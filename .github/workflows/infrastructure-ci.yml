name: Infrastructure validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: infrastructure-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Ansible, YAML, and Compose
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      ANSIBLE_CONFIG: ${{ github.workspace }}/ansible/ansible.cfg
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12.13"
          cache: pip

      - name: Install exact validation tools and Ansible collections
        run: |
          python -m pip install --disable-pip-version-check ansible-core==2.21.1 yamllint==1.38.0
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Validate YAML
        run: >-
          yamllint -c .yamllint.yml .github .trivyignore.yaml .yamllint.yml
          ansible compose services

      - name: Syntax-check Ansible without lab credentials
        run: |
          inventory="$RUNNER_TEMP/ci-inventory.ini"
          printf '[gateway]\nlocalhost ansible_connection=local\n[generic_rocky9]\n' > "$inventory"
          ansible-playbook -i "$inventory" ansible/os-prep.yml --syntax-check
          ansible-playbook -i "$inventory" ansible/deploy-stack-only.yml --syntax-check
          ansible-playbook -i "$inventory" ansible/site.yml --syntax-check

      - name: Render and validate base and lab Compose contracts
        run: bash scripts/validate-compose.sh

      - name: Run infrastructure security regression tests
        run: python3 -I -m unittest discover -v -s scripts/tests -p 'test_*.py'

      - name: Validate identity policy source parity
        run: python3 -I scripts/validate-identity-policy.py
