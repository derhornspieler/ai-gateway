name: CodeQL

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [python, go, actions]
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        if: matrix.language == 'go'
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.25.x
          cache: true
          cache-dependency-path: |
            services/dhi-health-probe/go.mod
            services/egress-proxy/go.mod
            services/vault-ui-proxy/go.mod

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          languages: ${{ matrix.language }}
          # Go does not support build-mode none. Manual mode also handles this
          # repository's three independent modules without relying on a
          # root-level go.mod that intentionally does not exist.
          build-mode: ${{ matrix.language == 'go' && 'manual' || 'none' }}

      - name: Build Go modules for CodeQL
        if: matrix.language == 'go'
        run: |
          for module in dhi-health-probe egress-proxy vault-ui-proxy; do
            (cd "services/$module" && go build ./...)
          done

      - name: Analyze
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          category: /language:${{ matrix.language }}
