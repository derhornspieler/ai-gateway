name: CodeQL

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [python, go, actions]
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Go
        if: matrix.language == 'go'
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26.x
          cache: true
          cache-dependency-path: |
            services/dhi-health-probe/go.mod
            services/egress-proxy/go.mod
            services/vault-ui-proxy/go.mod
            services/wif-provider-mock/go.mod

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: ${{ matrix.language }}
          # Go does not support build-mode none. Manual mode also handles this
          # repository's independent modules without relying on a
          # root-level go.mod that intentionally does not exist.
          build-mode: ${{ matrix.language == 'go' && 'manual' || 'none' }}

      - name: Build Go modules for CodeQL
        if: matrix.language == 'go'
        run: |
          for module in dhi-health-probe egress-proxy vault-ui-proxy wif-provider-mock; do
            (cd "services/$module" && go build ./...)
          done

      - name: Analyze
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: /language:${{ matrix.language }}
