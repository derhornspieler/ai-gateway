name: Go quality and final-image security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "31 8 * * 1"

permissions:
  contents: read

concurrency:
  group: go-security-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: ${{ matrix.module }} test, race, and vet
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        module: [dhi-health-probe, egress-proxy, vault-ui-proxy, wif-provider-mock]
    defaults:
      run:
        working-directory: services/${{ matrix.module }}
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26.x
          cache: true
          cache-dependency-path: services/${{ matrix.module }}/go.mod

      - name: Run tests with the race detector
        run: go test -race ./...

      - name: Vet
        run: go vet ./...

  final-image-sbom:
    name: ${{ matrix.image }} final image and SBOM
    if: >-
      ${{ github.ref == 'refs/heads/main' &&
          (github.event_name == 'push' || github.event_name == 'schedule') }}
    runs-on: ubuntu-24.04
    environment: release-container-security
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: dhi-health-probe
            context: services/dhi-health-probe
            base_image: dhi.io/oauth2-proxy:7.15.3@sha256:3e225291283ad41745327dcbd2e97b8a6aed461d38e9e84d1e664092b53f1158
          - image: egress-proxy
            context: services/egress-proxy
            base_image: ""
          - image: vault-ui-proxy
            context: services/vault-ui-proxy
            base_image: ""
          - image: wif-provider-mock
            context: services/wif-provider-mock
            base_image: ""
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Decide the DHI-authenticated artifact contract
        id: dhi
        env:
          DHI_USERNAME: ${{ secrets.DHI_USERNAME }}
          DHI_PASSWORD: ${{ secrets.DHI_PASSWORD }}
        run: |
          if [[ -n "$DHI_USERNAME" && -n "$DHI_PASSWORD" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          elif [[ -n "$DHI_USERNAME" || -n "$DHI_PASSWORD" ]]; then
            echo "::error::DHI_USERNAME and DHI_PASSWORD must be configured together"
            exit 1
          else
            echo "::error::DHI authentication is required for every main or scheduled final-image run"
            exit 1
          fi

      - name: Authenticate to DHI
        if: steps.dhi.outputs.available == 'true'
        env:
          DHI_USERNAME: ${{ secrets.DHI_USERNAME }}
          DHI_PASSWORD: ${{ secrets.DHI_PASSWORD }}
        run: printf '%s' "$DHI_PASSWORD" | docker login dhi.io --username "$DHI_USERNAME" --password-stdin

      - name: Build the actual final runtime image
        if: steps.dhi.outputs.available == 'true'
        env:
          IMAGE_NAME: ${{ matrix.image }}
          BUILD_CONTEXT: ${{ matrix.context }}
          BASE_IMAGE: ${{ matrix.base_image }}
        run: |
          if [[ "$IMAGE_NAME" == "egress-proxy" ]]; then
            planner="ai-gateway/ci-egress-policy-planner:${GITHUB_SHA}"
            final="ai-gateway/ci-${IMAGE_NAME}:${GITHUB_SHA}"
            docker build --pull --network=none --target policy-planner \
              --build-arg SOURCE_DATE_EPOCH=0 --tag "$planner" "$BUILD_CONTEXT"
            receipt="$({ docker run --rm --network none --read-only \
              --tmpfs /tmp:rw,noexec,nosuid,nodev,size=4m,mode=1777 \
              --user 65532:65532 --cap-drop ALL \
              --security-opt no-new-privileges:true "$planner" plan \
              --provider anthropic; } 2>/dev/null)"
            policy_sha="$(python3 -I -c \
              'import json,sys; print(json.load(sys.stdin)["egress_policy_sha256"])' \
              <<<"$receipt")"
            first="${RUNNER_TEMP}/egress-first.docker.tar"
            second="${RUNNER_TEMP}/egress-second.docker.tar"
            for output in "$first" "$second"; do
              docker buildx build --no-cache --pull=false --network=none \
                --platform linux/amd64 --provenance=false --sbom=false \
                --build-arg SOURCE_DATE_EPOCH=0 \
                --build-arg AIGW_EGRESS_PROVIDERS=anthropic \
                --build-arg "AIGW_EGRESS_POLICY_SHA256=$policy_sha" \
                --tag "$final" \
                --output "type=docker,dest=$output,rewrite-timestamp=true" \
                "$BUILD_CONTEXT"
            done
            cmp --silent "$first" "$second"
            docker image load --input "$first"
            live_receipt="$({ docker run --rm --network none --read-only \
              --user 65532:65532 --cap-drop ALL \
              --security-opt no-new-privileges:true "$final" receipt; } 2>/dev/null)"
            test "$live_receipt" = "$receipt"
            exit 0
          fi
          build_args=(--pull --tag "ai-gateway/ci-${IMAGE_NAME}:${GITHUB_SHA}")
          if [[ -n "$BASE_IMAGE" ]]; then
            build_args+=(--build-arg "BASE_IMAGE=$BASE_IMAGE")
          fi
          docker build "${build_args[@]}" "$BUILD_CONTEXT"

      - name: Remove DHI registry credentials
        if: ${{ always() && steps.dhi.outputs.available == 'true' }}
        run: docker logout dhi.io

      - name: Generate the final-image CycloneDX SBOM
        if: steps.dhi.outputs.available == 'true'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.72.0
          scan-type: image
          image-ref: ai-gateway/ci-${{ matrix.image }}:${{ github.sha }}
          format: cyclonedx
          output: ${{ matrix.image }}.cdx.json
          hide-progress: "true"

      - name: Upload the final-image SBOM
        if: steps.dhi.outputs.available == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.image }}-final-image-sbom
          path: ${{ matrix.image }}.cdx.json
          if-no-files-found: error
          retention-days: 14

      - name: Record explicit artifact disposition
        if: always()
        env:
          IMAGE_NAME: ${{ matrix.image }}
          DHI_AVAILABLE: ${{ steps.dhi.outputs.available }}
        run: |
          if [[ "$DHI_AVAILABLE" == "true" ]]; then
            echo "Final image and SBOM: COMPLETE ($IMAGE_NAME)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Final image and SBOM: SKIPPED/FAILED ($IMAGE_NAME; see DHI auth gate)" >> "$GITHUB_STEP_SUMMARY"
          fi
