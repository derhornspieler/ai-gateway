version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "10:15"
      timezone: America/New_York
    open-pull-requests-limit: 3
    cooldown:
      default-days: 7
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: /services/dev-portal
    schedule:
      interval: weekly
      day: monday
      time: "10:30"
      timezone: America/New_York
    open-pull-requests-limit: 3
    cooldown:
      default-days: 7
    groups:
      python:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: /services/key-rotator
    schedule:
      interval: weekly
      day: monday
      time: "10:45"
      timezone: America/New_York
    open-pull-requests-limit: 3
    cooldown:
      default-days: 7
    groups:
      python:
        patterns: ["*"]
