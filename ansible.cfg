# Repository-root Ansible configuration.
#
# WHY THIS FILE EXISTS (security control, not convenience):
# Ansible only auto-loads an ansible.cfg from the current working directory (or
# ANSIBLE_CONFIG / ~/.ansible.cfg / /etc/ansible/ansible.cfg). The documented
# converge commands in CLAUDE.md and docs/deploy-*.md run
#     ansible-playbook -i <inventory> ansible/site.yml
# from the REPOSITORY ROOT, where ./ansible.cfg -- not ansible/ansible.cfg -- is
# what Ansible discovers. Without this file, none of the settings in
# ansible/ansible.cfg apply to a repo-root run, and pipelining silently defaults
# to False.
#
# Pipelining being off is a confidentiality bug, not just a performance one. The
# Vault auto-unseal task and the LDAP bind task pass their decrypted secret on
# the module's stdin under no_log. no_log only suppresses Ansible's own logging;
# it does NOT stop Ansible from base64-embedding that stdin in the AnsiballZ
# module payload it writes to ~/.ansible/tmp on the TARGET when pipelining is
# off. Pipelining streams the module (and its stdin) over the SSH session
# instead, so the secret never lands on the remote disk. This file guarantees
# pipelining is on regardless of the invoking working directory.
#
# Keep in sync with ansible/ansible.cfg. Relative paths below resolve against
# this file's directory (the repo root), so they point into ansible/.
[defaults]
inventory = ansible/inventory/hosts.yml
roles_path = ansible/roles
host_key_checking = True
interpreter_python = auto_silent
# yaml stdout callback (community.general) was removed in v12; use the
# built-in default callback's yaml result format instead.
result_format = yaml
# Pipelining is declared here in [defaults] -- not only in [ssh_connection] --
# so it is the GLOBAL default and is reported by `ansible-config dump` as
# ANSIBLE_PIPELINING = True. The global setting reads [defaults]/[connection],
# never [ssh_connection], so an [ssh_connection]-only value leaves the audit
# dump showing the misleading default of False.
pipelining = True

[ssh_connection]
# Explicit SSH-connection statement of the same control. The ssh connection
# plugin reads pipelining from [defaults], [connection], and [ssh_connection].
pipelining = True
