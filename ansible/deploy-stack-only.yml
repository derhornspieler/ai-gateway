---
# Safe partial converge: bring up the container stack ONLY.
# Host network (routing, firewalld zones, docker networks) is already converged
# on the target; re-running those roles is unnecessary for an app-only rollout.
# docker_stack does not touch host networking, so it is safe in isolation.
# Kept in the ansible/ project root so playbook-adjacent group_vars/all.yml loads.
- name: AI Gateway — container stack only
  hosts: gateway:generic_rocky9
  become: true
  pre_tasks:
    - name: Preflight — require a bounded canonical lowercase deployment domain
      ansible.builtin.assert:
        that:
          - >-
            (aigw_domain | default('')) is string and
            (aigw_domain | default('') | length <= 253) and
            (aigw_domain | default('')) is match(
              '^(?=.{1,253}$)(?:[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?\.)+[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?$'
            )
        quiet: true
        fail_msg: >-
          Refusing stack-only mutation: aigw_domain must be a bounded canonical
          lowercase FQDN.
      no_log: true

    # Stack-only is deliberately unable to create/adopt a Docker host. Require
    # the exact marker promoted only after a successful full converge, and
    # refuse a host left in the pending state after a partial daemon-policy
    # change.
    - name: Preflight — define the completed dedicated-Docker-host marker contract
      ansible.builtin.set_fact:
        stack_only_docker_host_marker_content: |
          format=aigw-dedicated-docker-host-v1
          project={{ compose_project_name }}
          docker_data_root={{ docker_data_root }}

    - name: Preflight — inspect completed and pending dedicated-host markers
      ansible.builtin.stat:
        path: "{{ item }}"
        follow: false
        get_checksum: false
      loop:
        - "{{ aigw_docker_host_marker }}"
        - "{{ aigw_docker_host_pending_marker }}"
      register: stack_only_host_markers
      changed_when: false

    - name: Preflight — read the completed dedicated-host marker
      ansible.builtin.slurp:
        src: "{{ aigw_docker_host_marker }}"
      register: stack_only_docker_host_marker_raw
      no_log: true
      when: stack_only_host_markers.results[0].stat.exists | default(false)

    - name: Preflight — require a completed exact dedicated-host marker
      ansible.builtin.assert:
        that:
          - stack_only_host_markers.results[0].stat.exists | default(false)
          - stack_only_host_markers.results[0].stat.isreg | default(false)
          - not (stack_only_host_markers.results[0].stat.islnk | default(false))
          - stack_only_host_markers.results[0].stat.uid == 0
          - stack_only_host_markers.results[0].stat.gid == 0
          - stack_only_host_markers.results[0].stat.mode == '0600'
          - (stack_only_docker_host_marker_raw.content | b64decode) == stack_only_docker_host_marker_content
          - not (stack_only_host_markers.results[1].stat.exists | default(false))
        quiet: true
        fail_msg: >-
          Refusing stack-only mutation: run a successful full site.yml converge
          first. The exact completed dedicated-Docker-host marker is required
          and no pending adoption marker may remain.
      no_log: true

    # This partial play deliberately omits os_baseline. Refuse to recreate a
    # single container unless the full converge has already enabled Docker's
    # SELinux integration; host enforcement alone does not label containers.
    - name: Preflight — read effective SELinux enforcement mode
      ansible.builtin.command: getenforce
      register: preflight_selinux_mode
      changed_when: false

    - name: Preflight — read Docker SELinux and state-root configuration
      ansible.builtin.command:
        argv: [docker, --host, unix:///run/docker.sock, info, --format=json]
      register: stack_only_docker_info
      changed_when: false

    - name: Preflight — require the fully converged SELinux container boundary
      ansible.builtin.assert:
        that:
          - ansible_facts.selinux.status == 'enabled'
          - ansible_facts.selinux.mode == 'enforcing'
          - ansible_facts.selinux.type == 'targeted'
          - preflight_selinux_mode.stdout | trim == 'Enforcing'
          - "'name=selinux' in (stack_only_docker_info.stdout | from_json).SecurityOptions"
          - (stack_only_docker_info.stdout | from_json).DockerRootDir == docker_data_root
        quiet: true
        fail_msg: >-
          Refusing stack-only mutation: run the full site.yml converge first so
          Docker is SELinux-enabled on the reviewed data root. Stack-only must
          never recreate the graph under an unconfined daemon.

    - name: Preflight — capture the SELinux AVC audit window start
      # ausearch under LC_ALL=C requires MM/DD/YY on Rocky 9; YYYY is a
      # parser error and must never be mistaken for a clean audit window.
      ansible.builtin.command: date +'%m/%d/%y %H:%M:%S'
      environment:
        LC_ALL: C
      register: aigw_selinux_audit_window_start
      changed_when: false

    - name: Preflight — require encrypted backing for all sensitive state
      ansible.builtin.command:
        argv:
          - python3
          - -c
          - |
            import json, pathlib, subprocess, sys

            errors = []
            for configured in json.loads(sys.argv[1]):
                path = pathlib.Path(configured)
                probe = path
                while not probe.exists() and probe != probe.parent:
                    probe = probe.parent
                found = subprocess.run(
                    ["findmnt", "-n", "-o", "SOURCE", "-T", str(probe)],
                    check=True, text=True, capture_output=True,
                ).stdout.strip()
                source = found.split("[", 1)[0]
                ancestry = []
                if source.startswith("/dev/"):
                    ancestry = subprocess.run(
                        ["lsblk", "-s", "-n", "-o", "FSTYPE", source],
                        check=True, text=True, capture_output=True,
                    ).stdout.splitlines()
                if "crypto_LUKS" not in {value.strip() for value in ancestry}:
                    errors.append(f"{configured}: {source or found} has no crypto_LUKS ancestor")
            if errors:
                raise SystemExit("; ".join(errors))
          - "{{ encrypted_state_paths | to_json }}"
      changed_when: false
      when: aigw_encrypted_state_preflight_required | bool

    - name: Preflight — read live DOCKER-USER policy
      ansible.builtin.command: iptables -S DOCKER-USER
      register: stack_only_du
      changed_when: false

    - name: Preflight — require identity-pinned egress and original-direction default drop
      ansible.builtin.assert:
        that:
          - "'-i br-egress' in stack_only_du.stdout"
          - "('-s ' ~ envoy_egress_ip ~ '/32') in stack_only_du.stdout"
          - "('-o ' ~ nic_egress ~ ' -p tcp') in stack_only_du.stdout"
          - "'--dport 443 -j RETURN' in stack_only_du.stdout"
          - "'--ctdir REPLY -j RETURN' in stack_only_du.stdout"
          - "'--ctdir ORIGINAL' in stack_only_du.stdout"
          - "'--ctstate DNAT' in stack_only_du.stdout"
          - "('--ctorigdst ' ~ eth1_ip) in stack_only_du.stdout"
          - "('--ctorigdst ' ~ eth2_ip) in stack_only_du.stdout"
          - "'-i br+ ! -o br+ -j DROP' in stack_only_du.stdout"
        fail_msg: >-
          Refusing stack-only deployment: live DOCKER-USER does not prove the
          exact Envoy:443 allow plus the all-bridge original-direction drop.
          Run the full site.yml network/firewall converge first.

    - name: Preflight — read container-to-host boundary
      ansible.builtin.command: nft list table inet aigw_guard
      register: stack_only_host_input
      changed_when: false

    - name: Preflight — require native internal-to-egress drops before reply allowance
      ansible.builtin.command:
        argv:
          - python3
          - -I
          - -c
          - |
            import sys

            policy = sys.stdin.read()
            marker = "chain container_forward {"
            if policy.count(marker) != 1:
                raise SystemExit("aigw_guard must contain exactly one container_forward chain")
            forward = policy.split(marker, 1)[1]
            reply = forward.find("ct state established,related ct direction reply accept")
            if reply < 0:
                raise SystemExit("container_forward has no explicit reply-only allowance")
            errors = []
            for ingress, egress in ((sys.argv[1], sys.argv[2]), (sys.argv[2], sys.argv[1])):
                drop = f'iifname "{ingress}" oifname "{egress}" drop'
                position = forward.find(drop)
                if position < 0:
                    errors.append(f"missing physical cross-plane drop: {drop}")
                elif position > reply:
                    errors.append(f"physical cross-plane drop occurs after reply allowance: {drop}")
                if f'iifname "{ingress}" oifname "{egress}" accept' in forward:
                    errors.append(f"physical cross-plane accept exists: {ingress}->{egress}")
            if errors:
                raise SystemExit("; ".join(errors))
          - "{{ nic_internal }}"
          - "{{ nic_egress }}"
        stdin: "{{ stack_only_host_input.stdout }}"
        stdin_add_newline: false
      changed_when: false

    - name: Preflight — require every managed bridge to be denied new host connections
      ansible.builtin.assert:
        that:
          - "'chain container_forward' in stack_only_host_input.stdout"
          - "('ip saddr ' ~ envoy_egress_ip) in stack_only_host_input.stdout"
          - "'ct status dnat' in stack_only_host_input.stdout"
          - "('ct original ip daddr ' ~ eth1_ip) in stack_only_host_input.stdout"
          - "('ct original ip daddr ' ~ eth2_ip) in stack_only_host_input.stdout"
          - "('iifname \"' ~ item.bridge ~ '\" drop') in stack_only_host_input.stdout"
          - "('iifname \"' ~ item.bridge ~ '\" ct state established,related ct direction reply accept') in stack_only_host_input.stdout"
        fail_msg: "Host INPUT boundary is missing for {{ item.bridge }}; run site.yml."
      loop: "{{ docker_networks }}"
      loop_control:
        label: "{{ item.bridge }}"

    - name: Preflight — require exact Envoy-only Internet DNS rules
      ansible.builtin.assert:
        that:
          - "('ip saddr ' ~ envoy_egress_ip ~ ' ip daddr ' ~ item) in stack_only_host_input.stdout"
          - "('oifname \"' ~ nic_egress ~ '\"') in stack_only_host_input.stdout"
        fail_msg: "Internet resolver {{ item }} is not bound to Envoy and the egress NIC; run site.yml."
      loop: "{{ egress_dns_servers }}"

    - name: Preflight — require the current internal resolver firewall tuples
      ansible.builtin.assert:
        that:
          - >-
            (platform_authoritative_dns_enabled | bool) or
            (('-d ' ~ item ~ '/32') in stack_only_du.stdout)
          - >-
            (platform_authoritative_dns_enabled | bool) or
            (('ip daddr ' ~ item) in stack_only_host_input.stdout)
          - >-
            not (platform_authoritative_dns_enabled | bool) or
            (('-i br-lab-dns' in stack_only_du.stdout) and
             (('-s ' ~ lab_dns_ip ~ '/32') in stack_only_du.stdout) and
             ('--sport 53' in stack_only_du.stdout) and
             ('--ctdir REPLY' in stack_only_du.stdout))
          - >-
            not (platform_authoritative_dns_enabled | bool) or
            (('iifname "br-lab-dns"' in stack_only_host_input.stdout) and
             (('ip saddr ' ~ lab_dns_ip) in stack_only_host_input.stdout) and
             ('sport 53' in stack_only_host_input.stdout) and
             ('ct direction reply accept' in stack_only_host_input.stdout))
          - >-
            (platform_authoritative_dns_enabled | bool) or
            not (('-i br-lab-dns' in stack_only_du.stdout) and
                 ('--sport 53' in stack_only_du.stdout) and
                 ('--ctdir REPLY' in stack_only_du.stdout))
          - >-
            (platform_authoritative_dns_enabled | bool) or
            not (('iifname "br-lab-dns"' in stack_only_host_input.stdout) and
                 ('sport 53' in stack_only_host_input.stdout) and
                 ('ct direction reply accept' in stack_only_host_input.stdout))
        fail_msg: >-
          Internal resolver or authoritative platform-DNS firewall policy does
          not match this inventory. Run the full site.yml converge before a
          stack-only rollout.
      loop: "{{ internal_dns_servers }}"

    - name: Preflight — require firewall services active
      ansible.builtin.command: >-
        systemctl is-active aigw-host-input-rules.service
        docker-user-rules.service docker-user-rules-watch.service
      register: stack_only_firewall_services
      changed_when: false

    - name: Preflight — inspect every required external Docker network
      ansible.builtin.command:
        argv: [docker, --host, unix:///run/docker.sock, network, inspect, "{{ item.name }}"]
      loop: "{{ docker_networks }}"
      loop_control:
        label: "{{ item.name }}"
      register: stack_only_networks
      changed_when: false

    - name: Preflight — require exact bridge driver, name, subnet, and IPv6-off state
      ansible.builtin.assert:
        that:
          - (item.stdout | from_json | first).Driver == 'bridge'
          - (item.stdout | from_json | first).Internal == item.item.internal
          - not ((item.stdout | from_json | first).EnableIPv6 | bool)
          - (item.stdout | from_json | first).Options['com.docker.network.bridge.name'] == item.item.bridge
          - item.item.subnet in ((item.stdout | from_json | first).IPAM.Config | map(attribute='Subnet') | list)
        fail_msg: "Docker network {{ item.item.name }} does not match group_vars; run site.yml."
      loop: "{{ stack_only_networks.results }}"
      loop_control:
        label: "{{ item.item.name }}"
  roles:
    - role: docker_stack
    - role: verify
