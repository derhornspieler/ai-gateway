---
# Controller-only input gate for a generated production/customer inventory. It
# never gathers remote facts, contacts the target, or changes host state.
#
# This is the SHARED implementation for both preflight entry points. The
# canonical entry point is ansible/preflight-rocky9-production.yml, which simply
# imports this play; ansible/preflight-generic-rocky9.yml is its DEPRECATED
# compatibility name. Both accept the canonical 'rocky9-production' profile
# (group production_rocky9, a child of generic_rocky9) and the deprecated
# 'generic-rocky9' profile; a generic-rocky9 inventory additionally prints a
# one-line deprecation notice below. The AIGW_GENERIC_PREFLIGHT receipt name and
# aigw_generic_* fact names are deliberately unrenamed: they are a pinned
# machine-readable interface (tests and docs consume the exact strings).
- name: AI Gateway generic Rocky 9 — inventory and Vault contract
  hosts: generic_rocky9
  gather_facts: false
  become: false
  connection: local
  vars:
    aigw_generic_rocky9_contract: >-
      {{ lookup('ansible.builtin.file', playbook_dir ~ '/generic-rocky9-contract.json') | from_json }}
  pre_tasks:
    - name: Preflight — locate the alias-matched generated host-vars file
      ansible.builtin.stat:
        path: "{{ inventory_dir }}/host_vars/{{ inventory_hostname }}.yml"
        follow: false
        get_checksum: false
      delegate_to: localhost
      register: aigw_generic_host_vars_file
      changed_when: false

    - name: Preflight — initialize generic contract result lists
      ansible.builtin.set_fact:
        aigw_generic_missing_nonsecret_keys: []
        aigw_generic_missing_secret_keys: []
        aigw_generic_missing_identity_ldap: []
        aigw_generic_invalid_identity_ldap: []
      changed_when: false

    - name: Preflight — warn on deprecated generic-rocky9 profile terminology
      ansible.builtin.debug:
        msg: >-
          DEPRECATION: deployment_profile 'generic-rocky9' (group generic_rocky9)
          is a compatibility alias; migrate to the canonical 'rocky9-production'
          profile (group production_rocky9) generated by
          scripts/bootstrap-rocky9-production.py and gated by
          ansible/preflight-rocky9-production.yml.
      when: deployment_profile | default('') == aigw_generic_rocky9_contract.profile
      changed_when: false

    - name: Preflight — collect missing generic non-secret inputs
      ansible.builtin.set_fact:
        aigw_generic_missing_nonsecret_keys: >-
          {{ aigw_generic_missing_nonsecret_keys +
             ([item] if (
               ((lookup('vars', item, default='') is string) and
                (lookup('vars', item, default='') | trim | length == 0)) or
               ((lookup('vars', item, default='') is sequence) and
                (lookup('vars', item, default='') is not string) and
                (lookup('vars', item, default='') | length == 0))
             ) else []) }}
      loop: "{{ aigw_generic_rocky9_contract.required_nonsecret_keys }}"
      loop_control:
        label: "{{ item }}"
      changed_when: false

    - name: Preflight — collect missing generic Vault keys without emitting values
      ansible.builtin.set_fact:
        aigw_generic_missing_secret_keys: >-
          {{ aigw_generic_missing_secret_keys +
             ([item.name] if (lookup('vars', item.name, default='') | length == 0) else []) }}
      loop: "{{ aigw_generic_rocky9_contract.required_secret_keys }}"
      loop_control:
        label: "{{ item.name }}"
      changed_when: false

    # Optional external Active Directory federation. Every input is required
    # the moment identity_ldap_enabled is true; the bind credential is a
    # customer-supplied secret that this bootstrap never generates.
    - name: Preflight — collect missing external directory inputs
      ansible.builtin.set_fact:
        aigw_generic_missing_identity_ldap: >-
          {{ aigw_generic_missing_identity_ldap +
             ([item] if (lookup('vars', item, default='') | string | trim | length == 0)
              else []) }}
      loop: >-
        {{ aigw_generic_rocky9_contract.conditional_feature_keys.identity_ldap.required_nonsecret_keys }}
      loop_control:
        label: "{{ item }}"
      when: identity_ldap_enabled | default(false) | bool
      changed_when: false

    - name: Preflight — collect the missing external directory bind credential
      ansible.builtin.set_fact:
        aigw_generic_missing_identity_ldap: >-
          {{ aigw_generic_missing_identity_ldap +
             (['identity_ldap_bind_password']
              if (lookup('vars', 'identity_ldap_bind_password', default='') | length == 0)
              else []) }}
      when: identity_ldap_enabled | default(false) | bool
      changed_when: false
      no_log: true

    - name: Preflight — validate external directory inputs without emitting values
      ansible.builtin.assert:
        that:
          - not (samba_lab_enabled | default(false) | bool)
          - 'identity_ldap_url is match("^ldaps://[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?(?:\\.[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?)+(?::636)?$")'
          - 'identity_ldap_provider_name is match("^[A-Za-z0-9][A-Za-z0-9_.-]{0,63}$")'
          - identity_ldap_provider_name != 'lab-samba-ad'
          - identity_ldap_users_dn | length <= 512
          - identity_ldap_bind_dn | length <= 512
          - 'identity_ldap_users_dn is match("(?i)^(CN|OU)=")'
          - 'identity_ldap_bind_dn is match("(?i)^(CN|OU)=")'
          - 'identity_ldap_users_dn is search("(?i)DC=")'
          - 'identity_ldap_bind_dn is search("(?i)DC=")'
          - 'identity_ldap_users_dn is match("^[\\x20-\\x7e]+$")'
          - 'identity_ldap_bind_dn is match("^[\\x20-\\x7e]+$")'
          - 'identity_ldap_directory_ip is match("^(?:(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})\\.){3}(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})$")'
          - identity_ldap_vendor in ['ad', 'rhds', 'other']
          - 'identity_ldap_username_attribute is match("^[A-Za-z][A-Za-z0-9-]{0,59}$")'
          - 'identity_ldap_rdn_attribute is match("^[A-Za-z][A-Za-z0-9-]{0,59}$")'
          - 'identity_ldap_uuid_attribute is match("^[A-Za-z][A-Za-z0-9-]{0,59}$")'
          - 'identity_ldap_user_object_classes is match("^[A-Za-z][A-Za-z0-9-]{0,63}(, [A-Za-z][A-Za-z0-9-]{0,63}){0,7}$")'
          - 'identity_ldap_user_filter is match("^\\([A-Za-z0-9()&|!=<>~*.,:@ _\\\\-]{1,510}\\)$")'
          - identity_ldap_user_filter.count('(') == identity_ldap_user_filter.count(')')
          - identity_ldap_bind_password | length >= 16
          - identity_ldap_bind_password | length <= 512
          - 'identity_ldap_bind_password is match("^[\\x20-\\x7e]+$")'
        quiet: true
      register: aigw_generic_identity_ldap_validation
      delegate_to: localhost
      when: >-
        (identity_ldap_enabled | default(false) | bool) and
        (aigw_generic_missing_identity_ldap | length == 0)
      changed_when: false
      ignore_errors: true
      no_log: true

    # The bundle is public reviewed content, but it is about to become the sole
    # LDAPS trust anchor. Refuse anything that is not a bounded certificates-only
    # PEM before the converge can mount it into Keycloak.
    - name: Preflight — inspect the external directory CA bundle without following links
      ansible.builtin.stat:
        path: "{{ identity_ldap_ca_bundle_src }}"
        follow: false
      delegate_to: localhost
      register: aigw_generic_identity_ldap_ca
      when: >-
        (identity_ldap_enabled | default(false) | bool) and
        (aigw_generic_missing_identity_ldap | length == 0)
      changed_when: false

    - name: Preflight — validate the external directory CA bundle without emitting it
      ansible.builtin.assert:
        that:
          - aigw_generic_identity_ldap_ca.stat.exists | default(false)
          - aigw_generic_identity_ldap_ca.stat.isreg | default(false)
          - not (aigw_generic_identity_ldap_ca.stat.islnk | default(false))
          - (aigw_generic_identity_ldap_ca.stat.size | default(0) | int) > 0
          - (aigw_generic_identity_ldap_ca.stat.size | default(0) | int) <= 262144
          - >-
            lookup('ansible.builtin.file', identity_ldap_ca_bundle_src)
            is search('-----BEGIN CERTIFICATE-----')
          - >-
            lookup('ansible.builtin.file', identity_ldap_ca_bundle_src)
            is not search('PRIVATE KEY')
        quiet: true
      register: aigw_generic_identity_ldap_ca_validation
      delegate_to: localhost
      when: >-
        (identity_ldap_enabled | default(false) | bool) and
        (aigw_generic_missing_identity_ldap | length == 0)
      changed_when: false
      ignore_errors: true

    - name: Preflight — collect invalid external directory key classes only
      ansible.builtin.set_fact:
        aigw_generic_invalid_identity_ldap: >-
          {{
            ({} if not (aigw_generic_identity_ldap_validation.failed | default(false))
             else {'identity_ldap': 'bounded_ldaps_directory_contract'}) |
            combine(
              {} if not (aigw_generic_identity_ldap_ca_validation.failed | default(false))
              else {'identity_ldap_ca_bundle_src': 'certificates_only_pem'}
            )
          }}
      changed_when: false

    # The domain is subsequently rendered into DNS, TLS, OIDC, Traefik, and
    # environment files. Validate its complete grammar on the controller
    # before any target play can consume it; never put the supplied value in
    # the result.
    - name: Preflight — validate generic canonical lowercase FQDN without emitting its value
      ansible.builtin.assert:
        that:
          - >-
            (aigw_domain | default('')) is string and
            (aigw_domain | default('') | length <= 253) and
            (aigw_domain | default('')) is match(
              '^(?=.{1,253}$)(?:[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?\.)+[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?$'
            )
        quiet: true
        fail_msg: aigw_domain must be a bounded canonical lowercase FQDN
      register: aigw_generic_domain_validation
      delegate_to: localhost
      changed_when: false
      ignore_errors: true
      no_log: true

    - name: Preflight — collect invalid generic non-secret key classes only
      ansible.builtin.set_fact:
        aigw_generic_invalid_nonsecret: >-
          {{ {} if not (aigw_generic_domain_validation.failed | default(false))
             else {'aigw_domain': 'canonical_lowercase_fqdn'} }}
      changed_when: false

    - name: Preflight — validate generic Vault values without emitting values
      ansible.builtin.assert:
        that:
          - >-
            lookup('vars', item.name, default='') | length >=
            (item.exact_length if item.exact_length is defined else item.min_length)
          - >-
            item.exact_length is not defined or
            lookup('vars', item.name, default='') | length == item.exact_length
          - >-
            lookup('vars', item.name, default='') is regex(
              '^[A-Za-z0-9]+$' if item.alphabet == 'alnum'
              else '^[A-Za-z0-9_-]+$'
            )
          - >-
            lookup('vars', item.name, default='') | lower not in
            ['change_me', 'changeme', 'replace_me', 'password', 'secret']
        quiet: true
      loop: "{{ aigw_generic_rocky9_contract.required_secret_keys }}"
      loop_control:
        label: "{{ item.name }}"
      register: aigw_generic_secret_validation
      delegate_to: localhost
      changed_when: false
      ignore_errors: true
      no_log: true

    - name: Preflight — collect invalid generic Vault key names only
      ansible.builtin.set_fact:
        aigw_generic_invalid_secret_keys: >-
          {{ aigw_generic_secret_validation.results
             | selectattr('failed', 'equalto', true)
             | map(attribute='item.name') | list }}
      changed_when: false

    - name: Preflight — require distinct generic portal trust-boundary secrets
      ansible.builtin.assert:
        that:
          - portal_identity_token != rotator_internal_token
        quiet: true
      register: aigw_generic_identity_token_boundary
      delegate_to: localhost
      changed_when: false
      ignore_errors: true
      no_log: true

    - name: Preflight — require distinct generic portal session secrets
      ansible.builtin.assert:
        that:
          - portal_session_secret != admin_portal_session_secret
        quiet: true
      register: aigw_generic_session_secret_boundary
      delegate_to: localhost
      changed_when: false
      ignore_errors: true
      no_log: true

    - name: Preflight — require distinct generic OIDC client secrets
      ansible.builtin.assert:
        that:
          - >-
            [webui_oidc_client_secret, portal_oidc_client_secret,
             admin_portal_oidc_client_secret,
             oauth2_proxy_client_secret] | unique | length == 4
        quiet: true
      register: aigw_generic_oidc_secret_boundary
      delegate_to: localhost
      changed_when: false
      ignore_errors: true
      no_log: true

    - name: Preflight — collect duplicate generic trust-boundary labels only
      ansible.builtin.set_fact:
        aigw_generic_duplicate_secret_boundaries: >-
          {{
            ([] if not (aigw_generic_identity_token_boundary.failed | default(false))
             else ['portal_identity_token,rotator_internal_token']) +
            ([] if not (aigw_generic_session_secret_boundary.failed | default(false))
             else ['portal_session_secret,admin_portal_session_secret']) +
            ([] if not (aigw_generic_oidc_secret_boundary.failed | default(false))
             else ['webui_oidc_client_secret,portal_oidc_client_secret,admin_portal_oidc_client_secret,oauth2_proxy_client_secret'])
          }}
      changed_when: false

    - name: Preflight — reject lab-only feature paths from generic inventory
      ansible.builtin.set_fact:
        aigw_generic_forbidden_lab_options: >-
          {{
            ([] if not (samba_lab_enabled | default(false) | bool)
             else ['samba_lab_enabled']) +
            ([] if not (aigw_seed_test_users | default(false) | bool)
             else ['aigw_seed_test_users']) +
            ([] if not (retain_bootstrap_admin_user | default(false) | bool)
             else ['retain_bootstrap_admin_user']) +
            ([] if not (aigw_prebootstrap_oidc_scope_reconciliation | default(false) | bool)
             else ['aigw_prebootstrap_oidc_scope_reconciliation']) +
            ([] if not (aigw_prebootstrap_oidc_scope_reconciliation_ack | default('') | length > 0)
             else ['aigw_prebootstrap_oidc_scope_reconciliation_ack']) +
            ([] if not (aigw_ssh_password_authentication | default(false) | bool)
             else ['aigw_ssh_password_authentication']) +
            ([] if not (aigw_adm_socks_enabled | default(false) | bool)
             else ['aigw_adm_socks_enabled']) +
            ([] if (aigw_lab_reset_handoff_drop_interfaces | default([]) | length == 0)
             else ['aigw_lab_reset_handoff_drop_interfaces']) +
            ([] if (require_encrypted_state | default(true) | bool)
             else ['require_encrypted_state=false'])
          }}
      changed_when: false

    - name: Preflight — report a machine-readable generic inventory result
      ansible.builtin.assert:
        that:
          - >-
            deployment_profile | default('') in
            [aigw_generic_rocky9_contract.profile,
             aigw_generic_rocky9_contract.canonical_profile]
          - aigw_generic_inventory_alias | default('') == inventory_hostname
          - aigw_vault_ui_enabled is boolean
          - identity_ldap_enabled is boolean
          - aigw_generic_host_vars_file.stat.exists | default(false)
          - aigw_generic_host_vars_file.stat.isreg | default(false)
          - not (aigw_generic_host_vars_file.stat.islnk | default(false))
          - aigw_generic_missing_nonsecret_keys | length == 0
          - aigw_generic_invalid_nonsecret | length == 0
          - aigw_generic_missing_secret_keys | length == 0
          - aigw_generic_invalid_secret_keys | length == 0
          - aigw_generic_duplicate_secret_boundaries | length == 0
          - aigw_generic_forbidden_lab_options | length == 0
          - aigw_generic_missing_identity_ldap | length == 0
          - aigw_generic_invalid_identity_ldap | length == 0
        quiet: true
        fail_msg: >-
          AIGW_GENERIC_PREFLIGHT={{ {
            'schema': 'aigw.generic-rocky9/preflight-v1',
            'status': 'invalid',
            'host': inventory_hostname,
            'expected_host_vars': inventory_dir ~ '/host_vars/' ~ inventory_hostname ~ '.yml',
            'profile': deployment_profile | default(''),
            'missing_nonsecret': aigw_generic_missing_nonsecret_keys,
            'invalid_nonsecret': aigw_generic_invalid_nonsecret,
            'missing_secret': aigw_generic_missing_secret_keys,
            'invalid_secret': aigw_generic_invalid_secret_keys,
            'duplicate_secret_boundaries': aigw_generic_duplicate_secret_boundaries,
            'forbidden_lab_options': aigw_generic_forbidden_lab_options,
            'missing_identity_ldap': aigw_generic_missing_identity_ldap,
            'invalid_identity_ldap': aigw_generic_invalid_identity_ldap
          } | to_json }}

    - name: Preflight — emit the successful machine-readable generic contract receipt
      ansible.builtin.debug:
        msg: >-
          AIGW_GENERIC_PREFLIGHT={{ {
            'schema': 'aigw.generic-rocky9/preflight-v1',
            'status': 'ok',
            'host': inventory_hostname,
            'profile': deployment_profile,
            'host_vars': inventory_dir ~ '/host_vars/' ~ inventory_hostname ~ '.yml',
            'secret_key_count': aigw_generic_rocky9_contract.required_secret_keys | length,
            'missing_identity_ldap': aigw_generic_missing_identity_ldap,
            'invalid_identity_ldap': aigw_generic_invalid_identity_ldap
          } | to_json }}
