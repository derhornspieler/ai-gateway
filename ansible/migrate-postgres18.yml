---
# PostgreSQL 16 -> 18 is deliberately separate from ordinary image updates.
# First use --tags postgres_migration_stage to place the new backup/migration
# helpers on the PG16 host. Take a new encrypted backup, then run this playbook
# without a tag filter. The imported stack converge closes the rollback window
# before it starts PostgreSQL 18.
- name: AI Gateway — stage and run the PostgreSQL 18 logical migration
  hosts: generic_rocky9
  become: true
  tasks:
    - name: Inspect the deployed stack before staging migration tools
      ansible.builtin.stat:
        path: "{{ stack_dir }}"
        follow: false
        get_checksum: false
      register: postgres_migration_stack
      tags: [postgres_migration_stage]

    - name: Require a safe deployed stack boundary for migration tools
      ansible.builtin.assert:
        that:
          - postgres_migration_stack.stat.isdir | default(false)
          - not (postgres_migration_stack.stat.islnk | default(false))
          - postgres_migration_stack.stat.uid == 0
          - postgres_migration_stack.stat.gid == 0
          - postgres_migration_stack.stat.mode in ['0700', '0750']
        quiet: true
        fail_msg: PostgreSQL migration requires an existing root-owned AI Gateway stack.
      tags: [postgres_migration_stage]

    - name: Stage only the reviewed PostgreSQL backup and migration helpers
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../scripts/{{ item }}"
        dest: "{{ stack_dir }}/scripts/{{ item }}"
        owner: root
        group: root
        mode: "0750"
        follow: false
      loop:
        - postgres-major-migrate.py
        - restore_archive.py
        - state-backup.sh
      tags: [postgres_migration_stage]

    - name: Validate operator-supplied PostgreSQL migration inputs
      ansible.builtin.assert:
        that:
          - postgres_migration_backup_path is string
          - postgres_migration_backup_path is match('^/(?:[A-Za-z0-9][A-Za-z0-9._-]{0,127})(?:/[A-Za-z0-9][A-Za-z0-9._-]{0,127}){1,15}\\.age$')
          - postgres_migration_age_identity_path is string
          - postgres_migration_age_identity_path is match('^/run/ai-gateway-postgres18/[A-Za-z0-9][A-Za-z0-9._-]{0,127}$')
          - postgres_migration_backup_sha256 is match('^[0-9a-f]{64}$')
          - postgres_migration_confirm == 'MIGRATE_POSTGRES_16_TO_18'
          - pg_data_volume_name is match('^[A-Za-z0-9][A-Za-z0-9_.-]{0,127}$')
          - pg_data_volume_name != compose_project_name ~ '_pg_data'
        quiet: true
        fail_msg: >-
          Supply canonical target-host backup/identity paths, the authenticated
          backup SHA-256, and postgres_migration_confirm=MIGRATE_POSTGRES_16_TO_18.
      no_log: true
      tags: [postgres_migration_run]

    - name: Plan the PostgreSQL 18 migration without changing Docker state
      ansible.builtin.command:
        argv:
          - python3
          - -I
          - "{{ stack_dir }}/scripts/postgres-major-migrate.py"
          - plan
          - --input
          - "{{ postgres_migration_backup_path }}"
          - --identity
          - "{{ postgres_migration_age_identity_path }}"
          - --sha256
          - "{{ postgres_migration_backup_sha256 }}"
          - --source-volume
          - "{{ compose_project_name }}_pg_data"
          - --target-volume
          - "{{ pg_data_volume_name }}"
          - --receipt
          - "{{ stack_dir }}/.state/postgres-major-migration-v1.json"
          - --project
          - "{{ compose_project_name }}"
          - --stack-dir
          - "{{ stack_dir }}"
          - --deployment-profile
          - "{{ deployment_profile }}"
          - --max-backup-age-minutes
          - "{{ postgres_migration_max_backup_age_minutes | default(30) | string }}"
      register: postgres_migration_plan
      changed_when: true
      failed_when: >-
        postgres_migration_plan.rc != 0 or
        'POSTGRES_MIGRATION_PLANNED' not in postgres_migration_plan.stdout
      no_log: true
      tags: [postgres_migration_run]

    - name: Restore PostgreSQL 16 logical dumps into the fresh PostgreSQL 18 volume
      block:
        - name: Run the bounded PostgreSQL 18 migration
          ansible.builtin.command:
            argv:
              - python3
              - -I
              - "{{ stack_dir }}/scripts/postgres-major-migrate.py"
              - migrate
              - --input
              - "{{ postgres_migration_backup_path }}"
              - --identity
              - "{{ postgres_migration_age_identity_path }}"
              - --sha256
              - "{{ postgres_migration_backup_sha256 }}"
              - --source-volume
              - "{{ compose_project_name }}_pg_data"
              - --target-volume
              - "{{ pg_data_volume_name }}"
              - --receipt
              - "{{ stack_dir }}/.state/postgres-major-migration-v1.json"
              - --project
              - "{{ compose_project_name }}"
              - --stack-dir
              - "{{ stack_dir }}"
              - --deployment-profile
              - "{{ deployment_profile }}"
              - --max-backup-age-minutes
              - "{{ postgres_migration_max_backup_age_minutes | default(30) | string }}"
              - --confirm
              - MIGRATE_POSTGRES_16_TO_18
          register: postgres_migration_restore
          changed_when: true
          failed_when: >-
            postgres_migration_restore.rc != 0 or
            'POSTGRES_MIGRATION_RESTORED' not in postgres_migration_restore.stdout
          no_log: true
      rescue:
        - name: Restart the exact PostgreSQL 16 graph after a pre-cutover failure
          ansible.builtin.command:
            argv:
              - python3
              - -I
              - "{{ stack_dir }}/scripts/postgres-major-migrate.py"
              - rollback
              - --receipt
              - "{{ stack_dir }}/.state/postgres-major-migration-v1.json"
              - --project
              - "{{ compose_project_name }}"
              - --target-volume
              - "{{ pg_data_volume_name }}"
              - --confirm
              - ROLLBACK_POSTGRES_18_TO_16
          register: postgres_migration_rollback
          changed_when: true
          failed_when: >-
            postgres_migration_rollback.rc != 0 or
            'POSTGRES_MIGRATION_ROLLED_BACK' not in postgres_migration_rollback.stdout
          no_log: true

        - name: Stop after the safe PostgreSQL 16 rollback
          ansible.builtin.fail:
            msg: >-
              PostgreSQL 18 restore or validation failed. The exact PostgreSQL
              16 container graph was restarted and the PG16 volume was not
              changed. Fix the reported cause and take a new backup before retry.
      always:
        - name: Remove the temporary PostgreSQL migration age identity
          ansible.builtin.file:
            path: "{{ postgres_migration_age_identity_path }}"
            state: absent
      tags: [postgres_migration_run]

- import_playbook: deploy-stack-only.yml
  tags: [postgres_migration_run]

- name: AI Gateway — validate the deployed PostgreSQL 18 migration
  hosts: generic_rocky9
  become: true
  tasks:
    - name: Validate the live PostgreSQL 18 image, volume, roles, databases, and data
      ansible.builtin.command:
        argv:
          - python3
          - -I
          - "{{ stack_dir }}/scripts/postgres-major-migrate.py"
          - validate
          - --receipt
          - "{{ stack_dir }}/.state/postgres-major-migration-v1.json"
          - --project
          - "{{ compose_project_name }}"
          - --target-volume
          - "{{ pg_data_volume_name }}"
      register: postgres_migration_validation
      changed_when: true
      failed_when: >-
        postgres_migration_validation.rc != 0 or
        'POSTGRES_MIGRATION_VALIDATED' not in postgres_migration_validation.stdout
      no_log: true
      tags: [postgres_migration_run]
