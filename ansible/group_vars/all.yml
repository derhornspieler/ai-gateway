---
# ── Host interfaces / zones ─────────────────────────────────────────────
# The generic Rocky 9 playbook never guesses or changes NIC addressing.
# Supply every value in an environment-specific inventory/host_vars file, as
# --extra-vars, or through the AIGW_* controller environment shown below.
# Empty lookups are deliberate: site.yml rejects them before the first role
# can install packages, write firewall state, or add policy routes.
# 'rocky9-production' is the canonical fail-closed customer profile;
# 'generic-rocky9' remains a working DEPRECATED compatibility alias (all
# fail-closed logic keys off the profile NOT being 'rocky9-lab').
deployment_profile: "{{ lookup('ansible.builtin.env', 'AIGW_DEPLOYMENT_PROFILE') | default('rocky9-production', true) }}"
nic_egress: "{{ lookup('ansible.builtin.env', 'AIGW_NIC_EGRESS') }}"
nic_adm: "{{ lookup('ansible.builtin.env', 'AIGW_NIC_ADM') }}"
nic_internal: "{{ lookup('ansible.builtin.env', 'AIGW_NIC_INTERNAL') }}"
eth0_ip: "{{ lookup('ansible.builtin.env', 'AIGW_EGRESS_IP') }}"
eth0_gateway: "{{ lookup('ansible.builtin.env', 'AIGW_EGRESS_GATEWAY') }}"
eth1_ip: "{{ lookup('ansible.builtin.env', 'AIGW_ADM_IP') }}"
eth1_gateway: "{{ lookup('ansible.builtin.env', 'AIGW_ADM_GATEWAY') }}"
eth2_ip: "{{ lookup('ansible.builtin.env', 'AIGW_INTERNAL_IP') }}"
eth2_gateway: "{{ lookup('ansible.builtin.env', 'AIGW_INTERNAL_GATEWAY') }}"
vpn_client_cidr: "{{ lookup('ansible.builtin.env', 'AIGW_VPN_CLIENT_CIDR') }}"
internal_cidr: "{{ lookup('ansible.builtin.env', 'AIGW_INTERNAL_CIDR') }}"
# Resolver planes are deliberately distinct. Internal/ADM workloads use only
# the customer-supplied corporate resolver set; the sole Internet-facing
# Envoy workload uses only the separately supplied egress resolver set. Values
# are lists in inventory, or comma-separated IPv4 literals in the controller
# environment. site.yml rejects empty, duplicate, overlapping, loopback,
# link-local, multicast, or incorrectly routed resolver sets before mutation.
internal_dns_servers: >-
  {{ lookup('ansible.builtin.env', 'AIGW_INTERNAL_DNS_SERVERS').split(',')
     | map('trim') | reject('equalto', '') | list }}
egress_dns_servers: >-
  {{ lookup('ansible.builtin.env', 'AIGW_EGRESS_DNS_SERVERS').split(',')
     | map('trim') | reject('equalto', '') | list }}

# The full converge changes the ADM-zone SSH policy.  A controller must prove
# it can reconnect through this exact port on the ADM interface before any
# firewall or routing mutation occurs.  Override this alongside ansible_port
# for a non-default management port; an arbitrary existing SSH path is never
# silently carried through the hardened zone policy.
aigw_management_ssh_port: 22

# This stack owns Docker's daemon-wide firewall backend, logging defaults,
# SELinux integration, and data root.  It is deliberately a dedicated-Docker-
# host deployment, not a coexistence profile for unrelated workloads.  A
# clean existing Rocky VM is supported; a pre-existing dedicated Docker host
# can be adopted only with this explicit one-time acknowledgement after the
# read-only preflight proves it contains no foreign containers/networks.
aigw_docker_host_mode: dedicated
aigw_adopt_dedicated_docker_host: false
aigw_docker_host_marker: /etc/ai-gateway/dedicated-docker-host-v1
aigw_docker_host_pending_marker: "{{ aigw_docker_host_marker }}.pending"
# Kept only as a narrow acknowledgement for exact generated AIGW artifacts
# while resuming a validated pending converge. It never authorizes arbitrary
# firewalld, direct-rule, nftables, or NetworkManager policy on an existing
# VM; that policy must be removed/reviewed before this dedicated host takes
# ownership.
aigw_adopt_firewalld_state: false
# The managed sshd fragment is host-security state too.  Do not overwrite an
# existing AIGW fragment on a customer VM unless the operator acknowledges the
# takeover independently of Docker/firewalld ownership.
aigw_adopt_ssh_state: false

# SSH stays reachable only through the ADM interface/CIDR firewalld rule.  The
# generic/customer profile defaults to key-only. A lab inventory can enable
# password authentication explicitly during greenfield access setup; root
# login and all forwarding remain denied by default regardless of this setting.
aigw_ssh_password_authentication: false

# Dynamic SSH SOCKS forwarding is off by default.  Enabling it requires both
# an approved local user and/or group and one or more source CIDRs contained
# by vpn_client_cidr.  Group-based exceptions additionally name a real local
# member for `sshd -T -C` verification; this prevents untested Match Group
# policy from silently reaching production.
aigw_adm_socks_enabled: false
aigw_adm_socks_users: []
aigw_adm_socks_groups: []
aigw_adm_socks_source_cidrs: []
aigw_adm_socks_group_test_users: {}
# `PermitOpen any` is necessary for a true browser SOCKS proxy, but it lets a
# named approved operator reach every destination routable by the host. Keep
# the feature disabled unless the environment inventory explicitly records
# this trusted-operator acknowledgement.
aigw_adm_socks_trusted_operator_ack: ""

# Configure the Rocky SELinux desired state before Docker is installed or
# restarted.  Enabling a disabled policy requires a reboot, which remains an
# explicit operator opt-in rather than an implicit surprise reboot.
aigw_manage_selinux: true
aigw_selinux_policy: targeted
aigw_selinux_state: enforcing
aigw_allow_selinux_reboot: false
# Switching a live Docker host from permissive to enforcing can surface prior
# label/permission defects immediately. Require a maintenance acknowledgement.
aigw_allow_active_selinux_enforcement: false

# TLS, OIDC/JWT validation, signed package metadata, and certificate issuance
# all rely on a trustworthy wall clock. Require a preinstalled Rocky 9 Chrony
# client and use the host's reviewed Chrony source configuration; the role
# refuses to build or start the stack until a fresh accepted source sample
# proves the estimated clock error is within this bounded tolerance.
aigw_require_time_sync: true
aigw_time_sync_max_offset_seconds: 5

# Observability export target. Plaintext is permitted only for the in-stack
# development mock; docker_stack asserts that any real target uses validated
# TLS. A production overlay sets endpoint/server name/CA and false here.
#
# The Cribl CA bundle is deliberately SEPARATE from the edge CA. The CA that
# signs this gateway's edge certificate has no authority over the customer's
# telemetry endpoint, and trusting it for Cribl would silently widen the set of
# certificates Alloy accepts on an outbound connection.
cribl_otlp_endpoint: "cribl-mock:4317"
cribl_otlp_insecure: true
cribl_otlp_ca_file: "/etc/ssl/certs/aigw-cribl-ca.pem"
cribl_otlp_server_name: "cribl-mock"
# Controller-local PEM bundle for the REAL Cribl endpoint's CA. Required when
# cribl_external_export_enabled is true; never the edge CA.
cribl_otlp_ca_pem_file: ""

# ── Edge TLS / PKI ──────────────────────────────────────────────────────
# HTTPS terminates at the two Traefik edges (traefik-int, traefik-adm) and
# nowhere else. Container-to-container application traffic is deliberately
# plain HTTP on segmented, internal-only bridges. The exceptions are Envoy,
# which originates vendor TLS with narrowed per-vendor CA bundles, and Alloy,
# which speaks OTLP/TLS to Cribl using the dedicated bundle above. This
# platform does not do service-to-service mTLS.
#
# Exactly one mode must be selected; the selection is fail-closed in site.yml.
#
#   lab                -- self-signed TEST root minted by vault-bootstrap.sh.
#                         Legal on rocky9-lab only, and only as the explicit
#                         fallback for a disposable lab with no real CA.
#   vault-intermediate -- Vault generates the intermediate key INTERNALLY and
#                         emits a CSR; the customer CA signs it OFFLINE; the
#                         signed cert + chain are imported back. The customer's
#                         root private key is never requested or stored.
#   customer-supplied  -- the operator supplies the edge leaf, its private key,
#                         and the complete chain as controller-local files.
#   customer-intermediate -- the operator supplies an INTERMEDIATE CA
#                         certificate AND its private key plus the complete
#                         chain. Vault imports that intermediate into pki_int,
#                         promotes it to the default issuer, and issues every
#                         leaf (edge wildcard + Samba LDAPS) under it. This is a
#                         higher-trust posture than vault-intermediate: the
#                         gateway briefly holds the intermediate signing key,
#                         which transits the no_log Ansible pipe, sits at
#                         secrets/aigw-intermediate-import.key (0600 root) until
#                         the import ceremony, is imported over stdin, and is
#                         then shredded. The customer ROOT key is still never
#                         supplied. One mode for lab and production; they differ
#                         only in where the intermediate material comes from.
aigw_edge_tls_mode: "{{ 'lab' if deployment_profile == 'rocky9-lab' else '' }}"
# Mode customer-supplied only: controller-local PEM paths. Never committed,
# never placed in the encrypted inventory overlay (a multi-line PEM in an inline
# vault would create a second custody path); the key file must be 0600.
aigw_edge_tls_leaf_cert_file: ""
aigw_edge_tls_private_key_file: ""
aigw_edge_tls_chain_file: ""
# Mode customer-intermediate only: controller-local PEM paths. Same custody
# rules as the customer-supplied trio -- the intermediate key is a file path,
# never an inline-encrypted overlay value, and must be 0600.
aigw_edge_tls_intermediate_cert_file: ""
aigw_edge_tls_intermediate_key_file: ""
aigw_edge_tls_intermediate_chain_file: ""
# Certificates within this many days of notAfter fail validation and verify.
aigw_edge_tls_min_days_remaining: 30

# ── Policy routing ──────────────────────────────────────────────────────
# An existing host's addressing and ordinary routing are customer-owned.
# Source-policy routing is opt-in because it adds two defaults/rules; declare
# both this flag and the exact tables in an environment inventory only when
# asymmetric reply routing is actually required.  The lab profile opts in.
manage_networking: false
pbr_tables: []

# ── Docker networks (fixed subnets; referenced by DOCKER-USER rules) ───
docker_networks:
  # Explicit <=15-character bridge names are a firewall ABI; Linux IFNAMSIZ
  # makes deriving them from long Compose network names unsafe.
  - { name: net-egress,        bridge: br-egress, subnet: 172.28.0.0/24,  internal: false }
  - { name: net-adm,           bridge: br-adm,    subnet: 172.28.1.0/24,  internal: false }
  - { name: net-internal,      bridge: br-internal, subnet: 172.28.2.0/24, internal: false }
  - { name: net-chat,          bridge: br-chat,   subnet: 172.28.3.0/24,  internal: true }
  - { name: net-portal,        bridge: br-portal, subnet: 172.28.4.0/24,  internal: true }
  - { name: net-admin-app,     bridge: br-admin,  subnet: 172.28.5.0/24,  internal: true }
  - { name: net-grafana,       bridge: br-graf,   subnet: 172.28.6.0/24,  internal: true }
  - { name: net-vendor,        bridge: br-vendor, subnet: 172.28.7.0/24,  internal: true }
  - { name: net-vault,         bridge: br-vault,  subnet: 172.28.8.0/24,  internal: true }
  - { name: net-db-litellm,    bridge: br-db-llm, subnet: 172.28.9.0/24,  internal: true }
  - { name: net-db-keycloak,   bridge: br-db-kc,  subnet: 172.28.10.0/24, internal: true }
  - { name: net-db-rotator,    bridge: br-db-rot, subnet: 172.28.11.0/24, internal: true }
  - { name: net-cache,         bridge: br-cache,  subnet: 172.28.12.0/24, internal: true }
  - { name: net-telemetry,     bridge: br-otel,   subnet: 172.28.13.0/24, internal: true }
  - { name: net-metrics,       bridge: br-metrics, subnet: 172.28.14.0/24, internal: true }
  - { name: net-observability, bridge: br-obs,    subnet: 172.28.15.0/24, internal: true }
  - { name: net-traces,        bridge: br-traces, subnet: 172.28.16.0/24, internal: true }
  - { name: net-identity,      bridge: br-ident,  subnet: 172.28.17.0/24, internal: true }
  # Published ports do not traverse a Docker `internal: true` bridge. This
  # dedicated ordinary bridge has no application peers; DOCKER-USER and the
  # independent nft guard still deny every container-originated egress flow.
  # It is used only by the explicit lab overlay.
  - { name: net-lab-dns,       bridge: br-lab-dns, subnet: 172.28.18.0/24, internal: false }
  # Docker 29 silently omits published-port DNAT when every attached bridge is
  # `internal: true`. This ordinary no-peer bridge exists only for traefik-int;
  # DOCKER-USER and the native nft guard deny every bridge-originated egress.
  - { name: net-int-edge,      bridge: br-int-edge, subnet: 172.28.19.0/24, internal: false }
  # Owner-approved admin observability path: Grafana's read-only LiteLLM spend
  # datasource reaches Postgres over its own dedicated per-client DB bridge
  # (same isolation pattern as net-db-litellm/keycloak/rotator). Grafana still
  # has no route to LiteLLM's API and LiteLLM none to Grafana.
  - { name: net-db-grafana,    bridge: br-db-graf, subnet: 172.28.20.0/24, internal: true }

net_egress_subnet: 172.28.0.0/24

# Fixed workload addresses are part of the host-firewall ABI. Compose renders
# these exact addresses; DOCKER-USER must never authorize an entire bridge
# subnet to use a physical NIC.
envoy_egress_ip: 172.28.0.2
alloy_internal_ip: 172.28.2.2
# Keycloak joins the routable internal bridge only so the single external
# directory allowance can be pinned to one exact source address. Everything
# else it reaches stays on `internal: true` bridges.
keycloak_internal_ip: 172.28.2.3

# The in-stack Cribl mock stays on the Docker bridge and needs no physical-NIC
# exception. A customer overlay that exports to a real Cribl worker must opt in
# and supply its exact destination /32 and port. The firewall
# then permits only alloy_internal_ip -> that destination on nic_internal.
cribl_external_export_enabled: false
cribl_otlp_allowed_cidr: ""
cribl_otlp_allowed_port: 4317

# ── External production directory federation (LDAPS only) ───────────────
# Optional customer Active Directory federation for generic/production
# deployments. It is never combined with the lab Samba overlay: exactly one
# identity source may own the Keycloak truststore and the federation
# reconciliation inputs. Every value is inventory-owned and fail-closed, and
# the bind credential lives only in a dedicated encrypted overlay written by
# scripts/store-identity-ldap-bind-password.py. Plaintext ldap:// is refused
# at every layer; the URL must be ldaps:// on port 636.
identity_ldap_enabled: false
identity_ldap_provider_name: ""
identity_ldap_url: ""
identity_ldap_users_dn: ""
identity_ldap_bind_dn: ""
# Controller-local path to the PUBLIC CA bundle (PEM, certificates only). It
# is validated before mutation and mounted read-only into Keycloak alone.
identity_ldap_ca_bundle_src: ""
# Exact IPv4 address of the directory host. It feeds both the Keycloak
# extra_hosts pin and the single Keycloak -> directory tcp/636 allowance, so
# LDAPS never depends on a resolver Keycloak is not allowed to query.
identity_ldap_directory_ip: ""
identity_ldap_vendor: ad
identity_ldap_username_attribute: sAMAccountName
identity_ldap_rdn_attribute: cn
identity_ldap_uuid_attribute: objectGUID
identity_ldap_user_object_classes: "person, organizationalPerson, user"
identity_ldap_user_filter: ""
# identity_ldap_bind_password: <encrypted overlay only; never here>

# Fixed edge addresses are rendered into both Compose's network attachments
# and every downstream proxy-trust allowlist. A single source of truth avoids
# the HTTPS callback/trusted-proxy values drifting apart.
traefik_int_chat_ip: 172.28.3.2
traefik_int_portal_ip: 172.28.4.2
traefik_adm_admin_ip: 172.28.5.2
# LiteLLM must trust only the exact oauth2-proxy hop that fronts its native
# admin UI. Uvicorn otherwise ignores X-Forwarded-Proto and emits an insecure
# absolute http:// redirect for /ui -> /ui/ after a successful OIDC callback.
oauth2_proxy_litellm_ip: 172.28.5.3
traefik_adm_grafana_ip: 172.28.6.2
oauth2_proxy_grafana_ip: 172.28.6.3
alloy_telemetry_ip: 172.28.13.2
alloy_observability_ip: 172.28.15.2
prometheus_observability_ip: 172.28.15.3
tempo_ingest_ip: 172.28.16.2
lab_dns_ip: 172.28.18.2

# ── firewalld ───────────────────────────────────────────────────────────
# Zone names are prefixed (aigw-*) deliberately: firewalld ships built-in
# zones named "internal" (and "external", "public", "dmz", "home", "work",
# "trusted", "block", "drop") — reusing one of those names doesn't create a
# blank zone, it activates the built-in template, which has its own default
# services pre-enabled (the "internal" built-in ships with ssh, cockpit,
# mdns, samba-client, dhcpv6-client allowed). That silently punched a wider
# hole than intended. aigw-egress/aigw-adm/aigw-internal can't collide with
# any current or future firewalld built-in. Also aligned with the
# nic_egress/nic_adm/nic_internal and net-egress/net-adm/net-internal naming
# already used elsewhere in this repo.
firewalld_zones:
  - zone: aigw-egress
    interfaces: ["{{ nic_egress }}"]
    target: DROP
    rich_rules: []
  - zone: aigw-adm
    interfaces: ["{{ nic_adm }}"]
    target: "%%REJECT%%"
    rich_rules:
      - 'rule family="ipv4" source address="{{ vpn_client_cidr }}" port port="{{ aigw_management_ssh_port }}" protocol="tcp" accept'
      - 'rule family="ipv4" source address="{{ vpn_client_cidr }}" port port="443" protocol="tcp" accept'
  - zone: aigw-internal
    interfaces: ["{{ nic_internal }}"]
    target: "%%REJECT%%"
    rich_rules:
      - 'rule family="ipv4" source address="{{ internal_cidr }}" port port="443" protocol="tcp" accept'

# A clean-reset handoff leaves the lab egress and internal NICs in firewalld's
# built-in fail-closed ``drop`` zone until the next full converge. Generic and
# customer profiles never inherit this exception; the roles additionally bind
# it to this exact two-interface lab contract before accepting it.
aigw_lab_reset_handoff_drop_interfaces: []

# ── Feature flags (set false for a reduced local test VM) ──────────────
manage_firewalld: true       # zones + DOCKER-USER
# Optional authoritative-only split DNS for the gateway zone. It never
# forwards arbitrary names. The lab enables it; a generic deployment may opt
# in explicitly when clients should point their ADM/internal interfaces at the
# corresponding gateway address.
platform_authoritative_dns_enabled: "{{ deployment_profile == 'rocky9-lab' }}"
# The Vault API remains an internal control-plane dependency regardless of
# this flag. Only the browser-facing ADM UI and its OIDC proxy are optional;
# generic/customer deployments keep that additional operator surface closed
# unless an environment inventory explicitly enables it.
aigw_vault_ui_enabled: false

# ── Stack ───────────────────────────────────────────────────────────────
stack_dir: /opt/ai-gateway
docker_data_root: /var/lib/docker
# ── Docker Engine + Compose plugin version pins ───────────────────────
# Exact NEVRA (name-version-release; the arch resolves from $basearch, and the
# rpm epoch is matched automatically) of the four Docker packages that decide
# live runtime behaviour. These are the versions the verify + e2e suite last
# proved green (2026-07-15). An unpinned docker-ce-stable install twice adopted
# a Compose-v5 release that broke a live converge (see docs/os-security.md §4
# and the runtime-skew canary), so this is a stability control, not cosmetic.
# os_baseline installs `state: present` on these exact versions, so the converge
# fails LOUDLY if the mirror no longer offers the pinned NEVRA (it never
# silently installs the newest), and `allow_downgrade: false` makes it REFUSE to
# roll a host that already drifted newer back under a running stack. A deliberate
# upgrade bumps these here (or per host_vars) and follows the version-bump path
# in docs/operations.md. There is intentionally no dnf versionlock: the converge
# re-asserts these on every run and is the sole sanctioned change path on a
# dedicated host, matching the inline age/SDK pins and the image tag+digest pins.
aigw_docker_ce_version: "29.6.1-1.el9"
aigw_docker_ce_cli_version: "29.6.1-1.el9"
aigw_containerd_version: "2.2.6-1.el9"
aigw_docker_compose_plugin_version: "5.3.1-1.el9"
# Optional pre-staged Docker image archive. Generic/customer deployments are
# disabled and pathless by default. An environment-specific inventory may opt
# in with a remote target path and a separately reviewed exact SHA-256. The
# checksum marker lives with Docker state so resetting the image store also
# removes the skip decision.
offline_image_seed_enabled: false
offline_image_seed_remote_path: ""
offline_image_seed_sha256: ""
offline_image_seed_manifest_remote_path: ""
offline_image_seed_manifest_sha256: ""
offline_image_seed_marker_dir: "{{ docker_data_root }}/.aigw-image-seeds"
# Full prompts, Vault state, database pages, rendered credentials, and the
# edge private key all land under these two paths. Generic/customer deploys
# warn (but no longer fail) before mutation when either fails to resolve
# through a dm-crypt/LUKS ancestor: LUKS is a build-time (disk-provisioning)
# concern the converge does not manage, so the gap is surfaced loudly and the
# converge continues. The explicit lab profile opts out of even the warning
# because it is disposable local test.
require_encrypted_state: true
# This is deliberately stricter than the raw switch: an unencrypted-state
# exception is valid only when the selected profile is the committed disposable
# Rocky 9 lab *and* that lab explicitly sets require_encrypted_state=false.
# Generic/customer profiles therefore remain fail-closed even if a stray
# inventory override supplies false.
aigw_encrypted_state_preflight_required: >-
  {{ (deployment_profile | default('')) != 'rocky9-lab' or
     (require_encrypted_state | bool) }}
require_preupgrade_backup: true
encrypted_state_paths:
  - "{{ docker_data_root }}"
  - "{{ stack_dir }}"
compose_project_name: ai-gateway
aigw_domain: aigw.example.internal
samba_lab_enabled: "{{ deployment_profile == 'rocky9-lab' }}"
retain_bootstrap_admin_user: false
# A narrowly scoped recovery bridge for a realm created before explicit OIDC
# role scope mappings were imported. It is deliberately off for generic and
# customer inventories: it uses Keycloak's temporary bootstrap authority but
# refuses to run unless no durable identity controller is configured.
aigw_prebootstrap_oidc_scope_reconciliation: false
aigw_prebootstrap_oidc_scope_reconciliation_ack: ""
# Optional pre-Vault recovery bridge. Generic/customer inventories inherit no
# users, groups, federation choice, or acknowledgement: enabling it without an
# explicit inventory-owned mutation set fails before Keycloak is contacted.
aigw_pre_vault_identity_baseline_reconciliation: false
aigw_pre_vault_identity_baseline_reconciliation_ack: ""
aigw_pre_vault_identity_ensure_lab_federation: false
aigw_pre_vault_identity_baseline_groups: []
aigw_pre_vault_identity_bootstrap_admin_identities: []
samba_lab_seed_users:
  - lab-admin
  - lab-developer
  - lab-user

# ── Portal key-issuance guardrails (static backstop; default UNLIMITED) ─
# Owner decision: a new self-service key carries NO budget, rate limit, or
# expiry by default. Day-to-day rate/model restrictions are the RUNTIME
# per-project policy administrators edit in the admin console (stored as
# Keycloak group attributes via the identity controller); it overrides these
# static knobs for tpm/rpm and the model set, and applies retroactively to a
# project's existing keys. Cost/budget is an admin-only concept — no default
# budget is ever applied; admins set budgets per key from the admin console.
# These static knobs remain as a reviewed host_vars-overridable backstop:
# the literal string "none" disables one (max_budget is USD; tpm/rpm are
# per-minute ceilings; duration is LiteLLM's lifetime grammar, e.g. 30d).
# The portal re-validates every value at startup and refuses ambiguity.
portal_key_default_max_budget: "none"
portal_key_default_tpm_limit: "none"
portal_key_default_rpm_limit: "none"
portal_key_default_duration: "none"
# Optional per-project STATIC overrides keyed by managed project ID. Each
# entry may set max_budget/tpm_limit/rpm_limit/duration; null lifts the
# global default for that one project. Prefer the runtime admin-portal
# policy for rate/model restrictions. Example:
#   portal_key_project_limits:
#     ml-research: { max_budget: "100", duration: "7d" }
portal_key_project_limits: {}

# ── Keycloak seeded test users (default OFF — no credentials in git) ────
# When true, the aigw realm template seeds testadmin/testuser. The passwords
# have NO defaults on purpose: define aigw_test_admin_password and
# aigw_test_user_password in an Ansible-Vault/SOPS overlay or templating
# fails. Leave false for anything beyond a disposable test VM.
aigw_seed_test_users: false
# aigw_test_admin_password: <vault overlay only>
# aigw_test_user_password: <vault overlay only>

# ── Stack secrets ───────────────────────────────────────────────────────
# NO secret defaults ship in git. Every credential below is intentionally
# UNDEFINED here and MUST be supplied by an Ansible-Vault/SOPS-encrypted
# overlay. `inventory/group_vars/gateway/vault.yml` is selected only by the
# committed lab inventory. Generic/customer operators must use the separate
# layout generated by `scripts/bootstrap-generic-rocky9.py`, whose overlay is
# `group_vars/generic_rocky9/vault.yml` beside that generated inventory.
# env.j2 and the Keycloak realm templates wrap each of these in
# `| mandatory(...)`, so a deploy WITHOUT the overlay ABORTS with a clear
# message instead of silently coming up with a known-weak, git-published
# credential. This matches the fail-closed behavior of the dev-portal /
# key-rotator services (which refuse to start on placeholder secrets).
#
# ── CHARSET CONSTRAINT (read before generating secrets) ─────────────────
# docker_stack validates every stack secret before rendering: 24/32+ chars as
# appropriate and only [A-Za-z0-9_-]. This avoids Compose `$` interpolation,
# newline/comment injection, and URI delimiter ambiguity in DATABASE_URL.
# Each oauth2_proxy_*_cookie_secret is stricter: exactly 32 alphanumeric bytes.
#
# ── Overlay MUST define ALL of these ────────────────────────────────────
#   pg_super_password         pg_litellm_password        pg_keycloak_password
#   pg_rotator_password       pg_grafana_ro_password
#   kc_admin_password         litellm_master_key
#   litellm_salt_key          litellm_ui_breakglass_password
#   redis_password            webui_litellm_key
#   webui_secret_key          webui_oidc_client_secret
#   portal_oidc_client_secret admin_portal_oidc_client_secret
#   oauth2_proxy_client_secret vault_oidc_client_secret
#   oauth2_proxy_litellm_cookie_secret oauth2_proxy_grafana_cookie_secret
#   oauth2_proxy_prometheus_cookie_secret oauth2_proxy_vault_cookie_secret
#   portal_session_secret admin_portal_session_secret
#   rotator_internal_token portal_identity_token grafana_admin_password
#   kc_bootstrap_admin_client_secret
# The rocky9-lab profile additionally requires:
#   samba_ad_admin_password     samba_ad_bind_password
#   samba_user_lab_admin_password samba_user_lab_developer_password
#   samba_user_lab_user_password
# A production deployment with identity_ldap_enabled additionally requires:
#   identity_ldap_bind_password  <encrypted overlay only when identity_ldap_enabled>
#
# Left undefined on purpose (uncomment ONLY in a vault overlay, never here):
# pg_super_password:          <vault overlay only>
# pg_litellm_password:        <vault overlay only>
# pg_keycloak_password:       <vault overlay only>
# pg_rotator_password:        <vault overlay only>
# pg_grafana_ro_password:     <vault overlay only>  # READ-ONLY reporting role:
#     Grafana's provisioned LiteLLM spend datasource. SELECT on the reviewed
#     spend/token/user tables only; never a write-capable credential.
# kc_admin_password:          <vault overlay only>
# litellm_master_key:         <vault overlay only>
# litellm_salt_key:           <vault overlay only>
# litellm_ui_breakglass_password: <vault overlay only>  # Dedicated break-glass
#     browser login for the retained native LiteLLM admin UI (username
#     litellm-breakglass). NEVER reuse the master key: it is a server-side
#     bearer credential and must never be typed into a browser. host_finalize
#     prints a custody pointer (never the value) at the end of each converge.
# redis_password:             <vault overlay only>
# webui_litellm_key:          <vault overlay only>  # High-entropy candidate for
#     the SCOPED Open WebUI LiteLLM virtual key — NEVER the master key. Ansible
#     reconciles this exact value only after LiteLLM is ready and fails closed
#     on alias/hash collisions; operators do not mint it manually.
# webui_secret_key:           <vault overlay only>  # STABLE 32+ char session/
#     application signing secret. Never regenerate during a normal converge or
#     container replacement because doing so invalidates every Open WebUI session.
# webui_oidc_client_secret:   <vault overlay only>  # alphanumeric only
# portal_oidc_client_secret:  <vault overlay only>  # alphanumeric only
# admin_portal_oidc_client_secret: <vault overlay only>  # alphanumeric only
# oauth2_proxy_client_secret: <vault overlay only>  # alphanumeric only
# vault_oidc_client_secret:   <vault overlay only>  # alphanumeric only; the
#     Vault OIDC login client. The rotator escrows it in Vault for the
#     scripts/vault-oidc-setup.sh root ceremony (docs/identity-operations.md).
# oauth2_proxy_litellm_cookie_secret: <vault overlay only>  # STABLE 32-char alphanumeric
# oauth2_proxy_grafana_cookie_secret: <vault overlay only>  # STABLE 32-char alphanumeric
# oauth2_proxy_prometheus_cookie_secret: <vault overlay only> # STABLE 32-char alphanumeric
# oauth2_proxy_vault_cookie_secret: <vault overlay only>     # STABLE 32-char alphanumeric
# portal_session_secret:      <vault overlay only>
# admin_portal_session_secret: <vault overlay only>
# rotator_internal_token:     <vault overlay only>
# portal_identity_token:      <vault overlay only; distinct from rotator token>
# grafana_admin_password:     <vault overlay only>
# kc_bootstrap_admin_client_secret: <vault overlay only>
# samba_ad_admin_password:    <lab vault overlay only>
# samba_ad_bind_password:     <lab vault overlay only>
# samba_user_lab_admin_password: <lab vault overlay only>
# samba_user_lab_developer_password: <lab vault overlay only>
# samba_user_lab_user_password: <lab vault overlay only>
# vault_unseal_key:           <vault overlay only>  # Operator-supplied output
#     of HashiCorp Vault initialization. Never randomly generate this value.
#     When defined, Ansible may use it via the stdin-only unseal helper.
# identity_ldap_bind_password: <vault overlay only>  # Customer-supplied
#     read-only directory service-account credential. Never randomly generated;
#     store it with scripts/store-identity-ldap-bind-password.py (stdin only).

# Not an overlay secret: starts empty, written in place on the VM by
# scripts/vault-bootstrap.sh after Vault init/unseal.
rotator_vault_token: ""

# ── Anthropic WIF broker client authentication ──────────────────────────
# The imported broker is deliberately DISABLED with client-jwt selected and no
# key material. Post-start, the portal asks the rotator to have Keycloak mint
# the keypair, stores the private key only in Vault, proves authentication, and
# then enables the client. The static-client-secret escape hatch stays off.

# Vault path where the key-rotator reads its private_key_jwt signing key
# (non-secret path string; safe to keep here).
kc_client_assertion_key_vault_path: "ai-gateway/anthropic-wif-client-key"
identity_controller_key_vault_path: "ai-gateway/keycloak/identity-controller-key"
identity_state_vault_path: "ai-gateway/keycloak/identity-state"
# Durable group-gated Keycloak administration (every profile): during the
# one-time identity bootstrap the rotator provisions a marked master-realm
# `keycloak-admins` group carrying master's composite admin role plus a
# marked `break-glass-admin` user whose rotator-generated password is
# escrowed in Vault before the account is enabled. No operator secret is
# introduced — the retrieval/rotation ceremony is documented in
# docs/identity-operations.md.
break_glass_admin_enabled: true
break_glass_admin_vault_path: "ai-gateway/keycloak/break-glass-admin"
# Escrow path for the `vault` OIDC relying-party client secret (non-secret
# path string). The rotator writes it during the identity bootstrap; the
# root-token ceremony scripts/vault-oidc-setup.sh reads it to wire Vault's
# auth/oidc login to Keycloak (docs/identity-operations.md).
vault_oidc_rp_vault_path: "ai-gateway/keycloak/vault-oidc-rp"
