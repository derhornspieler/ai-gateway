[defaults]
inventory = inventory/hosts.yml
roles_path = roles
host_key_checking = True
interpreter_python = auto_silent
# yaml stdout callback (community.general) was removed in v12; use the
# built-in default callback's yaml result format instead.
result_format = yaml
# Pipelining is a confidentiality control: the Vault auto-unseal and LDAP bind
# tasks pass their decrypted secret on the module stdin under no_log, and only
# pipelining keeps that stdin out of the AnsiballZ payload written to
# ~/.ansible/tmp on the target. Declared in [defaults] -- not only in
# [ssh_connection] -- so it is the global default AND is reported by
# `ansible-config dump` as ANSIBLE_PIPELINING = True (the global setting reads
# [defaults]/[connection], never [ssh_connection]). Mirrored by the repo-root
# ./ansible.cfg for repo-root invocations; keep the two in sync.
pipelining = True

[ssh_connection]
pipelining = True
