    # During the short reset interval only the management plane retains SSH.
    # The other physical planes move to the built-in fail-closed zone until
    # full site.yml reapplies the reviewed AIGW zones.
    aigw_lab_reset_zone_migrations:
      - { nic: "{{ nic_egress }}", zone: drop }
      - { nic: "{{ nic_adm }}", zone: public }
      - { nic: "{{ nic_internal }}", zone: drop }
    # These paths are asserted absent before use and removed in an ``always``
    # block. They prove the exact staged seed can be loaded and its
    # RepoDigests verified before any teardown begins.
    aigw_lab_reset_seed_loader_path: /var/tmp/.aigw-reset-seed-loader.py
    aigw_lab_reset_seed_proof_marker_dir: "{{ docker_data_root }}/.aigw-reset-seed-proof"
    # Controller/guest identity binding for the only supported Parallels VM.
    # The DMI UUID is Parallels' VM UUID and all three virtual NIC MACs must
    # agree with the controller before the reset is allowed to mutate it.
    aigw_lab_reset_parallels_vm_uuid: eb1cdcf8-af33-4057-bf43-85ec1f6cd71d
    aigw_lab_reset_guest_nic_macs:
      enp0s5: "00:1c:42:1f:b2:86"
      enp0s7: "00:1c:42:d1:c3:fb"
      enp0s8: "00:1c:42:a0:d3:fa"
    # Canonical, symlink-safe inventory of the legacy stack tree. The digest
    # commits every descendant path, type, owner/group, mode, size, and the
    # SHA-256 of every non-secret file. Secret-bearing paths are still exact
    # name/type/owner/mode/size entries, but their bytes are deliberately not
    # represented in repository state. This prevents a root-owned unrelated
    # payload under /opt/ai-gateway from being recursively deleted by a reset.
    aigw_lab_reset_legacy_stack_entry_count: 167
    aigw_lab_reset_legacy_stack_total_bytes: 960890
    aigw_lab_reset_legacy_stack_manifest_sha256: 074bb2a9610a8674bed4afbcf11a7aca0cf199eb8dd9cc4dff9b2490ee16963d
    aigw_lab_reset_legacy_stack_sensitive_paths:
      - .env
      - certs/int.key
      - secrets/redis_password
      - secrets/redis_users.acl
      - secrets/samba_ad_admin_password
      - secrets/samba_ad_bind_password
      - secrets/samba_user_lab-admin_password
      - secrets/samba_user_lab-developer_password
      - secrets/samba_user_lab-user_password
    # All are legacy AIGW-owned files observed on aigw01.  Missing entries are
    # acceptable; unexpected similarly named files fail the preflight.
    aigw_lab_legacy_reset_host_files:
      - /etc/docker/daemon.json
      - /usr/local/sbin/aigw-policy-routing
      - /usr/local/sbin/aigw-host-input-rules.sh
      - /usr/local/sbin/docker-user-rules.sh
      - /usr/local/sbin/docker-user-rules-watch.sh
      - /usr/local/sbin/aigw-docker-log-acl
      - /usr/local/sbin/aigw-load-offline-image-seed
      - /usr/local/sbin/aigw-maintenance-boot-guard
      - /etc/aigw-maintenance-boot-guard.nft
      - /etc/NetworkManager/dispatcher.d/90-aigw-policy-routing
      - /etc/NetworkManager/dispatcher.d/91-aigw-firewalld-zones
      - /etc/ssh/sshd_config.d/00-ai-gateway-hardening.conf
      - /etc/systemd/system/aigw-policy-routing.service
      - /etc/systemd/system/aigw-host-input-rules.service
      - /etc/systemd/system/docker-user-rules.service
      - /etc/systemd/system/docker-user-rules-watch.service
      - /etc/systemd/system/aigw-docker-log-acl.service
      - /etc/systemd/system/aigw-docker-log-acl.timer
      - /etc/systemd/system/aigw-vault-audit-rotate.service
      - /etc/systemd/system/aigw-vault-audit-rotate.timer
      - /etc/systemd/system/aigw-maintenance-boot-guard.service
      - /etc/systemd/system/docker.service.d/90-aigw-maintenance-boot-guard.conf
      - /etc/firewalld/zones/aigw-adm.xml
      - /etc/firewalld/zones/aigw-adm.xml.old
      - /etc/firewalld/zones/aigw-egress.xml
      - /etc/firewalld/zones/aigw-egress.xml.old
      - /etc/firewalld/zones/aigw-internal.xml
      - /etc/firewalld/zones/aigw-internal.xml.old
      - /etc/firewalld/zones/public.xml
      - /etc/firewalld/zones/public.xml.old
      - /etc/firewalld/zones/docker.xml
      - /etc/firewalld/policies/docker-forwarding.xml
    aigw_lab_legacy_reset_units:
      - aigw-policy-routing.service
      - aigw-host-input-rules.service
      - docker-user-rules.service
      - docker-user-rules-watch.service
      - aigw-docker-log-acl.service
      - aigw-docker-log-acl.timer
      - aigw-vault-audit-rotate.service
      - aigw-vault-audit-rotate.timer
      - aigw-maintenance-boot-guard.service
    aigw_lab_reset_docker_argv:
      - /usr/bin/env
      - -u
      - DOCKER_CONFIG
      - -u
      - DOCKER_CONTEXT
      - -u
      - DOCKER_HOST
      - -u
      - DOCKER_TLS
      - -u
      - DOCKER_TLS_VERIFY
      - -u
      - DOCKER_CERT_PATH
      - /usr/bin/docker
      - --host
      - unix:///run/docker.sock

  pre_tasks:
    - name: Reset gate — require a safe snapshot-name shape before VM inspection
      ansible.builtin.assert:
        that:
          - (aigw_lab_legacy_reset_snapshot_name | default('')) is match('^aigw(?:01)?-[A-Za-z0-9._-]{8,96}$')
        quiet: true
        fail_msg: >-
          Refusing legacy reset: provide an existing Parallels snapshot named
          aigw-... or aigw01-... through aigw_lab_legacy_reset_snapshot_name.
      delegate_to: localhost
      become: false
      run_once: true

    - name: Reset gate — read Parallels snapshots from the local controller
      ansible.builtin.command:
        argv: [prlctl, snapshot-list, aigw01, --json]
      register: aigw_lab_reset_snapshots
      changed_when: false
      delegate_to: localhost
      become: false
      run_once: true

    - name: Reset gate — require the named Parallels rollback snapshot to exist
      ansible.builtin.command:
        argv:
          - python3
          - -I
          - -c
          - |
            import json
            import sys

            wanted = sys.argv[1]
            try:
                document = json.loads(sys.stdin.read())
            except json.JSONDecodeError as exc:
                raise SystemExit("Parallels did not return snapshot JSON") from exc

            names = []
            def visit(value):
                if isinstance(value, dict):
                    for key, child in value.items():
                        if key.lower() in {"name", "snapshot_name"} and isinstance(child, str):
                            names.append(child)
                        visit(child)
                elif isinstance(value, list):
                    for child in value:
                        visit(child)
            visit(document)
            if names.count(wanted) != 1:
                raise SystemExit("required unique Parallels snapshot is absent")
          - "{{ aigw_lab_legacy_reset_snapshot_name }}"
        stdin: "{{ aigw_lab_reset_snapshots.stdout }}"
        stdin_add_newline: false
      changed_when: false
      delegate_to: localhost
      become: false
      run_once: true

    - name: Reset gate — read the exact Parallels VM identity from the controller
      ansible.builtin.command:
        argv: [prlctl, list, -i, aigw01, --json]
      register: aigw_lab_reset_parallels_vm
      changed_when: false
      delegate_to: localhost
      become: false
      run_once: true

    - name: Reset gate — bind the controller VM identity, guest address, and NIC MACs
      ansible.builtin.command:
        argv:
          - python3
          - -I
          - -c
          - |
            import json
            import re
            import sys
            wanted_uuid, wanted_ip, expected_macs_text = sys.argv[1:]
            try:
                records = json.loads(sys.stdin.read())
            except json.JSONDecodeError as exc:
                raise SystemExit("Parallels did not return VM JSON") from exc
            if not isinstance(records, list) or len(records) != 1 or not isinstance(records[0], dict):
                raise SystemExit("Parallels did not return exactly one VM record")
            record = records[0]
            def normalize(value):
                compact = re.sub(r"[^0-9a-fA-F]", "", str(value)).upper()
                if re.fullmatch(r"[0-9A-F]{12}", compact) is None:
                    raise SystemExit("Parallels returned an invalid NIC MAC")
                return compact
            expected_macs = sorted(normalize(value) for value in json.loads(expected_macs_text).values())
            actual_macs = sorted(
                normalize(value.get("mac", ""))
                for key, value in (record.get("Hardware") or {}).items()
                if re.fullmatch(r"net[0-9]+", str(key)) and isinstance(value, dict) and value.get("enabled") is True
            )
            addresses = {
                item.get("ip") for item in (record.get("Network") or {}).get("ipAddresses", [])
                if isinstance(item, dict) and item.get("type") == "ipv4"
            }
            actual_uuid = str(record.get("ID", "")).strip("{}").lower()
            if (record.get("Name") != "aigw01" or record.get("Type") != "VM" or
                    record.get("State") != "running" or actual_uuid != wanted_uuid or
                    wanted_ip not in addresses or actual_macs != expected_macs):
                raise SystemExit("Parallels VM identity does not match the dedicated aigw01 lab")
          - "{{ aigw_lab_reset_parallels_vm_uuid }}"
          - "{{ ansible_host }}"
          - "{{ aigw_lab_reset_guest_nic_macs | to_json }}"
        stdin: "{{ aigw_lab_reset_parallels_vm.stdout }}"
        stdin_add_newline: false
      changed_when: false
      delegate_to: localhost
      become: false
      run_once: true

    - name: Reset gate — collect only target host facts after snapshot verification
      ansible.builtin.setup:

    - name: Reset gate — require exact lab identity and both destructive acknowledgements
      ansible.builtin.assert:
        that:
          - inventory_hostname == 'lab-aigw01'
          - (inventory_file | default('')) == (playbook_dir ~ '/inventory/lab.yml')
          - deployment_profile == 'rocky9-lab'
          - ansible_facts.hostname | default('') == 'aigw01'
          - ansible_host == '10.8.10.10'
          - aigw_domain == 'aigw.aegisgroup.ch'
          - compose_project_name == 'ai-gateway'
          - stack_dir == '/opt/ai-gateway'
          - docker_data_root == '/var/lib/docker'
          - nic_egress == 'enp0s5'
          - nic_adm == 'enp0s7'
          - nic_internal == 'enp0s8'
          - eth0_ip == '10.211.55.3'
          - eth1_ip == '10.8.10.10'
          - eth2_ip == '10.20.0.10'
          - samba_lab_enabled | bool
          - platform_authoritative_dns_enabled | bool
          - offline_image_seed_enabled | bool
          - offline_image_seed_remote_path is match('^/var/tmp/[A-Za-z0-9._-]+\.docker\.tar\.zst$')
          - offline_image_seed_manifest_remote_path is match('^/var/tmp/[A-Za-z0-9._-]+\.manifest\.json$')
          - docker_networks | map(attribute='name') | list == aigw_lab_reset_expected_networks
          - (aigw_lab_reset_confirmation | default('')) == aigw_lab_reset_confirmation_token
          - (aigw_lab_legacy_host_teardown_confirmation | default('')) == aigw_lab_legacy_host_confirmation_token
        quiet: true
        fail_msg: >-
          Refusing destructive reset: this is only for lab-aigw01/aigw01 with
          both explicit acknowledgements and a verified Parallels snapshot.

    - name: Reset gate — bind the live guest NICs, addresses, default route, and DMI UUID
      ansible.builtin.command:
        argv:
          - /usr/bin/python3
          - -I
          - -c
          - |
            import json
            import pathlib
            import re
            import subprocess
            import sys
            vm_uuid, macs_text, egress_gateway, *values = sys.argv[1:]
            nics = values[:3]
            addresses = values[3:]
            expected_macs = json.loads(macs_text)
            if len(nics) != 3 or len(addresses) != 3:
                raise SystemExit("invalid guest NIC identity contract")
            def invoke(*args):
                result = subprocess.run(args, text=True, stdout=subprocess.PIPE, stderr=subprocess.PIPE, check=False)
                if result.returncode:
                    raise SystemExit(" ".join(args) + ": " + result.stderr.strip())
                return json.loads(result.stdout)
            def normalize(value):
                compact = re.sub(r"[^0-9a-fA-F]", "", str(value)).lower()
                if re.fullmatch(r"[0-9a-f]{12}", compact) is None:
                    raise SystemExit("guest returned an invalid NIC MAC")
                return ":".join(compact[index:index + 2] for index in range(0, 12, 2))
            try:
                guest_uuid = pathlib.Path("/sys/class/dmi/id/product_uuid").read_text(encoding="ascii").strip().lower()
            except OSError as exc:
                raise SystemExit("cannot read the guest DMI UUID") from exc
            if guest_uuid != vm_uuid:
                raise SystemExit("guest DMI UUID does not match the Parallels VM")
            for nic, expected_ip in zip(nics, addresses):
                links = invoke("ip", "-j", "link", "show", "dev", nic)
                records = invoke("ip", "-j", "-4", "address", "show", "dev", nic)
                actual_ips = {
                    entry.get("local") for entry in records[0].get("addr_info") or []
                    if entry.get("family") == "inet" and entry.get("scope") in {"global", "host"}
                } if len(records) == 1 else set()
                if (len(links) != 1 or links[0].get("ifname") != nic or
                        normalize(links[0].get("address", "")) != expected_macs.get(nic) or
                        len(records) != 1 or records[0].get("ifname") != nic or
                        actual_ips != {expected_ip}):
                    raise SystemExit("guest NIC address or MAC does not match the dedicated aigw01 lab")
            defaults = [route for route in invoke("ip", "-j", "-4", "route", "show", "table", "main") if route.get("dst") == "default"]
            if len(defaults) != 1 or defaults[0].get("dev") != nics[0] or defaults[0].get("gateway") != egress_gateway:
                raise SystemExit("guest main default route is not the reviewed egress route")
          - "{{ aigw_lab_reset_parallels_vm_uuid }}"
          - "{{ aigw_lab_reset_guest_nic_macs | to_json }}"
          - "{{ eth0_gateway }}"
          - "{{ nic_egress }}"
          - "{{ nic_adm }}"
          - "{{ nic_internal }}"
          - "{{ eth0_ip }}"
          - "{{ eth1_ip }}"
          - "{{ eth2_ip }}"
      changed_when: false

    - name: Reset gate — require no completed or pending host-ownership marker
      ansible.builtin.stat:
        path: "{{ item }}"
        follow: false
        get_checksum: false
      loop:
        - /etc/ai-gateway/dedicated-docker-host-v1
        - /etc/ai-gateway/dedicated-docker-host-v1.pending
      register: aigw_lab_reset_markers
      changed_when: false

    - name: Reset gate — require the known unmarked legacy host state
      ansible.builtin.assert:
        that:
          - not (aigw_lab_reset_markers.results[0].stat.exists | default(false))
          - not (aigw_lab_reset_markers.results[1].stat.exists | default(false))
        quiet: true
        fail_msg: >-
          Refusing this legacy reset because a modern completed or pending
          dedicated-host marker exists. Do not use a legacy teardown on it.

    - name: Reset gate — validate canonical local Docker client
      ansible.builtin.stat:
        path: /usr/bin/docker
        follow: false
        get_checksum: false
      register: aigw_lab_reset_docker_cli
      changed_when: false

    - name: Reset gate — reject an unsafe Docker client boundary
      ansible.builtin.assert:
        that:
          - aigw_lab_reset_docker_cli.stat.exists | default(false)
          - aigw_lab_reset_docker_cli.stat.isreg | default(false)
          - not (aigw_lab_reset_docker_cli.stat.islnk | default(false))
          - aigw_lab_reset_docker_cli.stat.uid == 0
          - aigw_lab_reset_docker_cli.stat.gid == 0
          - aigw_lab_reset_docker_cli.stat.mode == '0755'
        quiet: true
        fail_msg: Refusing reset because /usr/bin/docker is not the canonical root-owned client.

    - name: Reset gate — inspect the dedicated Docker root deletion boundary
      ansible.builtin.stat:
        path: "{{ docker_data_root }}"
        follow: false
        get_checksum: false
      register: aigw_lab_reset_docker_root
      changed_when: false

    - name: Reset gate — reject an unsafe dedicated Docker root deletion boundary
      ansible.builtin.assert:
        that:
          - aigw_lab_reset_docker_root.stat.exists | default(false)
          - aigw_lab_reset_docker_root.stat.isdir | default(false)
          - not (aigw_lab_reset_docker_root.stat.islnk | default(false))
          - aigw_lab_reset_docker_root.stat.uid == 0
          - aigw_lab_reset_docker_root.stat.gid == 0
          - aigw_lab_reset_docker_root.stat.mode is match('^0?[0-7][0-7][0-5][0-5]$')
        quiet: true
        fail_msg: >-
          Refusing reset because the dedicated Docker root is absent,
          symlinked, non-directory, or writable by a non-root principal.

    - name: Reset gate — verify the offline image seed to preserve
      ansible.builtin.stat:
        path: "{{ item.path }}"
        follow: false
        get_checksum: true
        checksum_algorithm: sha256
      loop:
        - { path: "{{ offline_image_seed_remote_path }}", checksum: "{{ offline_image_seed_sha256 }}" }
        - { path: "{{ offline_image_seed_manifest_remote_path }}", checksum: "{{ offline_image_seed_manifest_sha256 }}" }
      register: aigw_lab_reset_seed_before
      changed_when: false

    - name: Reset gate — require staged seed files before any destructive action
      ansible.builtin.assert:
        that:
          - item.stat.exists | default(false)
          - item.stat.isreg | default(false)
          - not (item.stat.islnk | default(false))
          - item.stat.uid == 0
          - item.stat.gid == 0
          - item.stat.mode == '0600'
          - (item.stat.size | int) > 0
          - item.stat.checksum == item.item.checksum
        quiet: true
        fail_msg: >-
          Refusing reset: the required /var/tmp archive or manifest is not a
          verified root-only seed. Re-stage both exact inventory-pinned files.
      loop: "{{ aigw_lab_reset_seed_before.results }}"
      loop_control:
        label: "{{ item.item.path }}"

    - name: Reset preflight — snapshot physical NIC addresses and physical routes
      ansible.builtin.command:
        argv:
          - python3
          - -I
          - -c
          - |
            import json
            import subprocess
            import sys
            nics = sys.argv[1:]
            def invoke(*args):
                result = subprocess.run(args, text=True, stdout=subprocess.PIPE, stderr=subprocess.PIPE, check=False)
                if result.returncode:
                    raise SystemExit(" ".join(args) + ": " + result.stderr.strip())
                return json.loads(result.stdout)
            addresses = {}
            for nic in nics:
                records = invoke("ip", "-j", "address", "show", "dev", nic)
                if len(records) != 1 or records[0].get("ifname") != nic:
                    raise SystemExit("cannot read physical NIC " + nic)
                addresses[nic] = sorted([
                    {key: item.get(key) for key in ("family", "local", "prefixlen", "scope")}
                    for item in records[0].get("addr_info") or []
                    if item.get("family") in {"inet", "inet6"} and item.get("scope") in {"global", "host", "link"}
                ], key=lambda item: json.dumps(item, sort_keys=True))
            routes = []
            pbr_rules = []
            for family, flag in (("inet", "-4"), ("inet6", "-6")):
                for route in invoke("ip", "-j", flag, "route", "show", "table", "all"):
                    if route.get("dev") in nics:
                        routes.append({"family": family, **{key: route.get(key) for key in ("type", "dst", "gateway", "dev", "protocol", "scope", "src", "prefsrc", "metric", "table") if route.get(key) is not None}})
                for rule in invoke("ip", "-j", flag, "rule", "show"):
                    if str(rule.get("priority", "")) in {"10101", "10102"}:
                        pbr_rules.append({"family": family, **{key: rule.get(key) for key in ("priority", "from", "src", "table") if rule.get(key) is not None}})
            print(json.dumps({"addresses": addresses, "routes": sorted(routes, key=lambda item: json.dumps(item, sort_keys=True)), "pbr_rules": sorted(pbr_rules, key=lambda item: json.dumps(item, sort_keys=True))}, sort_keys=True))
          - "{{ nic_egress }}"
          - "{{ nic_adm }}"
          - "{{ nic_internal }}"
      register: aigw_lab_reset_physical_network_before
      changed_when: false

    - name: Reset preflight — inventory only known AIGW Docker graph and seed images
      ansible.builtin.command:
        argv:
          - /usr/bin/env
          - -u
          - DOCKER_CONFIG
          - -u
          - DOCKER_CONTEXT
          - -u
          - DOCKER_HOST
          - -u
          - DOCKER_TLS
          - -u
          - DOCKER_TLS_VERIFY
          - -u
          - DOCKER_CERT_PATH
          - python3
          - -I
          - -c
          - |
            import json
            import re
            import subprocess
            import sys
            docker, project, stack_dir, root, manifest_path, services_text, network_specs_text, volumes_text, local_image_tags_text, legacy_seed_tags_text, archive_only_seed_tags_text = sys.argv[1:]
            services = set(json.loads(services_text))
            volumes = set(json.loads(volumes_text))
            local_image_tags = json.loads(local_image_tags_text)
            if (not isinstance(local_image_tags, dict) or
                    not local_image_tags or
                    not all(isinstance(tag, str) and re.fullmatch(r"(?:[a-z0-9][a-z0-9._/-]*):[A-Za-z0-9_.-]+", tag) and
                            isinstance(image_id, str) and re.fullmatch(r"sha256:[0-9a-f]{64}", image_id)
                            for tag, image_id in local_image_tags.items())):
                raise SystemExit("invalid exact legacy local-image contract")
            legacy_seed_tags = json.loads(legacy_seed_tags_text)
            if (not isinstance(legacy_seed_tags, dict) or not legacy_seed_tags or
                    not all(isinstance(tag, str) and re.fullmatch(r"(?:[a-z0-9][a-z0-9._/-]*):[A-Za-z0-9_.-]+", tag) and
                            isinstance(image_id, str) and
                            re.fullmatch(r"sha256:[0-9a-f]{64}", image_id)
                            for tag, image_id in legacy_seed_tags.items())):
                raise SystemExit("invalid exact legacy seed-image contract")
            archive_only_seed_tags = json.loads(archive_only_seed_tags_text)
            if (not isinstance(archive_only_seed_tags, dict) or not archive_only_seed_tags or
                    not all(isinstance(tag, str) and re.fullmatch(r"(?:[a-z0-9][a-z0-9._/-]*):[A-Za-z0-9_.-]+", tag) and
                            isinstance(image_id, str) and
                            re.fullmatch(r"sha256:[0-9a-f]{64}", image_id)
                            for tag, image_id in archive_only_seed_tags.items()) or
                    not set(archive_only_seed_tags).issubset(legacy_seed_tags) or
                    any(legacy_seed_tags[tag] != image_id for tag, image_id in archive_only_seed_tags.items())):
                raise SystemExit("invalid exact legacy archive-only seed-image contract")
            required_seed_tags = set(legacy_seed_tags) - set(archive_only_seed_tags)
            network_specs = json.loads(network_specs_text)
            networks = {entry.get("name"): entry for entry in network_specs if isinstance(entry, dict)} if isinstance(network_specs, list) else {}
            if (not isinstance(network_specs, list) or len(networks) != len(network_specs) or
                    any(not isinstance(entry, dict) for entry in network_specs) or not all(
                isinstance(entry.get("name"), str) and isinstance(entry.get("bridge"), str) and
                isinstance(entry.get("subnet"), str) and isinstance(entry.get("internal"), bool)
                for entry in network_specs)):
                raise SystemExit("invalid reviewed Docker network contract")
            volume_names = {project + "_" + value for value in volumes}
            errors = []
            def invoke(*args):
                result = subprocess.run([docker, "--host", "unix:///run/docker.sock", *args], text=True, stdout=subprocess.PIPE, stderr=subprocess.PIPE, check=False)
                if result.returncode:
                    raise RuntimeError("docker " + " ".join(args) + ": " + (result.stderr.strip() or result.stdout.strip()))
                return result.stdout
            try:
                info = json.loads(invoke("info", "--format=json"))
                if info.get("DockerRootDir") != root:
                    errors.append("Docker root is not the lab root")
                if (info.get("Swarm") or {}).get("LocalNodeState", "inactive") != "inactive":
                    errors.append("Docker Swarm is active")
                ids = invoke("ps", "-aq", "--no-trunc").split()
                containers = json.loads(invoke("inspect", *ids)) if ids else []
                approved_ids = []
                approved_services = []
                for record in containers:
                    labels = (record.get("Config") or {}).get("Labels") or {}
                    identifier = record.get("Id", "")
                    service = labels.get("com.docker.compose.service")
                    if (labels.get("com.docker.compose.project") != project or
                        labels.get("com.docker.compose.project.working_dir") != stack_dir or
                        service not in services or
                        labels.get("com.docker.compose.container-number") != "1" or
                        labels.get("com.docker.compose.oneoff") != "False" or
                        re.fullmatch(r"[0-9a-f]{64}", labels.get("com.docker.compose.config-hash", "")) is None or
                        re.fullmatch(r"[0-9a-f]{64}", identifier) is None or
                        record.get("Name") != f"/{project}-{service}-1"):
                        errors.append("foreign or unrecognized Docker container")
                    else:
                        approved_ids.append(identifier)
                        approved_services.append(service)
                if (len(containers) != len(services) or set(approved_services) != services or
                        any(approved_services.count(service) != 1 for service in services)):
                    errors.append("Docker service graph is not exact one-per reviewed legacy service")
                actual_networks = json.loads(invoke("network", "inspect", *invoke("network", "ls", "-q").split()))
                approved_networks = []
                for record in actual_networks:
                    name = record.get("Name", "")
                    if name in {"bridge", "host", "none"}:
                        continue
                    expected = networks.get(name)
                    expected_iprange = expected["subnet"].replace(".0/24", ".128/25") if expected else ""
                    expected_gateway = expected["subnet"].replace(".0/24", ".128") if expected else ""
                    expected_ipam_config = [{"Subnet": expected["subnet"], "IPRange": expected_iprange, "Gateway": expected_gateway}] if expected else []
                    ipam = record.get("IPAM") or {}
                    config = ipam.get("Config") or []
                    options = record.get("Options") or {}
                    if (expected is None or record.get("Driver") != "bridge" or record.get("Scope") != "local" or
                        bool(record.get("Internal")) != expected["internal"] or bool(record.get("EnableIPv6")) or
                        options != {"com.docker.network.bridge.name": expected["bridge"]} or
                        (record.get("Labels") or {}) != {} or
                        ipam.get("Driver") != "default" or (ipam.get("Options") or {}) != {} or
                        config != expected_ipam_config or
                        not set((record.get("Containers") or {}).keys()).issubset(set(approved_ids))):
                        errors.append("foreign or unrecognized Docker network")
                    else:
                        approved_networks.append(name)
                if (set(approved_networks) != set(networks) or
                        len(approved_networks) != len(networks)):
                    errors.append("Docker network graph is not the exact reviewed legacy set")
                volume_ids = invoke("volume", "ls", "-q").split()
                actual_volumes = json.loads(invoke("volume", "inspect", *volume_ids)) if volume_ids else []
                approved_volumes = []
                for record in actual_volumes:
                    name = record.get("Name", "")
                    labels = record.get("Labels") or {}
                    logical = name[len(project) + 1:] if name.startswith(project + "_") else ""
                    if (name not in volume_names or record.get("Driver") != "local" or
                        record.get("Scope") != "local" or (record.get("Options") or {}) != {} or
                        set(labels) != {"com.docker.compose.config-hash", "com.docker.compose.project", "com.docker.compose.version", "com.docker.compose.volume"} or
                        re.fullmatch(r"[0-9a-f]{64}", labels.get("com.docker.compose.config-hash", "")) is None or
                        not isinstance(labels.get("com.docker.compose.version"), str) or not labels.get("com.docker.compose.version") or
                        labels.get("com.docker.compose.project") != project or
                        labels.get("com.docker.compose.volume") != logical or
                        record.get("Mountpoint") != root + "/volumes/" + name + "/_data"):
                        errors.append("foreign or unrecognized Docker volume")
                    else:
                        approved_volumes.append(name)
                if (set(approved_volumes) != volume_names or
                        len(approved_volumes) != len(volume_names)):
                    errors.append("Docker volume graph is not the exact reviewed legacy set")
                manifest = json.load(open(manifest_path, encoding="utf-8"))
                seed_tags = {}
                seed_ids = set()
                for image in manifest.get("images", []) if isinstance(manifest, dict) else []:
                    if not isinstance(image, dict) or not isinstance(image.get("reference"), str) or not isinstance(image.get("image_id"), str):
                        raise SystemExit("invalid image seed manifest identity")
                    reference = image["reference"]
                    image_id = image["image_id"]
                    if (reference.count("@sha256:") != 1 or re.fullmatch(r"sha256:[0-9a-f]{64}", image_id) is None):
                        raise SystemExit("invalid image seed manifest identity")
                    tag = reference.rsplit("@sha256:", 1)[0]
                    if tag in seed_tags or image_id in seed_ids:
                        raise SystemExit("duplicate image seed manifest identity")
                    seed_tags[tag] = image_id
                    seed_ids.add(image_id)
                if not seed_tags:
                    raise SystemExit("empty image seed manifest identity")
                if seed_tags != legacy_seed_tags:
                    raise SystemExit("staged seed manifest is not the exact legacy seed-image contract")
                image_rows = [json.loads(line) for line in invoke("image", "ls", "--all", "--no-trunc", "--format", "{{ '{{json .}}' }}").splitlines() if line]
                seen_local_tags = set()
                seen_legacy_seed_tags = set()
                for image in image_rows:
                    repository = image.get("Repository", "")
                    tag = image.get("Tag", "")
                    image_id = image.get("ID", "")
                    if re.fullmatch(r"sha256:[0-9a-f]{64}", image_id) is None:
                        errors.append("foreign or malformed Docker image identity")
                    elif repository == "<none>" or tag == "<none>":
                        errors.append("dangling Docker image")
                    else:
                        tag_identity = repository + ":" + tag
                        allowed_image_ids = {
                            expected for expected in (
                                local_image_tags.get(tag_identity),
                                legacy_seed_tags.get(tag_identity),
                            ) if expected is not None
                        }
                        if image_id not in allowed_image_ids:
                            errors.append("foreign or unrecognized Docker image identity")
                        elif tag_identity in local_image_tags:
                            seen_local_tags.add(tag_identity)
                        else:
                            seen_legacy_seed_tags.add(tag_identity)
                if (seen_local_tags != set(local_image_tags) or
                        not required_seed_tags.issubset(seen_legacy_seed_tags)):
                    errors.append("legacy Docker image tags are not the exact reviewed set")
                if errors:
                    raise SystemExit("; ".join(dict.fromkeys(errors)))
                print(json.dumps({"containers": sorted(approved_ids), "networks": sorted(approved_networks), "volumes": sorted(approved_volumes), "images": len(image_rows)}, sort_keys=True))
            except Exception as exc:
                raise SystemExit(str(exc)) from exc
