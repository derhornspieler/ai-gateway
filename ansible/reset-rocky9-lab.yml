    - name: Reset preflight — require the exact bounded legacy stack inventory before recursive removal
      ansible.builtin.command:
        argv:
          - /usr/bin/python3
          - -I
          - -c
          - |
            import hashlib
            import json
            import os
            import pathlib
            import re
            import stat
            import sys

            root_text, expected_count_text, expected_bytes_text, expected_manifest, sensitive_text = sys.argv[1:]
            if root_text != "/opt/ai-gateway":
                raise SystemExit("invalid legacy stack root")
            if re.fullmatch(r"[0-9]{1,4}", expected_count_text) is None or re.fullmatch(r"[0-9]{1,10}", expected_bytes_text) is None:
                raise SystemExit("invalid legacy stack inventory bounds")
            expected_count = int(expected_count_text)
            expected_bytes = int(expected_bytes_text)
            if re.fullmatch(r"[0-9a-f]{64}", expected_manifest) is None:
                raise SystemExit("invalid legacy stack manifest digest")
            try:
                sensitive_paths = json.loads(sensitive_text)
            except json.JSONDecodeError as exc:
                raise SystemExit("invalid legacy stack sensitive-path inventory") from exc
            if not isinstance(sensitive_paths, list) or not all(isinstance(value, str) for value in sensitive_paths):
                raise SystemExit("invalid legacy stack sensitive-path inventory")
            sensitive = set(sensitive_paths)
            if len(sensitive) != len(sensitive_paths):
                raise SystemExit("duplicate legacy stack sensitive-path inventory")
            max_file_size = 131072
            max_entries = 256

            def fail(message):
                raise SystemExit(message)

            def safe_relative(value):
                if not value or value == "." or value.startswith("/") or ".." in value.split("/"):
                    fail("unsafe legacy stack relative path")
                if any(ord(character) < 0x20 for character in value):
                    fail("unsafe legacy stack path characters")
                return value

            for value in sensitive:
                safe_relative(value)

            def check_metadata(metadata, relative, directory):
                mode = stat.S_IMODE(metadata.st_mode)
                if metadata.st_uid != 0 or mode & 0o022:
                    fail("unsafe legacy stack ownership or permissions: " + relative)
                if directory:
                    if not stat.S_ISDIR(metadata.st_mode):
                        fail("legacy stack directory type changed: " + relative)
                elif not stat.S_ISREG(metadata.st_mode):
                    fail("legacy stack file is not a regular file: " + relative)
                return mode

            def file_digest(path, metadata, relative):
                if metadata.st_size > max_file_size:
                    fail("legacy stack file exceeds bounded reviewed size: " + relative)
                flags = os.O_RDONLY | getattr(os, "O_NOFOLLOW", 0)
                try:
                    descriptor = os.open(path, flags)
                except OSError as exc:
                    fail("cannot open legacy stack file safely: " + relative + ": " + str(exc))
                try:
                    opened = os.fstat(descriptor)
                    if (not stat.S_ISREG(opened.st_mode) or opened.st_dev != metadata.st_dev or
                            opened.st_ino != metadata.st_ino or opened.st_size != metadata.st_size):
                        fail("legacy stack file changed during inventory: " + relative)
                    digest = hashlib.sha256()
                    while True:
                        block = os.read(descriptor, 1024 * 1024)
                        if not block:
                            break
                        digest.update(block)
                    return digest.hexdigest()
                finally:
                    os.close(descriptor)

            root = pathlib.Path(root_text)
            try:
                root_metadata = os.lstat(root)
            except OSError as exc:
                raise SystemExit("cannot inspect legacy stack root") from exc
            root_mode = check_metadata(root_metadata, ".", True)
            if stat.S_ISLNK(root_metadata.st_mode):
                fail("legacy stack root must not be a symlink")
            records = [f"D\t.\t{root_mode:04o}\t{root_metadata.st_uid}\t{root_metadata.st_gid}"]
            seen_sensitive = set()
            child_count = 0
            total_bytes = 0

            def visit(directory, relative_directory):
                global child_count, total_bytes
                try:
                    entries = sorted(os.scandir(directory), key=lambda entry: entry.name)
                except OSError as exc:
                    fail("cannot enumerate legacy stack directory: " + relative_directory + ": " + str(exc))
                for entry in entries:
                    relative = safe_relative(entry.name if relative_directory == "." else relative_directory + "/" + entry.name)
                    try:
                        metadata = entry.stat(follow_symlinks=False)
                    except OSError as exc:
                        fail("cannot inspect legacy stack entry: " + relative + ": " + str(exc))
                    child_count += 1
                    if child_count > max_entries:
                        fail("legacy stack exceeds bounded reviewed entry count")
                    if stat.S_ISLNK(metadata.st_mode):
                        fail("legacy stack contains a symlink: " + relative)
                    if stat.S_ISDIR(metadata.st_mode):
                        mode = check_metadata(metadata, relative, True)
                        records.append(f"D\t{relative}\t{mode:04o}\t{metadata.st_uid}\t{metadata.st_gid}")
                        visit(entry.path, relative)
                        continue
                    mode = check_metadata(metadata, relative, False)
                    total_bytes += metadata.st_size
                    content = "sensitive"
                    if relative in sensitive:
                        seen_sensitive.add(relative)
                    else:
                        content = file_digest(entry.path, metadata, relative)
                    records.append(f"F\t{relative}\t{mode:04o}\t{metadata.st_uid}\t{metadata.st_gid}\t{metadata.st_size}\t{content}")

            visit(str(root), ".")
            if seen_sensitive != sensitive:
                fail("legacy stack sensitive-path allowlist does not match the reviewed tree")
            if child_count != expected_count or total_bytes != expected_bytes:
                fail("legacy stack inventory bounds do not match the reviewed tree")
            manifest = "aigw-legacy-stack-inventory-v1\n" + "\n".join(records) + "\n"
            if hashlib.sha256(manifest.encode("utf-8")).hexdigest() != expected_manifest:
                fail("legacy stack inventory does not exactly match the reviewed tree")
          - /opt/ai-gateway
          - "{{ aigw_lab_reset_legacy_stack_entry_count | string }}"
          - "{{ aigw_lab_reset_legacy_stack_total_bytes | string }}"
          - "{{ aigw_lab_reset_legacy_stack_manifest_sha256 }}"
          - "{{ aigw_lab_reset_legacy_stack_sensitive_paths | to_json }}"
      changed_when: false

