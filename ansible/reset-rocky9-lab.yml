---
# Destructive legacy-lab teardown.  This playbook is intentionally separate
# from site.yml and is only for the unmarked, disposable aigw01 Parallels VM.
# It never targets generic/customer inventory and never runs a Docker prune.

- name: AI Gateway Rocky 9 lab — snapshot-gated legacy clean reset
  hosts: lab-aigw01
  become: true
  gather_facts: false
  serial: 1
  any_errors_fatal: true
  vars:
    aigw_lab_reset_confirmation_token: DESTROY_AIGW01_LAB_STATE
    aigw_lab_legacy_host_confirmation_token: REMOVE_AIGW01_LEGACY_HOST_ARTIFACTS
    aigw_lab_reset_expected_services:
      - volume-init
      - traefik-int
      - traefik-adm
      - oauth2-proxy
      - oauth2-proxy-grafana
      - oauth2-proxy-prometheus
      - oauth2-proxy-vault
      - litellm
      - open-webui
      - keycloak
      - dev-portal
      - admin-portal
      - envoy-egress
      - key-rotator
      - vault-ui-proxy
      - vault
      - postgres
      - redis
      - alloy
      - prometheus
      - node-exporter
      - loki
      - tempo
      - grafana
      - cribl-mock
      - lab-dns
      - samba-ad
    # This unmarked snapshot predates the three later optional RPs/admin UI.
    # Deletion therefore requires this exact one-container-per-service legacy
    # graph, rather than merely a subset of the current Compose model.
    aigw_lab_reset_legacy_expected_services:
      - alloy
      - cribl-mock
      - dev-portal
      - envoy-egress
      - grafana
      - keycloak
      - key-rotator
      - lab-dns
      - litellm
      - loki
      - node-exporter
      - oauth2-proxy
      - oauth2-proxy-grafana
      - open-webui
      - postgres
      - prometheus
      - redis
      - samba-ad
      - tempo
      - traefik-adm
      - traefik-int
      - vault
      - volume-init
    aigw_lab_reset_expected_networks:
      - net-egress
      - net-adm
      - net-internal
      - net-chat
      - net-portal
      - net-admin-app
      - net-grafana
      - net-vendor
      - net-vault
      - net-db-litellm
      - net-db-keycloak
      - net-db-rotator
      - net-cache
      - net-telemetry
      - net-metrics
      - net-observability
      - net-traces
      - net-identity
      - net-lab-dns
      - net-int-edge
      - net-db-grafana
    # The unmarked snapshot also predates net-db-grafana (the Grafana spend-
    # datasource DB bridge landed with the observability drop), so the live
    # legacy Docker graph carries exactly these 20 reviewed bridges. The
    # live network-graph proof therefore compares against this frozen legacy
    # set — never the evolving ``docker_networks`` model, which the current-
    # topology assertion above still pins — while still requiring exact set
    # equality with the live host, never a subset or superset.
    aigw_lab_reset_legacy_expected_networks:
      - { name: net-egress,        bridge: br-egress,   subnet: 172.28.0.0/24,  internal: false }
      - { name: net-adm,           bridge: br-adm,      subnet: 172.28.1.0/24,  internal: false }
      - { name: net-internal,      bridge: br-internal, subnet: 172.28.2.0/24,  internal: false }
      - { name: net-chat,          bridge: br-chat,     subnet: 172.28.3.0/24,  internal: true }
      - { name: net-portal,        bridge: br-portal,   subnet: 172.28.4.0/24,  internal: true }
      - { name: net-admin-app,     bridge: br-admin,    subnet: 172.28.5.0/24,  internal: true }
