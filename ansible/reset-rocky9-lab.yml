    - name: Reset preflight — validate recognized legacy host artifacts only
      ansible.builtin.command:
        argv:
          - python3
          - -I
          - -c
          - |
            import hashlib
            import json
            import os
            import pathlib
            import re
            import stat
            import subprocess
            import sys
            expected_hashes = json.loads(sys.argv[1])
            if (not isinstance(expected_hashes, dict) or
                    not all(isinstance(path, str) and isinstance(digest, str) and
                            re.fullmatch(r"[0-9a-f]{64}", digest)
                            for path, digest in expected_hashes.items())):
                raise SystemExit("invalid exact legacy artifact digest contract")
            expected_files = {pathlib.Path(value) for value in expected_hashes}
            expected_nft_hashes = json.loads(sys.argv[2])
            expected_docker_user_hashes = json.loads(sys.argv[3])
            if (not isinstance(expected_nft_hashes, dict) or
                    set(expected_nft_hashes) != {"aigw_guard", "aigw_maintenance"} or
                    not all(isinstance(value, str) and re.fullmatch(r"[0-9a-f]{64}", value)
                            for value in expected_nft_hashes.values()) or
                    not isinstance(expected_docker_user_hashes, dict) or
                    set(expected_docker_user_hashes) != {"iptables", "ip6tables"} or
                    not all(isinstance(value, str) and re.fullmatch(r"[0-9a-f]{64}", value)
                            for value in expected_docker_user_hashes.values())):
                raise SystemExit("invalid exact legacy packet-filter digest contract")
            errors = []
            def safe_directory(path):
                try:
                    metadata = path.lstat()
                except FileNotFoundError:
                    errors.append("missing legacy artifact parent " + str(path))
                    return False
                if (not stat.S_ISDIR(metadata.st_mode) or stat.S_ISLNK(metadata.st_mode) or
                        metadata.st_uid != 0 or metadata.st_gid != 0 or metadata.st_mode & 0o022):
                    errors.append("unsafe legacy artifact parent " + str(path))
                    return False
                return True
            def safe_file(path):
                try:
                    metadata = path.lstat()
                except FileNotFoundError:
                    return False
                if (not stat.S_ISREG(metadata.st_mode) or stat.S_ISLNK(metadata.st_mode) or
                    metadata.st_uid != 0 or metadata.st_gid != 0 or metadata.st_mode & 0o022 or
                    metadata.st_size > 1048576):
                    errors.append("unsafe legacy artifact " + str(path))
                    return False
                return True
            for directory in (
                pathlib.Path("/etc/docker"), pathlib.Path("/usr/local/sbin"),
                pathlib.Path("/etc/NetworkManager/dispatcher.d"),
                pathlib.Path("/etc/ssh/sshd_config.d"),
                pathlib.Path("/etc/systemd/system"), pathlib.Path("/etc/firewalld/zones"),
                pathlib.Path("/etc/firewalld/policies"),
            ):
                safe_directory(directory)
            for path in expected_files:
                if safe_file(path):
                    digest = hashlib.sha256(path.read_bytes()).hexdigest()
                    if digest != expected_hashes[str(path)]:
                        errors.append("legacy artifact digest differs " + str(path))
            expected_by_directory = {
                pathlib.Path("/usr/local/sbin"): {"aigw-policy-routing", "aigw-host-input-rules.sh", "docker-user-rules.sh", "docker-user-rules-watch.sh", "aigw-docker-log-acl", "aigw-load-offline-image-seed", "aigw-maintenance-boot-guard"},
                pathlib.Path("/etc/NetworkManager/dispatcher.d"): {"90-aigw-policy-routing", "91-aigw-firewalld-zones"},
                pathlib.Path("/etc/ssh/sshd_config.d"): {"00-ai-gateway-hardening.conf"},
                pathlib.Path("/etc/systemd/system"): {"aigw-policy-routing.service", "aigw-host-input-rules.service", "docker-user-rules.service", "docker-user-rules-watch.service", "aigw-docker-log-acl.service", "aigw-docker-log-acl.timer", "aigw-vault-audit-rotate.service", "aigw-vault-audit-rotate.timer", "aigw-maintenance-boot-guard.service"},
                pathlib.Path("/etc/firewalld/zones"): {"aigw-adm.xml", "aigw-adm.xml.old", "aigw-egress.xml", "aigw-egress.xml.old", "aigw-internal.xml", "aigw-internal.xml.old", "public.xml", "public.xml.old", "docker.xml"},
                pathlib.Path("/etc/firewalld/policies"): {"docker-forwarding.xml"},
            }
            for directory, allowed in expected_by_directory.items():
                if not directory.is_dir():
                    continue
                for entry in directory.iterdir():
                    name = entry.name
                    relevant = ("aigw" in name or name.startswith("docker-user") or directory.name in {"zones", "policies"})
                    if relevant and name not in allowed:
                        errors.append("unexpected legacy-like artifact " + str(entry))
            dropin = pathlib.Path("/etc/systemd/system/docker.service.d")
            if dropin.exists():
                metadata = dropin.lstat()
                if (not stat.S_ISDIR(metadata.st_mode) or stat.S_ISLNK(metadata.st_mode) or
                        metadata.st_uid != 0 or metadata.st_gid != 0 or metadata.st_mode & 0o022 or
                        {entry.name for entry in dropin.iterdir()} != {"90-aigw-maintenance-boot-guard.conf"}):
                    errors.append("unexpected Docker systemd drop-in boundary")
            daemon = pathlib.Path("/etc/docker/daemon.json")
            if daemon.exists() and safe_file(daemon):
                try:
                    actual = json.loads(daemon.read_text(encoding="utf-8"))
                except (OSError, ValueError):
                    errors.append("legacy Docker daemon config is invalid")
                else:
                    expected = {"data-root": "/var/lib/docker", "log-driver": "json-file", "log-opts": {"max-size": "50m", "max-file": "5"}, "live-restore": True, "firewall-backend": "iptables"}
                    if actual != expected:
                        errors.append("legacy Docker daemon config is not the recognized AIGW contract")
            def capture(command):
                result = subprocess.run(command, text=True, stdout=subprocess.PIPE, stderr=subprocess.PIPE, check=False)
                if result.returncode not in (0, 1):
                    errors.append("cannot inspect " + " ".join(command))
                return result.returncode, result.stdout
            for table, expected_digest in expected_nft_hashes.items():
                rc, text = capture(["nft", "list", "table", "inet", table])
                if rc == 0:
                    if hashlib.sha256(text.encode()).hexdigest() != expected_digest:
                        errors.append("legacy nft table differs " + table)
            for binary, expected_digest in expected_docker_user_hashes.items():
                rc, text = capture([binary, "-S", "DOCKER-USER"])
                if rc == 0:
                    if hashlib.sha256(text.encode()).hexdigest() != expected_digest:
                        errors.append("legacy DOCKER-USER rules differ " + binary)
            expected_zones = {"aigw-adm", "aigw-egress", "aigw-internal"}
            for scope in ([], ["--permanent"]):
                rc, text = capture(["firewall-cmd", *scope, "--get-zones"])
                zones = set(text.split()) if rc == 0 else set()
                unexpected = {zone for zone in zones if zone.startswith("aigw-")} - expected_zones
                missing = expected_zones - zones
                if unexpected:
                    errors.append("unexpected AIGW firewalld zones " + ",".join(sorted(unexpected)))
                if missing:
                    errors.append("missing recognized AIGW firewalld zones " + ",".join(sorted(missing)))
            for option in ("--get-all-chains", "--get-all-rules", "--get-all-passthroughs"):
                rc, text = capture(["firewall-cmd", "--direct", option])
                if rc == 0 and text.strip():
                    errors.append("firewalld direct state is not empty")
            if errors:
                raise SystemExit("; ".join(dict.fromkeys(errors)))
          - "{{ aigw_lab_legacy_artifact_sha256 | to_json }}"
          - "{{ aigw_lab_legacy_nft_sha256 | to_json }}"
          - "{{ aigw_lab_legacy_docker_user_sha256 | to_json }}"
      changed_when: false

