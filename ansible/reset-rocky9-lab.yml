      ansible.builtin.assert:
        that: [not (item.stat.exists | default(false))]
        quiet: true
        fail_msg: >-
          Refusing reset because a prior seed-loader proof path remains. Do
          not overwrite an unreviewed /var/tmp loader or Docker-root marker.
      loop: "{{ aigw_lab_reset_seed_proof_paths.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Reset gate — prove the exact staged image seed loads and verifies RepoDigests
      block:
        - name: Reset gate — stage the current fail-closed seed loader ephemerally
          ansible.builtin.copy:
            src: "{{ playbook_dir }}/../scripts/load-offline-image-seed.py"
            dest: "{{ aigw_lab_reset_seed_loader_path }}"
            owner: root
            group: root
            mode: "0700"

        - name: Reset gate — load and verify only manifest-approved seed images
          ansible.builtin.command:
            argv:
              - /usr/bin/python3
              - -I
              - "{{ aigw_lab_reset_seed_loader_path }}"
              - "{{ offline_image_seed_remote_path }}"
              - "{{ offline_image_seed_sha256 }}"
              - "{{ offline_image_seed_manifest_remote_path }}"
              - "{{ offline_image_seed_manifest_sha256 }}"
              - "{{ aigw_lab_reset_seed_proof_marker_dir }}"
          register: aigw_lab_reset_seed_loader_result
          changed_when: false
          failed_when: >-
            aigw_lab_reset_seed_loader_result.rc != 0 or
            aigw_lab_reset_seed_loader_result.stdout is not match(
              '^(LOADED|RELOADED|SKIPPED) ' ~ offline_image_seed_sha256 ~ '$'
            )

      always:
        - name: Reset gate — remove the ephemeral seed-loader proof marker
          ansible.builtin.file:
            path: "{{ aigw_lab_reset_seed_proof_marker_dir }}"
            state: absent

        - name: Reset gate — remove the ephemeral staged seed loader
          ansible.builtin.file:
            path: "{{ aigw_lab_reset_seed_loader_path }}"
            state: absent

  tasks:
    - name: Reset plan — report scope before any destructive action
      ansible.builtin.debug:
        msg: >-
          Snapshot {{ aigw_lab_legacy_reset_snapshot_name }} is verified. This will remove only
          {{ aigw_lab_reset_docker_plan.containers | length }} recognized AI Gateway containers,
          {{ aigw_lab_reset_docker_plan.networks | length }} networks,
          {{ aigw_lab_reset_docker_plan.volumes | length }} volumes, the validated legacy AIGW
          host artifacts, and the dedicated Docker root. NIC addresses/PBR routes, base OS,
          SSH ADM reachability, and the verified /var/tmp seed archive/manifest are retained.
      changed_when: false

    - name: Reset legacy — inspect known AIGW unit availability
      ansible.builtin.command:
        argv: [systemctl, show, "{{ item }}", --property=LoadState, --value]
      loop: "{{ aigw_lab_legacy_reset_units }}"
      register: aigw_lab_reset_units_before
      changed_when: false
      failed_when: false

    - name: Reset legacy — stop and disable only loaded AIGW units
      ansible.builtin.command:
        argv: [systemctl, disable, --now, "{{ item.item }}"]
      loop: "{{ aigw_lab_reset_units_before.results }}"
      when: item.stdout | trim == 'loaded'
      changed_when: true

    - name: Reset legacy — remove only preflight-approved AI Gateway containers
      ansible.builtin.command:
        argv: "{{ aigw_lab_reset_docker_argv + ['rm', '-f', item] }}"
      loop: "{{ aigw_lab_reset_docker_plan.containers }}"
      loop_control:
        label: AI Gateway container

    - name: Reset legacy — remove only preflight-approved AI Gateway networks
      ansible.builtin.command:
        argv: "{{ aigw_lab_reset_docker_argv + ['network', 'rm', item] }}"
      loop: "{{ aigw_lab_reset_docker_plan.networks }}"
      loop_control:
        label: AI Gateway network

    - name: Reset legacy — remove only preflight-approved AI Gateway volumes
      ansible.builtin.command:
        # No force: a new attachment after preflight fails closed.
        argv: "{{ aigw_lab_reset_docker_argv + ['volume', 'rm', item] }}"
      loop: "{{ aigw_lab_reset_docker_plan.volumes }}"
      loop_control:
        label: AI Gateway volume

    - name: Reset legacy — reject Docker graph drift before stopping the daemon
      ansible.builtin.command:
        argv:
          - /usr/bin/env
          - -u
          - DOCKER_CONFIG
          - -u
          - DOCKER_CONTEXT
          - -u
          - DOCKER_HOST
          - -u
          - DOCKER_TLS
          - -u
          - DOCKER_TLS_VERIFY
          - -u
          - DOCKER_CERT_PATH
          - python3
          - -I
          - -c
          - |
            import json
            import re
            import subprocess
            import sys
            docker, root, manifest_path, local_image_tags_text, archive_only_seed_tags_text = sys.argv[1:]
            local_image_tags = json.loads(local_image_tags_text)
            if (not isinstance(local_image_tags, dict) or
                    not all(isinstance(tag, str) and isinstance(image_id, str) and
                            re.fullmatch(r"sha256:[0-9a-f]{64}", image_id)
                            for tag, image_id in local_image_tags.items())):
                raise SystemExit("invalid exact legacy local-image contract")
            archive_only_seed_tags = json.loads(archive_only_seed_tags_text)
            if (not isinstance(archive_only_seed_tags, dict) or not archive_only_seed_tags or
                    not all(isinstance(tag, str) and re.fullmatch(r"(?:[a-z0-9][a-z0-9._/-]*):[A-Za-z0-9_.-]+", tag) and
                            isinstance(image_id, str) and
                            re.fullmatch(r"sha256:[0-9a-f]{64}", image_id)
                            for tag, image_id in archive_only_seed_tags.items())):
                raise SystemExit("invalid exact legacy archive-only seed-image contract")
            def invoke(*args):
                result = subprocess.run([docker, "--host", "unix:///run/docker.sock", *args], text=True, stdout=subprocess.PIPE, stderr=subprocess.PIPE, check=False)
                if result.returncode:
                    raise RuntimeError("docker " + " ".join(args) + ": " + (result.stderr.strip() or result.stdout.strip()))
                return result.stdout
            try:
                info = json.loads(invoke("info", "--format=json"))
                if info.get("DockerRootDir") != root:
                    raise SystemExit("Docker root changed after the reset plan")
                if (info.get("Swarm") or {}).get("LocalNodeState", "inactive") != "inactive":
                    raise SystemExit("Docker Swarm became active after the reset plan")
                if invoke("ps", "-aq", "--no-trunc").split():
                    raise SystemExit("Docker containers remain or appeared after the reset plan")
                network_ids = invoke("network", "ls", "-q").split()
                networks = json.loads(invoke("network", "inspect", *network_ids)) if network_ids else []
                unexpected_networks = sorted(record.get("Name", "") for record in networks if record.get("Name") not in {"bridge", "host", "none"})
                if unexpected_networks:
                    raise SystemExit("Docker networks remain or appeared after the reset plan")
                if invoke("volume", "ls", "-q").split():
                    raise SystemExit("Docker volumes remain or appeared after the reset plan")
                manifest = json.load(open(manifest_path, encoding="utf-8"))
                seed_tags = {}
                seed_ids = set()
                seed_records = []
                for image in manifest.get("images", []) if isinstance(manifest, dict) else []:
                    if not isinstance(image, dict) or not isinstance(image.get("reference"), str) or not isinstance(image.get("image_id"), str):
                        raise SystemExit("invalid image seed manifest identity")
                    reference = image["reference"]
                    image_id = image["image_id"]
                    if reference.count("@sha256:") != 1 or re.fullmatch(r"sha256:[0-9a-f]{64}", image_id) is None:
                        raise SystemExit("invalid image seed manifest identity")
                    tag, digest = reference.rsplit("@sha256:", 1)
                    if tag in seed_tags or image_id in seed_ids or re.fullmatch(r"[0-9a-f]{64}", digest) is None:
                        raise SystemExit("duplicate image seed manifest identity")
                    seed_tags[tag] = image_id
                    seed_ids.add(image_id)
                    seed_records.append((reference, image_id, digest))
                if not seed_tags:
                    raise SystemExit("empty image seed manifest identity")
                if (not set(archive_only_seed_tags).issubset(seed_tags) or
                        any(seed_tags[tag] != image_id for tag, image_id in archive_only_seed_tags.items())):
                    raise SystemExit("archive-only seed image is not in the exact staged manifest")
                required_seed_tags = set(seed_tags) - set(archive_only_seed_tags)
                seen_local_tags = set()
                seen_seed_tags = set()
                for line in invoke("image", "ls", "--all", "--no-trunc", "--format", "{{ '{{json .}}' }}").splitlines():
                    image = json.loads(line)
                    repository = image.get("Repository", "")
                    tag = image.get("Tag", "")
                    image_id = image.get("ID", "")
                    if re.fullmatch(r"sha256:[0-9a-f]{64}", image_id) is None:
                        raise SystemExit("malformed Docker image appeared after the reset plan")
                    if repository == "<none>" or tag == "<none>":
                        raise SystemExit("dangling Docker image appeared after the reset plan")
                    tag_identity = repository + ":" + tag
                    allowed_image_ids = {
                        expected for expected in (
                            local_image_tags.get(tag_identity),
                            seed_tags.get(tag_identity),
                        ) if expected is not None
                    }
                    if image_id not in allowed_image_ids:
                        raise SystemExit("foreign Docker image identity appeared after the reset plan")
                    if tag_identity in local_image_tags:
                        seen_local_tags.add(tag_identity)
                    if image_id == seed_tags.get(tag_identity):
                        seen_seed_tags.add(tag_identity)
                if (seen_local_tags != set(local_image_tags) or
                        not required_seed_tags.issubset(seen_seed_tags)):
                    raise SystemExit("Docker image tags are not the exact verified legacy-and-seed set")
                for reference, expected_image_id, digest in seed_records:
                    tag = reference.rsplit("@sha256:", 1)[0]
                    if tag in archive_only_seed_tags and tag not in seen_seed_tags:
                        continue
                    records = json.loads(invoke("image", "inspect", "--", reference))
                    if len(records) != 1 or records[0].get("Id") != expected_image_id or not any(
                            isinstance(value, str) and value.endswith("@sha256:" + digest)
                            for value in records[0].get("RepoDigests") or []):
                        raise SystemExit("Docker seed RepoDigest changed after the reset plan")
            except Exception as exc:
                raise SystemExit(str(exc)) from exc
          - /usr/bin/docker
          - "{{ docker_data_root }}"
          - "{{ offline_image_seed_manifest_remote_path }}"
          - "{{ aigw_lab_reset_legacy_local_image_tags | to_json }}"
          - "{{ aigw_lab_reset_legacy_archive_only_seed_image_tags | to_json }}"
      changed_when: false
      no_log: true

    - name: Reset legacy — stop and disable Docker socket before Docker root removal
      ansible.builtin.systemd_service:
        name: docker.socket
        enabled: false
        state: stopped

    - name: Reset legacy — stop and disable Docker service before Docker root removal
      ansible.builtin.systemd_service:
        name: docker.service
        enabled: false
        state: stopped

    - name: Reset legacy — require Docker service and socket to be inactive
      ansible.builtin.command:
        argv: [systemctl, show, "{{ item }}", --property=ActiveState, --value]
      loop: [docker.service, docker.socket]
      register: aigw_lab_reset_docker_units_after_stop
      changed_when: false

    - name: Reset legacy — reject Docker root removal while a unit remains active
      ansible.builtin.assert:
        that: [item.stdout | trim == 'inactive']
        quiet: true
        fail_msg: Docker did not stop cleanly; Docker data root will not be removed.
      loop: "{{ aigw_lab_reset_docker_units_after_stop.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Reset legacy — prove no dockerd process remains before socket remediation
      ansible.builtin.command:
        argv:
          - /usr/bin/python3
          - -I
          - -c
          - |
            import pathlib

            dockerd = []
            for entry in pathlib.Path("/proc").iterdir():
                if not entry.name.isdigit():
                    continue
                try:
                    if (entry / "comm").read_text(encoding="ascii").strip() == "dockerd":
                        dockerd.append(entry.name)
                except OSError:
                    continue
            if dockerd:
                raise SystemExit("dockerd process remains after stop")
            print("NO_DOCKERD")
      changed_when: false

    - name: Reset legacy — remove only a verified stale Docker Unix socket
      ansible.builtin.command:
        argv:
          - /usr/bin/python3
          - -I
          - -c
          - |
            import grp
            import os
            import pathlib
            import stat
            import subprocess

            socket_path = "/run/docker.sock"

            def fail(message):
                raise SystemExit(message)

            def dockerd_pids():
                pids = []
                for entry in pathlib.Path("/proc").iterdir():
                    if not entry.name.isdigit():
                        continue
                    try:
                        if (entry / "comm").read_text(encoding="ascii").strip() == "dockerd":
                            pids.append(entry.name)
                    except OSError:
                        continue
                return pids

            def require_docker_unreachable():
                try:
                    result = subprocess.run(
                        ["/usr/bin/docker", "--host", "unix:///run/docker.sock", "info"],
                        stdin=subprocess.DEVNULL, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL,
                        check=False, timeout=10,
                        env={"HOME": "/", "LC_ALL": "C", "PATH": "/usr/sbin:/usr/bin:/sbin:/bin"},
                    )
                except subprocess.TimeoutExpired as exc:
                    fail("Docker reachability probe did not fail promptly")
                if result.returncode == 0:
                    fail("Docker remains reachable after stop")

            def require_no_bound_socket_path():
                try:
                    lines = pathlib.Path("/proc/net/unix").read_text(encoding="ascii").splitlines()
                except OSError as exc:
                    fail("cannot inspect active Unix sockets")
                for line in lines[1:]:
                    fields = line.split()
                    if len(fields) >= 8 and fields[-1] == socket_path:
                        fail("Docker socket path is still actively bound")

            if dockerd_pids():
                fail("dockerd process remains before stale-socket remediation")
            try:
                initial_metadata = os.lstat(socket_path)
            except FileNotFoundError:
                print("DOCKER_SOCKET_ABSENT")
                raise SystemExit(0)
            if stat.S_ISLNK(initial_metadata.st_mode):
                fail("refusing to remove Docker socket path because it is a symlink")
            if not stat.S_ISSOCK(initial_metadata.st_mode):
                fail("refusing to remove Docker socket path because it is not a Unix socket")
            try:
                docker_gid = grp.getgrnam("docker").gr_gid
            except KeyError as exc:
                fail("refusing to remove Docker socket without the docker group")
            if (initial_metadata.st_uid != 0 or initial_metadata.st_gid != docker_gid or
                    stat.S_IMODE(initial_metadata.st_mode) != 0o660):
                fail("refusing to remove Docker socket with unsafe ownership or mode")
            require_docker_unreachable()
            require_no_bound_socket_path()
            try:
                run_metadata = os.lstat("/run")
            except OSError as exc:
                fail("cannot inspect Docker socket parent directory")
            if (not stat.S_ISDIR(run_metadata.st_mode) or stat.S_ISLNK(run_metadata.st_mode) or
                    run_metadata.st_uid != 0 or run_metadata.st_gid != 0 or
                    stat.S_IMODE(run_metadata.st_mode) & 0o022):
                fail("Docker socket parent directory is unsafe")
            flags = os.O_RDONLY | os.O_DIRECTORY | getattr(os, "O_NOFOLLOW", 0)
            try:
                run_fd = os.open("/run", flags)
            except OSError as exc:
                fail("cannot open Docker socket parent directory safely")
            try:
                metadata = os.stat("docker.sock", dir_fd=run_fd, follow_symlinks=False)
                if stat.S_ISLNK(metadata.st_mode):
                    fail("refusing to remove Docker socket path because it changed to a symlink")
                if (not stat.S_ISSOCK(metadata.st_mode) or metadata.st_uid != 0 or
                        metadata.st_gid != docker_gid or stat.S_IMODE(metadata.st_mode) != 0o660):
                    fail("Docker socket metadata changed before stale-socket remediation")
                if dockerd_pids():
                    fail("dockerd process appeared before stale-socket remediation")
                require_docker_unreachable()
                require_no_bound_socket_path()
                os.unlink("docker.sock", dir_fd=run_fd)
                try:
                    os.stat("docker.sock", dir_fd=run_fd, follow_symlinks=False)
                except FileNotFoundError:
                    pass
                else:
                    fail("Docker socket path remains after stale-socket remediation")
            except FileNotFoundError:
                fail("Docker socket path changed before stale-socket remediation")
            finally:
                os.close(run_fd)
            print("REMOVED_STALE_DOCKER_SOCKET")
      register: aigw_lab_reset_stale_docker_socket_remediation
      changed_when: aigw_lab_reset_stale_docker_socket_remediation.stdout | trim == 'REMOVED_STALE_DOCKER_SOCKET'

    - name: Reset legacy — prove Docker is unreachable and its root has no mount boundary
      ansible.builtin.command:
        argv:
          - /usr/bin/python3
          - -I
          - -c
          - |
            import os
            import pathlib
            import subprocess
            import sys
            root = pathlib.Path(sys.argv[1])
            try:
                os.lstat("/run/docker.sock")
            except FileNotFoundError:
                pass
            else:
                raise SystemExit("Docker socket path remains after stale-socket remediation")
            dockerd = []
            for entry in pathlib.Path("/proc").iterdir():
                if not entry.name.isdigit():
                    continue
                try:
                    if (entry / "comm").read_text(encoding="ascii").strip() == "dockerd":
                        dockerd.append(entry.name)
                except OSError:
                    continue
            if dockerd:
                raise SystemExit("dockerd process remains after stop")
            result = subprocess.run(
                ["/usr/bin/docker", "--host", "unix:///run/docker.sock", "info"],
                stdin=subprocess.DEVNULL, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL,
                check=False, timeout=10,
                env={"HOME": "/", "LC_ALL": "C", "PATH": "/usr/sbin:/usr/bin:/sbin:/bin"},
            )
            if result.returncode == 0:
                raise SystemExit("Docker remains reachable after stop")
            root_text = str(root)
            for line in pathlib.Path("/proc/self/mountinfo").read_text(encoding="utf-8").splitlines():
                fields = line.split()
                if len(fields) < 5:
                    raise SystemExit("cannot parse mountinfo before Docker-root removal")
                mountpoint = fields[4].replace("\\040", " ").replace("\\011", "\t").replace("\\134", "\\")
                if mountpoint == root_text or mountpoint.startswith(root_text + "/"):
                    raise SystemExit("Docker root or a child is a mountpoint")
          - "{{ docker_data_root }}"
      changed_when: false

    - name: Reset legacy — remove exact legacy nftables tables after Docker stops
      ansible.builtin.command:
        argv: [nft, delete, table, inet, "{{ item }}"]
      loop: [aigw_guard, aigw_maintenance]
      register: aigw_lab_reset_nft_remove
      changed_when: aigw_lab_reset_nft_remove.rc == 0
      failed_when: aigw_lab_reset_nft_remove.rc not in [0, 1]

    - name: Reset legacy — flush only the Docker-owned IPv4 DOCKER-USER chain
      ansible.builtin.command: iptables -F DOCKER-USER
      register: aigw_lab_reset_ipv4_du_flush
      changed_when: aigw_lab_reset_ipv4_du_flush.rc == 0
      failed_when: aigw_lab_reset_ipv4_du_flush.rc not in [0, 1]

    - name: Reset legacy — flush only the Docker-owned IPv6 DOCKER-USER chain
      ansible.builtin.command: ip6tables -F DOCKER-USER
      register: aigw_lab_reset_ipv6_du_flush
      changed_when: aigw_lab_reset_ipv6_du_flush.rc == 0
      failed_when: aigw_lab_reset_ipv6_du_flush.rc not in [0, 1]

    - name: Reset legacy — persist fail-closed reset zones without cycling lab NICs
      ansible.builtin.command:
        argv: [nmcli, connection, modify, uuid, "{{ item.uuid }}", connection.zone, "{{ item.zone }}"]
      loop: "{{ aigw_lab_reset_nm_zone_bindings }}"
      loop_control:
        label: "{{ item.nic }} -> {{ item.zone }}"

    - name: Reset legacy — require public zone to retain SSH before zone migration
      ansible.builtin.command: firewall-cmd --zone=public --query-service=ssh
      changed_when: false

    - name: Reset legacy — move lab interfaces to their reviewed reset zones
      ansible.builtin.command:
        argv: [firewall-cmd, "--zone={{ item.zone }}", "--change-interface={{ item.nic }}"]
      loop: "{{ aigw_lab_reset_nm_zone_bindings }}"
      loop_control:
        label: "{{ item.nic }} -> {{ item.zone }}"
      changed_when: true

    - name: Reset legacy — remove validated legacy files only
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop: "{{ aigw_lab_legacy_reset_host_files }}"

    - name: Reset legacy — remove empty known maintenance drop-in directory only
      ansible.builtin.file:
        path: /etc/systemd/system/docker.service.d
        state: absent

    - name: Reset legacy — remove exact AIGW stack directory
      ansible.builtin.file:
        path: /opt/ai-gateway
        state: absent

    - name: Reset legacy — remove dedicated Docker data root after graph proof
      ansible.builtin.file:
        path: /var/lib/docker
        state: absent

    - name: Reset legacy — reload systemd after unit and drop-in removal
      ansible.builtin.systemd_service:
        daemon_reload: true

    - name: Reset legacy — reload firewalld after validated permanent-file removal
      ansible.builtin.command: firewall-cmd --reload
      changed_when: true

    - name: Reset verify — require public zone SSH after legacy zone removal
      ansible.builtin.command: firewall-cmd --zone=public --query-service=ssh
      changed_when: false

    - name: Reset verify — read runtime reset zones for each physical lab NIC
      ansible.builtin.command:
        argv: [firewall-cmd, "--get-zone-of-interface={{ item.nic }}"]
      loop: "{{ aigw_lab_reset_nm_zone_bindings }}"
      loop_control:
        label: "{{ item.nic }} -> {{ item.zone }}"
      register: aigw_lab_reset_runtime_zones_after
      changed_when: false

    - name: Reset verify — require fail-closed physical runtime zones
      ansible.builtin.assert:
        that: [item.stdout | trim == item.item.zone]
        quiet: true
        fail_msg: Reset left a lab physical NIC in an unexpected runtime firewalld zone.
      loop: "{{ aigw_lab_reset_runtime_zones_after.results }}"
      loop_control:
        label: "{{ item.item.nic }} -> {{ item.item.zone }}"

    - name: Reset verify — read persistent reset zones for each physical lab NIC
      ansible.builtin.command:
        argv: [nmcli, --get-values, connection.zone, connection, show, uuid, "{{ item.uuid }}"]
      loop: "{{ aigw_lab_reset_nm_zone_bindings }}"
      loop_control:
        label: "{{ item.nic }} -> {{ item.zone }}"
      register: aigw_lab_reset_persistent_zones_after
      changed_when: false

    - name: Reset verify — require fail-closed persistent physical zones
      ansible.builtin.assert:
        that: [item.stdout | trim == item.item.zone]
        quiet: true
        fail_msg: Reset did not persist the reviewed physical interface firewall zones.
      loop: "{{ aigw_lab_reset_persistent_zones_after.results }}"
      loop_control:
        label: "{{ item.item.nic }} -> {{ item.item.zone }}"

    - name: Reset verify — prove a fresh key-only ADM SSH connection still works
      ansible.builtin.command:
        argv: "{{ aigw_lab_reset_ssh_argv + ['/usr/bin/true'] }}"
      vars:
        aigw_lab_reset_ssh_argv: >-
          {{
            ['ssh', '-p', ansible_port | default(22) | string]
            + (
                ['-i', ansible_ssh_private_key_file]
                if ansible_ssh_private_key_file is defined
                  and ansible_ssh_private_key_file | length > 0
                else []
              )
            + [
                '-o', 'BatchMode=yes',
                '-o', 'PasswordAuthentication=no',
                '-o', 'KbdInteractiveAuthentication=no',
                '-o', 'PreferredAuthentications=publickey',
                '-o', 'StrictHostKeyChecking=yes',
                '-o', 'ConnectTimeout=10',
                ansible_user ~ '@' ~ ansible_host
              ]
          }}
      delegate_to: localhost
      become: false
      changed_when: false

  post_tasks:
    - name: Reset verify — require no AIGW zones, nft guards, or Docker root
      ansible.builtin.command:
        argv:
          - python3
          - -I
          - -c
          - |
            import pathlib
            import subprocess
            import sys
            errors = []
            def invoke(*args):
                result = subprocess.run(args, text=True, stdout=subprocess.PIPE, stderr=subprocess.PIPE, check=False)
                return result.returncode, result.stdout, result.stderr
            rc, zones, _ = invoke("firewall-cmd", "--get-zones")
            if rc or any(zone.startswith("aigw-") for zone in zones.split()):
                errors.append("legacy AIGW firewalld zones remain")
            for table in ("aigw_guard", "aigw_maintenance"):
                rc, _, _ = invoke("nft", "list", "table", "inet", table)
                if rc == 0:
                    errors.append("legacy nft table remains: " + table)
            for binary in ("iptables", "ip6tables"):
                rc, text, _ = invoke(binary, "-S", "DOCKER-USER")
                if rc == 0 and any(line.startswith("-A DOCKER-USER ") for line in text.splitlines()):
                    errors.append("legacy DOCKER-USER rule remains")
            for path in (
                "/opt/ai-gateway", "/var/lib/docker", "/etc/docker/daemon.json",
                "/etc/firewalld/policies/docker-forwarding.xml",
            ):
                if pathlib.Path(path).exists():
                    errors.append("legacy path remains: " + path)
            if errors:
                raise SystemExit("; ".join(errors))
      changed_when: false

    - name: Reset verify — snapshot physical NIC addresses and physical routes again
      ansible.builtin.command:
        argv:
          - python3
          - -I
          - -c
          - |
            import json
            import subprocess
            import sys
            nics = sys.argv[1:]
            def invoke(*args):
                result = subprocess.run(args, text=True, stdout=subprocess.PIPE, stderr=subprocess.PIPE, check=False)
                if result.returncode:
                    raise SystemExit(" ".join(args) + ": " + result.stderr.strip())
                return json.loads(result.stdout)
            addresses = {}
            for nic in nics:
                records = invoke("ip", "-j", "address", "show", "dev", nic)
                if len(records) != 1 or records[0].get("ifname") != nic:
                    raise SystemExit("cannot read physical NIC " + nic)
                addresses[nic] = sorted([{key: item.get(key) for key in ("family", "local", "prefixlen", "scope")} for item in records[0].get("addr_info") or [] if item.get("family") in {"inet", "inet6"} and item.get("scope") in {"global", "host", "link"}], key=lambda item: json.dumps(item, sort_keys=True))
            routes = []
            pbr_rules = []
            for family, flag in (("inet", "-4"), ("inet6", "-6")):
                for route in invoke("ip", "-j", flag, "route", "show", "table", "all"):
                    if route.get("dev") in nics:
                        routes.append({"family": family, **{key: route.get(key) for key in ("type", "dst", "gateway", "dev", "protocol", "scope", "src", "prefsrc", "metric", "table") if route.get(key) is not None}})
                for rule in invoke("ip", "-j", flag, "rule", "show"):
                    if str(rule.get("priority", "")) in {"10101", "10102"}:
                        pbr_rules.append({"family": family, **{key: rule.get(key) for key in ("priority", "from", "src", "table") if rule.get(key) is not None}})
            print(json.dumps({"addresses": addresses, "routes": sorted(routes, key=lambda item: json.dumps(item, sort_keys=True)), "pbr_rules": sorted(pbr_rules, key=lambda item: json.dumps(item, sort_keys=True))}, sort_keys=True))
          - "{{ nic_egress }}"
          - "{{ nic_adm }}"
          - "{{ nic_internal }}"
      register: aigw_lab_reset_physical_network_after
      changed_when: false

    - name: Reset verify — require NIC addresses and routes unchanged
      ansible.builtin.assert:
        that:
          - aigw_lab_reset_physical_network_before.stdout == aigw_lab_reset_physical_network_after.stdout
        quiet: true
        fail_msg: Reset altered a physical NIC address or route; do not continue to site.yml.

    - name: Reset verify — revalidate preserved offline seed files
      ansible.builtin.stat:
        path: "{{ item.path }}"
        follow: false
        get_checksum: true
        checksum_algorithm: sha256
      loop:
        - { path: "{{ offline_image_seed_remote_path }}", checksum: "{{ offline_image_seed_sha256 }}" }
        - { path: "{{ offline_image_seed_manifest_remote_path }}", checksum: "{{ offline_image_seed_manifest_sha256 }}" }
      register: aigw_lab_reset_seed_after
      changed_when: false

    - name: Reset verify — require offline seed checksums unchanged
      ansible.builtin.assert:
        that:
          - item.stat.exists | default(false)
          - item.stat.isreg | default(false)
          - not (item.stat.islnk | default(false))
          - item.stat.uid == 0
          - item.stat.gid == 0
          - item.stat.mode == '0600'
          - item.stat.checksum == item.item.checksum
        quiet: true
        fail_msg: Reset changed or invalidated a required /var/tmp image seed artifact.
      loop: "{{ aigw_lab_reset_seed_after.results }}"
      loop_control:
        label: "{{ item.item.path }}"

    - name: Reset complete — require full guarded site converge next
      ansible.builtin.debug:
        msg: >-
          Legacy lab reset completed. Docker remains stopped with no data root;
          run the full site.yml converge next (or os-prep.yml followed by
          deploy-stack-only.yml), never deploy-stack-only alone.
      changed_when: false
