    # All graph, host-artifact, stack-boundary, and NetworkManager gates above
    # are read-only. This is the sole intentional pre-teardown mutation: it
    # proves the exact pinned archive is loadable on this daemon, then removes
    # its temporary loader and marker before the destructive task section.
    - name: Reset gate — inspect ephemeral seed-loader proof paths
      ansible.builtin.stat:
        path: "{{ item }}"
        follow: false
        get_checksum: false
      loop:
        - "{{ aigw_lab_reset_seed_loader_path }}"
        - "{{ aigw_lab_reset_seed_proof_marker_dir }}"
