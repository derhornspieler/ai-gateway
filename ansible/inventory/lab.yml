---
# Explicit Rocky 9 lab inventory. Production/customer deployments
# use hosts.yml (or their own inventory), never this file implicitly.
all:
  children:
    gateway:
      hosts:
        lab-aigw01:
          ansible_host: 10.8.10.10
          ansible_user: ansible
          ansible_become: true
          # Stack-only must resolve this disposable-lab exception even when
          # host_vars discovery is unavailable or intentionally disabled.
          deployment_profile: rocky9-lab
          require_encrypted_state: false
          require_preupgrade_backup: false
    # Exists only so the shared play host pattern is warning-free. The lab
    # host does not join generic_rocky9 and never loads a customer Vault.
    generic_rocky9:
      hosts: {}
