---
all:
  children:
    # Exists only so the shared play host pattern is warning-free. No generic
    # host belongs to gateway, so its lab-only Vault overlay is never loaded.
    gateway:
      hosts: {}
    # Do not make this a child of gateway: that name selects the committed
    # lab-only Vault overlay. Generic/customer Vault values live under this
    # exact child group instead.
    generic_rocky9:
      hosts:
        aigw:
          # Generic inventory: set the controller-side connection target in
          # the environment, or generate a separate customer inventory with
          # scripts/bootstrap-generic-rocky9.py. No lab/customer address is a
          # production default.
          ansible_host: "{{ lookup('ansible.builtin.env', 'AIGW_ANSIBLE_HOST') | default(undef('Set AIGW_ANSIBLE_HOST or use an environment inventory'), true) }}"
          ansible_user: "{{ lookup('ansible.builtin.env', 'AIGW_ANSIBLE_USER') | default('ansible', true) }}"
          ansible_become: true
