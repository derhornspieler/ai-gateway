---
all:
  children:
    # Exists only so the shared play host pattern is warning-free. No host
    # belongs to gateway, so its lab-only Vault overlay is never loaded.
    gateway:
      hosts: {}
    # Do not make this a child of gateway: that name selects the committed
    # lab-only Vault overlay. Production/customer Vault values live under the
    # canonical 'production_rocky9' child group instead. 'generic_rocky9'
    # remains as the DEPRECATED compatibility parent group; hosts placed
    # directly under it keep working under the deprecated profile name.
    generic_rocky9:
      children:
        production_rocky9:
          hosts:
            aigw:
              # Canonical production inventory: set the controller-side
              # connection target in the environment, or generate a separate
              # customer inventory with scripts/bootstrap-rocky9-production.py.
              # No lab/customer address is a production default.
              ansible_host: "{{ lookup('ansible.builtin.env', 'AIGW_ANSIBLE_HOST') | default(undef('Set AIGW_ANSIBLE_HOST or use an environment inventory'), true) }}"
              ansible_user: "{{ lookup('ansible.builtin.env', 'AIGW_ANSIBLE_USER') | default('ansible', true) }}"
              ansible_become: true
