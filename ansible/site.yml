---
# Ordering is deliberate: sysctl + routing + firewalld (incl. DOCKER-USER
# egress lockdown) must be LIVE before docker_networks/docker_stack bring
# containers up; stack starts last; verify asserts all. network_routing and
# firewalld_zones flush their own handlers in-role — nothing security-relevant
# may be deferred to end-of-play handlers, or containers would run unlocked
# and verify would assert against unpopulated state.
- name: AI Gateway host — full converge
  hosts: gateway:generic_rocky9
  become: true
  pre_tasks:
    # These checks intentionally run before os_baseline. A stale NIC mapping
    # must not install/restart Docker or alter forwarding before we fail.
    - name: Preflight — require concrete, syntactically valid topology inputs
      ansible.builtin.assert:
        that:
          - deployment_profile | length > 0
          - >-
            (aigw_domain | default('')) is string and
            (aigw_domain | default('') | length <= 253) and
            (aigw_domain | default('')) is match(
              '^(?=.{1,253}$)(?:[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?\.)+[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?$'
            )
          - stack_dir is string
          - stack_dir | length <= 192
          - stack_dir is match('^/(?:[A-Za-z0-9][A-Za-z0-9._-]{0,62})(?:/[A-Za-z0-9][A-Za-z0-9._-]{0,62}){0,15}$')
          - docker_data_root is string
          - docker_data_root | length <= 192
          - docker_data_root is match('^/(?:[A-Za-z0-9][A-Za-z0-9._-]{0,62})(?:/[A-Za-z0-9][A-Za-z0-9._-]{0,62}){0,15}$')
          - stack_dir != docker_data_root
          - not stack_dir.startswith(docker_data_root ~ '/')
          - not docker_data_root.startswith(stack_dir ~ '/')
          - compose_project_name is string
          - compose_project_name is match('^[a-z0-9][a-z0-9_-]{0,62}$')
          - nic_egress is match('^[A-Za-z0-9_.:-]{1,15}$')
          - nic_adm is match('^[A-Za-z0-9_.:-]{1,15}$')
          - nic_internal is match('^[A-Za-z0-9_.:-]{1,15}$')
          - eth0_ip is match('^(?:(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})\\.){3}(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})$')
          - eth1_ip is match('^(?:(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})\\.){3}(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})$')
          - eth2_ip is match('^(?:(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})\\.){3}(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})$')
          - eth0_gateway is match('^(?:(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})\\.){3}(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})$')
          - not (manage_networking | bool) or eth1_gateway is match('^(?:(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})\\.){3}(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})$')
          - not (manage_networking | bool) or eth2_gateway is match('^(?:(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})\\.){3}(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})$')
          - vpn_client_cidr is match('^(?:(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})\\.){3}(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})/(?:[1-9]|[12][0-9]|3[0-2])$')
          - internal_cidr is match('^(?:(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})\\.){3}(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})/(?:[1-9]|[12][0-9]|3[0-2])$')
          - aigw_management_ssh_port | int >= 1
          - aigw_management_ssh_port | int <= 65535
          - aigw_docker_host_mode == 'dedicated'
          - manage_firewalld | bool
          - aigw_docker_host_marker is string
          - aigw_docker_host_marker | length <= 192
          - aigw_docker_host_marker is match('^/(?:[A-Za-z0-9][A-Za-z0-9._-]{0,62})(?:/[A-Za-z0-9][A-Za-z0-9._-]{0,62}){0,15}$')
          - aigw_selinux_policy == 'targeted'
          - aigw_selinux_state == 'enforcing'
          - aigw_require_time_sync is boolean
          - >-
            not (aigw_require_time_sync | bool) or
            (aigw_time_sync_max_offset_seconds | int >= 1 and
             aigw_time_sync_max_offset_seconds | int <= 300)
          - internal_dns_servers is sequence
          - internal_dns_servers is not string
          - internal_dns_servers | length >= 1
          - internal_dns_servers | length <= 3
          - internal_dns_servers | unique | length == internal_dns_servers | length
          - internal_dns_servers | select('match', '^(?:(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})\\.){3}(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})$') | list | length == internal_dns_servers | length
          - internal_dns_servers | select('match', '^(127|169\\.254|22[4-9]|23[0-9])\\.') | list | length == 0
          - egress_dns_servers is sequence
          - egress_dns_servers is not string
          - egress_dns_servers | length >= 1
          - egress_dns_servers | length <= 3
          - egress_dns_servers | unique | length == egress_dns_servers | length
          - egress_dns_servers | select('match', '^(?:(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})\\.){3}(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})$') | list | length == egress_dns_servers | length
          - egress_dns_servers | select('match', '^(127|169\\.254|22[4-9]|23[0-9])\\.') | list | length == 0
          - internal_dns_servers | intersect(egress_dns_servers) | length == 0
          - platform_authoritative_dns_enabled is boolean
          - aigw_vault_ui_enabled is boolean
          - >-
            not (platform_authoritative_dns_enabled | bool) or
            (internal_dns_servers | sort == [eth1_ip, eth2_ip] | sort)
          - envoy_egress_ip is match('^(?:(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})\\.){3}(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})$')
          - alloy_internal_ip is match('^(?:(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})\\.){3}(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})$')
          - lab_dns_ip is match('^(?:(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})\\.){3}(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})$')
          - not (cribl_external_export_enabled | bool) or
            cribl_otlp_allowed_cidr is match('^(?:(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})\\.){3}(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})/(?:[1-9]|[12][0-9]|3[0-2])$')
          - not (cribl_external_export_enabled | bool) or
            (cribl_otlp_allowed_port | int >= 1 and cribl_otlp_allowed_port | int <= 65535)
          - (cribl_external_export_enabled | bool) or cribl_otlp_endpoint == 'cribl-mock:4317'
          - not (cribl_external_export_enabled | bool) or cribl_otlp_endpoint != 'cribl-mock:4317'
          - keycloak_internal_ip is match('^(?:(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})\\.){3}(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})$')
          - identity_ldap_enabled is boolean
          # Exactly one identity source may own the Keycloak truststore and the
          # federation reconciliation inputs.
          - not (identity_ldap_enabled | bool) or not (samba_lab_enabled | bool)
          # Plaintext LDAP is refused before any host mutation.
          - not (identity_ldap_enabled | bool) or identity_ldap_url is match('^ldaps://')
          - not (identity_ldap_enabled | bool) or
            identity_ldap_directory_ip is match('^(?:(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})\\.){3}(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})$')
          - (manage_networking | bool) or pbr_tables | length == 0
          - not (manage_networking | bool) or pbr_tables | length == 2
          - pbr_tables | map(attribute='id') | unique | length == pbr_tables | length
          - pbr_tables | map(attribute='name') | unique | length == pbr_tables | length
          - pbr_tables | map(attribute='priority') | unique | length == pbr_tables | length
          - aigw_ssh_password_authentication is boolean
          - aigw_adm_socks_enabled is boolean
          - aigw_adm_socks_trusted_operator_ack is string
        fail_msg: >-
          Refusing to mutate host: supply a bounded canonical lowercase FQDN,
          canonical bounded stack/Docker paths, a safe Compose project name,
          the three NIC names, three existing IPv4 addresses, three gateways,
          ADM/internal source CIDRs, and distinct internal/egress resolver lists
          via an environment inventory, --extra-vars, or the AIGW_* controller
          environment.

    - name: Preflight — restrict SSH password and SOCKS exceptions to rocky9-lab
      ansible.builtin.assert:
        that:
          - >-
            (deployment_profile | default('')) == 'rocky9-lab' or
            not (aigw_ssh_password_authentication | bool)
          - >-
            (deployment_profile | default('')) == 'rocky9-lab' or
            not (aigw_adm_socks_enabled | bool)
        quiet: true
        fail_msg: >-
          Password SSH authentication and trusted-operator SOCKS forwarding
          are temporary rocky9-lab-only access exceptions. Generic/customer
          inventories must keep both disabled.

    # SOCKS uses SSH local/dynamic forwarding, not host packet forwarding.  It
    # is therefore an explicit, source-scoped sshd Match exception rather than
    # a broad ADM routing/NAT policy.  Reject arbitrary Match input before it
    # is rendered into the root-owned sshd fragment.
    - name: Preflight — validate default-deny ADM SSH SOCKS exception inputs
      ansible.builtin.command:
        argv:
          - python3
          - -I
          - -c
          - |
            import ipaddress
            import json
            import re
            import sys

            deployment_profile = sys.argv[1]
            password_authentication = sys.argv[2] == "true"
            enabled = sys.argv[3] == "true"
            users = json.loads(sys.argv[4])
            groups = json.loads(sys.argv[5])
            source_cidrs = json.loads(sys.argv[6])
            group_test_users = json.loads(sys.argv[7])
            trusted_operator_ack = sys.argv[8]
            vpn_network = ipaddress.ip_network(sys.argv[9], strict=True)
            errors = []
            safe_principal = re.compile(r"[a-z_][a-z0-9_-]{0,31}$")

            if deployment_profile != "rocky9-lab":
                if password_authentication:
                    errors.append(
                        "password SSH authentication is allowed only in deployment_profile=rocky9-lab"
                    )
                if enabled:
                    errors.append(
                        "SSH SOCKS is allowed only in deployment_profile=rocky9-lab"
                    )

            if not isinstance(users, list) or not isinstance(groups, list):
                errors.append("aigw_adm_socks_users/groups must be lists")
                users, groups = [], []
            if not isinstance(source_cidrs, list):
                errors.append("aigw_adm_socks_source_cidrs must be a list")
                source_cidrs = []
            if not isinstance(group_test_users, dict):
                errors.append("aigw_adm_socks_group_test_users must be a mapping")
                group_test_users = {}

            for label, values in (("user", users), ("group", groups)):
                if any(not isinstance(value, str) or not safe_principal.fullmatch(value)
                       for value in values):
                    errors.append(f"unsafe SSH SOCKS {label} name")
                if len(set(values)) != len(values):
                    errors.append(f"duplicate SSH SOCKS {label} name")
            if "root" in users:
                errors.append("root cannot receive an SSH SOCKS exception")

            parsed_sources = []
            for value in source_cidrs:
                try:
                    network = ipaddress.ip_network(value, strict=True)
                except ValueError:
                    errors.append(f"invalid SSH SOCKS source CIDR {value!r}")
                    continue
                if network.version != 4 or network.prefixlen == 0 or not network.subnet_of(vpn_network):
                    errors.append(
                        f"SSH SOCKS source CIDR {value!r} is not a bounded ADM subset of {vpn_network}"
                    )
                    continue
                parsed_sources.append(str(network))
            if len(set(parsed_sources)) != len(parsed_sources):
                errors.append("duplicate SSH SOCKS source CIDR")

            if set(group_test_users) != set(groups):
                errors.append("every SSH SOCKS group needs exactly one declared test user")
            for group, user in group_test_users.items():
                if (not isinstance(group, str) or not safe_principal.fullmatch(group) or
                        not isinstance(user, str) or not safe_principal.fullmatch(user) or
                        user == "root"):
                    errors.append("unsafe SSH SOCKS group test-user mapping")

            if enabled:
                if not source_cidrs:
                    errors.append("enabled SSH SOCKS requires an ADM source CIDR")
                if not users and not groups:
                    errors.append("enabled SSH SOCKS requires an approved user or group")
                if trusted_operator_ack != "I_UNDERSTAND_SOCKS_REACHES_ALL_HOST_ROUTES":
                    errors.append(
                        "enabled SSH SOCKS requires the trusted-operator acknowledgement because PermitOpen any reaches every host-routable destination"
                    )
            elif users or groups or source_cidrs or group_test_users or trusted_operator_ack:
                errors.append(
                    "disabled SSH SOCKS must not retain approved principals, source CIDRs, or a trusted-operator acknowledgement"
                )

            if errors:
                raise SystemExit("; ".join(dict.fromkeys(errors)))
          - "{{ deployment_profile | default('') }}"
          - "{{ 'true' if (aigw_ssh_password_authentication | bool) else 'false' }}"
          - "{{ 'true' if (aigw_adm_socks_enabled | bool) else 'false' }}"
          - "{{ aigw_adm_socks_users | to_json }}"
          - "{{ aigw_adm_socks_groups | to_json }}"
          - "{{ aigw_adm_socks_source_cidrs | to_json }}"
          - "{{ aigw_adm_socks_group_test_users | to_json }}"
          - "{{ aigw_adm_socks_trusted_operator_ack }}"
          - "{{ vpn_client_cidr }}"
      changed_when: false

    # Docker bridge names and firewalld zone/interface values are interpolated
    # into root-run firewall scripts. The platform graph is fixed, so accept
    # only its canonical topology instead of treating an arbitrary inventory
    # list as a shell-safe extension point.
    - name: Preflight — require exact Docker network and firewalld topology contracts
      ansible.builtin.command:
        argv:
          - python3
          - -I
          - -c
          - |
            import ipaddress
            import json
            import re
            import sys

            networks = json.loads(sys.argv[1])
            zones = json.loads(sys.argv[2])
            (
                egress_nic, adm_nic, internal_nic, vpn_cidr, internal_cidr,
                ssh_port, adm_ip, internal_ip,
            ) = sys.argv[3:]
            expected_networks = {
                "net-egress": ("br-egress", "172.28.0.0/24", False),
                "net-adm": ("br-adm", "172.28.1.0/24", False),
                "net-internal": ("br-internal", "172.28.2.0/24", False),
                "net-chat": ("br-chat", "172.28.3.0/24", True),
                "net-portal": ("br-portal", "172.28.4.0/24", True),
                "net-admin-app": ("br-admin", "172.28.5.0/24", True),
                "net-grafana": ("br-graf", "172.28.6.0/24", True),
                "net-vendor": ("br-vendor", "172.28.7.0/24", True),
                "net-vault": ("br-vault", "172.28.8.0/24", True),
                "net-db-litellm": ("br-db-llm", "172.28.9.0/24", True),
                "net-db-keycloak": ("br-db-kc", "172.28.10.0/24", True),
                "net-db-rotator": ("br-db-rot", "172.28.11.0/24", True),
                "net-cache": ("br-cache", "172.28.12.0/24", True),
                "net-telemetry": ("br-otel", "172.28.13.0/24", True),
                "net-metrics": ("br-metrics", "172.28.14.0/24", True),
                "net-observability": ("br-obs", "172.28.15.0/24", True),
                "net-traces": ("br-traces", "172.28.16.0/24", True),
                "net-identity": ("br-ident", "172.28.17.0/24", True),
                "net-lab-dns": ("br-lab-dns", "172.28.18.0/24", False),
                "net-int-edge": ("br-int-edge", "172.28.19.0/24", False),
            }
            errors = []
            if not isinstance(networks, list):
                errors.append("docker_networks is not a list")
                networks = []
            by_name = {}
            for entry in networks:
                if not isinstance(entry, dict):
                    errors.append(f"Docker network entry is not an object: {entry!r}")
                    continue
                name = entry.get("name")
                bridge = entry.get("bridge")
                subnet = entry.get("subnet")
                internal = entry.get("internal")
                if not isinstance(name, str) or not re.fullmatch(r"net-[a-z0-9-]{1,30}", name):
                    errors.append(f"unsafe Docker network name {name!r}")
                    continue
                if name in by_name:
                    errors.append(f"duplicate Docker network name {name}")
                    continue
                if not isinstance(bridge, str) or not re.fullmatch(r"[A-Za-z0-9_.-]{1,15}", bridge):
                    errors.append(f"unsafe Linux bridge name for {name}: {bridge!r}")
                if not isinstance(subnet, str):
                    errors.append(f"invalid Docker subnet for {name}: {subnet!r}")
                else:
                    try:
                        parsed = ipaddress.ip_network(subnet, strict=True)
                        if parsed.version != 4 or parsed.prefixlen != 24:
                            errors.append(f"Docker subnet for {name} must be an IPv4 /24: {subnet!r}")
                    except ValueError:
                        errors.append(f"invalid Docker subnet for {name}: {subnet!r}")
                if type(internal) is not bool:
                    errors.append(f"Docker network internal flag for {name} must be boolean")
                by_name[name] = (bridge, subnet, internal)
            if by_name != expected_networks:
                errors.append("docker_networks differs from the fixed AI Gateway bridge topology")

            if not isinstance(zones, list):
                errors.append("firewalld_zones is not a list")
                zones = []
            expected_zones = {
                "aigw-egress": {
                    "interfaces": [egress_nic], "target": "DROP", "rich_rules": [],
                },
                "aigw-adm": {
                    "interfaces": [adm_nic], "target": "%%REJECT%%",
                    "rich_rules": [
                        f'rule family="ipv4" source address="{vpn_cidr}" port port="{ssh_port}" protocol="tcp" accept',
                        f'rule family="ipv4" source address="{vpn_cidr}" port port="443" protocol="tcp" accept',
                    ],
                },
                "aigw-internal": {
                    "interfaces": [internal_nic], "target": "%%REJECT%%",
                    "rich_rules": [
                        f'rule family="ipv4" source address="{internal_cidr}" port port="443" protocol="tcp" accept',
                    ],
                },
            }
            by_zone = {}
            for entry in zones:
                if not isinstance(entry, dict):
                    errors.append(f"firewalld zone entry is not an object: {entry!r}")
                    continue
                name = entry.get("zone")
                if not isinstance(name, str) or not re.fullmatch(r"aigw-[a-z0-9-]{1,24}", name):
                    errors.append(f"unsafe firewalld zone name {name!r}")
                    continue
                if name in by_zone:
                    errors.append(f"duplicate firewalld zone {name}")
                    continue
                by_zone[name] = {
                    "interfaces": entry.get("interfaces"),
                    "target": entry.get("target"),
                    "rich_rules": entry.get("rich_rules"),
                }
            if by_zone != expected_zones:
                errors.append("firewalld_zones differs from the fixed AI Gateway interface policy")
            try:
                vpn_network = ipaddress.ip_network(vpn_cidr, strict=True)
                internal_network = ipaddress.ip_network(internal_cidr, strict=True)
                adm_address = ipaddress.ip_address(adm_ip)
                internal_address = ipaddress.ip_address(internal_ip)
                if vpn_network.overlaps(internal_network):
                    errors.append("vpn_client_cidr and internal_cidr must be disjoint")
                if adm_address not in vpn_network or adm_address in internal_network:
                    errors.append("eth1_ip must belong only to vpn_client_cidr")
                if internal_address not in internal_network or internal_address in vpn_network:
                    errors.append("eth2_ip must belong only to internal_cidr")
            except ValueError as exc:
                errors.append(f"invalid ADM/internal address or CIDR: {exc}")
            if errors:
                raise SystemExit("; ".join(dict.fromkeys(errors)))
          - "{{ docker_networks | to_json }}"
          - "{{ firewalld_zones | to_json }}"
          - "{{ nic_egress }}"
          - "{{ nic_adm }}"
          - "{{ nic_internal }}"
          - "{{ vpn_client_cidr }}"
          - "{{ internal_cidr }}"
          - "{{ aigw_management_ssh_port | string }}"
          - "{{ eth1_ip }}"
          - "{{ eth2_ip }}"
      changed_when: false

    - name: Preflight — validate all three NIC identities before mutation
      ansible.builtin.assert:
        that:
          - nic_egress in ansible_facts.interfaces
          - nic_adm in ansible_facts.interfaces
          - nic_internal in ansible_facts.interfaces
          - "[nic_egress, nic_adm, nic_internal] | unique | length == 3"
          - ansible_facts[nic_egress].ipv4.address == eth0_ip
          - ansible_facts[nic_adm].ipv4.address == eth1_ip
          - ansible_facts[nic_internal].ipv4.address == eth2_ip
          - ansible_facts.default_ipv4.interface == nic_egress
          - ansible_facts.default_ipv4.gateway == eth0_gateway
        fail_msg: >-
          Refusing to mutate host: configured egress/ADM/internal NICs must be
          distinct, own the expected IPs, and the only default route must be on
          the configured egress interface/gateway.

    - name: Preflight — read main-table default routes
      ansible.builtin.command:
        argv: [ip, -4, -o, route, show, table, main, default]
      register: preflight_main_defaults
      changed_when: false

    - name: Preflight — require exactly one existing egress default
      ansible.builtin.assert:
        that:
          - preflight_main_defaults.stdout_lines | length == 1
          - "'dev ' ~ nic_egress in preflight_main_defaults.stdout"
          - "'via ' ~ eth0_gateway in preflight_main_defaults.stdout"
        fail_msg: >-
          Refusing to mutate host: the main table must already have exactly one
          default route through the supplied egress NIC and gateway.

    - name: Preflight — read live main-table routes as structured data
      ansible.builtin.command:
        argv: [ip, -j, -4, route, show, table, main]
      register: preflight_main_routes_json
      changed_when: false

    - name: Preflight — reject Docker subnet collisions and invalid fixed workload IPs
      ansible.builtin.command:
        argv:
          - python3
          - -c
          - |
            import ipaddress, json, sys

            networks = json.loads(sys.argv[1])
            routes = json.loads(sys.argv[2])
            protected = [ipaddress.ip_network(value, strict=False)
                         for value in json.loads(sys.argv[3])]
            envoy_ip = ipaddress.ip_address(sys.argv[4])
            alloy_ip = ipaddress.ip_address(sys.argv[5])
            lab_dns_ip = ipaddress.ip_address(sys.argv[6])
            declared_egress = ipaddress.ip_network(sys.argv[7], strict=True)
            keycloak_ip = ipaddress.ip_address(sys.argv[8])

            parsed = []
            errors = []
            for item in networks:
                network = ipaddress.ip_network(item["subnet"], strict=True)
                parsed.append((item["name"], item["bridge"], network))

            for index, (name, bridge, network) in enumerate(parsed):
                for other_name, _, other_network in parsed[index + 1:]:
                    if network.overlaps(other_network):
                        errors.append(f"Docker subnets overlap: {name}={network} and {other_name}={other_network}")
                for protected_network in protected:
                    if network.overlaps(protected_network):
                        errors.append(f"Docker subnet {name}={network} overlaps protected CIDR {protected_network}")

            by_name = {name: network for name, _, network in parsed}
            if by_name.get("net-egress") != declared_egress:
                errors.append(f"net_egress_subnet={declared_egress} does not match net-egress={by_name.get('net-egress')}")

            def check_workload_ip(label, address, network_name):
                network = by_name.get(network_name)
                if network is None or address not in network:
                    errors.append(f"{label}={address} is not inside {network_name}={network}")
                    return
                # Docker reserves the first usable address as the bridge gateway.
                if address in (network.network_address, network.broadcast_address, network.network_address + 1):
                    errors.append(f"{label}={address} is a reserved address in {network}")

            check_workload_ip("envoy_egress_ip", envoy_ip, "net-egress")
            check_workload_ip("alloy_internal_ip", alloy_ip, "net-internal")
            check_workload_ip("lab_dns_ip", lab_dns_ip, "net-lab-dns")
            check_workload_ip("keycloak_internal_ip", keycloak_ip, "net-internal")
            if keycloak_ip == alloy_ip:
                errors.append("keycloak_internal_ip must differ from alloy_internal_ip")

            for route in routes:
                destination = route.get("dst")
                if not destination or destination == "default":
                    continue
                try:
                    route_network = ipaddress.ip_network(destination, strict=False)
                except ValueError:
                    continue
                route_device = route.get("dev", "")
                for name, bridge, network in parsed:
                    if not network.overlaps(route_network):
                        continue
                    # A rerun may see the exact route created by this exact
                    # Docker bridge. Anything broader/different is a customer
                    # route collision and must fail before Docker mutates it.
                    if route_device == bridge and route_network == network:
                        continue
                    errors.append(f"Docker subnet {name}={network} overlaps live route {route_network} dev {route_device or '?'}")

            if errors:
                raise SystemExit("; ".join(dict.fromkeys(errors)))
          - "{{ docker_networks | to_json }}"
          - "{{ preflight_main_routes_json.stdout }}"
          - >-
            {{ ([vpn_client_cidr, internal_cidr]
                + ((internal_dns_servers + egress_dns_servers)
                   | map('regex_replace', '$', '/32') | list)
                + ([cribl_otlp_allowed_cidr] if (cribl_external_export_enabled | bool) else [])
                + ([identity_ldap_directory_ip ~ '/32']
                   if (identity_ldap_enabled | bool) else [])) | to_json }}
          - "{{ envoy_egress_ip }}"
          - "{{ alloy_internal_ip }}"
          - "{{ lab_dns_ip }}"
          - "{{ net_egress_subnet }}"
          - "{{ keycloak_internal_ip }}"
      changed_when: false

    - name: Preflight — require corporate DNS to use only ADM/internal routing
      ansible.builtin.command:
        argv: [ip, -4, route, get, "{{ item }}"]
      loop: "{{ internal_dns_servers }}"
      register: preflight_internal_dns_routes
      changed_when: false
      failed_when: >-
        preflight_internal_dns_routes.rc != 0 or
        ((platform_authoritative_dns_enabled | bool) and
         item not in [eth1_ip, eth2_ip]) or
        (not (platform_authoritative_dns_enabled | bool) and
         not (preflight_internal_dns_routes.stdout is search(
           'dev (' ~ ([nic_adm, nic_internal] | map('regex_escape') | join('|')) ~ ')( |$)'
         )))

    - name: Preflight — require Internet DNS to use only the egress routing leg
      ansible.builtin.command:
        argv: [ip, -4, route, get, "{{ item }}"]
      loop: "{{ egress_dns_servers }}"
      register: preflight_egress_dns_routes
      changed_when: false
      failed_when: >-
        preflight_egress_dns_routes.rc != 0 or
        not (preflight_egress_dns_routes.stdout is search(
          'dev ' ~ (nic_egress | regex_escape) ~ '( |$)'
        ))

    - name: Preflight — bind an external Cribl endpoint to its exact firewall tuple
      ansible.builtin.command:
        argv:
          - python3
          - -c
          - |
            import ipaddress, sys

            host, port_text = sys.argv[1].rsplit(":", 1)
            host_ip = ipaddress.ip_address(host)
            allowed = ipaddress.ip_network(sys.argv[2], strict=True)
            allowed_port = int(sys.argv[3])
            if allowed.prefixlen != 32 or host_ip not in allowed:
                raise SystemExit(f"external Cribl endpoint {host_ip} must equal exact allowed /32 {allowed}")
            if int(port_text) != allowed_port:
                raise SystemExit(f"external Cribl port {port_text} does not equal firewall port {allowed_port}")
          - "{{ cribl_otlp_endpoint }}"
          - "{{ cribl_otlp_allowed_cidr }}"
          - "{{ cribl_otlp_allowed_port | string }}"
      changed_when: false
      when: cribl_external_export_enabled | bool

    - name: Preflight — prove external Cribl uses the internal physical leg
      ansible.builtin.command:
        argv:
          - ip
          - -4
          - route
          - get
          - "{{ cribl_otlp_endpoint.rsplit(':', 1)[0] }}"
          - oif
          - "{{ nic_internal }}"
      register: preflight_cribl_route
      changed_when: false
      failed_when: >-
        preflight_cribl_route.rc != 0 or
        ('dev ' ~ nic_internal) not in preflight_cribl_route.stdout
      when: cribl_external_export_enabled | bool

    # The single LDAPS allowance authorizes exactly one output interface. If the
    # directory is not actually reachable through the internal physical leg, the
    # rendered firewall tuple would be inert and federation would fail silently
    # at connect time instead of here.
    - name: Preflight — prove the external directory uses the internal physical leg
      ansible.builtin.command:
        argv:
          - ip
          - -4
          - route
          - get
          - "{{ identity_ldap_directory_ip }}"
          - oif
          - "{{ nic_internal }}"
      register: preflight_identity_ldap_route
      changed_when: false
      failed_when: >-
        preflight_identity_ldap_route.rc != 0 or
        ('dev ' ~ nic_internal) not in preflight_identity_ldap_route.stdout
      when: identity_ldap_enabled | bool

    # A genuinely vanilla Rocky 9 host ships the vendor registry beneath
    # /usr/share and does not create the /etc override until an administrator
    # needs one.  Inspect the effective source without creating it in this
    # mutation-free preflight; the network role later seeds the override from
    # the vendor file before adding the bounded project block.
    - name: Preflight — inspect policy-routing registry locations
      ansible.builtin.stat:
        path: "{{ item }}"
        follow: false
      loop:
        - /etc/iproute2/rt_tables
        - /usr/share/iproute2/rt_tables
      register: preflight_rt_table_paths
      when: manage_networking | bool

    - name: Preflight — require a safe effective policy-routing registry
      ansible.builtin.assert:
        that:
          - >-
            not (preflight_rt_table_paths.results[0].stat.exists | default(false)) or
            (preflight_rt_table_paths.results[0].stat.isreg | default(false))
          - not (preflight_rt_table_paths.results[0].stat.islnk | default(false))
          - >-
            (preflight_rt_table_paths.results[0].stat.exists | default(false)) or
            (preflight_rt_table_paths.results[1].stat.isreg | default(false))
          - >-
            (preflight_rt_table_paths.results[0].stat.exists | default(false)) or
            not (preflight_rt_table_paths.results[1].stat.islnk | default(false))
        quiet: true
        fail_msg: >-
          The effective iproute2 table registry must be a regular non-symlink
          at /etc/iproute2/rt_tables, or a vanilla host must provide the Rocky
          vendor registry at /usr/share/iproute2/rt_tables.
      when: manage_networking | bool

    - name: Preflight — read the effective policy-routing table registry
      ansible.builtin.slurp:
        src: >-
          {{ '/etc/iproute2/rt_tables'
             if (preflight_rt_table_paths.results[0].stat.exists | default(false))
             else '/usr/share/iproute2/rt_tables' }}
      register: preflight_rt_tables
      when: manage_networking | bool

    - name: Preflight — reject routing table ID or name collisions
      ansible.builtin.command:
        argv:
          - python3
          - -c
          - |
            import json, sys

            desired = json.loads(sys.argv[1])
            existing = []
            for raw in sys.argv[2].splitlines():
                fields = raw.split("#", 1)[0].split()
                if len(fields) != 2 or not fields[0].isdigit():
                    continue
                existing.append((int(fields[0]), fields[1]))
            errors = []
            for table in desired:
                table_id, name = int(table["id"]), table["name"]
                for existing_id, existing_name in existing:
                    if existing_id == table_id and existing_name != name:
                        errors.append(f"routing table ID {table_id} is already named {existing_name}, not {name}")
                    if existing_name == name and existing_id != table_id:
                        errors.append(f"routing table name {name} already uses ID {existing_id}, not {table_id}")
            if errors:
                raise SystemExit("; ".join(dict.fromkeys(errors)))
          - "{{ pbr_tables | to_json }}"
          - "{{ preflight_rt_tables.content | b64decode }}"
      changed_when: false
      when: manage_networking | bool

    - name: Preflight — validate bounded source-policy routing inputs
      ansible.builtin.command:
        argv:
          - python3
          - -I
          - -c
          - |
            import ipaddress
            import json
            import re
            import sys

            tables = json.loads(sys.argv[1])
            expected = {
                sys.argv[2]: {"src": sys.argv[4], "name": "adm"},
                sys.argv[3]: {"src": sys.argv[5], "name": "internal"},
            }
            errors = []
            if not isinstance(tables, list) or len(tables) != 2:
                errors.append("manage_networking requires exactly the ADM and internal PBR entries")
                tables = tables if isinstance(tables, list) else []
            seen_devices = set()
            seen_sources = set()
            for table in tables:
                try:
                    table_id = int(table["id"])
                    priority = int(table["priority"])
                    name = table["name"]
                    device = table["dev"]
                    source = table["src"]
                    gateway = table["gw"]
                except (KeyError, TypeError, ValueError) as exc:
                    errors.append(f"invalid PBR entry {table!r}: {exc}")
                    continue
                if not 1 <= table_id <= 252:
                    errors.append(f"PBR table ID {table_id} is reserved or out of range")
                if not 1000 <= priority < 32766:
                    errors.append(f"PBR priority {priority} is reserved or out of range")
                if not isinstance(name, str) or not re.fullmatch(r"[a-z][a-z0-9_-]{0,31}", name):
                    errors.append(f"unsafe PBR table name {name!r}")
                if device not in expected:
                    errors.append(f"PBR device {device!r} is not an ADM/internal NIC")
                elif source != expected[device]["src"]:
                    errors.append(f"PBR source {source!r} does not match {device}")
                elif name != expected[device]["name"]:
                    errors.append(
                        f"PBR device {device!r} must use fixed table name {expected[device]['name']!r}"
                    )
                if device in seen_devices:
                    errors.append(f"duplicate PBR device {device!r}")
                if source in seen_sources:
                    errors.append(f"duplicate PBR source {source!r}")
                seen_devices.add(device)
                seen_sources.add(source)
                for label, value in (("source", source), ("gateway", gateway)):
                    try:
                        ipaddress.ip_address(value)
                    except ValueError:
                        errors.append(f"invalid PBR {label} {value!r}")
            if seen_devices != set(expected):
                errors.append("PBR entries must cover exactly the ADM and internal NICs")
            if errors:
                raise SystemExit("; ".join(dict.fromkeys(errors)))
          - "{{ pbr_tables | to_json }}"
          - "{{ nic_adm }}"
          - "{{ nic_internal }}"
          - "{{ eth1_ip }}"
          - "{{ eth2_ip }}"
      changed_when: false
      when: manage_networking | bool

    - name: Preflight — reject live policy-table and rule collisions before replacement
      ansible.builtin.command:
        argv:
          - python3
          - -I
          - -c
          - |
            import ipaddress
            import json
            import subprocess
            import sys

            tables = json.loads(sys.argv[1])

            def invoke(*args):
                result = subprocess.run(
                    ["ip", *args], text=True, stdout=subprocess.PIPE,
                    stderr=subprocess.PIPE, check=False,
                )
                if result.returncode:
                    raise RuntimeError("ip " + " ".join(args) + ": " + result.stderr.strip())
                return json.loads(result.stdout)

            errors = []
            rules = invoke("-j", "-4", "rule", "show")
            for table in tables:
                table_id = int(table["id"])
                priority = int(table["priority"])
                device = table["dev"]
                source = table["src"]
                gateway = table["gw"]
                existing = invoke("-j", "-4", "route", "show", "table", str(table_id))
                def canonical_link_signature(route):
                    # Do not let an arbitrary route sharing only a destination
                    # and device pass as the kernel-connected route that the
                    # applicator copies.  `prefsrc` is named `src` by some
                    # iproute2 JSON versions, so normalize that one spelling.
                    if (
                        route.get("scope") != "link"
                        or route.get("gateway") is not None
                        or route.get("via") is not None
                        or route.get("type", "unicast") != "unicast"
                        or route.get("nexthops")
                    ):
                        return None
                    return (
                        route.get("dst"),
                        route.get("dev"),
                        route.get("protocol"),
                        route.get("scope"),
                        route.get("prefsrc") or route.get("src"),
                        route.get("metric"),
                    )

                # iproute2 omits the selected `dev` field from JSON when the
                # command itself is constrained with `dev <device>`.  Query
                # the full main table, then explicitly retain only canonical
                # kernel-connected routes on this device.  This permits only
                # the exact link routes the applicator copies and rejects a
                # foreign route that merely shares a destination/device.
                main_routes = invoke("-j", "-4", "route", "show", "table", "main")
                allowed_link_signatures = {
                    signature
                    for route in main_routes
                    if route.get("dev") == device
                    for signature in [canonical_link_signature(route)]
                    if signature is not None
                }
                for route in existing:
                    destination = route.get("dst", "default")
                    if destination == "default":
                        route_source = route.get("prefsrc") or route.get("src")
                        if not (
                            route.get("gateway") == gateway
                            and route.get("dev") == device
                            and route_source == source
                        ):
                            errors.append(f"table {table_id} has a non-AIGW default route")
                    elif canonical_link_signature(route) not in allowed_link_signatures:
                        errors.append(f"table {table_id} has a non-AIGW route {destination!r}")

                same_priority = [rule for rule in rules if int(rule.get("priority", -1)) == priority]
                if same_priority:
                    if len(same_priority) != 1:
                        errors.append(f"PBR priority {priority} has multiple live rules")
                        continue
                    rule = same_priority[0]
                    actual_source = rule.get("from") or rule.get("src")
                    actual_table = str(rule.get("table", ""))
                    if actual_source not in {source, source + "/32"} or actual_table not in {str(table_id), table["name"]}:
                        errors.append(f"PBR priority {priority} belongs to a different live rule")

                # A different policy rule evaluated before the requested AIGW
                # source rule can silently send management replies through a
                # customer table. The normal priority-0 `lookup local` rule is
                # the sole safe exception; every other earlier rule that
                # covers the exact ADM/internal source needs an operator to
                # resolve the overlap before this role adds a shadowed rule.
                source_address = ipaddress.ip_address(source)
                for rule in rules:
                    try:
                        rule_priority = int(rule.get("priority", -1))
                    except (TypeError, ValueError):
                        continue
                    if rule_priority >= priority:
                        continue
                    rule_source = rule.get("from") or rule.get("src") or "all"
                    if rule_source in {"all", "0.0.0.0/0"}:
                        covers_source = True
                    else:
                        try:
                            covers_source = source_address in ipaddress.ip_network(rule_source, strict=False)
                        except ValueError:
                            errors.append(f"PBR priority {rule_priority} has malformed source {rule_source!r}")
                            continue
                    lookup = str(rule.get("table", rule.get("lookup", "")))
                    if covers_source and lookup not in {"local", "255"}:
                        errors.append(
                            f"earlier policy rule priority {rule_priority} shadows AIGW source {source}"
                        )
            if errors:
                raise SystemExit("; ".join(dict.fromkeys(errors)))
          - "{{ pbr_tables | to_json }}"
      changed_when: false
      when: manage_networking | bool

    - name: Preflight — verify policy gateways are reachable on existing NICs
      ansible.builtin.command:
        argv: [ip, -4, route, get, "{{ item.gw }}", oif, "{{ item.dev }}"]
      loop: "{{ pbr_tables }}"
      register: preflight_policy_gateways
      changed_when: false
      failed_when: >-
        preflight_policy_gateways.rc != 0 or
        ('dev ' ~ item.dev) not in preflight_policy_gateways.stdout
      when: manage_networking | bool

    - name: Preflight — reject documentation placeholders
      ansible.builtin.assert:
        that:
          - eth0_gateway not in ['203.0.113.1', '192.0.2.1', '198.51.100.1']
          - vpn_client_cidr not in ['0.0.0.0/0', '10.8.0.0/24']
          - internal_cidr not in ['0.0.0.0/0', '10.20.0.0/16']
        fail_msg: >-
          Placeholder gateway/CIDRs remain. Supply a concrete inventory
          profile before running the mutating full converge.

    - name: Preflight — validate concrete lab profile
      ansible.builtin.assert:
        that:
          - nic_egress == 'enp0s5'
          - nic_adm == 'enp0s7'
          - nic_internal == 'enp0s8'
          - eth0_ip == '10.211.55.3'
          - eth0_gateway == '10.211.55.1'
          - eth1_gateway == '10.8.10.2'
          - eth2_gateway == '10.20.0.2'
          - vpn_client_cidr == '10.8.10.0/24'
          - internal_cidr == '10.20.0.0/24'
        fail_msg: The rocky9-lab profile does not match verified wiring.
      when: deployment_profile | default('') == 'rocky9-lab'

    - name: Preflight — require encrypted backing for all sensitive state
      ansible.builtin.command:
        argv:
          - python3
          - -c
          - |
            import json, os, pathlib, subprocess, sys

            errors = []
            for configured in json.loads(sys.argv[1]):
                path = pathlib.Path(configured)
                probe = path
                while not probe.exists() and probe != probe.parent:
                    probe = probe.parent
                found = subprocess.run(
                    ["findmnt", "-n", "-o", "SOURCE", "-T", str(probe)],
                    check=True, text=True, capture_output=True,
                ).stdout.strip()
                source = found.split("[", 1)[0]
                if not source.startswith("/dev/"):
                    errors.append(f"{configured}: backing source {found!r} is not a verifiable block device")
                    continue
                ancestry = subprocess.run(
                    ["lsblk", "-s", "-n", "-o", "FSTYPE", source],
                    check=True, text=True, capture_output=True,
                ).stdout.splitlines()
                if "crypto_LUKS" not in {value.strip() for value in ancestry}:
                    errors.append(f"{configured}: {source} has no crypto_LUKS ancestor")
            if errors:
                raise SystemExit("; ".join(errors))
          - "{{ encrypted_state_paths | to_json }}"
      changed_when: false
      when: aigw_encrypted_state_preflight_required | bool
  roles:
    # These roles are intentionally first. They perform read-only controller,
    # Docker, and packet-filter ownership gates, then prove a synchronized
    # clock before SELinux or Docker can install signed packages or build
    # images. Only then establish the required SELinux runtime state before
    # routing, firewalld, or Docker can mutate an existing Rocky host.
    - role: host_preflight
    - role: firewall_preflight
      when: manage_firewalld | bool
    - role: time_sync
    - role: selinux_baseline
    - role: network_routing
      when: manage_networking | bool
    - role: firewalld_zones
      when: manage_firewalld | bool
    # Docker installation/start follows the live firewall. os_baseline does
    # not start the daemon; docker_networks does so after flushing its handler.
    - role: os_baseline
    - role: docker_networks
    - role: docker_stack
    - role: verify
    - role: host_finalize
