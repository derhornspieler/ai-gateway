---
# Full converge = host preparation THEN the container stack, in the exact
# eleven-role order the security review pinned:
#   host_preflight → firewall_preflight → time_sync → selinux_baseline →
#   network_routing → firewalld_zones → os_baseline → docker_networks
#   (os-prep.yml)
#   → docker_stack → verify → host_finalize   (deploy-stack-only.yml)
# The split is purely compositional: os-prep.yml validates every input and
# prepares the host up to and including the Docker bridges; then
# deploy-stack-only.yml proves the prepared host's live firewall/network ABI,
# deploys and verifies the stack, and host_finalize promotes the completed
# dedicated-Docker-host marker. Running this playbook converges exactly what
# the pre-split single-play site.yml converged, with the same end state.
- import_playbook: os-prep.yml
- import_playbook: deploy-stack-only.yml
