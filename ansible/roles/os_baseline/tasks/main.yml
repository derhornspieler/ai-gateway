---
- name: Preflight — prove controller key-only SSH, passwordless become, and capture its transport tuple
  ansible.builtin.command:
    # Capture from the fresh OpenSSH process itself. Ansible's remote module
    # process is not guaranteed to retain SSH_CONNECTION (sudo/pipelining can
    # strip it), so reading that module environment is not an authoritative
    # transport check. OpenSSH joins all arguments after its destination, so
    # the compound remote command must remain one argv element.
    argv: "{{ controller_key_only_ssh_argv + ['/usr/bin/sudo -n /usr/bin/true && exec /usr/bin/printenv SSH_CONNECTION'] }}"
  vars:
    # Use the same non-default port and explicit identity as the inventory.
    # ansible_ssh_common_args is deliberately not shell-split here; sites that
    # need a bastion should put ProxyJump in the controller's OpenSSH config.
    controller_key_only_ssh_argv: >-
      {{
        ['ssh', '-p', ansible_port | default(22) | string]
        + (
            ['-i', ansible_ssh_private_key_file]
            if ansible_ssh_private_key_file is defined
              and ansible_ssh_private_key_file | length > 0
            else []
          )
        + [
            '-o', 'BatchMode=yes',
            '-o', 'PasswordAuthentication=no',
            '-o', 'KbdInteractiveAuthentication=no',
            '-o', 'PreferredAuthentications=publickey',
            '-o', 'StrictHostKeyChecking=yes',
            '-o', 'ConnectTimeout=10',
            ansible_user ~ '@' ~ ansible_host
          ]
      }}
  delegate_to: localhost
  become: false
  changed_when: false
  register: current_ssh_connection

- name: Require a complete SSH transport tuple
  ansible.builtin.assert:
    that:
      - current_ssh_connection.stdout.split() | length == 4
      - current_ssh_connection.stdout.split()[1] is match('^[0-9]{1,5}$')
      - current_ssh_connection.stdout.split()[3] is match('^[0-9]{1,5}$')
    fail_msg: >-
      Refusing to modify sshd because the active SSH client/server address and
      port tuple cannot be evaluated against Match rules.
    quiet: true

- name: Derive an ADM-address sshd Match probe without trusting a controller hostname
  ansible.builtin.command:
    argv:
      - python3
      - -I
      - -c
      - |
        import ipaddress
        import sys

        network = ipaddress.ip_network(sys.argv[1], strict=True)
        print(next(network.hosts(), network.network_address))
      - "{{ vpn_client_cidr }}"
  register: aigw_default_sshd_probe_source
  changed_when: false

# The managed 00 fragment relies on Rocky's early Include ordering. A prior
# global directive or a later unreviewed Match can otherwise retain a more
# permissive effective policy for an account that our synthetic denied tuple
# does not represent. Refuse ambiguity instead of claiming default-deny on an
# existing customer SSH configuration.
- name: Preflight — require a safe sshd include and forwarding precedence boundary
  ansible.builtin.command:
    argv:
      - python3
      - -I
      - -c
      - |
        import os
        import stat
        import subprocess
        import sys

        main_path, fragment_dir, managed_name = sys.argv[1:]
        protected = {
            "authenticationmethods", "passwordauthentication", "permitrootlogin",
            "disableforwarding", "allowtcpforwarding",
            "allowstreamlocalforwarding", "allowagentforwarding", "permitopen",
            "permitlisten", "gatewayports", "permittunnel", "x11forwarding",
        }
        crypto_policy_directives = {
            "casignaturealgorithms", "ciphers", "gssapikeyexchange",
            "gssapikexalgorithms",
            "hostkeyalgorithms", "kexalgorithms", "macs",
            "pubkeyacceptedalgorithms", "requiredrsasize",
        }
        crypto_policy_backend = "/etc/crypto-policies/back-ends/opensshserver.config"
        crypto_policy_root = "/usr/share/crypto-policies"
        errors = []

        def read_safe(path):
            try:
                metadata = os.lstat(path)
            except FileNotFoundError:
                errors.append(f"required sshd config path is missing: {path}")
                return []
            if (stat.S_ISLNK(metadata.st_mode) or not stat.S_ISREG(metadata.st_mode) or
                    metadata.st_uid != 0 or metadata.st_gid != 0 or metadata.st_mode & 0o022):
                errors.append(f"unsafe sshd config boundary: {path}")
                return []
            try:
                with open(path, encoding="utf-8", errors="replace") as source:
                    return source.readlines()
            except OSError as exc:
                errors.append(f"cannot read sshd config {path}: {exc}")
                return []

        def active(line):
            return line.split("#", 1)[0].strip()

        def keyword(line):
            text = active(line)
            return text.split(None, 1)[0].lower() if text else ""

        def read_verified_crypto_policy_backend(path):
            """Read Rocky's policy backend without trusting arbitrary links.

            ``update-crypto-policies`` intentionally installs the stock backend
            as a root-owned link into /usr/share/crypto-policies.  A custom
            local policy is a root-owned regular file instead.  In both cases
            its content is restricted to the cryptographic directives that the
            generated OpenSSH backend may contain; it cannot alter login or
            forwarding policy.  A link is accepted only when its final target
            is a pristine, RPM-owned crypto-policies file below that vendor
            root.
            """
            try:
                link_metadata = os.lstat(path)
            except FileNotFoundError:
                errors.append(f"required sshd config path is missing: {path}")
                return []
            if stat.S_ISREG(link_metadata.st_mode):
                lines = read_safe(path)
            else:
                if (
                    not stat.S_ISLNK(link_metadata.st_mode)
                    or link_metadata.st_uid != 0
                    or link_metadata.st_gid != 0
                ):
                    errors.append(f"unsafe crypto-policy sshd backend: {path}")
                    return []
                try:
                    trusted_root = os.path.realpath(crypto_policy_root)
                    resolved_path = os.path.realpath(path)
                    inside_vendor_root = (
                        os.path.commonpath([trusted_root, resolved_path])
                        == trusted_root
                    )
                except (OSError, ValueError) as exc:
                    errors.append(f"cannot resolve crypto-policy sshd backend {path}: {exc}")
                    return []
                if (
                    not inside_vendor_root
                    or os.path.basename(resolved_path) != "opensshserver.txt"
                ):
                    errors.append(f"unsafe crypto-policy sshd backend: {path}")
                    return []
                try:
                    target_metadata = os.lstat(resolved_path)
                except FileNotFoundError:
                    errors.append(f"required sshd config path is missing: {path}")
                    return []
                if (
                    not stat.S_ISREG(target_metadata.st_mode)
                    or target_metadata.st_uid != 0
                    or target_metadata.st_gid != 0
                    or target_metadata.st_mode & 0o022
                ):
                    errors.append(f"unsafe crypto-policy sshd backend: {path}")
                    return []
                owner = subprocess.run(
                    ["/usr/bin/rpm", "-qf", "--qf", "%{NAME}\\n", resolved_path],
                    text=True,
                    stdout=subprocess.PIPE,
                    stderr=subprocess.DEVNULL,
                    check=False,
                )
                verified = subprocess.run(
                    ["/usr/bin/rpm", "-Vf", resolved_path],
                    text=True,
                    stdout=subprocess.PIPE,
                    stderr=subprocess.DEVNULL,
                    check=False,
                )
                if (
                    owner.returncode != 0
                    or owner.stdout.strip() != "crypto-policies"
                    or verified.returncode != 0
                    or verified.stdout.strip()
                ):
                    errors.append(f"unverified crypto-policy sshd backend: {path}")
                    return []
                try:
                    with open(resolved_path, encoding="utf-8", errors="replace") as source:
                        lines = source.readlines()
                except OSError as exc:
                    errors.append(f"cannot read sshd config {path}: {exc}")
                    return []
            for candidate in lines:
                key = keyword(candidate)
                if key and key not in crypto_policy_directives:
                    errors.append(
                        f"unreviewed crypto-policy sshd directive {key!r}: {path}"
                    )
            return lines

        def is_verified_late_redhat_fragment(entry, lines):
            """Accept only Rocky's unmodified, later vendor X11 default.

            Rocky 9 ships 50-redhat.conf with X11Forwarding yes.  The managed
            00 fragment is parsed first and the post-write sshd -T probes
            prove its deny value wins, so rejecting this RPM-owned default
            would make a fresh supported host undeployable.  Keep the
            exception intentionally narrow: no Match scope, no other
            protected setting, and no include except the stock crypto-policy
            backend after proving that backend cannot set an access control.
            """
            if entry.name != "50-redhat.conf" or entry.name <= managed_name:
                return False
            owner = subprocess.run(
                ["/usr/bin/rpm", "-qf", "--qf", "%{NAME}\\n", entry.path],
                text=True,
                stdout=subprocess.PIPE,
                stderr=subprocess.DEVNULL,
                check=False,
            )
            verified = subprocess.run(
                ["/usr/bin/rpm", "-Vf", entry.path],
                text=True,
                stdout=subprocess.PIPE,
                stderr=subprocess.DEVNULL,
                check=False,
            )
            if (
                owner.returncode != 0
                or owner.stdout.strip() != "openssh-server"
                or verified.returncode != 0
                or verified.stdout.strip()
            ):
                return False
            for line in lines:
                text = active(line)
                key = keyword(line)
                if key == "match" or (key in protected and key != "x11forwarding"):
                    return False
                if key == "include":
                    if text != "Include /etc/crypto-policies/back-ends/opensshserver.config":
                        return False
                    policy_lines = read_verified_crypto_policy_backend(
                        crypto_policy_backend
                    )
                    if any(
                        keyword(candidate) not in crypto_policy_directives | {""}
                        for candidate in policy_lines
                    ):
                        return False
            return True

        main_lines = read_safe(main_path)
        include_index = None
        for index, line in enumerate(main_lines):
            text = active(line)
            if not text:
                continue
            pieces = text.split(None, 1)
            if pieces[0].lower() == "include":
                if len(pieces) != 2 or pieces[1].strip() != "/etc/ssh/sshd_config.d/*.conf":
                    if include_index is None:
                        errors.append("sshd has an unreviewed Include before the managed fragment directory")
                    continue
                include_index = index
                break
        if include_index is None:
            errors.append("sshd_config must include /etc/ssh/sshd_config.d/*.conf before policy directives")
        else:
            for line in main_lines[:include_index]:
                key = keyword(line)
                if key == "match" or key in protected:
                    errors.append(f"sshd directive {key!r} precedes the managed fragment Include")
            in_match = False
            for line in main_lines[include_index + 1:]:
                key = keyword(line)
                if key == "match":
                    in_match = True
                    continue
                if in_match and key in protected:
                    errors.append(f"sshd Match block after managed fragments sets {key!r}")

        try:
            directory_metadata = os.lstat(fragment_dir)
        except FileNotFoundError:
            errors.append(f"required sshd fragment directory is missing: {fragment_dir}")
        else:
            if (stat.S_ISLNK(directory_metadata.st_mode) or not stat.S_ISDIR(directory_metadata.st_mode) or
                    directory_metadata.st_uid != 0 or directory_metadata.st_gid != 0 or
                    directory_metadata.st_mode & 0o022):
                errors.append(f"unsafe sshd fragment directory: {fragment_dir}")
            else:
                for entry in sorted(os.scandir(fragment_dir), key=lambda item: item.name):
                    if not entry.name.endswith(".conf") or entry.name == managed_name:
                        continue
                    try:
                        metadata = entry.stat(follow_symlinks=False)
                    except OSError:
                        errors.append(f"uninspectable sshd fragment {entry.path}")
                        continue
                    if (stat.S_ISLNK(metadata.st_mode) or not stat.S_ISREG(metadata.st_mode) or
                            metadata.st_uid != 0 or metadata.st_gid != 0 or metadata.st_mode & 0o022):
                        errors.append(f"unsafe sshd fragment {entry.path}")
                        continue
                    lines = read_safe(entry.path)
                    verified_late_redhat = is_verified_late_redhat_fragment(entry, lines)
                    for line in lines:
                        key = keyword(line)
                        if key == "match" and not verified_late_redhat:
                            errors.append(f"unreviewed sshd fragment opens a Match scope: {entry.path}")
                        if key == "include" and not verified_late_redhat:
                            errors.append(f"unreviewed sshd fragment includes another file: {entry.path}")
                        if key in protected:
                            if not (verified_late_redhat and key == "x11forwarding"):
                                errors.append(f"unreviewed sshd fragment sets protected directive {key!r}: {entry.path}")
        if errors:
            raise SystemExit("; ".join(dict.fromkeys(errors)))
      - /etc/ssh/sshd_config
      - /etc/ssh/sshd_config.d
      - 00-ai-gateway-hardening.conf
  changed_when: false

- name: Install default-deny SSH policy with explicit ADM SOCKS exceptions
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/00-ai-gateway-hardening.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by AI Gateway. The firewalld ADM rule limits all SSH ingress
      # to vpn_client_cidr; password authentication is a temporary rocky9-lab
      # exception while root login remains prohibited.
      PubkeyAuthentication yes
      PasswordAuthentication {{ 'yes' if ((deployment_profile | default('')) == 'rocky9-lab' and (aigw_ssh_password_authentication | bool)) else 'no' }}
      KbdInteractiveAuthentication no
      ChallengeResponseAuthentication no
      PermitEmptyPasswords no
      HostbasedAuthentication no
      GSSAPIAuthentication no
      IgnoreRhosts yes
      PermitRootLogin no
      X11Forwarding no
      DisableForwarding yes
      AllowTcpForwarding no
      AllowStreamLocalForwarding no
      AllowAgentForwarding no
      PermitTunnel no
      GatewayPorts no
      PermitOpen none
      PermitListen none
      PermitUserEnvironment no
      PermitUserRC no
      MaxAuthTries 3
      LoginGraceTime 30
      MaxSessions 4
      MaxStartups 10:30:30
      {% if ((deployment_profile | default('')) == 'rocky9-lab') and (aigw_adm_socks_enabled | bool) %}
      # Trusted ADM-operator SOCKS `ssh -D` is local TCP forwarding. The
      # inventory acknowledgement records that PermitOpen any reaches every
      # host-routable destination. It remains unavailable to every other
      # account/source; remote forwarding, gateway binds, agent, stream-local,
      # X11, and tunnels remain denied by the global policy.
      {% if aigw_adm_socks_users | length > 0 %}
      Match User {{ aigw_adm_socks_users | join(',') }} Address {{ aigw_adm_socks_source_cidrs | join(',') }}
        DisableForwarding no
        AllowTcpForwarding local
        PermitOpen any
      {% endif %}
      {% if aigw_adm_socks_groups | length > 0 %}
      Match Group {{ aigw_adm_socks_groups | join(',') }} Address {{ aigw_adm_socks_source_cidrs | join(',') }}
        DisableForwarding no
        AllowTcpForwarding local
        PermitOpen any
      {% endif %}
      Match all
      {% endif %}
    validate: /usr/sbin/sshd -t -f %s
  notify: reload sshd

- name: Validate the complete SSH daemon configuration before reload
  ansible.builtin.command:
    argv: [/usr/sbin/sshd, -t]
  changed_when: false

- name: Apply SSH hardening only after complete-config validation
  ansible.builtin.meta: flush_handlers

- name: Read effective SSH daemon policy for the active automation path
  ansible.builtin.command:
    # Evaluate Match User/Host/Address/LocalAddress/LocalPort for the active
    # automation path. A bare `sshd -T` can report safe globals while a Match
    # block re-enables access. When sshd has no resolved client hostname, its
    # numeric client address is the applicable host value too.
    argv:
      - /usr/sbin/sshd
      - -T
      - -C
      - "user={{ ansible_user }},host={{ current_ssh_connection.stdout.split()[0] }},addr={{ current_ssh_connection.stdout.split()[0] }},laddr={{ current_ssh_connection.stdout.split()[2] }},lport={{ current_ssh_connection.stdout.split()[3] }}"
  register: effective_sshd_policy
  changed_when: false

- name: Assert effective active-path SSH authentication and listener policy
  ansible.builtin.assert:
    that:
      - effective_sshd_policy.stdout is search('(?m)^pubkeyauthentication yes$')
      - >-
        effective_sshd_policy.stdout is search(
          '(?m)^passwordauthentication ' ~
          ('yes' if ((deployment_profile | default('')) == 'rocky9-lab' and (aigw_ssh_password_authentication | bool)) else 'no') ~ '$'
        )
      - effective_sshd_policy.stdout is search('(?m)^kbdinteractiveauthentication no$')
      - effective_sshd_policy.stdout is search('(?m)^permitemptypasswords no$')
      - effective_sshd_policy.stdout is search('(?m)^hostbasedauthentication no$')
      - effective_sshd_policy.stdout is search('(?m)^gssapiauthentication no$')
      - effective_sshd_policy.stdout is search('(?m)^ignorerhosts yes$')
      - effective_sshd_policy.stdout is search('(?m)^permitrootlogin no$')
      - effective_sshd_policy.stdout is search('(?m)^x11forwarding no$')
      - effective_sshd_policy.stdout is search('(?m)^allowstreamlocalforwarding no$')
      - effective_sshd_policy.stdout is search('(?m)^allowagentforwarding no$')
      - effective_sshd_policy.stdout is search('(?m)^permittunnel no$')
      - effective_sshd_policy.stdout is search('(?m)^gatewayports no$')
      - effective_sshd_policy.stdout is search('(?m)^permituserenvironment no$')
      - effective_sshd_policy.stdout is search('(?m)^permituserrc no$')
      - effective_sshd_policy.stdout is search('(?m)^maxauthtries 3$')
      - effective_sshd_policy.stdout is search('(?m)^logingracetime 30$')
      - effective_sshd_policy.stdout is search('(?m)^maxsessions 4$')
      - effective_sshd_policy.stdout is search('(?m)^maxstartups 10:30:30$')
    quiet: true

- name: Read effective SSH forwarding policy for an unapproved ADM user
  ansible.builtin.command:
    argv:
      - /usr/sbin/sshd
      - -T
      - -C
      - "user=aigw-forwarding-denied,host={{ aigw_default_sshd_probe_source.stdout | trim }},addr={{ aigw_default_sshd_probe_source.stdout | trim }},laddr={{ eth1_ip }},lport={{ aigw_management_ssh_port }}"
  register: aigw_denied_sshd_forwarding_policy
  changed_when: false

- name: Assert SSH forwarding remains default-deny for an unapproved ADM user
  ansible.builtin.assert:
    that:
      - aigw_denied_sshd_forwarding_policy.stdout is search('(?m)^disableforwarding yes$')
      - aigw_denied_sshd_forwarding_policy.stdout is search('(?m)^allowtcpforwarding no$')
      - aigw_denied_sshd_forwarding_policy.stdout is search('(?m)^allowstreamlocalforwarding no$')
      - aigw_denied_sshd_forwarding_policy.stdout is search('(?m)^allowagentforwarding no$')
      - aigw_denied_sshd_forwarding_policy.stdout is search('(?m)^permitopen none$')
      - aigw_denied_sshd_forwarding_policy.stdout is search('(?m)^permitlisten none$')
      - aigw_denied_sshd_forwarding_policy.stdout is search('(?m)^permittunnel no$')
      - aigw_denied_sshd_forwarding_policy.stdout is search('(?m)^gatewayports no$')
    quiet: true

- name: Derive an sshd Match probe for every approved ADM SOCKS source CIDR
  ansible.builtin.command:
    argv:
      - python3
      - -I
      - -c
      - |
        import ipaddress
        import sys

        network = ipaddress.ip_network(sys.argv[1], strict=True)
        print(next(network.hosts(), network.network_address))
      - "{{ item }}"
  loop: "{{ aigw_adm_socks_source_cidrs }}"
  register: aigw_adm_socks_source_probe
  changed_when: false
  when: aigw_adm_socks_enabled | bool

- name: Record approved ADM SOCKS probe addresses
  ansible.builtin.set_fact:
    aigw_adm_socks_probe_sources: >-
      {{ aigw_adm_socks_source_probe.results | map(attribute='stdout') | map('trim') | list }}
  when: aigw_adm_socks_enabled | bool

- name: Read effective SSH SOCKS policy for every approved user/source pair
  ansible.builtin.command:
    argv:
      - /usr/sbin/sshd
      - -T
      - -C
      - "user={{ item.0 }},host={{ item.1 }},addr={{ item.1 }},laddr={{ eth1_ip }},lport={{ aigw_management_ssh_port }}"
  loop: "{{ aigw_adm_socks_users | product(aigw_adm_socks_probe_sources | default([])) | list }}"
  loop_control:
    label: "{{ item.0 }} from {{ item.1 }}"
  register: aigw_adm_socks_user_policy
  changed_when: false
  when:
    - aigw_adm_socks_enabled | bool
    - aigw_adm_socks_users | length > 0

- name: Assert approved user/source SSH SOCKS policy is local-only
  ansible.builtin.assert:
    that:
      - item.stdout is search('(?m)^disableforwarding no$')
      - item.stdout is search('(?m)^allowtcpforwarding local$')
      - item.stdout is search('(?m)^permitopen any$')
      - item.stdout is search('(?m)^allowstreamlocalforwarding no$')
      - item.stdout is search('(?m)^allowagentforwarding no$')
      - item.stdout is search('(?m)^permittunnel no$')
      - item.stdout is search('(?m)^gatewayports no$')
      - item.stdout is search('(?m)^permitlisten none$')
    quiet: true
  loop: "{{ aigw_adm_socks_user_policy.results | default([]) }}"
  loop_control:
    label: "{{ item.item.0 }} from {{ item.item.1 }}"
  when:
    - aigw_adm_socks_enabled | bool
    - aigw_adm_socks_users | length > 0

- name: Verify every declared SSH SOCKS group test user is a current member
  ansible.builtin.command:
    argv: [id, -nG, "{{ item.value }}"]
  loop: "{{ aigw_adm_socks_group_test_users | dict2items }}"
  loop_control:
    label: "{{ item.value }} in {{ item.key }}"
  register: aigw_adm_socks_group_membership
  changed_when: false
  when:
    - aigw_adm_socks_enabled | bool
    - aigw_adm_socks_groups | length > 0

- name: Require each declared SSH SOCKS group test user to match its group
  ansible.builtin.assert:
    that:
      - item.item.key in item.stdout.split()
    quiet: true
    fail_msg: >-
      SSH SOCKS Match Group {{ item.item.key }} cannot be evaluated because
      its declared test user {{ item.item.value }} is not a current member.
  loop: "{{ aigw_adm_socks_group_membership.results | default([]) }}"
  loop_control:
    label: "{{ item.item.value }} in {{ item.item.key }}"
  when:
    - aigw_adm_socks_enabled | bool
    - aigw_adm_socks_groups | length > 0

- name: Read effective SSH SOCKS policy for every approved group/source pair
  ansible.builtin.command:
    argv:
      - /usr/sbin/sshd
      - -T
      - -C
      - "user={{ item.0.value }},host={{ item.1 }},addr={{ item.1 }},laddr={{ eth1_ip }},lport={{ aigw_management_ssh_port }}"
  loop: "{{ (aigw_adm_socks_group_test_users | dict2items) | product(aigw_adm_socks_probe_sources | default([])) | list }}"
  loop_control:
    label: "{{ item.0.value }} via {{ item.0.key }} from {{ item.1 }}"
  register: aigw_adm_socks_group_policy
  changed_when: false
  when:
    - aigw_adm_socks_enabled | bool
    - aigw_adm_socks_groups | length > 0

- name: Assert approved group/source SSH SOCKS policy is local-only
  ansible.builtin.assert:
    that:
      - item.stdout is search('(?m)^disableforwarding no$')
      - item.stdout is search('(?m)^allowtcpforwarding local$')
      - item.stdout is search('(?m)^permitopen any$')
      - item.stdout is search('(?m)^allowstreamlocalforwarding no$')
      - item.stdout is search('(?m)^allowagentforwarding no$')
      - item.stdout is search('(?m)^permittunnel no$')
      - item.stdout is search('(?m)^gatewayports no$')
      - item.stdout is search('(?m)^permitlisten none$')
    quiet: true
  loop: "{{ aigw_adm_socks_group_policy.results | default([]) }}"
  loop_control:
    label: "{{ item.item.0.value }} via {{ item.item.0.key }} from {{ item.item.1 }}"
  when:
    - aigw_adm_socks_enabled | bool
    - aigw_adm_socks_groups | length > 0

- name: Postflight — prove a fresh key-only SSH connection and passwordless become
  ansible.builtin.command:
    # This is deliberately one remote-command argv element after the OpenSSH
    # destination; do not split `sudo -n` into separate SSH arguments.
    argv: "{{ controller_key_only_ssh_argv + ['/usr/bin/sudo -n /usr/bin/true'] }}"
  vars:
    controller_key_only_ssh_argv: >-
      {{
        ['ssh', '-p', ansible_port | default(22) | string]
        + (
            ['-i', ansible_ssh_private_key_file]
            if ansible_ssh_private_key_file is defined
              and ansible_ssh_private_key_file | length > 0
            else []
          )
        + [
            '-o', 'BatchMode=yes',
            '-o', 'PasswordAuthentication=no',
            '-o', 'KbdInteractiveAuthentication=no',
            '-o', 'PreferredAuthentications=publickey',
            '-o', 'StrictHostKeyChecking=yes',
            '-o', 'ConnectTimeout=10',
            ansible_user ~ '@' ~ ansible_host
          ]
      }}
  delegate_to: localhost
  become: false
  changed_when: false

- name: Add Docker CE repo
  ansible.builtin.yum_repository:
    name: docker-ce-stable
    description: Docker CE Stable
    baseurl: https://download.docker.com/linux/rhel/9/$basearch/stable
    gpgcheck: true
    gpgkey: https://download.docker.com/linux/rhel/gpg

# Docker Engine, CLI, containerd, and the Compose plugin install at the exact
# NEVRA proven green by the verify/e2e suite — the single source of truth is
# group_vars/all.yml (aigw_docker_ce_version and its siblings), overridable per
# host_vars. An unpinned docker-ce-stable install twice adopted a Compose-v5
# release that broke a live converge. state: present on an exact version fails
# the converge LOUDLY if the mirror no longer offers that NEVRA (it never
# silently installs the newest); allow_downgrade: false REFUSES to roll a host
# that already drifted newer back under a running stack — an intentional Docker
# downgrade is a deliberate, separately sequenced operation, not a converge side
# effect. Deliberate upgrades bump the group_vars pins (see docs/operations.md).
# The remaining packages are Rocky base/EPEL supporting tooling taken at the
# newest signed version on purpose.
- name: Install Docker Engine + compose plugin
  ansible.builtin.dnf:
    name:
      - "docker-ce-{{ aigw_docker_ce_version }}"
      - "docker-ce-cli-{{ aigw_docker_ce_cli_version }}"
      - "containerd.io-{{ aigw_containerd_version }}"
      # Docker CE on Rocky does not enable SELinux integration merely because
      # the host policy is enforcing. Keep the policy package explicit so the
      # daemon's mandatory-access-control contract cannot disappear with an
      # RPM dependency change.
      - container-selinux
      - policycoreutils-python-utils  # persistent reviewed bind-source fcontexts
      - audit                     # bounded post-converge AVC/USER_AVC gate
      - "docker-compose-plugin-{{ aigw_docker_compose_plugin_version }}"
      - python3-requests          # community.docker API backend
      - python3-pip
      # The SELinux-confined ACL reconciler queries Docker's local Unix API
      # through curl so it can retain NoNewPrivileges (Docker CLI requires a
      # prohibited runtime-domain transition under that boundary).
      - curl
      - openssl                   # placeholder cert generation (docker_stack)
      - bind-utils                # authoritative platform DNS UDP/TCP verification
      - acl                       # least-privilege Alloy access to Docker logs
      - zstd                      # exact-verified offline Docker image seeds
    state: present
    # Refuse to auto-downgrade a host that already drifted to a newer Docker;
    # rolling Docker back under a live stack is an operator decision, not a
    # converge side effect. Explicit so a future Ansible default cannot loosen it.
    allow_downgrade: false

# Rocky 9's signed EPEL build supplies age for independently encrypted state
# backups. Pin the reviewed NEVRA rather than resolving an unbounded future
# package during a privileged converge.
- name: Enable signed EPEL package metadata for age
  ansible.builtin.dnf:
    name: epel-release
    state: present

- name: Install pinned age backup encryption tool
  ansible.builtin.dnf:
    name: age-1.3.1-1.el9
    state: present

- name: Docker SDK for Python (community.docker docker_network)
  ansible.builtin.pip:
    # Exact reviewed version: never let a future PyPI major execute as root
    # merely because an unbounded >= specifier was re-resolved.
    name: docker==7.2.0
    state: present

# host_preflight has already rejected foreign Docker state and only sets this
# fact for an explicitly acknowledged, dedicated-host daemon.json takeover.
# Preserve the exact old document once before replacing it; this is evidence
# for the operator, not an automatic rollback of a daemon-wide policy change.
- name: Create the private dedicated-Docker-host marker directory
  ansible.builtin.file:
    path: "{{ aigw_docker_host_marker | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Inspect an existing pre-adoption daemon backup before takeover
  ansible.builtin.stat:
    path: "{{ aigw_docker_host_marker }}.pre-adoption-daemon.json"
    follow: false
    get_checksum: false
  register: aigw_pre_adoption_daemon_backup_stat
  changed_when: false
  when: aigw_docker_daemon_adoption_required | default(false) | bool

- name: Read an existing pre-adoption daemon backup without following links
  ansible.builtin.slurp:
    src: "{{ aigw_docker_host_marker }}.pre-adoption-daemon.json"
  register: aigw_pre_adoption_daemon_backup_raw
  no_log: true
  when:
    - aigw_docker_daemon_adoption_required | default(false) | bool
    - aigw_pre_adoption_daemon_backup_stat.stat.exists | default(false)

- name: Require a retained pre-adoption daemon backup to match the current daemon document
  ansible.builtin.assert:
    that:
      - >-
        not (aigw_pre_adoption_daemon_backup_stat.stat.exists | default(false)) or
        ((aigw_pre_adoption_daemon_backup_stat.stat.isreg | default(false)) and
         not (aigw_pre_adoption_daemon_backup_stat.stat.islnk | default(false)) and
         aigw_pre_adoption_daemon_backup_stat.stat.uid == 0 and
         aigw_pre_adoption_daemon_backup_stat.stat.gid == 0 and
         aigw_pre_adoption_daemon_backup_stat.stat.mode == '0600' and
         aigw_pre_adoption_daemon_backup_raw.content == aigw_daemon_config_raw.content)
    quiet: true
    fail_msg: >-
      Refusing daemon takeover: the retained pre-adoption daemon backup is
      unsafe or does not byte-match the current /etc/docker/daemon.json. Move
      it aside for review rather than silently preserving stale recovery data.
  no_log: true
  when: aigw_docker_daemon_adoption_required | default(false) | bool

- name: Preserve the prior daemon configuration before explicit dedicated-host adoption
  ansible.builtin.copy:
    src: /etc/docker/daemon.json
    dest: "{{ aigw_docker_host_marker }}.pre-adoption-daemon.json"
    remote_src: true
    owner: root
    group: root
    mode: "0600"
    force: false
  when: aigw_docker_daemon_adoption_required | default(false) | bool

- name: Record an in-progress dedicated-Docker-host ownership contract before daemon mutation
  ansible.builtin.copy:
    dest: "{{ aigw_docker_host_pending_marker }}"
    content: "{{ aigw_docker_host_marker_content }}"
    owner: root
    group: root
    mode: "0600"
  when: not (aigw_host_marker_stat.exists | default(false))

# Docker's default /var/lib/docker has this type from container-selinux, but a
# reviewed custom data root does not. Label the root before dockerd starts or
# restarts. An inactive Docker tree has no live container MCS ownership and is
# recursively restored; an active tree receives only its root label so this
# play cannot erase a live container's private MCS range.
- name: Create the reviewed Docker data-root boundary
  ansible.builtin.file:
    path: "{{ docker_data_root }}"
    state: directory
    owner: root
    group: root
    mode: "0711"

- name: Persist the Docker data-root SELinux file-context boundary
  community.general.sefcontext:
    target: "{{ (docker_data_root | regex_escape) ~ '(/.*)?' }}"
    setype: container_var_lib_t
    state: present

- name: Apply the Docker data-root SELinux type without relabeling live descendants
  ansible.builtin.command:
    argv: [restorecon, -Fv, "{{ docker_data_root }}"]
  register: aigw_docker_root_restorecon
  changed_when: aigw_docker_root_restorecon.stdout | length > 0
  when: aigw_docker_daemon_active | default(false) | bool

- name: Restore the complete inactive Docker data-root SELinux boundary
  ansible.builtin.command:
    argv: [restorecon, -RFv, "{{ docker_data_root }}"]
  register: aigw_inactive_docker_root_restorecon
  changed_when: aigw_inactive_docker_root_restorecon.stdout | length > 0
  when: not (aigw_docker_daemon_active | default(false) | bool)

- name: Read the Docker data-root SELinux context
  ansible.builtin.command:
    argv: [stat, -c, '%C', --, "{{ docker_data_root }}"]
  register: aigw_docker_root_context
  changed_when: false

- name: Require the Docker data-root SELinux type before daemon startup
  ansible.builtin.assert:
    that:
      - aigw_docker_root_context.stdout is match('^[^:]+:object_r:container_var_lib_t:s0$')
    quiet: true
    fail_msg: "Unsafe Docker data-root SELinux context: {{ aigw_docker_root_context.stdout }}"

# Keep Docker on the iptables backend (default). Do NOT enable the Docker 29
# experimental nftables backend — it removes the DOCKER-USER chain this
# design relies on (see docs/solution-map.md §5).
- name: Read whether Docker was already active before daemon configuration
  ansible.builtin.command: systemctl is-active docker.service
  register: docker_active_before_daemon_config
  changed_when: false
  failed_when: false

- name: Docker daemon config
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "data-root": "{{ docker_data_root }}",
        "log-driver": "json-file",
        "log-opts": { "max-size": "50m", "max-file": "5" },
        "live-restore": true,
        "firewall-backend": "iptables",
        "selinux-enabled": true
      }
    mode: "0644"
    # Reject a syntactically valid JSON document containing an unsupported or
    # misspelled daemon key before it can replace the active configuration.
    validate: /usr/bin/dockerd --validate --config-file %s
  register: docker_daemon_config

# On a vanilla host Docker remains stopped until docker_networks starts it
# behind both firewall layers. On an already-running host, apply a changed
# security configuration now—while those guards are already live—rather than
# deferring a surprise restart until after post-converge verification. A
# daemon that was active without `name=selinux` also must restart after the
# policy RPM is installed, even if daemon.json itself was already exact.
- name: Restart an already-active Docker daemon after config change or missing SELinux support
  ansible.builtin.systemd_service:
    name: docker.service
    state: restarted
  when:
    - >-
      docker_daemon_config is changed or
      not (aigw_live_docker_boundary.selinux_enabled | default(false) | bool)
    - docker_active_before_daemon_config.rc == 0

# Docker is deliberately NOT started in this role. site.yml applies the
# host firewall before os_baseline, and docker_networks starts the daemon only
# after the atomic DOCKER-USER policy is live. Starting it here would let
# restart-policy containers come up before the security boundary on a fresh or
# recovery converge.

# Docker needs IPv4 forwarding, but an existing VM's reverse-path policy is
# customer-owned unless this inventory explicitly opts into source-policy
# routing. Do not globally loosen anti-spoofing merely because Docker is
# installed.
- name: Sysctl — enable IPv4 forwarding for reviewed Docker bridges
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_file: /etc/sysctl.d/90-ai-gateway.conf
    state: present
    reload: true

# rp_filter=2 (loose, RFC3704): Rocky's strict default silently drops
# legitimate return traffic once policy-based routing is in play (the 3-NIC
# asymmetric routing in network_routing needs loose mode). This is DELIBERATE
# and must stay loose — do NOT flip it to strict (=1) to "harden" spoofing.
#
# Security note: because rp_filter is loose, a compromised container with the
# default CAP_NET_RAW could forge a net-egress source IP (172.28.0.x) and the
# kernel would NOT drop it on reverse-path grounds. Egress spoofing is instead
# blocked in DOCKER-USER (firewalld_zones/templates/docker-user-rules.sh.j2):
# the 443 egress-allow rule is pinned to net-egress's explicit bridge interface
# (-i br-egress), so only traffic that genuinely ingresses that bridge is let
# out eth0. Egress safety therefore relies on that -i bridge pin, NOT on
# rp_filter. Keep the two facts linked: loosening rp_filter is only acceptable
# while the -i pin exists.
- name: Sysctl — use loose rp_filter only with explicit source-policy routing
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/90-ai-gateway.conf
    state: present
    reload: true
  loop:
    - { name: net.ipv4.conf.all.rp_filter, value: "2" }
    - { name: "net.ipv4.conf.{{ nic_adm }}.rp_filter", value: "2" }
    - { name: "net.ipv4.conf.{{ nic_internal }}.rp_filter", value: "2" }
  when: manage_networking | bool
