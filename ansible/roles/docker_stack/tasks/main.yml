---
- name: Define the exact resolver and optional service Compose overlays
  ansible.builtin.set_fact:
    aigw_compose_files: >-
      {{ ['docker-compose.yml', 'docker-compose.dns.yml']
         + (['docker-compose.platform-dns.yml']
            if (platform_authoritative_dns_enabled | bool) else [])
         + (['docker-compose.lab.yml']
            if (samba_lab_enabled | bool) else [])
         + (['docker-compose.identity-ldap.yml']
            if (identity_ldap_enabled | bool) else []) }}
    aigw_compose_profiles: >-
      {{ (['lab-ad'] if (samba_lab_enabled | bool) else [])
         + (['vault-ui'] if (aigw_vault_ui_enabled | bool) else []) }}
    aigw_compose_cli_overlay_args: >-
      {{ ['--file', 'docker-compose.yml', '--file', 'docker-compose.dns.yml']
         + (['--file', 'docker-compose.platform-dns.yml']
            if (platform_authoritative_dns_enabled | bool) else [])
         + (['--file', 'docker-compose.lab.yml']
            if (samba_lab_enabled | bool) else [])
         + (['--file', 'docker-compose.identity-ldap.yml']
            if (identity_ldap_enabled | bool) else [])
         + (['--profile', 'lab-ad']
            if (samba_lab_enabled | bool) else [])
         + (['--profile', 'vault-ui']
            if (aigw_vault_ui_enabled | bool) else []) }}

- name: Validate fixed edge IP / trusted-proxy network ABI
  ansible.builtin.assert:
    that:
      - traefik_int_chat_ip == '172.28.3.2'
      - traefik_int_portal_ip == '172.28.4.2'
      - traefik_adm_admin_ip == '172.28.5.2'
      - oauth2_proxy_litellm_ip == '172.28.5.3'
      - traefik_adm_grafana_ip == '172.28.6.2'
      - oauth2_proxy_grafana_ip == '172.28.6.3'
      - alloy_telemetry_ip == '172.28.13.2'
      - alloy_observability_ip == '172.28.15.2'
      - prometheus_observability_ip == '172.28.15.3'
      - tempo_ingest_ip == '172.28.16.2'
      - lab_dns_ip == '172.28.18.2'
      - keycloak_internal_ip == '172.28.2.3'
      - (docker_networks | selectattr('name', 'equalto', 'net-chat') | map(attribute='subnet') | first) == '172.28.3.0/24'
      - (docker_networks | selectattr('name', 'equalto', 'net-portal') | map(attribute='subnet') | first) == '172.28.4.0/24'
      - (docker_networks | selectattr('name', 'equalto', 'net-admin-app') | map(attribute='subnet') | first) == '172.28.5.0/24'
      - (docker_networks | selectattr('name', 'equalto', 'net-grafana') | map(attribute='subnet') | first) == '172.28.6.0/24'
      - (docker_networks | selectattr('name', 'equalto', 'net-telemetry') | map(attribute='subnet') | first) == '172.28.13.0/24'
      - (docker_networks | selectattr('name', 'equalto', 'net-observability') | map(attribute='subnet') | first) == '172.28.15.0/24'
      - (docker_networks | selectattr('name', 'equalto', 'net-traces') | map(attribute='subnet') | first) == '172.28.16.0/24'
      - (docker_networks | selectattr('name', 'equalto', 'net-identity') | map(attribute='subnet') | first) == '172.28.17.0/24'
      - (docker_networks | selectattr('name', 'equalto', 'net-lab-dns') | map(attribute='subnet') | first) == '172.28.18.0/24'
    fail_msg: >-
      Fixed Traefik IPs and application subnets are a proxy-trust ABI. Update
      Compose, Keycloak/oauth2-proxy/Uvicorn trust, and these assertions as one
      reviewed change; do not let callback reconstruction drift.

- name: Validate the platform DNS administrative view selector
  ansible.builtin.assert:
    that:
      - vpn_client_cidr is match('^(?:(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})\\.){3}(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})/(?:[1-9]|[12][0-9]|3[0-2])$')
      - vpn_client_cidr not in ['0.0.0.0/0', '10.8.0.0/24']
      - vpn_client_cidr != internal_cidr
    quiet: true
    fail_msg: >-
      Platform split DNS requires the already-validated, non-placeholder ADM/VPN
      client CIDR and it must remain distinct from the internal-user CIDR.
  when: platform_authoritative_dns_enabled | bool

- name: Process optional offline external-image seed before Compose
  ansible.builtin.include_tasks: offline_image_seed.yml

- name: Stack directory
  ansible.builtin.file:
    path: "{{ stack_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

# Keycloak imports client secrets only while a realm is first created. The
# post-bootstrap identity controller deliberately has no manage-clients role,
# so changing a relying-party secret in .env first would restart applications
# with credentials Keycloak does not know and take every affected SSO path
# down. Treat those four credentials as immutable during ordinary converge.
# A future rotation workflow must update Keycloak first with a separately
# reviewed short-lived authority and only then atomically advance this state.
- name: Inspect the existing stack environment before any deployment write
  ansible.builtin.stat:
    path: "{{ stack_dir }}/.env"
    follow: false
    get_checksum: false
  register: aigw_existing_env_path
  no_log: true

- name: Require a private regular existing stack environment
  ansible.builtin.assert:
    that:
      - aigw_existing_env_path.stat.isreg | default(false)
      - not (aigw_existing_env_path.stat.islnk | default(false))
      - aigw_existing_env_path.stat.uid == 0
      - aigw_existing_env_path.stat.gid == 0
      - aigw_existing_env_path.stat.mode == '0600'
      - (aigw_existing_env_path.stat.nlink | int) == 1
      - (aigw_existing_env_path.stat.size | int) > 0
      - (aigw_existing_env_path.stat.size | int) <= 262144
    quiet: true
    fail_msg: Existing stack environment has an unsafe object, owner, or mode boundary.
  when: aigw_existing_env_path.stat.exists
  no_log: true

- name: Inspect persistent Keycloak database state on the clean-state path
  ansible.builtin.command:
    argv:
      - /usr/bin/docker
      - --host
      - unix:///run/docker.sock
      - volume
      - inspect
      - "{{ compose_project_name }}_pg_data"
  register: aigw_clean_state_pg_volume
  changed_when: false
  failed_when: false
  when: not aigw_existing_env_path.stat.exists

- name: Permit no-environment bootstrap only when persistent identity state is absent
  ansible.builtin.assert:
    that:
      - aigw_clean_state_pg_volume.rc == 1
      - aigw_clean_state_pg_volume.stderr is search('(?i)no such volume')
    quiet: true
    fail_msg: >-
      Refusing a new stack environment because persistent PostgreSQL/Keycloak
      state already exists. Restore its matching root-only .env or use the
      separately reviewed destructive clean-state rebuild procedure.
  when: not aigw_existing_env_path.stat.exists

- name: Read the existing stack environment for immutable OIDC comparison
  ansible.builtin.slurp:
    src: "{{ stack_dir }}/.env"
  register: aigw_existing_env
  when: aigw_existing_env_path.stat.exists
  no_log: true

- name: Reject ordinary converge when a Keycloak relying-party secret drifts
  ansible.builtin.command:
    argv:
      - python3
      - -I
      - -c
      - |
        import base64
        import hmac
        import json
        import re
        import sys

        expected_keys = (
            "WEBUI_OIDC_CLIENT_SECRET",
            "PORTAL_OIDC_CLIENT_SECRET",
            "ADMIN_PORTAL_OIDC_CLIENT_SECRET",
            "OAUTH2_PROXY_CLIENT_SECRET",
        )
        try:
            request = json.loads(sys.stdin.buffer.read(524289))
            if not isinstance(request, dict) or set(request) != {
                "deployed_b64",
                "desired",
            }:
                raise ValueError
            desired = request["desired"]
            if not isinstance(desired, dict) or set(desired) != set(expected_keys):
                raise ValueError
            if any(
                not isinstance(desired[key], str)
                or re.fullmatch(r"[A-Za-z0-9_-]{32,}", desired[key]) is None
                for key in expected_keys
            ):
                raise ValueError
            if len(set(desired.values())) != len(expected_keys):
                raise ValueError

            encoded = request["deployed_b64"]
            if not isinstance(encoded, str) or len(encoded) > 350000:
                raise ValueError
            payload = base64.b64decode(encoded.encode("ascii", "strict"), validate=True)
            if not payload or len(payload) > 262144:
                raise ValueError
            decoded = payload.decode("utf-8", "strict")
            deployed = {}
            for line in decoded.splitlines():
                key, separator, value = line.partition("=")
                if key not in expected_keys:
                    if any(
                        re.match(
                            rf"^\s*(?:export\s+)?{re.escape(candidate)}(?:\s*=|\s*$)",
                            line,
                        )
                        for candidate in expected_keys
                    ):
                        raise ValueError
                    continue
                if (
                    separator != "="
                    or key in deployed
                    or re.fullmatch(r"[A-Za-z0-9_-]{32,}", value) is None
                ):
                    raise ValueError
                deployed[key] = value
            if set(deployed) != set(expected_keys):
                raise ValueError
            if len(set(deployed.values())) != len(expected_keys):
                raise ValueError
            if any(
                not hmac.compare_digest(deployed[key], desired[key])
                for key in expected_keys
            ):
                raise ValueError
        except Exception:
            raise SystemExit(1)
  args:
    stdin: >-
      {{
        {
          'deployed_b64': aigw_existing_env.content,
          'desired': {
            'WEBUI_OIDC_CLIENT_SECRET': webui_oidc_client_secret | default(''),
            'PORTAL_OIDC_CLIENT_SECRET': portal_oidc_client_secret | default(''),
            'ADMIN_PORTAL_OIDC_CLIENT_SECRET': admin_portal_oidc_client_secret | default(''),
            'OAUTH2_PROXY_CLIENT_SECRET': oauth2_proxy_client_secret | default('')
          }
        } | to_json
      }}
    stdin_add_newline: false
  register: aigw_oidc_rp_secret_drift_check
  changed_when: false
  failed_when: false
  when: aigw_existing_env_path.stat.exists
  no_log: true

- name: Fail closed before deploy when an OIDC relying-party secret changed
  ansible.builtin.assert:
    that:
      - aigw_oidc_rp_secret_drift_check.rc == 0
    quiet: true
    fail_msg: >-
      An existing Keycloak OIDC relying-party credential is missing, invalid,
      reused, or differs from the requested deployment value. Ordinary
      converge cannot rotate it; use a reviewed Keycloak-first rotation
      procedure or a destructive clean-state rebuild.
  when: aigw_existing_env_path.stat.exists

# Deploy an explicit allow-list. A recursive copy of the working tree also
# copied ignored local .env/private-key/secrets files; .gitignore is not an
# Ansible deployment boundary.
- name: Create allow-listed compose config directories
  ansible.builtin.file:
    path: "{{ stack_dir }}/{{ item }}"
    state: directory
    # These directories contain reviewed non-secret service configuration.
    # Several DHI services run as distinct non-root UIDs and Grafana mounts a
    # whole provisioning tree, so deterministic traverse permission is part
    # of the runtime contract. Secrets use the separate root-only directory.
    owner: root
    group: root
    mode: "0755"
  loop:
    - alloy
    - cribl-mock
    - grafana
    - grafana/provisioning
    - grafana/provisioning/alerting
    - grafana/provisioning/dashboards
    - grafana/provisioning/dashboards/json
    - grafana/provisioning/datasources
    - grafana/provisioning/plugins
    - litellm
    - loki
    - postgres/init
    - prometheus
    - traefik
    - tempo
    - vault

- name: Find existing Grafana dashboard artifacts
  ansible.builtin.find:
    paths: "{{ stack_dir }}/grafana/provisioning/dashboards/json"
    recurse: false
    hidden: true
    file_type: any
  register: aigw_existing_grafana_dashboard_artifacts

- name: Remove unmanaged Grafana dashboard artifacts
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ aigw_existing_grafana_dashboard_artifacts.files }}"
  loop_control:
    label: "{{ item.path }}"
  when: >-
    (not (item.isreg | default(false) | bool)) or
    ((item.path | basename) not in
      [
        'ai-gateway-live-logs.json',
        'ai-gateway-overview.json',
        'ai-gateway-request-audit.json',
        'edge-identity-services.json',
        'grafana-lgtm-stack.json',
        'rocky9-host.json'
      ])

- name: Sync allow-listed compose configuration files
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../compose/{{ item }}"
    dest: "{{ stack_dir }}/{{ item }}"
    owner: root
    group: root
    # Controller checkout modes are not a deployment policy. In particular,
    # a local 0600 dynamic route file leaves non-root Traefik healthy at /ping
    # but unable to load TLS/routes. Only the PostgreSQL initializer executes.
    mode: "{{ '0755' if item == 'postgres/init/01-init-databases.sh' else '0644' }}"
  loop:
    - bind-source-digest-inputs.json
    - docker-compose.yml
    - docker-compose.platform-dns.yml
    - docker-compose.lab.yml
    - docker-compose.identity-ldap.yml
    - alloy/config.alloy
    - cribl-mock/config.yaml
    - grafana/provisioning/alerting/empty.yml
    - grafana/provisioning/dashboards/dashboards.yml
    - grafana/provisioning/dashboards/json/ai-gateway-live-logs.json
    - grafana/provisioning/dashboards/json/ai-gateway-overview.json
    - grafana/provisioning/dashboards/json/ai-gateway-request-audit.json
    - grafana/provisioning/dashboards/json/edge-identity-services.json
    - grafana/provisioning/dashboards/json/grafana-lgtm-stack.json
    - grafana/provisioning/dashboards/json/rocky9-host.json
    - grafana/provisioning/datasources/datasources.yml
    - grafana/provisioning/plugins/empty.yml
    - litellm/config.yaml
    - loki/config.yml
    - postgres/init/01-init-databases.sh
    - prometheus/prometheus.yml
    - prometheus/rules.yml
    - traefik/traefik-int.yml
    - traefik/traefik-adm.yml
    - traefik/dynamic-int.yml
    - traefik/dynamic-adm.yml
    - tempo/config.yml
    - vault/config.hcl

- name: Render plane-specific container resolver lists
  ansible.builtin.template:
    src: docker-compose.dns.yml.j2
    dest: "{{ stack_dir }}/docker-compose.dns.yml"
    owner: root
    group: root
    mode: "0644"

- name: Render the environment-specific authoritative DNS views
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ stack_dir }}/services/lab-dns/{{ item.dest }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - { src: Corefile.authoritative.j2, dest: Corefile }
    - { src: db.aigw.aegisgroup.ch.j2, dest: db.aigw.aegisgroup.ch }
    - { src: db.aigw.aegisgroup.ch.adm.j2, dest: db.aigw.aegisgroup.ch.adm }
  when: platform_authoritative_dns_enabled | bool

- name: Render mutually exclusive Cribl plaintext or verified-TLS client
  ansible.builtin.blockinfile:
    path: "{{ stack_dir }}/alloy/config.alloy"
    marker: "    // {mark} AIGW MANAGED CRIBL TLS"
    block: |
      {% if cribl_otlp_insecure | bool %}
          tls {
            insecure = true
          }
      {% else %}
          tls {
            insecure             = false
            ca_file              = "{{ cribl_otlp_ca_file }}"
            server_name          = "{{ cribl_otlp_server_name }}"
            insecure_skip_verify = false
            min_version          = "1.2"
          }
      {% endif %}

- name: Inspect PostgreSQL initialization mount permissions
  ansible.builtin.stat:
    path: "{{ stack_dir }}/{{ item }}"
  loop:
    - postgres/init
    - postgres/init/01-init-databases.sh
  register: postgres_init_mount

- name: Verify PostgreSQL can traverse and execute its initialization mount
  ansible.builtin.assert:
    that:
      - postgres_init_mount.results[0].stat.isdir | default(false)
      - postgres_init_mount.results[0].stat.mode == '0755'
      - postgres_init_mount.results[1].stat.isreg | default(false)
      - postgres_init_mount.results[1].stat.mode in ['0555', '0755']
    quiet: true
    fail_msg: >-
      The PostgreSQL image drops privileges before enumerating
      /docker-entrypoint-initdb.d; its non-secret init directory must be 0755
      and 01-init-databases.sh must be world-readable/executable.

# Realm imports: Ansible vars are the single source of truth. The static
# compose/keycloak/realms/*.json copied above are pure-docker-compose dev
# defaults; these templates overwrite them with var-driven values.
- name: Keycloak realms dir
  ansible.builtin.file:
    path: "{{ stack_dir }}/keycloak/realms"
    state: directory
    owner: root
    group: "65532"
    mode: "0750"

- name: Template Keycloak realm imports (overrides static dev defaults)
  ansible.builtin.template:
    src: "keycloak-realms/{{ item }}.j2"
    dest: "{{ stack_dir }}/keycloak/realms/{{ item }}"
    owner: root
    group: "65532"
    mode: "0640"
  loop:
    - aigw-realm.json
    - anthropic-wif-realm.json
  no_log: true

- name: Create custom-service build-context directories
  ansible.builtin.file:
    path: "{{ stack_dir }}/services/{{ item.path }}"
    state: directory
    # These directories contain only the strict source allow-list below. Build
    # context directory modes are preserved by COPY; 0750 made nested Python
    # packages and templates unreadable to uid-1000 runtime users.
    mode: "0755"
  loop: "{{ query('community.general.filetree', playbook_dir ~ '/../services/') }}"
  loop_control:
    label: "{{ item.path }}"
  when:
    - item.state == 'directory'
    - item.path is not regex('(^|/)(__pycache__|\.pytest_cache|\.ruff_cache|\.git|secrets)(/|$)')

- name: Sync allow-listed custom-service source files
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ stack_dir }}/services/{{ item.path }}"
    owner: root
    group: root
    # Avoid copying workstation umask drift into image layers. The only files
    # that must execute directly in a build are the explicitly reviewed shell
    # entrypoints; application/config source remains non-writable 0644.
    mode: >-
      {{
        '0755'
        if ((item.path | basename) in
            ['policy-rc.d', 'samba-ad-entrypoint', 'samba-ad-healthcheck',
             'samba-ad-secret-tool'] or item.path is regex('.*\.sh$'))
        else '0644'
      }}
  loop: "{{ query('community.general.filetree', playbook_dir ~ '/../services/') }}"
  loop_control:
    label: "{{ item.path }}"
  when:
    - item.state == 'file'
    - item.path is not regex('(^|/)(__pycache__|\.pytest_cache|\.ruff_cache|\.git|secrets)(/|$)')
    - item.path is regex('(^|/)(Dockerfile(?:\.open-webui)?|\.dockerignore|README\.md|policy-rc\.d|go\.mod|samba-ad-(entrypoint|healthcheck|secret-tool)|requirements[^/]*\.(txt|lock)|[^/]+\.(py|go|html|ya?ml|sh|pem|patch)|upstream-provenance\.json|oauth-v0\.10\.2\.sha256-fixture|Corefile|db\.aigw\.internal(?:\.adm)?)$')

- name: Find stale unsafe build-context artifacts from older recursive syncs
  ansible.builtin.find:
    paths: "{{ stack_dir }}/services"
    recurse: true
    # Hidden cache/credential artifacts are exactly what this cleanup targets.
    hidden: true
    file_type: any
    patterns:
      - __pycache__
      - .pytest_cache
      - .ruff_cache
      - "*.pyc"
      - .env
      - "*.key"
      - "*.p12"
      - "*.pfx"
  register: stale_service_artifacts

- name: Remove stale unsafe build-context artifacts
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ stale_service_artifacts.files }}"
  loop_control:
    label: "{{ item.path }}"

# Backups intentionally carry the deployed service source needed to recreate
# images.  Reconciliation must also retire reviewed files that disappeared
# from the current source; otherwise a restore can leave obsolete root-owned
# executable code behind even when a strict .dockerignore keeps it out of the
# image.  Keep this list explicit so deletion never expands to customer data.
- name: Remove explicitly retired service-source artifacts
  ansible.builtin.file:
    path: "{{ stack_dir }}/services/{{ item }}"
    state: absent
  loop:
    - egress-proxy/docker-entrypoint.sh

- name: Reconcile the exact operational-script deployment boundary
  vars:
    # Keep this a flat, reviewed manifest. Never recursively copy scripts/:
    # controller caches, tests, editor metadata, or a future local credential
    # must not become root-owned target code merely because it exists nearby.
    aigw_operational_scripts:
      - aigw-compose.sh
      - aigw-runtime-up.sh
      - compute-bind-source-digests.py
      - edge-tls.py
      - load-offline-image-seed.py
      - plan-compose-builds.py
      - preserve-compose-rollbacks.py
      - pre-upgrade-check.sh
      - reconcile-openwebui-key.py
      - remove-lab-local-keycloak-users.py
      - restore_archive.py
      - rotate-vault-audit.sh
      - state-backup.sh
      - state-restore.sh
      - test-portal-group-flow.py
      - test-portal-identity-flow.py
      - test-portal-key-lifecycle.py
      - test-portal-login.py
      - validate-build-contract.py
      - validate-compose.sh
      - validate-identity-policy.py
      - validate-vault-config.sh
      - vault-bootstrap.sh
      - vault-pki-intermediate.sh
      - vault-unseal.sh
      - verify-live-lab-identity.py
  block:
    - name: Inspect the deployed scripts path without following a link
      ansible.builtin.stat:
        path: "{{ stack_dir }}/scripts"
        follow: false
      register: deployed_scripts_path

    - name: Remove a non-directory or symlinked scripts-path boundary
      ansible.builtin.file:
        path: "{{ stack_dir }}/scripts"
        state: absent
      when: >-
        deployed_scripts_path.stat.exists and
        (deployed_scripts_path.stat.islnk | default(false) or
         not (deployed_scripts_path.stat.isdir | default(false)))

    - name: Create the private operational scripts directory
      ansible.builtin.file:
        path: "{{ stack_dir }}/scripts"
        state: directory
        owner: root
        group: root
        mode: "0750"

    - name: Inventory top-level deployed script entries without following links
      ansible.builtin.find:
        paths: "{{ stack_dir }}/scripts"
        recurse: false
        hidden: true
        file_type: any
        follow: false
      register: deployed_script_top_level

    # Deleting an unexpected top-level directory removes its contained stale
    # cache/test tree as one boundary. ansible.builtin.file removes symlinks as
    # links and does not traverse their targets.
    - name: Remove every non-manifest top-level script entry
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ deployed_script_top_level.files }}"
      loop_control:
        label: "{{ item.path }}"
      when: (item.path | basename) not in aigw_operational_scripts

    - name: Inspect manifest destinations without following links
      ansible.builtin.stat:
        path: "{{ stack_dir }}/scripts/{{ item }}"
        follow: false
      loop: "{{ aigw_operational_scripts }}"
      register: deployed_script_targets

    - name: Remove unsafe manifest destination objects
      ansible.builtin.file:
        path: "{{ stack_dir }}/scripts/{{ item.item }}"
        state: absent
      loop: "{{ deployed_script_targets.results }}"
      loop_control:
        label: "{{ item.item }}"
      when: >-
        item.stat.exists and
        (item.stat.islnk | default(false) or
         not (item.stat.isreg | default(false)) or
         (item.stat.nlink | default(1) | int) != 1)

    - name: Deploy only reviewed top-level operational scripts
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../scripts/{{ item }}"
        dest: "{{ stack_dir }}/scripts/{{ item }}"
        owner: root
        group: root
        # Match the two later container-readability tasks on the copy itself so
        # an unchanged converge does not oscillate 0750 -> 0555 on every run.
        mode: >-
          {{ '0555' if
             (item == 'reconcile-openwebui-key.py' or
              (item == 'remove-lab-local-keycloak-users.py' and
               (samba_lab_enabled | bool)))
             else '0750' }}
      loop: "{{ aigw_operational_scripts }}"

    - name: Inventory the complete deployed scripts tree without following links
      ansible.builtin.find:
        paths: "{{ stack_dir }}/scripts"
        recurse: true
        hidden: true
        file_type: any
        follow: false
      register: deployed_script_inventory

    - name: Require exactly the flat operational-script manifest
      ansible.builtin.assert:
        that:
          - deployed_script_inventory.matched == aigw_operational_scripts | length
        quiet: true
        fail_msg: >-
          The deployed scripts tree contains a missing, unexpected, or nested
          entry outside the reviewed operational-script manifest.

    - name: Prove every deployed script is a root-owned top-level regular file
      ansible.builtin.assert:
        that:
          - item.isreg | default(false)
          - not (item.islnk | default(false))
          - item.uid == 0
          - item.gid == 0
          - item.path == stack_dir ~ '/scripts/' ~ (item.path | basename)
          - (item.path | basename) in aigw_operational_scripts
        quiet: true
        fail_msg: "Unsafe deployed script object: {{ item.path }}"
      loop: "{{ deployed_script_inventory.files }}"
      loop_control:
        label: "{{ item.path }}"

# This bounded, non-secret source file is bind-mounted read-only into the
# non-root one-shot reconciliation container. Keep the rest of scripts/ at
# 0750; only this exact helper needs container readability.
- name: Make the Open WebUI key reconciliation tool readable in its container
  ansible.builtin.file:
    path: "{{ stack_dir }}/scripts/reconcile-openwebui-key.py"
    owner: root
    group: root
    mode: "0555"

# This one script is bind-mounted into a non-root, one-shot key-rotator
# container after the directory administrator is proven. It contains no
# secret material and still requires an exact destructive confirmation.
- name: Make the bounded lab local-user cleanup tool readable in its container
  ansible.builtin.file:
    path: "{{ stack_dir }}/scripts/remove-lab-local-keycloak-users.py"
    owner: root
    group: root
    mode: "0555"
  when: samba_lab_enabled | bool

# Install these non-secret runtime artifacts before the render-only gate.
# On a genuinely pristine host the deployed validator has no controller-side
# Ansible tree to inspect, so it validates the exact helper and unit bytes that
# the later timer will execute. Neither artifact is started at this point.
- name: Install scoped Docker json-log ACL reconciler
  ansible.builtin.copy:
    dest: /usr/local/sbin/aigw-docker-log-acl
    owner: root
    group: root
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      export LC_ALL=C PATH=/usr/sbin:/usr/bin:/sbin:/bin
      unset DOCKER_CONFIG DOCKER_CONTEXT DOCKER_HOST \
        HTTP_PROXY HTTPS_PROXY ALL_PROXY http_proxy https_proxy all_proxy NO_PROXY no_proxy
      [[ $# -eq 0 ]] || { echo "arguments are not accepted" >&2; exit 2; }
      state_root={{ docker_data_root | quote }}
      root="$state_root/containers"
      stack_root={{ stack_dir | quote }}

      [[ -d "$state_root" && ! -L "$state_root" ]] || {
        echo "Docker state root is missing or symlinked" >&2
        exit 1
      }
      [[ -d "$root" && ! -L "$root" ]] || {
        echo "Docker containers root is missing or symlinked" >&2
        exit 1
      }
      for boundary in "$state_root" "$root"; do
        [[ "$(/usr/bin/stat -c '%u:%g' -- "$boundary")" == 0:0 ]] || {
          echo "Docker ACL boundary must be owned by root:root: $boundary" >&2
          exit 1
        }
      done

      intersect_permissions() {
        local granted=$1 mask=$2 result='' index character
        for index in 0 1 2; do
          character=${granted:index:1}
          if [[ "$character" != - && "${mask:index:1}" != - ]]; then
            result+=$character
          else
            result+=-
          fi
        done
        printf '%s\n' "$result"
      }

      require_access_acl() {
        local path=$1 expected=$2 count=0 permissions='' mask='rwx' effective
        while IFS=: read -r kind qualifier value _; do
          if [[ "$kind" == user && "$qualifier" == 473 ]]; then
            count=$((count + 1))
            permissions=$value
          elif [[ "$kind" == mask && -z "$qualifier" ]]; then
            mask=$value
          fi
        done < <(/usr/bin/getfacl -cpn -- "$path")
        effective=$(intersect_permissions "$permissions" "$mask")
        ((count == 1)) && [[ "$permissions" == "$expected" ]] &&
          [[ "$effective" == "$expected" ]] || {
          echo "unexpected uid473 access ACL on $path" >&2
          exit 1
        }
      }

      require_root_owned_real() {
        local path=$1 expected_type=$2
        [[ ! -L "$path" ]] || {
          echo "refusing symlinked Docker ACL target: $path" >&2
          exit 1
        }
        case "$expected_type" in
          directory)
            [[ -d "$path" ]] || {
              echo "Docker ACL target is not a directory: $path" >&2
              exit 1
            }
            ;;
          file)
            [[ -f "$path" ]] || {
              echo "Docker ACL target is not a regular file: $path" >&2
              exit 1
            }
            ;;
          entry)
            [[ -e "$path" ]] || {
              echo "Docker ACL target is missing: $path" >&2
              exit 1
            }
            ;;
          *)
            echo "internal ACL target-type error" >&2
            exit 2
            ;;
        esac
        [[ "$(/usr/bin/stat -c '%u:%g' -- "$path")" == 0:0 ]] || {
          echo "Docker ACL target must be owned by root:root: $path" >&2
          exit 1
        }
      }

      require_no_default_acl() {
        if /usr/bin/getfacl -cpn -- "$1" | /usr/bin/grep -q '^default:'; then
          echo "unexpected inherited ACL on Docker log boundary: $1" >&2
          exit 1
        fi
      }

      # The parent ACLs are established once by Ansible. The recurring helper
      # never walks or writes an arbitrary Docker container directory: it asks
      # Docker for the exact Compose project IDs, validates *all* of their
      # direct entries before its first write, then grants uid 473 only the
      # json-file logs for those containers. This prevents an unrelated future
      # container on the same host from becoming observable merely because it
      # exists below DockerRootDir.
      require_access_acl "$state_root" --x
      require_access_acl "$root" r-x
      require_no_default_acl "$root"

      # Docker CLI transitions into container_runtime_t. SELinux correctly
      # rejects that transition once NoNewPrivileges is set on this systemd
      # service, so query the same local Docker API through its Unix socket
      # instead. This keeps the helper's NoNewPrivileges, AF_UNIX-only, and
      # private-network boundaries intact while still validating the complete
      # Compose ownership tuple before it touches a host ACL.
      project_ids=()
      if ! project_output=$(
        /usr/bin/curl --unix-socket /run/docker.sock --noproxy '*' \
          --fail --silent --show-error --connect-timeout 5 --max-time 10 \
          --max-filesize 1048576 --get \
          --data-urlencode 'filters={"label":["com.docker.compose.project={{ compose_project_name }}"]}' \
          'http://localhost/containers/json?all=1' |
          /usr/bin/python3 -I -c 'import json,re,sys; project,stack_root=sys.argv[1:]; payload=sys.stdin.buffer.read(1048577); len(payload) <= 1048576 or (_ for _ in ()).throw(SystemExit("Docker returned an oversized container inventory")); containers=json.loads(payload); isinstance(containers,list) and len(containers) <= 64 or (_ for _ in ()).throw(SystemExit("Docker returned an invalid container inventory")); identifiers=[container.get("Id") if isinstance(container,dict) else None for container in containers]; valid=all(isinstance(container,dict) and isinstance(container.get("Labels"),dict) and isinstance(identifier,str) and re.fullmatch(r"[0-9a-f]{64}",identifier) and container["Labels"].get("com.docker.compose.project") == project and container["Labels"].get("com.docker.compose.project.working_dir") == stack_root and re.fullmatch(r"[a-z0-9][a-z0-9_-]{0,62}",container["Labels"].get("com.docker.compose.service", "")) and re.fullmatch(r"[0-9a-f]{64}",container["Labels"].get("com.docker.compose.config-hash", "")) for container,identifier in zip(containers,identifiers)); valid and len(set(identifiers)) == len(identifiers) or (_ for _ in ()).throw(SystemExit("Docker returned a container without the full AI Gateway Compose ownership tuple")); print("\n".join(identifiers))' {{ compose_project_name | quote }} "$stack_root"
      ); then
        echo "Docker failed to enumerate AI Gateway project containers" >&2
        exit 1
      fi
      if [[ -n "$project_output" ]]; then
        mapfile -t project_ids <<<"$project_output"
      fi
      project_dirs=()
      for identifier in "${project_ids[@]}"; do
        [[ "$identifier" =~ ^[0-9a-f]{64}$ ]] || {
          echo "Docker returned an invalid AI Gateway container ID" >&2
          exit 1
        }
        project_dir="$root/$identifier"
        require_root_owned_real "$project_dir" directory
        project_dirs+=("$project_dir")
      done

      # Validate every object that will be changed before the first ACL write.
      # Docker json logs and runtime metadata live directly in each container
      # directory; unexpected symlinks, owners, or types fail closed.
      for project_dir in "${project_dirs[@]}"; do
        while IFS= read -r -d '' candidate; do
          require_root_owned_real "$candidate" entry
          if [[ "$candidate" == *-json.log* ]]; then
            require_root_owned_real "$candidate" file
          fi
        done < <(/usr/bin/find "$project_dir" -xdev -mindepth 1 -maxdepth 1 -print0)
      done

      for project_dir in "${project_dirs[@]}"; do
        # Clear only legacy inherited ACLs on this exact AIGW container
        # directory. No default ACL is left that could grant future files.
        /usr/bin/setfacl -k -- "$project_dir"
        /usr/bin/setfacl -m u:473:r-x "$project_dir"
        while IFS= read -r -d '' candidate; do
          if [[ "$candidate" == *-json.log* ]]; then
            /usr/bin/setfacl -m u:473:r-- "$candidate"
          else
            # Named deny overrides Docker runtime files that happen to carry
            # other-read permission; config.v2.json and injected resolver
            # material remain outside Alloy's collection boundary.
            /usr/bin/setfacl -m u:473:--- "$candidate"
          fi
        done < <(/usr/bin/find "$project_dir" -xdev -mindepth 1 -maxdepth 1 -print0)
      done

      # Fail closed if a concurrent action altered parent access or if a child
      # reconciliation did not yield the exact per-file read boundary.
      require_access_acl "$state_root" --x
      require_access_acl "$root" r-x
      require_no_default_acl "$root"
      for project_dir in "${project_dirs[@]}"; do
        require_access_acl "$project_dir" r-x
        require_no_default_acl "$project_dir"
        while IFS= read -r -d '' candidate; do
          if [[ "$candidate" == *-json.log* ]]; then
            require_access_acl "$candidate" r--
          else
            require_access_acl "$candidate" ---
          fi
        done < <(/usr/bin/find "$project_dir" -xdev -mindepth 1 -maxdepth 1 -print0)
      done

- name: Install scoped Docker json-log ACL reconciliation service
  ansible.builtin.copy:
    dest: /etc/systemd/system/aigw-docker-log-acl.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Grant DHI Alloy read access only to Docker json logs
      After=docker.service
      Requires=docker.service

      [Service]
      Type=oneshot
      ExecStart=/usr/local/sbin/aigw-docker-log-acl
      NoNewPrivileges=true
      PrivateTmp=true
      PrivateDevices=true
      PrivateNetwork=true
      ProtectSystem=strict
      ProtectHome=true
      ProtectKernelTunables=true
      ProtectKernelModules=true
      ProtectControlGroups=true
      ProtectProc=invisible
      ProcSubset=pid
      RestrictAddressFamilies=AF_UNIX
      RestrictNamespaces=true
      RestrictSUIDSGID=true
      LockPersonality=true
      MemoryDenyWriteExecute=true
      SystemCallArchitectures=native
      CapabilityBoundingSet=CAP_DAC_OVERRIDE CAP_DAC_READ_SEARCH CAP_FOWNER
      UMask=0077
      # Rocky SELinux denies systemd bind-mounting Docker's
      # container_var_run_t Unix socket into a sandbox. A read-only bind would
      # not restrict Unix-socket RPC writes in any case; retain the host
      # namespace socket only for this root-owned, exact-project helper while
      # the service remains network-isolated and AF_UNIX-only.
      ReadOnlyPaths={{ docker_data_root }}
      ReadWritePaths={{ docker_data_root }}/containers

- name: Validate static Vault server configuration in an isolated container
  ansible.builtin.command:
    argv:
      - "{{ stack_dir }}/scripts/validate-vault-config.sh"
  changed_when: false

- name: Extract existing ROTATOR_VAULT_TOKEN
  ansible.builtin.set_fact:
    rotator_vault_token: "{{ (aigw_existing_env.content | b64decode | regex_search('ROTATOR_VAULT_TOKEN=(.*)', '\\1') or ['']) | first }}"
  when:
    - aigw_existing_env.content is defined
    - rotator_vault_token | length == 0
  no_log: true

- name: Fail closed on missing, placeholder, or unsafe stack secrets
  ansible.builtin.assert:
    that:
      - lookup('vars', item.name, default='') | length >= item.min_length
      - lookup('vars', item.name, default='') is regex('^[A-Za-z0-9_-]+$')
      - lookup('vars', item.name, default='') | lower not in ['change_me', 'changeme', 'replace_me', 'password', 'secret']
    quiet: true
    fail_msg: >-
      {{ item.name }} must be at least {{ item.min_length }} characters, must
      not be a placeholder, and may contain only A-Z/a-z/0-9/_/-. This keeps
      Compose interpolation and PostgreSQL URI embedding unambiguous.
  loop:
    - { name: pg_super_password, min_length: 24 }
    - { name: pg_litellm_password, min_length: 24 }
    - { name: pg_keycloak_password, min_length: 24 }
    - { name: pg_rotator_password, min_length: 24 }
    - { name: kc_admin_password, min_length: 24 }
    - { name: litellm_master_key, min_length: 32 }
    - { name: litellm_salt_key, min_length: 32 }
    - { name: redis_password, min_length: 32 }
    - { name: webui_litellm_key, min_length: 24 }
    - { name: webui_secret_key, min_length: 32 }
    - { name: webui_oidc_client_secret, min_length: 32 }
    - { name: portal_oidc_client_secret, min_length: 32 }
    - { name: admin_portal_oidc_client_secret, min_length: 32 }
    - { name: oauth2_proxy_client_secret, min_length: 32 }
    - { name: oauth2_proxy_litellm_cookie_secret, min_length: 32 }
    - { name: oauth2_proxy_grafana_cookie_secret, min_length: 32 }
    - { name: oauth2_proxy_prometheus_cookie_secret, min_length: 32 }
    - { name: oauth2_proxy_vault_cookie_secret, min_length: 32 }
    - { name: portal_session_secret, min_length: 32 }
    - { name: admin_portal_session_secret, min_length: 32 }
    - { name: rotator_internal_token, min_length: 32 }
    - { name: portal_identity_token, min_length: 32 }
    - { name: grafana_admin_password, min_length: 24 }
    - { name: kc_bootstrap_admin_client_secret, min_length: 32 }
  loop_control:
    label: "{{ item.name }}"

- name: Require distinct credentials across portal and OIDC trust boundaries
  ansible.builtin.assert:
    that:
      - portal_identity_token != rotator_internal_token
      - portal_session_secret != admin_portal_session_secret
      - >-
        [oauth2_proxy_litellm_cookie_secret,
         oauth2_proxy_grafana_cookie_secret,
         oauth2_proxy_prometheus_cookie_secret,
         oauth2_proxy_vault_cookie_secret] | unique | length == 4
      - oauth2_proxy_litellm_cookie_secret not in [portal_session_secret, admin_portal_session_secret]
      - oauth2_proxy_grafana_cookie_secret not in [portal_session_secret, admin_portal_session_secret]
      - oauth2_proxy_prometheus_cookie_secret not in [portal_session_secret, admin_portal_session_secret]
      - oauth2_proxy_vault_cookie_secret not in [portal_session_secret, admin_portal_session_secret]
      - >-
        [webui_oidc_client_secret, portal_oidc_client_secret,
         admin_portal_oidc_client_secret,
         oauth2_proxy_client_secret] | unique | length == 4
    quiet: true
    fail_msg: Portal tokens, session keys, and OIDC client secrets must be distinct.
  no_log: true

- name: Fail closed on missing or unsafe Samba lab secrets
  ansible.builtin.assert:
    that:
      - lookup('vars', item, default='') | length >= 16
      - lookup('vars', item, default='') is regex('^[A-Za-z0-9_-]+$')
      # Samba AD's default password policy requires three character classes.
      # Prove that here, before a failed first bootstrap can leave a
      # repeatedly-restarting directory container with no useful diagnostics.
      - lookup('vars', item, default='') is regex('.*[A-Z].*')
      - lookup('vars', item, default='') is regex('.*[a-z].*')
      - lookup('vars', item, default='') is regex('.*[0-9].*')
      - lookup('vars', item, default='') | lower not in ['change_me', 'changeme', 'replace_me', 'password', 'secret']
    quiet: true
    fail_msg: >-
      {{ item }} must be a non-placeholder 16+ character [A-Za-z0-9_-]
      secret in the encrypted lab overlay.
  loop:
    - samba_ad_admin_password
    - samba_ad_bind_password
    - samba_user_lab_admin_password
    - samba_user_lab_developer_password
    - samba_user_lab_user_password
  when: samba_lab_enabled | bool
  no_log: true

- name: Require distinct Samba lab credentials
  ansible.builtin.assert:
    that:
      - >-
        [samba_ad_admin_password, samba_ad_bind_password,
         samba_user_lab_admin_password, samba_user_lab_developer_password,
         samba_user_lab_user_password] | unique | length == 5
    quiet: true
    fail_msg: Samba administrator, bind, and seeded-user credentials must be distinct.
  when: samba_lab_enabled | bool
  no_log: true

- name: Validate the external directory federation inventory contract
  ansible.builtin.assert:
    that:
      # Exactly one identity source may own the Keycloak truststore and the
      # federation reconciliation inputs.
      - not (samba_lab_enabled | bool)
      # ldaps:// only, on the standard port. A plaintext ldap:// origin, an
      # IP-literal host, userinfo, a path, or a query never reaches Keycloak.
      - 'identity_ldap_url is match("^ldaps://[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?(?:\\.[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?)+(?::636)?$")'
      - (identity_ldap_url | urlsplit('port')) in [none, 636]
      # The lab component identity is reserved: a production converge must
      # never be able to adopt or reprovision the lab directory provider.
      - 'identity_ldap_provider_name is match("^[A-Za-z0-9][A-Za-z0-9_.-]{0,63}$")'
      - identity_ldap_provider_name != 'lab-samba-ad'
      - identity_ldap_users_dn | length <= 512
      - identity_ldap_bind_dn | length <= 512
      - 'identity_ldap_users_dn is match("(?i)^(CN|OU)=")'
      - 'identity_ldap_bind_dn is match("(?i)^(CN|OU)=")'
      - 'identity_ldap_users_dn is search("(?i)DC=")'
      - 'identity_ldap_bind_dn is search("(?i)DC=")'
      - 'identity_ldap_users_dn is match("^[\\x20-\\x7e]+$")'
      - 'identity_ldap_bind_dn is match("^[\\x20-\\x7e]+$")'
      - 'identity_ldap_directory_ip is match("^(?:(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})\\.){3}(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})$")'
      - identity_ldap_vendor in ['ad', 'rhds', 'other']
      - 'identity_ldap_username_attribute is match("^[A-Za-z][A-Za-z0-9-]{0,59}$")'
      - 'identity_ldap_rdn_attribute is match("^[A-Za-z][A-Za-z0-9-]{0,59}$")'
      - 'identity_ldap_uuid_attribute is match("^[A-Za-z][A-Za-z0-9-]{0,59}$")'
      - 'identity_ldap_user_object_classes is match("^[A-Za-z][A-Za-z0-9-]{0,63}(, [A-Za-z][A-Za-z0-9-]{0,63}){0,7}$")'
      - 'identity_ldap_user_filter is match("^\\([A-Za-z0-9()&|!=<>~*.,:@ _\\\\-]{1,510}\\)$")'
      - identity_ldap_user_filter.count('(') == identity_ldap_user_filter.count(')')
      - identity_ldap_ca_bundle_src | length > 0
    quiet: true
    fail_msg: >-
      The external directory federation inventory is incomplete or unsafe.
      LDAPS on port 636 is mandatory, the lab provider name is reserved, and
      the lab Samba overlay may never be enabled at the same time.
  when: identity_ldap_enabled | bool

- name: Require the external directory bind credential boundary
  ansible.builtin.assert:
    that:
      - identity_ldap_bind_password is defined
      - identity_ldap_bind_password | length >= 16
      - identity_ldap_bind_password | length <= 512
      - 'identity_ldap_bind_password is match("^[\\x20-\\x7e]+$")'
      - >-
        identity_ldap_bind_password | lower not in
        ['change_me', 'changeme', 'replace_me', 'password', 'secret']
    quiet: true
    fail_msg: >-
      identity_ldap_bind_password must be a non-placeholder 16-512 byte
      printable-ASCII credential supplied by a dedicated encrypted overlay
      (scripts/store-identity-ldap-bind-password.py).
  when: identity_ldap_enabled | bool
  no_log: true

- name: Validate per-gate oauth2-proxy cookie secret shapes
  ansible.builtin.assert:
    that:
      - lookup('vars', item, default='') is regex('^[A-Za-z0-9]{32}$')
    quiet: true
    fail_msg: Each oauth2-proxy cookie secret must be exactly 32 alphanumeric bytes.
  loop:
    - oauth2_proxy_litellm_cookie_secret
    - oauth2_proxy_grafana_cookie_secret
    - oauth2_proxy_prometheus_cookie_secret
    - oauth2_proxy_vault_cookie_secret
  loop_control:
    label: "{{ item }}"
  no_log: true

- name: Refuse plaintext Cribl export except for the in-stack development mock
  ansible.builtin.assert:
    that:
      - not (cribl_otlp_insecure | bool) or cribl_otlp_endpoint == 'cribl-mock:4317'
      - (cribl_external_export_enabled | bool) or cribl_otlp_endpoint == 'cribl-mock:4317'
      - not (cribl_external_export_enabled | bool) or cribl_otlp_endpoint != 'cribl-mock:4317'
      - cribl_otlp_endpoint is regex('^[A-Za-z0-9.-]+:[0-9]{1,5}$')
      - (cribl_otlp_insecure | bool) or (cribl_otlp_server_name | length > 0)
      - (cribl_otlp_insecure | bool) or (cribl_otlp_ca_file | length > 0)
      - cribl_otlp_server_name is regex('^[A-Za-z0-9.-]+$')
      - cribl_otlp_ca_file is regex('^/[A-Za-z0-9_./-]+$')
      # The Cribl trust anchor is a SEPARATE, operator-supplied bundle. The edge
      # CA is never implicitly trusted for the telemetry endpoint.
      - not (cribl_external_export_enabled | bool) or (cribl_otlp_ca_pem_file | length > 0)
      - not (cribl_external_export_enabled | bool) or cribl_otlp_ca_file == '/etc/ssl/certs/aigw-cribl-ca.pem'
    quiet: true
    fail_msg: >-
      CRIBL OTLP plaintext is allowed only for cribl-mock:4317. Real endpoints
      require cribl_otlp_insecure=false, the dedicated cribl_otlp_ca_pem_file
      bundle mounted at /etc/ssl/certs/aigw-cribl-ca.pem, and a TLS server name.

- name: Create root-only runtime secret source directory
  ansible.builtin.file:
    path: "{{ stack_dir }}/secrets"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Materialize Redis authentication files outside command and environment metadata
  ansible.builtin.copy:
    content: "{{ item.content }}\n"
    dest: "{{ stack_dir }}/secrets/{{ item.filename }}"
    owner: root
    # The pinned DHI Redis image runs uid/gid 65532. The parent directory is
    # root-only on the host; Docker bind-mounts only these exact files into the
    # one authorized container, where group-read is the minimum usable mode.
    group: "65532"
    mode: "0440"
    follow: false
  loop:
    - filename: redis_password
      content: "{{ redis_password }}"
    - filename: redis_users.acl
      # Redis accepts exact SHA-256 verifiers in ACL files. The plaintext is
      # present only in the separate health/client file, never in server argv,
      # Config.Env, source, or the ACL verifier file.
      content: "user default reset on #{{ redis_password | hash('sha256') }} ~* &* +@all"
  loop_control:
    label: "{{ item.filename }}"
  no_log: true

- name: Inspect rendered Redis authentication-file boundary
  ansible.builtin.stat:
    path: "{{ stack_dir }}/secrets/{{ item }}"
    follow: false
  loop:
    - redis_password
    - redis_users.acl
  register: redis_auth_files

- name: Require exact Redis authentication-file ownership and mode
  ansible.builtin.assert:
    that:
      - item.stat.isreg | default(false)
      - not (item.stat.islnk | default(false))
      - item.stat.uid == 0
      - item.stat.gid == 65532
      - item.stat.mode == '0440'
      - (item.stat.nlink | default(1) | int) == 1
    quiet: true
    fail_msg: Redis authentication source files must be root:65532 0440 regular single-link files.
  loop: "{{ redis_auth_files.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: Materialize Samba lab Docker secret source files
  ansible.builtin.copy:
    content: "{{ lookup('vars', item.variable) }}\n"
    dest: "{{ stack_dir }}/secrets/{{ item.filename }}"
    owner: root
    # The bind secret is shared only with root Samba and gid-65532 key-rotator.
    # Keep every other Samba credential root-only and never use world-read.
    group: "{{ '65532' if item.variable == 'samba_ad_bind_password' else 'root' }}"
    mode: "{{ '0440' if item.variable == 'samba_ad_bind_password' else '0400' }}"
  loop:
    - { variable: samba_ad_admin_password, filename: samba_ad_admin_password }
    - { variable: samba_ad_bind_password, filename: samba_ad_bind_password }
    - { variable: samba_user_lab_admin_password, filename: samba_user_lab-admin_password }
    - { variable: samba_user_lab_developer_password, filename: samba_user_lab-developer_password }
    - { variable: samba_user_lab_user_password, filename: samba_user_lab-user_password }
  loop_control:
    label: "{{ item.filename }}"
  when: samba_lab_enabled | bool
  no_log: true

- name: Inspect the Samba lab secret-file boundary
  ansible.builtin.stat:
    path: "{{ stack_dir }}/secrets/{{ item.filename }}"
    follow: false
  loop:
    - { filename: samba_ad_admin_password, gid: 0, mode: '0400' }
    - { filename: samba_ad_bind_password, gid: 65532, mode: '0440' }
    - { filename: samba_user_lab-admin_password, gid: 0, mode: '0400' }
    - { filename: samba_user_lab-developer_password, gid: 0, mode: '0400' }
    - { filename: samba_user_lab-user_password, gid: 0, mode: '0400' }
  register: samba_secret_files
  when: samba_lab_enabled | bool

- name: Require exact Samba lab secret-file ownership and modes
  ansible.builtin.assert:
    that:
      - item.stat.isreg | default(false)
      - not (item.stat.islnk | default(false))
      - item.stat.uid == 0
      - item.stat.gid == item.item.gid
      - item.stat.mode == item.item.mode
      - (item.stat.nlink | default(1) | int) == 1
    quiet: true
    fail_msg: "Unsafe Samba secret-file boundary: {{ item.item.filename }}"
  loop: "{{ samba_secret_files.results }}"
  loop_control:
    label: "{{ item.item.filename }}"
  when: samba_lab_enabled | bool

# The lab DC's LDAPS leaf and key are ISSUED from the customer-CA-signed Vault
# intermediate by the operator ceremony (scripts/vault-pki-intermediate.sh
# samba-tls), NOT by this converge — the converge holds no Vault token. On a
# FRESH first converge Vault is uninitialized, so these bind sources must still
# EXIST for the digest computation and the read-only bind mount to succeed:
# create empty placeholders and let the samba-ad entrypoint self-sign until the
# ceremony delivers real material. force=false never overwrites CA-issued
# material once it is present; a later converge simply re-digests the new bytes
# and recreates samba-ad so it adopts them.
- name: Provide empty Samba LDAPS certificate placeholders on first converge
  ansible.builtin.copy:
    content: ""
    dest: "{{ stack_dir }}/secrets/{{ item.filename }}"
    owner: root
    group: root
    mode: "{{ item.mode }}"
    force: false
  loop:
    - { filename: samba_ad_tls_cert, mode: '0644' }
    - { filename: samba_ad_tls_key, mode: '0600' }
  loop_control:
    label: "{{ item.filename }}"
  when: samba_lab_enabled | bool

- name: Inspect the Samba LDAPS certificate material boundary
  ansible.builtin.stat:
    path: "{{ stack_dir }}/secrets/{{ item.filename }}"
    follow: false
  loop:
    - { filename: samba_ad_tls_cert, mode: '0644' }
    - { filename: samba_ad_tls_key, mode: '0600' }
  loop_control:
    label: "{{ item.filename }}"
  register: samba_tls_files
  when: samba_lab_enabled | bool

# The private key must be exactly 0600: Samba's CVE-2013-4476 guard rejects any
# group/other bit on the LDAPS key and refuses to start the ldap server task.
# root:root (cert 0644 public, key 0600 owner-only); the ceremony and the
# container entrypoint both write exactly these modes.
- name: Require exact Samba LDAPS certificate material ownership and modes
  ansible.builtin.assert:
    that:
      - item.stat.isreg | default(false)
      - not (item.stat.islnk | default(false))
      - item.stat.uid == 0
      - item.stat.gid == 0
      - item.stat.mode == item.item.mode
      - (item.stat.nlink | default(1) | int) == 1
    quiet: true
    fail_msg: >-
      Samba LDAPS certificate material must be a root:root regular single-link
      file (cert 0644, key 0600): {{ item.item.filename }}
  loop: "{{ samba_tls_files.results }}"
  loop_control:
    label: "{{ item.item.filename }}"
  when: samba_lab_enabled | bool

# The directory bind credential never becomes a Compose environment value, an
# argv element, or a log line. It exists on the host only as this root-owned
# file, bind-mounted read-only into the single reconciliation component.
- name: Materialize the external directory bind credential outside command and environment metadata
  ansible.builtin.copy:
    content: "{{ identity_ldap_bind_password }}\n"
    dest: "{{ stack_dir }}/secrets/identity_ldap_bind_password"
    owner: root
    # key-rotator runs uid/gid 65532; the parent directory is root-only.
    group: "65532"
    mode: "0440"
    follow: false
  when: identity_ldap_enabled | bool
  no_log: true

- name: Inspect the external directory secret-file boundary
  ansible.builtin.stat:
    path: "{{ stack_dir }}/secrets/identity_ldap_bind_password"
    follow: false
  register: identity_ldap_secret_file
  when: identity_ldap_enabled | bool

- name: Require exact external directory secret-file ownership and mode
  ansible.builtin.assert:
    that:
      - identity_ldap_secret_file.stat.isreg | default(false)
      - not (identity_ldap_secret_file.stat.islnk | default(false))
      - identity_ldap_secret_file.stat.uid == 0
      - identity_ldap_secret_file.stat.gid == 65532
      - identity_ldap_secret_file.stat.mode == '0440'
      - (identity_ldap_secret_file.stat.nlink | default(1) | int) == 1
    quiet: true
    fail_msg: >-
      The external directory bind credential must be a root:65532 0440
      regular single-link file.
  when: identity_ldap_enabled | bool

# Public, reviewed content: the bundle Keycloak trusts for LDAPS. It is staged
# and fully validated (certificates-only, no PRIVATE KEY, parses) on a private
# copy BEFORE the live trust anchor is overwritten, so a bad, empty, or
# key-bearing controller-side bundle can never destroy the known-good deployed
# bundle or land private-key bytes at the mounted destination. Only a validated
# bundle is promoted, atomically, to keycloak/identity-ldap-ca.pem.
- name: Install the validated external directory public CA bundle for Keycloak
  when: identity_ldap_enabled | bool
  block:
    - name: Create the external directory CA state boundary
      ansible.builtin.file:
        path: "{{ stack_dir }}/.state"
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Reset the external directory CA staging boundary
      ansible.builtin.file:
        path: "{{ stack_dir }}/.state/edge-tls-staging-identity-ca"
        state: absent

    - name: Create the external directory CA staging boundary
      ansible.builtin.file:
        path: "{{ stack_dir }}/.state/edge-tls-staging-identity-ca"
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Stage the external directory public CA bundle
      ansible.builtin.copy:
        src: "{{ identity_ldap_ca_bundle_src }}"
        dest: "{{ stack_dir }}/.state/edge-tls-staging-identity-ca/identity-ldap-ca.pem"
        owner: root
        group: root
        mode: "0600"
        follow: false

    - name: Require a certificates-only external directory trust bundle
      ansible.builtin.command:
        argv:
          - openssl
          - storeutl
          - -noout
          - -certs
          - "{{ stack_dir }}/.state/edge-tls-staging-identity-ca/identity-ldap-ca.pem"
      register: identity_ldap_ca_probe
      changed_when: false
      failed_when: >-
        identity_ldap_ca_probe.rc != 0 or
        'Total found: 0' in identity_ldap_ca_probe.stdout or
        (lookup('ansible.builtin.file', identity_ldap_ca_bundle_src) is search('PRIVATE KEY'))

    - name: Promote the validated external directory public CA bundle for Keycloak
      ansible.builtin.copy:
        src: "{{ stack_dir }}/.state/edge-tls-staging-identity-ca/identity-ldap-ca.pem"
        dest: "{{ stack_dir }}/keycloak/identity-ldap-ca.pem"
        remote_src: true
        owner: root
        group: "65532"
        mode: "0440"
        follow: false
  always:
    - name: Remove the external directory CA staging boundary
      ansible.builtin.file:
        path: "{{ stack_dir }}/.state/edge-tls-staging-identity-ca"
        state: absent

- name: Placeholder certs dir (vault-bootstrap issues real ones)
  ansible.builtin.file:
    path: "{{ stack_dir }}/certs"
    state: directory
    owner: root
    # Both shellless Traefik DHI processes run uid/gid 65532. The host parent
    # remains non-world-traversable; only the exact read-only bind recipients
    # receive the private key through this group.
    group: "65532"
    mode: "0750"

- name: Inspect existing edge certificate SANs
  ansible.builtin.command:
    argv:
      - openssl
      - x509
      - -in
      - "{{ stack_dir }}/certs/int.crt"
      - -noout
      - -ext
      - subjectAltName
  register: existing_edge_certificate
  changed_when: false
  failed_when: false

# The marker records that a customer-CA-signed chain was installed by
# scripts/vault-pki-intermediate.sh. Once it exists, a placeholder must never
# reappear: silently downgrading a real edge certificate to a self-signed one
# would keep the stack "working" while destroying its identity. Inspect it and
# assert the SAN contract BEFORE any deletion so a real-CA domain mismatch fails
# closed instead of deleting live production material.
- name: Inspect the vault-intermediate issuance marker
  ansible.builtin.stat:
    path: "{{ stack_dir }}/.state/edge-tls-issued"
    follow: false
    get_checksum: false
  register: aigw_edge_tls_issued_marker

# Fire BEFORE any deletion. On vault-intermediate, once the ceremony wrote its
# marker certs/int.crt must be a CA-signed leaf for aigw_domain; if it is
# missing, unreadable, or issued for a different domain (the operator moved
# aigw_domain), fail here with an actionable message. The material is never
# removed in this mode, so the mismatch is preserved for recovery rather than
# masked by a self-signed placeholder or an empty certs/ served by default.
- name: Refuse to mask lost production edge material with a placeholder
  ansible.builtin.assert:
    that:
      - >-
        not (aigw_edge_tls_issued_marker.stat.exists and (
          existing_edge_certificate.rc != 0 or
          ('DNS:*.' ~ aigw_domain) not in existing_edge_certificate.stdout or
          ('DNS:' ~ aigw_domain) not in existing_edge_certificate.stdout))
    quiet: true
    fail_msg: >-
      The vault-intermediate or customer-intermediate ceremony previously
      installed customer-CA-signed edge material, but certs/int.crt is now
      missing, unreadable, or issued for a different domain than aigw_domain. If
      aigw_domain changed, rerun the ceremony (vault-intermediate:
      scripts/vault-pki-intermediate.sh csr -> customer CA signs ->
      install-signed; customer-intermediate: import-intermediate); otherwise
      restore state or run renew-leaf. A self-signed placeholder must never
      silently replace a CA-signed certificate.
  when: aigw_edge_tls_mode in ['vault-intermediate', 'customer-intermediate']

# Only lab mode deletes stale edge material, because regenerating a self-signed
# placeholder there is free. On the real-CA modes the material is NEVER deleted:
# a vault-intermediate mismatch already failed the assert above, and
# customer-supplied is overwritten atomically by edge-tls.py install only after
# it validates. A failed real-CA converge therefore can never leave certs/ empty
# and served by Traefik's built-in self-signed default.
- name: Remove edge material that belongs to a different lab domain
  ansible.builtin.file:
    path: "{{ stack_dir }}/certs/{{ item }}"
    state: absent
  loop:
    - int.crt
    - int.key
    - ca.pem
  when: >-
    aigw_edge_tls_mode == 'lab' and
    (existing_edge_certificate.rc != 0 or
     ('DNS:*.' ~ aigw_domain) not in existing_edge_certificate.stdout or
     ('DNS:' ~ aigw_domain) not in existing_edge_certificate.stdout)

# ── Mode customer-supplied: validate on the target, then install atomically ──
# The private key is staged with no_log and every crypto check runs BEFORE the
# live certs/ store is touched. A failure anywhere leaves the previous
# certificates exactly as they were.
- name: Install validated customer-supplied edge TLS material
  when: aigw_edge_tls_mode == 'customer-supplied'
  block:
    - name: Create the private edge TLS state boundary
      ansible.builtin.file:
        path: "{{ stack_dir }}/.state"
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Reset the private edge TLS staging boundary
      ansible.builtin.file:
        path: "{{ stack_dir }}/.state/edge-tls-staging"
        state: absent

    - name: Create the private edge TLS staging boundary
      ansible.builtin.file:
        path: "{{ stack_dir }}/.state/edge-tls-staging"
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Stage the customer edge certificate and chain
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ stack_dir }}/.state/edge-tls-staging/{{ item.dest }}"
        owner: root
        group: root
        mode: "0600"
      loop:
        - { src: "{{ aigw_edge_tls_leaf_cert_file }}", dest: leaf.pem }
        - { src: "{{ aigw_edge_tls_chain_file }}", dest: chain.pem }
      loop_control:
        label: "{{ item.dest }}"

    - name: Stage the customer edge private key without logging
      ansible.builtin.copy:
        src: "{{ aigw_edge_tls_private_key_file }}"
        dest: "{{ stack_dir }}/.state/edge-tls-staging/leaf.key"
        owner: root
        group: root
        mode: "0600"
      no_log: true

    - name: Validate and atomically install the customer edge TLS material
      ansible.builtin.command:
        argv:
          - python3
          - -I
          - "{{ stack_dir }}/scripts/edge-tls.py"
          - install
          - --leaf
          - "{{ stack_dir }}/.state/edge-tls-staging/leaf.pem"
          - --key
          - "{{ stack_dir }}/.state/edge-tls-staging/leaf.key"
          - --chain
          - "{{ stack_dir }}/.state/edge-tls-staging/chain.pem"
          - --certs-dir
          - "{{ stack_dir }}/certs"
          - --domain
          - "{{ aigw_domain }}"
          - --min-days-remaining
          - "{{ aigw_edge_tls_min_days_remaining }}"
          - --expect-key-owner
          - "0:0"
          - --expect-key-mode
          - "0600"
      register: aigw_edge_tls_install
      changed_when: "'edge-tls=changed' in aigw_edge_tls_install.stdout"
  always:
    - name: Remove the edge TLS staging boundary
      ansible.builtin.file:
        path: "{{ stack_dir }}/.state/edge-tls-staging"
        state: absent

# ── Mode customer-intermediate: stage the operator intermediate + key + chain ─
# The converge does NOT touch Vault (it holds no privileged token); it only
# stages the material into the root-only secrets/ dir so the operator ceremony
# (scripts/vault-pki-intermediate.sh import-intermediate) has Ansible-validated,
# no_log-transported inputs. Staging is gated on marker ABSENCE, exactly like the
# placeholder, so a post-ceremony converge (which sees the marker, after the
# ceremony shredded the key) never re-writes the intermediate private key.
- name: Stage the customer intermediate CA material for the import ceremony
  when: >-
    aigw_edge_tls_mode == 'customer-intermediate' and
    not (aigw_edge_tls_issued_marker.stat.exists | default(false))
  block:
    - name: Create the private secrets boundary
      ansible.builtin.file:
        path: "{{ stack_dir }}/secrets"
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Stage the intermediate certificate and complete chain
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ stack_dir }}/secrets/{{ item.dest }}"
        owner: root
        group: root
        mode: "0600"
      loop:
        - { src: "{{ aigw_edge_tls_intermediate_cert_file }}", dest: aigw-intermediate-import.pem }
        - { src: "{{ aigw_edge_tls_intermediate_chain_file }}", dest: aigw-intermediate-import-chain.pem }
      loop_control:
        label: "{{ item.dest }}"

    - name: Stage the intermediate CA private key without logging
      ansible.builtin.copy:
        src: "{{ aigw_edge_tls_intermediate_key_file }}"
        dest: "{{ stack_dir }}/secrets/aigw-intermediate-import.key"
        owner: root
        group: root
        mode: "0600"
      no_log: true

- name: Self-signed placeholder cert so traefik/open-webui start pre-bootstrap
  ansible.builtin.command:
    cmd: >
      openssl req -x509 -newkey rsa:2048 -nodes -days 7
      -subj "/CN=*.{{ aigw_domain }}"
      -addext "subjectAltName=DNS:*.{{ aigw_domain }},DNS:{{ aigw_domain }}"
      -addext "extendedKeyUsage=serverAuth"
      -keyout {{ stack_dir }}/certs/int.key -out {{ stack_dir }}/certs/int.crt
    creates: "{{ stack_dir }}/certs/int.crt"
  when: >-
    aigw_edge_tls_mode in ['lab', 'vault-intermediate', 'customer-intermediate'] and
    not (aigw_edge_tls_issued_marker.stat.exists | default(false))

- name: Placeholder CA bundle (replaced by the reviewed edge TLS ceremony)
  ansible.builtin.copy:
    src: "{{ stack_dir }}/certs/int.crt"
    dest: "{{ stack_dir }}/certs/ca.pem"
    remote_src: true
    force: false
    mode: "0644"
  when: >-
    aigw_edge_tls_mode in ['lab', 'vault-intermediate', 'customer-intermediate'] and
    not (aigw_edge_tls_issued_marker.stat.exists | default(false))

- name: Reconcile public edge certificate material permissions
  ansible.builtin.file:
    path: "{{ stack_dir }}/certs/{{ item }}"
    owner: root
    group: root
    mode: "0644"
    follow: false
  loop:
    - int.crt
    - ca.pem

- name: Reconcile the non-root Traefik private-key boundary
  ansible.builtin.file:
    path: "{{ stack_dir }}/certs/int.key"
    owner: root
    group: "65532"
    mode: "0640"
    follow: false

# Fail the converge BEFORE any compose activity if the installed production
# material is a placeholder, self-signed, expiring, or otherwise invalid. For
# vault-intermediate and customer-intermediate this activates only once the
# ceremony has written its marker; before that the placeholder is expected and
# this gate stays dormant.
- name: Prove installed production edge TLS material before starting the stack
  ansible.builtin.command:
    argv:
      - python3
      - -I
      - "{{ stack_dir }}/scripts/edge-tls.py"
      - validate-installed
      - --certs-dir
      - "{{ stack_dir }}/certs"
      - --domain
      - "{{ aigw_domain }}"
      - --min-days-remaining
      - "{{ aigw_edge_tls_min_days_remaining }}"
      - --reject-self-signed
  changed_when: false
  when: >-
    deployment_profile != 'rocky9-lab' and
    (aigw_edge_tls_mode == 'customer-supplied' or
     (aigw_edge_tls_mode in ['vault-intermediate', 'customer-intermediate'] and
      (aigw_edge_tls_issued_marker.stat.exists | default(false))))

# ── Cribl export CA bundle (separate trust anchor from the edge CA) ──────────
# alloy always mounts certs/cribl-ca.pem, so the bind source must always exist.
# When exporting to a real Cribl endpoint it is the operator's validated bundle;
# otherwise it is a copy of the edge ca.pem whose content is unused while the
# mock export runs insecure. The edge CA is never TRUSTED for Cribl either way:
# alloy only reads cribl-ca.pem when cribl_otlp_insecure is false.
- name: Install the external Cribl export CA bundle
  when: cribl_external_export_enabled | bool
  block:
    - name: Create the Cribl CA staging boundary
      ansible.builtin.file:
        path: "{{ stack_dir }}/.state/edge-tls-staging-cribl"
        state: "{{ item }}"
        owner: root
        group: root
        mode: "0700"
      loop:
        - absent
        - directory
      loop_control:
        label: "{{ item }}"

    - name: Stage the external Cribl CA bundle
      ansible.builtin.copy:
        src: "{{ cribl_otlp_ca_pem_file }}"
        dest: "{{ stack_dir }}/.state/edge-tls-staging-cribl/bundle.pem"
        owner: root
        group: root
        mode: "0600"

    - name: Validate the external Cribl CA bundle
      ansible.builtin.command:
        argv:
          - python3
          - -I
          - "{{ stack_dir }}/scripts/edge-tls.py"
          - validate-ca-bundle
          - --bundle
          - "{{ stack_dir }}/.state/edge-tls-staging-cribl/bundle.pem"
          - --min-days-remaining
          - "{{ aigw_edge_tls_min_days_remaining }}"
      changed_when: false

    - name: Install the validated external Cribl CA bundle
      ansible.builtin.copy:
        src: "{{ stack_dir }}/.state/edge-tls-staging-cribl/bundle.pem"
        dest: "{{ stack_dir }}/certs/cribl-ca.pem"
        remote_src: true
        owner: root
        group: root
        mode: "0644"
  always:
    - name: Remove the Cribl CA staging boundary
      ansible.builtin.file:
        path: "{{ stack_dir }}/.state/edge-tls-staging-cribl"
        state: absent

- name: Provide a placeholder Cribl CA bundle when no external endpoint is used
  ansible.builtin.copy:
    src: "{{ stack_dir }}/certs/ca.pem"
    dest: "{{ stack_dir }}/certs/cribl-ca.pem"
    remote_src: true
    force: true
    owner: root
    group: root
    mode: "0644"
  when: not (cribl_external_export_enabled | bool)

# Linux bind mounts retain the source inode selected at container creation.
# Ansible's safe atomic replacement can therefore install correct new bytes at
# the host path while a running container continues to see the old inode, and
# path-stable Compose configuration alone does not request recreation. Keyed
# per-service content digests make the affected service's Compose metadata
# change without exposing a reusable verifier for file-backed credentials.
- name: Inspect the bind-digest state path without following links
  ansible.builtin.stat:
    path: "{{ stack_dir }}/.state"
    follow: false
    get_checksum: false
  register: aigw_bind_digest_state_before

- name: Reject an unsafe pre-existing bind-digest state path
  ansible.builtin.assert:
    that:
      - aigw_bind_digest_state_before.stat.isdir | default(false)
      - not (aigw_bind_digest_state_before.stat.islnk | default(false))
      - aigw_bind_digest_state_before.stat.uid == 0
      - aigw_bind_digest_state_before.stat.gid == 0
      - aigw_bind_digest_state_before.stat.mode == '0700'
    quiet: true
    fail_msg: Existing bind-digest state path is not a private root-owned directory.
  when: aigw_bind_digest_state_before.stat.exists

- name: Create the private bind-digest state directory
  ansible.builtin.file:
    path: "{{ stack_dir }}/.state"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Inspect the stable bind-digest HMAC key without following links
  ansible.builtin.stat:
    path: "{{ stack_dir }}/.state/bind-digest.key"
    follow: false
    get_checksum: false
  register: aigw_bind_digest_key_before
  no_log: true

- name: Reject an unsafe pre-existing bind-digest HMAC key
  ansible.builtin.assert:
    that:
      - not (aigw_bind_digest_key_before.stat.islnk | default(false))
      - aigw_bind_digest_key_before.stat.isreg | default(false)
      - aigw_bind_digest_key_before.stat.uid == 0
      - aigw_bind_digest_key_before.stat.gid == 0
      - aigw_bind_digest_key_before.stat.mode == '0600'
      - (aigw_bind_digest_key_before.stat.nlink | int) == 1
      - (aigw_bind_digest_key_before.stat.size | int) == 64
    quiet: true
    fail_msg: Existing bind-digest HMAC key has an unsafe object/ownership/mode boundary.
  when: aigw_bind_digest_key_before.stat.exists
  no_log: true

- name: Create a stable root-only bind-digest HMAC key once
  ansible.builtin.command:
    argv:
      - python3
      - -I
      - -c
      - |
        import os
        import secrets
        import sys

        path = sys.argv[1]
        flags = os.O_WRONLY | os.O_CREAT | os.O_EXCL | getattr(os, "O_NOFOLLOW", 0)
        descriptor = os.open(path, flags, 0o600)
        try:
            payload = secrets.token_hex(32).encode("ascii")
            while payload:
                written = os.write(descriptor, payload)
                if written <= 0:
                    raise OSError("short write creating bind-digest key")
                payload = payload[written:]
            os.fsync(descriptor)
        finally:
            os.close(descriptor)
      - "{{ stack_dir }}/.state/bind-digest.key"
  when: not aigw_bind_digest_key_before.stat.exists
  no_log: true

- name: Reinspect the stable bind-digest HMAC key
  ansible.builtin.stat:
    path: "{{ stack_dir }}/.state/bind-digest.key"
    follow: false
    get_checksum: false
  register: aigw_bind_digest_key_after
  no_log: true

- name: Require the exact stable bind-digest key boundary
  ansible.builtin.assert:
    that:
      - aigw_bind_digest_key_after.stat.isreg | default(false)
      - not (aigw_bind_digest_key_after.stat.islnk | default(false))
      - aigw_bind_digest_key_after.stat.uid == 0
      - aigw_bind_digest_key_after.stat.gid == 0
      - aigw_bind_digest_key_after.stat.mode == '0600'
      - (aigw_bind_digest_key_after.stat.nlink | int) == 1
      - (aigw_bind_digest_key_after.stat.size | int) == 64
    quiet: true
    fail_msg: Bind-digest HMAC key creation did not produce the exact private boundary.
  no_log: true

- name: Read the stable bind-digest HMAC key for stdin-only use
  ansible.builtin.slurp:
    src: "{{ stack_dir }}/.state/bind-digest.key"
  register: aigw_bind_digest_key
  no_log: true

- name: Require a canonical high-entropy bind-digest HMAC key
  ansible.builtin.assert:
    that:
      - (aigw_bind_digest_key.content | b64decode) is match('^[0-9a-f]{64}$')
    quiet: true
    fail_msg: Bind-digest HMAC key content is malformed.
  no_log: true

- name: Read the deployed bind-source digest inventory
  ansible.builtin.slurp:
    src: "{{ stack_dir }}/bind-source-digest-inputs.json"
  register: aigw_bind_source_digest_manifest_raw

- name: Define exact per-service bind-source digest inputs
  ansible.builtin.set_fact:
    aigw_bind_source_digest_inputs: >-
      {{
        ((aigw_bind_source_digest_manifest_raw.content | b64decode | from_json).base)
        |
        combine(
          (aigw_bind_source_digest_manifest_raw.content | b64decode | from_json).platform_dns
          if (platform_authoritative_dns_enabled | bool) else {}
        )
        |
        combine(
          (aigw_bind_source_digest_manifest_raw.content | b64decode | from_json).lab_identity
          if (samba_lab_enabled | bool) else {}
        )
        |
        combine(
          (aigw_bind_source_digest_manifest_raw.content | b64decode | from_json).identity_ldap
          if (identity_ldap_enabled | bool) else {}
        )
      }}

- name: Compute keyed bind-source content digests without exposing secret verifiers
  ansible.builtin.command:
    argv:
      - python3
      - -I
      - "{{ stack_dir }}/scripts/compute-bind-source-digests.py"
      - "{{ stack_dir }}"
      - "{{ aigw_bind_source_digest_inputs | to_json }}"
  args:
    stdin: "{{ aigw_bind_digest_key.content | b64decode }}"
    stdin_add_newline: false
  register: aigw_bind_source_digests_raw
  changed_when: false
  no_log: true

- name: Record the exact bind-source recreation contract
  ansible.builtin.set_fact:
    aigw_bind_source_digests: "{{ aigw_bind_source_digests_raw.stdout | from_json }}"
  no_log: true

- name: Require one SHA-256 HMAC recreation marker per bind consumer
  ansible.builtin.assert:
    that:
      - aigw_bind_source_digests.keys() | sort == aigw_bind_source_digest_inputs.keys() | sort
      - aigw_bind_source_digests.values() | select('match', '^[0-9a-f]{64}$') | list | length == aigw_bind_source_digests | length
    quiet: true
    fail_msg: Per-service bind-source digest inventory is incomplete or malformed.
  no_log: true

- name: Template .env only after every bind-source digest is final
  ansible.builtin.template:
    src: env.j2
    dest: "{{ stack_dir }}/.env"
    mode: "0600"
  no_log: true

# The deployed-layout validator deliberately parses the root-only .env for
# Docker-root and identity consistency.  Run it only after that exact file and
# every secret-backed bind source exist, but still before any SELinux relabel or
# container creation can make the rendered Compose graph live.
- name: Validate render-only Compose and restricted build-network contracts
  ansible.builtin.command:
    argv:
      - "{{ stack_dir }}/scripts/validate-compose.sh"
  environment:
    # Non-secret pristine-host input for the identity callback check. Once
    # .env exists, the validator requires this value and DOMAIN to agree.
    AIGW_VALIDATION_DOMAIN: "{{ aigw_domain }}"
  changed_when: false

# Docker's SELinux integration assigns a unique MCS process/mount level when a
# container is created. Persist a read-only content *type* for only the exact
# host paths that the reviewed Compose graph bind-mounts. This keeps later
# Ansible atomic copies usable before Compose applies z/Z categories, and adds
# a second write denial beneath the read-only bind flag. Never match stack_dir
# wholesale: .env and non-mounted operational code are outside this boundary.
#
# restorecon is safe only before the project owns a container. Docker's private
# `Z` contract deliberately replaces the persistent s0 type with that
# container's unique MCS range. Running restorecon during a repeated converge
# would erase the range while Compose correctly retains an unchanged container.
# The presence check includes stopped/one-shot and non-project containers: a
# manually-created consumer can hold the same bind inode without our labels.
- name: Inventory every existing Docker container before persistent relabeling
  ansible.builtin.command:
    argv:
      - docker
      - --host
      - unix:///run/docker.sock
      - ps
      - -aq
  register: aigw_containers_before_selinux
  changed_when: false

- name: Define the exact SELinux read-only bind-source boundary
  ansible.builtin.set_fact:
    aigw_selinux_ro_bind_sources: >-
      {{
        [
          {'path': stack_dir ~ '/alloy/config.alloy', 'recursive': false},
          {'path': stack_dir ~ '/certs', 'recursive': true},
          {'path': stack_dir ~ '/cribl-mock/config.yaml', 'recursive': false},
          {'path': stack_dir ~ '/grafana/provisioning', 'recursive': true},
          {'path': stack_dir ~ '/keycloak/realms', 'recursive': true},
          {'path': stack_dir ~ '/litellm/config.yaml', 'recursive': false},
          {'path': stack_dir ~ '/loki/config.yml', 'recursive': false},
          {'path': stack_dir ~ '/postgres/init', 'recursive': true},
          {'path': stack_dir ~ '/prometheus/prometheus.yml', 'recursive': false},
          {'path': stack_dir ~ '/prometheus/rules.yml', 'recursive': false},
          {'path': stack_dir ~ '/secrets/redis_password', 'recursive': false},
          {'path': stack_dir ~ '/secrets/redis_users.acl', 'recursive': false},
          {'path': stack_dir ~ '/tempo/config.yml', 'recursive': false},
          {'path': stack_dir ~ '/traefik/dynamic-adm.yml', 'recursive': false},
          {'path': stack_dir ~ '/traefik/dynamic-int.yml', 'recursive': false},
          {'path': stack_dir ~ '/traefik/traefik-adm.yml', 'recursive': false},
          {'path': stack_dir ~ '/traefik/traefik-int.yml', 'recursive': false},
          {'path': stack_dir ~ '/vault/config.hcl', 'recursive': false}
        ]
        +
        ([
          {'path': stack_dir ~ '/services/lab-dns/Corefile', 'recursive': false},
          {'path': stack_dir ~ '/services/lab-dns/db.aigw.aegisgroup.ch', 'recursive': false},
          {'path': stack_dir ~ '/services/lab-dns/db.aigw.aegisgroup.ch.adm', 'recursive': false}
        ] if (platform_authoritative_dns_enabled | bool) else [])
        +
        ([
          {'path': stack_dir ~ '/secrets/samba_ad_admin_password', 'recursive': false},
          {'path': stack_dir ~ '/secrets/samba_ad_bind_password', 'recursive': false},
          {'path': stack_dir ~ '/secrets/samba_ad_tls_cert', 'recursive': false},
          {'path': stack_dir ~ '/secrets/samba_ad_tls_key', 'recursive': false},
          {'path': stack_dir ~ '/secrets/samba_user_lab-admin_password', 'recursive': false},
          {'path': stack_dir ~ '/secrets/samba_user_lab-developer_password', 'recursive': false},
          {'path': stack_dir ~ '/secrets/samba_user_lab-user_password', 'recursive': false}
        ] if (samba_lab_enabled | bool) else [])
        +
        ([
          {'path': stack_dir ~ '/keycloak/identity-ldap-ca.pem', 'recursive': false},
          {'path': stack_dir ~ '/secrets/identity_ldap_bind_password', 'recursive': false}
        ] if (identity_ldap_enabled | bool) else [])
      }}

- name: Persist exact read-only container file-context rules
  community.general.sefcontext:
    target: "{{ (item.path | regex_escape) ~ ('(/.*)?' if item.recursive else '') ~ '$' }}"
    setype: container_ro_file_t
    state: present
  loop: "{{ aigw_selinux_ro_bind_sources }}"
  loop_control:
    label: "{{ item.path }}"

- name: Apply the reviewed read-only container contexts before Compose
  ansible.builtin.command:
    argv:
      - restorecon
      - -RFv
      - "{{ item.path }}"
  loop: "{{ aigw_selinux_ro_bind_sources }}"
  loop_control:
    label: "{{ item.path }}"
  register: restored_bind_source_contexts
  changed_when: restored_bind_source_contexts.stdout | length > 0
  when: aigw_containers_before_selinux.stdout_lines | length == 0

- name: Read effective SELinux contexts on every bind-source root
  ansible.builtin.command:
    argv: [stat, -c, '%C', --, "{{ item.path }}"]
  loop: "{{ aigw_selinux_ro_bind_sources }}"
  loop_control:
    label: "{{ item.path }}"
  register: effective_bind_source_contexts
  changed_when: false
  when: aigw_containers_before_selinux.stdout_lines | length == 0

- name: Require the exact read-only container type before Compose relabels it
  ansible.builtin.assert:
    that:
      - item.stdout is match('^[^:]+:object_r:container_ro_file_t:s0$')
    quiet: true
    fail_msg: "Unsafe SELinux bind-source context on {{ item.item.path }}: {{ item.stdout }}"
  loop: "{{ effective_bind_source_contexts.results | default([]) }}"
  loop_control:
    label: "{{ item.item.path }}"
  when: aigw_containers_before_selinux.stdout_lines | length == 0

# DHI Alloy runs as uid 473 with no capabilities. It needs parent traversal to
# glob the Docker json-file tree, but it receives directory/log ACLs only for
# containers that Docker currently labels as this Compose project. Never leave
# a default ACL on the shared containers root: it would apply to an unrelated
# container created after this converge.

- name: Allow DHI Alloy to traverse the Docker state root
  ansible.posix.acl:
    path: "{{ docker_data_root }}"
    entity: "473"
    etype: user
    permissions: x
    state: present

- name: Allow DHI Alloy to enumerate the Docker containers root
  ansible.posix.acl:
    path: "{{ docker_data_root }}/containers"
    entity: "473"
    etype: user
    permissions: rx
    state: present

- name: Read existing inherited ACLs from the Docker containers root
  ansible.builtin.command:
    argv: [getfacl, -cpn, --, "{{ docker_data_root }}/containers"]
  register: aigw_docker_containers_root_acl
  changed_when: false

- name: Remove legacy inherited ACLs from the Docker containers root
  ansible.builtin.command:
    argv: [setfacl, -k, --, "{{ docker_data_root }}/containers"]
  when: "'default:' in aigw_docker_containers_root_acl.stdout"

- name: Install scoped Docker json-log ACL reconciliation timer
  ansible.builtin.copy:
    dest: /etc/systemd/system/aigw-docker-log-acl.timer
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Reconcile DHI Alloy Docker json-log ACLs after rotation

      [Timer]
      OnBootSec=15s
      OnUnitActiveSec=15s
      AccuracySec=1s
      Persistent=true
      Unit=aigw-docker-log-acl.service

      [Install]
      WantedBy=timers.target

- name: Enable the scoped Docker json-log ACL timer
  ansible.builtin.systemd_service:
    name: aigw-docker-log-acl.timer
    enabled: true
    state: started
    daemon_reload: true

- name: Reconcile the scoped Docker json-log ACL boundary immediately
  ansible.builtin.systemd_service:
    name: aigw-docker-log-acl.service
    state: started

- name: Gate stateful image upgrades on a recent encrypted backup
  ansible.builtin.command:
    argv:
      - "{{ stack_dir }}/scripts/pre-upgrade-check.sh"
  args:
    chdir: "{{ stack_dir }}"
  changed_when: false
  when: require_preupgrade_backup | bool

# Explicitly targeting a profiled Compose service activates it, so a stale
# container can survive a profile transition. Never trust its predictable
# name alone: prove the full Compose ownership tuple before removing exactly
# the two UI containers. Vault, its volumes, images, and API consumers remain
# untouched.
- name: Inspect stale Vault browser-surface containers when disabled
  community.docker.docker_container_info:
    docker_host: unix:///run/docker.sock
    tls: false
    validate_certs: false
    name: "{{ compose_project_name }}-{{ item }}-1"
  loop:
    - oauth2-proxy-vault
    - vault-ui-proxy
  register: aigw_disabled_vault_ui_inventory
  when: not (aigw_vault_ui_enabled | bool)

- name: Require the full Compose ownership tuple before stale UI removal
  ansible.builtin.assert:
    that:
      - >-
        not item.exists or
        (item.container.Id is match('^[0-9a-f]{64}$') and
         item.container.Name == ('/' ~ compose_project_name ~ '-' ~ item.item ~ '-1') and
         item.container.Config.Labels.get('com.docker.compose.project', '') == compose_project_name and
         item.container.Config.Labels.get('com.docker.compose.project.working_dir', '') == stack_dir and
         item.container.Config.Labels.get('com.docker.compose.service', '') == item.item and
         item.container.Config.Labels.get('com.docker.compose.oneoff', '') == 'False' and
         item.container.Config.Labels.get('com.docker.compose.container-number', '') == '1' and
         item.container.Config.Labels.get('com.docker.compose.config-hash', '') is match('^[0-9a-f]{64}$'))
    quiet: true
    fail_msg: >-
      Refusing to remove a predictable Vault UI container name without the
      complete AI Gateway Compose ownership tuple.
  loop: "{{ aigw_disabled_vault_ui_inventory.results | default([]) }}"
  loop_control:
    label: "{{ item.item | default('unknown') }}"
  when: not (aigw_vault_ui_enabled | bool)

- name: Detect an enabled-to-disabled Vault browser-surface transition
  ansible.builtin.set_fact:
    aigw_vault_ui_transitioning_off: >-
      {{ (aigw_disabled_vault_ui_inventory.results | default([]) |
          selectattr('exists', 'equalto', true) | list | length) > 0 }}
  when: not (aigw_vault_ui_enabled | bool)

# Remove the edge route before its backend. Recreating the single ADM edge
# loads both the disabled environment selector and the freshly-rendered
# dynamic config, while explicitly emptying ambient profiles prevents this
# targeted service operation from reactivating either optional UI service.
- name: Reconcile the ADM edge before removing stale Vault UI backends
  community.docker.docker_compose_v2:
    docker_host: unix:///run/docker.sock
    tls: false
    validate_certs: false
    project_src: "{{ stack_dir }}"
    project_name: "{{ compose_project_name }}"
    files: "{{ aigw_compose_files }}"
    profiles: "{{ aigw_compose_profiles }}"
    services: [traefik-adm]
    dependencies: false
    state: present
    build: never
    wait: true
    wait_timeout: 600
  environment:
    COMPOSE_PROFILES: ""
    VAULT_UI_ENABLED: "{{ aigw_vault_ui_enabled | bool | lower }}"
  when:
    - not (aigw_vault_ui_enabled | bool)
    - aigw_vault_ui_transitioning_off | default(false) | bool
  no_log: true

- name: Prove the disabled Vault host has no router before backend removal
  ansible.builtin.command:
    argv:
      - python3
      - -I
      - -c
      - |
        import socket
        import ssl
        import sys

        ca_file, address, hostname = sys.argv[1:]
        context = ssl.create_default_context(cafile=ca_file)
        with socket.create_connection((address, 443), timeout=5) as plain:
            with context.wrap_socket(plain, server_hostname=hostname) as tls:
                tls.sendall((
                    f"GET / HTTP/1.1\r\nHost: {hostname}\r\n"
                    "Connection: close\r\n\r\n"
                ).encode("ascii"))
                response = bytearray()
                while b"\r\n" not in response and len(response) <= 4096:
                    chunk = tls.recv(4096)
                    if not chunk:
                        break
                    response.extend(chunk)
        status_line = bytes(response).split(b"\r\n", 1)[0].decode("ascii", "strict")
        fields = status_line.split()
        if len(fields) < 2 or fields[1] != "404":
            raise SystemExit(f"Vault route remained active: {status_line!r}")
        print("404")
      - "{{ stack_dir }}/certs/ca.pem"
      - "{{ traefik_adm_admin_ip }}"
      - "vault.{{ aigw_domain }}"
  register: aigw_disabled_vault_ui_route_probe
  changed_when: false
  retries: 30
  delay: 1
  until: aigw_disabled_vault_ui_route_probe.rc == 0
  when:
    - not (aigw_vault_ui_enabled | bool)
    - aigw_vault_ui_transitioning_off | default(false) | bool

- name: Remove verified stale Vault browser-surface containers when disabled
  community.docker.docker_container:
    docker_host: unix:///run/docker.sock
    tls: false
    validate_certs: false
    # Address the exact inspected object, not a reusable predictable name. If
    # another Docker-root actor replaces it after validation, this removal is
    # harmless and the later absence proof fails closed on the replacement.
    name: "{{ item.container.Id }}"
    state: absent
    keep_volumes: true
  loop: "{{ aigw_disabled_vault_ui_inventory.results | default([]) }}"
  loop_control:
    label: "{{ item.item | default('unknown') }}"
  when:
    - not (aigw_vault_ui_enabled | bool)
    - item.exists | default(false)

- name: Read the effective Compose service set
  ansible.builtin.command:
    argv: >-
      {{
        ['docker', '--host', 'unix:///run/docker.sock', 'compose', '--project-name', compose_project_name]
        + aigw_compose_cli_overlay_args
        + ['config', '--services']
      }}
  args:
    chdir: "{{ stack_dir }}"
  environment:
    COMPOSE_PROFILES: ""
    VAULT_UI_ENABLED: "{{ aigw_vault_ui_enabled | bool | lower }}"
  register: effective_compose_services
  changed_when: false

- name: Read the desired volume initializer configuration hash
  ansible.builtin.command:
    argv: >-
      {{
        ['docker', '--host', 'unix:///run/docker.sock', 'compose', '--project-name', compose_project_name]
        + aigw_compose_cli_overlay_args
        + ['config', '--hash', 'volume-init']
      }}
  args:
    chdir: "{{ stack_dir }}"
  environment:
    COMPOSE_PROFILES: ""
    VAULT_UI_ENABLED: "{{ aigw_vault_ui_enabled | bool | lower }}"
  register: desired_volume_init_hash
  changed_when: false

- name: Derive the long-running service set without the one-shot initializer
  ansible.builtin.set_fact:
    compose_long_running_services: >-
      {{ effective_compose_services.stdout_lines
         | reject('equalto', 'volume-init') | list }}
    compose_volume_init_hash: "{{ desired_volume_init_hash.stdout.split() | last }}"

- name: Validate the one-shot / long-running service boundary
  ansible.builtin.assert:
    that:
      - effective_compose_services.stdout_lines | select('equalto', 'volume-init') | list | length == 1
      - compose_long_running_services | length == effective_compose_services.stdout_lines | length - 1
      - compose_long_running_services | length > 0
      - compose_volume_init_hash is regex('^[a-f0-9]{64}$')
    quiet: true

- name: Inspect the existing volume initializer
  community.docker.docker_container_info:
    docker_host: unix:///run/docker.sock
    tls: false
    validate_certs: false
    name: "{{ compose_project_name }}-volume-init-1"
  register: existing_volume_init

- name: Inspect the state-volume owner and mode contract
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - |
        import json
        import os
        import subprocess
        import sys

        project = sys.argv[1]
        expected = {
            "pg_data": (70, 70, 0o700),
            "openwebui_data": (65532, 65532, 0o700),
            "vault_data": (1000, 1000, 0o700),
            "vault_audit": (1000, 473, 0o2750),
            "alloy_data": (473, 473, 0o700),
            "prom_data": (65532, 65532, 0o700),
            "loki_data": (65532, 65532, 0o700),
            "tempo_data": (65532, 65532, 0o700),
            "grafana_data": (65532, 65532, 0o700),
        }
        drift = []
        for volume, contract in expected.items():
            result = subprocess.run(
                ["docker", "--host", "unix:///run/docker.sock", "volume", "inspect", f"{project}_{volume}"],
                stdin=subprocess.DEVNULL,
                stdout=subprocess.PIPE,
                stderr=subprocess.DEVNULL,
                text=True,
                check=False,
            )
            if result.returncode:
                drift.append(f"{volume}:missing")
                continue
            mountpoint = json.loads(result.stdout)[0]["Mountpoint"]
            try:
                metadata = os.stat(mountpoint)
            except OSError:
                drift.append(f"{volume}:unreadable")
                continue
            actual = (metadata.st_uid, metadata.st_gid, metadata.st_mode & 0o7777)
            if actual != contract:
                drift.append(f"{volume}:owner-or-mode")
        print("\n".join(drift))
      - "{{ compose_project_name }}"
  register: volume_init_permission_drift
  changed_when: false

# Compose restarts an exited one-shot whenever a broad `up` includes it through
# depends_on. Run it only when absent, failed, or its reviewed service
# definition or state-volume ownership contract changed; all subsequent Compose
# calls explicitly exclude it.
- name: Run the versioned volume initializer when required
  community.docker.docker_compose_v2:
    docker_host: unix:///run/docker.sock
    tls: false
    validate_certs: false
    project_src: "{{ stack_dir }}"
    project_name: "{{ compose_project_name }}"
    files: "{{ aigw_compose_files }}"
    profiles: "{{ aigw_compose_profiles }}"
    services: [volume-init]
    dependencies: false
    state: present
    build: never
  environment:
    COMPOSE_PROFILES: ""
    VAULT_UI_ENABLED: "{{ aigw_vault_ui_enabled | bool | lower }}"
  when: >-
    not existing_volume_init.exists or
    existing_volume_init.container.State.Status != 'exited' or
    existing_volume_init.container.State.ExitCode != 0 or
    existing_volume_init.container.Config.Labels['com.docker.compose.config-hash']
      | default('') != compose_volume_init_hash or
    volume_init_permission_drift.stdout_lines | length > 0
  no_log: true

- name: Wait for the volume initializer success contract
  community.docker.docker_container_info:
    docker_host: unix:///run/docker.sock
    tls: false
    validate_certs: false
    name: "{{ compose_project_name }}-volume-init-1"
  register: verified_volume_init
  retries: 30
  delay: 1
  until: >-
    verified_volume_init.exists and
    verified_volume_init.container.State.Status == 'exited' and
    verified_volume_init.container.State.ExitCode == 0 and
    verified_volume_init.container.Config.Labels['com.docker.compose.config-hash']
      | default('') == compose_volume_init_hash

- name: Prove the initializer repaired the state-volume owner and mode contract
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - |
        import json
        import os
        import subprocess
        import sys

        project = sys.argv[1]
        expected = {
            "pg_data": (70, 70, 0o700),
            "openwebui_data": (65532, 65532, 0o700),
            "vault_data": (1000, 1000, 0o700),
            "vault_audit": (1000, 473, 0o2750),
            "alloy_data": (473, 473, 0o700),
            "prom_data": (65532, 65532, 0o700),
            "loki_data": (65532, 65532, 0o700),
            "tempo_data": (65532, 65532, 0o700),
            "grafana_data": (65532, 65532, 0o700),
        }
        drift = []
        for volume, contract in expected.items():
            result = subprocess.run(
                ["docker", "--host", "unix:///run/docker.sock", "volume", "inspect", f"{project}_{volume}"],
                stdin=subprocess.DEVNULL,
                stdout=subprocess.PIPE,
                stderr=subprocess.DEVNULL,
                text=True,
                check=False,
            )
            if result.returncode:
                drift.append(f"{volume}:missing")
                continue
            mountpoint = json.loads(result.stdout)[0]["Mountpoint"]
            try:
                metadata = os.stat(mountpoint)
            except OSError:
                drift.append(f"{volume}:unreadable")
                continue
            actual = (metadata.st_uid, metadata.st_gid, metadata.st_mode & 0o7777)
            if actual != contract:
                drift.append(f"{volume}:owner-or-mode")
        print("\n".join(drift))
      - "{{ compose_project_name }}"
  register: verified_volume_init_permissions
  changed_when: false
  failed_when: verified_volume_init_permissions.stdout_lines | length > 0

- name: Start PostgreSQL before credential reconciliation
  community.docker.docker_compose_v2:
    docker_host: unix:///run/docker.sock
    tls: false
    validate_certs: false
    project_src: "{{ stack_dir }}"
    project_name: "{{ compose_project_name }}"
    files: "{{ aigw_compose_files }}"
    profiles: "{{ aigw_compose_profiles }}"
    services: [postgres]
    dependencies: false
    state: present
    build: policy
  environment:
    COMPOSE_PROFILES: ""
    VAULT_UI_ENABLED: "{{ aigw_vault_ui_enabled | bool | lower }}"
  no_log: true

# Raw `docker compose exec`-style tasks resolve the project from the deployed
# .env (COMPOSE_FILE) plus this process environment only. Modern Compose
# validates the complete project model even for exec and live-project queries,
# so emptying COMPOSE_PROFILES while the lab overlay is loaded leaves the
# overlay's keycloak depends_on pointing at the excluded profile-gated
# samba-ad service and rejects the whole project. Live-project exec/queries
# therefore carry the exact reviewed profile set; an empty ambient
# COMPOSE_PROFILES stays reserved for tasks that pass files and profiles
# explicitly (module `profiles:` or aigw_compose_cli_overlay_args) and for the
# Vault UI removal reconciliation, where profile-gated services must remain
# removable orphans.
- name: Wait for PostgreSQL local-socket readiness
  ansible.builtin.command:
    argv:
      - docker
      - --host
      - unix:///run/docker.sock
      - compose
      - exec
      - -T
      - postgres
      - pg_isready
      - --username
      - postgres
      - --dbname
      - postgres
  args:
    chdir: "{{ stack_dir }}"
  environment:
    COMPOSE_PROFILES: "{{ aigw_compose_profiles | join(',') }}"
    VAULT_UI_ENABLED: "{{ aigw_vault_ui_enabled | bool | lower }}"
  register: postgres_ready
  changed_when: false
  retries: 30
  delay: 2
  until: postgres_ready.rc == 0

# docker-entrypoint-initdb.d runs only for an empty PGDATA. Re-running this
# idempotent script over PostgreSQL's trusted local Unix socket is the
# deliberate existing-volume password-rotation path; no secret is placed in
# argv or task output.
- name: Reconcile PostgreSQL roles, passwords, databases, and CONNECT ACLs
  ansible.builtin.command:
    argv:
      - docker
      - --host
      - unix:///run/docker.sock
      - compose
      - exec
      - -T
      - postgres
      - /docker-entrypoint-initdb.d/01-init-databases.sh
  args:
    chdir: "{{ stack_dir }}"
  environment:
    COMPOSE_PROFILES: "{{ aigw_compose_profiles | join(',') }}"
    VAULT_UI_ENABLED: "{{ aigw_vault_ui_enabled | bool | lower }}"
  register: postgres_reconcile
  changed_when: "'AIGW_POSTGRES_CHANGED' in postgres_reconcile.stdout"
  no_log: true

- name: Read the exact PostgreSQL service-role security matrix
  ansible.builtin.command:
    argv:
      - docker
      - --host
      - unix:///run/docker.sock
      - compose
      - exec
      - -T
      - postgres
      - psql
      - --username
      - postgres
      - --dbname
      - postgres
      - --tuples-only
      - --no-align
      - --command
      - |
        SELECT role_name || '|' || db_name || '|' ||
               CASE WHEN has_database_privilege(role_name, db_name, 'CONNECT')
                    THEN 'true' ELSE 'false' END
          FROM unnest(ARRAY['keycloak','litellm','rotator']) AS role_name
         CROSS JOIN unnest(ARRAY['keycloak','litellm','rotator','postgres']) AS db_name
         ORDER BY role_name, db_name;
        SELECT 'postgres|postgres|' ||
               CASE WHEN has_database_privilege('postgres', 'postgres', 'CONNECT')
                    THEN 'true' ELSE 'false' END;
        SELECT 'owner|' || datname || '|' || pg_get_userbyid(datdba)
          FROM pg_database
         WHERE datname IN ('keycloak','litellm','rotator')
         ORDER BY datname;
        SELECT 'role|' || rolname || '|' ||
               CASE WHEN rolcanlogin AND NOT rolsuper AND NOT rolcreatedb AND
                         NOT rolcreaterole AND NOT rolinherit AND NOT rolreplication AND
                         NOT rolbypassrls AND rolconnlimit = -1 AND rolconfig IS NULL AND
                         (rolvaliduntil IS NULL OR rolvaliduntil = 'infinity'::timestamptz)
                    THEN 'true' ELSE 'false' END
          FROM pg_roles
         WHERE rolname IN ('keycloak','litellm','rotator')
         ORDER BY rolname;
        SELECT 'membership|' || count(*)
          FROM pg_auth_members membership
          JOIN pg_roles granted_role ON granted_role.oid = membership.roleid
          JOIN pg_roles member_role ON member_role.oid = membership.member
         WHERE granted_role.rolname IN ('keycloak','litellm','rotator')
            OR member_role.rolname IN ('keycloak','litellm','rotator');
  args:
    chdir: "{{ stack_dir }}"
  environment:
    COMPOSE_PROFILES: "{{ aigw_compose_profiles | join(',') }}"
    VAULT_UI_ENABLED: "{{ aigw_vault_ui_enabled | bool | lower }}"
  register: postgres_connect_matrix
  changed_when: false

- name: Assert the exact PostgreSQL service-role security matrix
  ansible.builtin.assert:
    that:
      - postgres_connect_matrix.stdout_lines | sort == expected_postgres_connect_matrix | sort
    quiet: true
    fail_msg: >-
      PostgreSQL service-role drift: roles must have exact least-privilege
      attributes, no memberships, exact database ownership, and CONNECT only
      to their own database; postgres alone retains maintenance access.
  vars:
    expected_postgres_connect_matrix:
      - keycloak|keycloak|true
      - keycloak|litellm|false
      - keycloak|postgres|false
      - keycloak|rotator|false
      - litellm|keycloak|false
      - litellm|litellm|true
      - litellm|postgres|false
      - litellm|rotator|false
      - postgres|postgres|true
      - rotator|keycloak|false
      - rotator|litellm|false
      - rotator|postgres|false
      - rotator|rotator|true
      - owner|keycloak|keycloak
      - owner|litellm|litellm
      - owner|rotator|rotator
      - role|keycloak|true
      - role|litellm|true
      - role|rotator|true
      - membership|0

- name: Create private deployment-state directory
  ansible.builtin.file:
    path: "{{ stack_dir }}/.state"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Prove offline seed parity and local pins before any custom build
  ansible.builtin.command:
    argv:
      - python3
      - -I
      - /usr/local/sbin/aigw-load-offline-image-seed
      - verify-current
      - "{{ offline_image_seed_remote_path }}"
      - "{{ offline_image_seed_manifest_remote_path }}"
      - "{{ offline_image_seed_manifest_sha256 }}"
      - "{{ stack_dir }}"
  register: offline_image_seed_current_verification
  changed_when: false
  failed_when: >-
    offline_image_seed_current_verification.rc != 0
    or offline_image_seed_current_verification.stdout
       != 'VERIFIED ' ~ offline_image_seed_manifest_sha256
  when: offline_image_seed_enabled | bool

# `docker compose up --build` asks BuildKit to consider every local context on
# every converge. Apart from making an unchanged run report build activity, a
# changed shared probe context can update several image tags at once and make
# the subsequent `up` recreate stateful services such as Vault. Vault then
# correctly starts sealed. Plan builds by a stable digest of each service's
# effective build definition and deployed context instead; an absent image is
# also rebuilt even when its prior digest is still recorded.
- name: Render effective Compose model for the custom-image build planner
  ansible.builtin.command:
    argv: >-
      {{
        ['docker', '--host', 'unix:///run/docker.sock', 'compose', '--project-name', compose_project_name]
        + aigw_compose_cli_overlay_args
        + ['config', '--format', 'json']
      }}
  args:
    chdir: "{{ stack_dir }}"
  environment:
    COMPOSE_PROFILES: ""
    VAULT_UI_ENABLED: "{{ aigw_vault_ui_enabled | bool | lower }}"
  register: effective_compose_model
  changed_when: false
  no_log: true

- name: Prove the effective Compose model keeps resolver planes separate
  ansible.builtin.command:
    argv:
      - python3
      - -I
      - -c
      - |
        import json
        import sys

        model = json.load(sys.stdin)["services"]
        internal = json.loads(sys.argv[1])
        egress = json.loads(sys.argv[2])
        internal_services = set(json.loads(sys.argv[3]))
        isolated_services = set(json.loads(sys.argv[4]))
        errors = []
        for name in internal_services:
            if model.get(name, {}).get("dns") != internal:
                errors.append(f"{name}:internal-resolver-drift")
        for name in isolated_services:
            if model.get(name, {}).get("dns") != ["127.0.0.1"]:
                errors.append(f"{name}:service-discovery-only-resolver-drift")
        if model.get("envoy-egress", {}).get("dns") != egress:
            errors.append("envoy-egress:egress-resolver-drift")
        if internal_services & isolated_services:
            errors.append("internal-and-isolated-service-sets-overlap")
        if set(internal) & set(egress):
            errors.append("resolver-planes-overlap")
        if errors:
            raise SystemExit(";".join(errors))
      - "{{ internal_dns_servers | to_json }}"
      - "{{ egress_dns_servers | to_json }}"
      - >-
        {{ [
          'traefik-int', 'traefik-adm', 'alloy', 'cribl-mock'
        ] | to_json }}
      - >-
        {{ ([
          'oauth2-proxy', 'oauth2-proxy-grafana',
          'oauth2-proxy-prometheus', 'litellm',
          'open-webui', 'keycloak', 'dev-portal', 'admin-portal',
          'key-rotator', 'vault', 'postgres', 'redis',
          'prometheus', 'node-exporter', 'loki', 'tempo', 'grafana'
        ] + (['oauth2-proxy-vault', 'vault-ui-proxy']
             if (aigw_vault_ui_enabled | bool) else [])) | to_json }}
    stdin: "{{ effective_compose_model.stdout }}"
    stdin_add_newline: false
  changed_when: false
  no_log: true

- name: Plan only missing or build-input-changed custom images
  ansible.builtin.command:
    argv:
      - python3
      - -I
      - "{{ stack_dir }}/scripts/plan-compose-builds.py"
      - "{{ stack_dir }}"
      - "{{ stack_dir }}/.state/compose-build-inputs.json"
      - "{{ compose_project_name }}"
  args:
    chdir: "{{ stack_dir }}"
    stdin: "{{ effective_compose_model.stdout }}"
    stdin_add_newline: false
  register: compose_build_plan_raw
  changed_when: (compose_build_plan_raw.stdout | from_json).services | length > 0
  no_log: true

- name: Record custom-image build plan
  ansible.builtin.set_fact:
    compose_build_plan: "{{ compose_build_plan_raw.stdout | from_json }}"
  no_log: true

# The containerd image store can discard the prior image record as soon as a
# stable tag moves and Compose removes the old container. Resolve the exact
# running container image—not merely that mutable tag—then retain one verified
# content-addressed generation and its root-only manifest before the first build
# mutates Docker. A partial multi-service attempt never moves a committed tag.
- name: Preserve exact running images for planned build rollback
  ansible.builtin.command:
    argv:
      - python3
      - -I
      - "{{ stack_dir }}/scripts/preserve-compose-rollbacks.py"
      - "{{ stack_dir }}"
      - "{{ compose_project_name }}"
  args:
    chdir: "{{ stack_dir }}"
    stdin: "{{ compose_build_plan | to_json }}"
    stdin_add_newline: false
  register: compose_rollback_preservation
  changed_when: true
  when: compose_build_plan.services | length > 0

- name: Inspect the pre-build rollback manifest boundary
  ansible.builtin.stat:
    path: "{{ stack_dir }}/.state/compose-build-rollbacks.json"
    follow: false
  register: compose_rollback_manifest
  when: compose_build_plan.services | length > 0

- name: Require a private single-link pre-build rollback manifest
  ansible.builtin.assert:
    that:
      - compose_rollback_manifest.stat.isreg | default(false)
      - not (compose_rollback_manifest.stat.islnk | default(false))
      - (compose_rollback_manifest.stat.nlink | default(0) | int) == 1
      - compose_rollback_manifest.stat.uid == 0
      - compose_rollback_manifest.stat.gid == 0
      - compose_rollback_manifest.stat.mode == '0600'
      - (compose_rollback_preservation.stdout | from_json).schema == 2
      - (compose_rollback_preservation.stdout | from_json).project == compose_project_name
      - >-
        ((compose_rollback_preservation.stdout | from_json).updated_services |
         sort) == (compose_build_plan.services | sort)
      - >-
        (compose_build_plan.services |
         difference((compose_rollback_preservation.stdout | from_json).services.keys() | list) |
         length) == 0
    quiet: true
    fail_msg: >-
      Planned custom images must have an exact root-only rollback record before
      any mutable build tag is replaced.
  when: compose_build_plan.services | length > 0

- name: Build only missing or build-input-changed custom images
  ansible.builtin.command:
    argv: >-
      {{
        ['docker', '--host', 'unix:///run/docker.sock', 'compose', '--project-name', compose_project_name]
        + aigw_compose_cli_overlay_args
        + ['build', '--pull=false']
        + compose_build_plan.services
      }}
  args:
    chdir: "{{ stack_dir }}"
  environment:
    COMPOSE_PROFILES: ""
    VAULT_UI_ENABLED: "{{ aigw_vault_ui_enabled | bool | lower }}"
  when: compose_build_plan.services | length > 0
  no_log: true

- name: Inventory the pinned CoreDNS runtime plugins
  ansible.builtin.command:
    argv:
      - docker
      - --host
      - unix:///run/docker.sock
      - run
      - --rm
      - --network
      - none
      - --read-only
      - --cap-drop
      - ALL
      - ai-gateway/lab-dns:1.14.4
      - -plugins
  register: aigw_coredns_plugins
  changed_when: false
  when: platform_authoritative_dns_enabled | bool

- name: Require every plugin used by authoritative split DNS
  ansible.builtin.assert:
    that:
      - item in aigw_coredns_plugins.stdout_lines
    quiet: true
    fail_msg: "Pinned CoreDNS runtime is missing required plugin {{ item }}."
  loop: [cache, errors, file, health, template, view]
  when: platform_authoritative_dns_enabled | bool

# Capture the tag's immutable image ID after builds. This also detects a later
# manual retag or deletion even when source inputs have not changed.
- name: Finalize custom-image manifest with built image IDs
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - |
        import json
        import subprocess
        import sys

        manifest = json.load(sys.stdin)
        for name, record in manifest.get("services", {}).items():
            try:
                output = subprocess.check_output(
                    ["docker", "--host", "unix:///run/docker.sock", "image", "inspect", record["image"]],
                    stdin=subprocess.DEVNULL,
                    stderr=subprocess.DEVNULL,
                    text=True,
                )
                record["image_id"] = json.loads(output)[0]["Id"]
            except subprocess.CalledProcessError as exc:
                raise SystemExit(
                    f"built image is missing after Compose build: {name}"
                ) from exc
        print(json.dumps(manifest, sort_keys=True))
  args:
    stdin: "{{ compose_build_plan.manifest | to_json }}"
    stdin_add_newline: false
  register: finalized_compose_build_manifest
  changed_when: false
  no_log: true

# A previous fresh realm import omitted explicit realm-role scope mappings.
# The repair remains an inventory-bound one-time action: its temporary
# Keycloak master-realm client is powerful until interactive bootstrap deletes
# it, so it must never become a routine privileged converge.
- name: Require explicit acknowledgement for pre-bootstrap OIDC scope reconciliation
  ansible.builtin.assert:
    that:
      - aigw_prebootstrap_oidc_scope_reconciliation | bool
      - aigw_prebootstrap_oidc_scope_reconciliation_ack == 'RECONCILE_PREBOOTSTRAP_OIDC_ROLE_SCOPES'
    quiet: true
    fail_msg: >-
      Pre-bootstrap OIDC role-scope reconciliation requires the exact
      RECONCILE_PREBOOTSTRAP_OIDC_ROLE_SCOPES inventory acknowledgement.
  when: aigw_prebootstrap_oidc_scope_reconciliation | bool

- name: Deploy stack without implicitly rebuilding custom images
  community.docker.docker_compose_v2:
    docker_host: unix:///run/docker.sock
    tls: false
    validate_certs: false
    project_src: "{{ stack_dir }}"
    project_name: "{{ compose_project_name }}"
    files: "{{ aigw_compose_files }}"
    profiles: "{{ aigw_compose_profiles }}"
    services: "{{ compose_long_running_services }}"
    dependencies: false
    state: present
    # Builds are content-addressed and completed above. Keeping `up` in
    # --no-build mode prevents an unchanged converge from retagging images or
    # recreating/resealing Vault as a side effect of unrelated build contexts.
    build: never
    remove_orphans: true
  environment:
    COMPOSE_PROFILES: ""
    VAULT_UI_ENABLED: "{{ aigw_vault_ui_enabled | bool | lower }}"
  no_log: true

# A successful image build alone is not proof that its service ever deployed.
# Keep the explicit first-build retry record through `compose up`, so a failed
# initial deployment can retry without destructive state edits. Once Compose
# has created the runtime graph, persist the receipt and retire that proof; a
# later missing service container is then fail-closed. The backup tooling
# already excludes `.state` from stateful archives.
- name: Persist deployed custom-image build-input manifest
  ansible.builtin.copy:
    content: "{{ finalized_compose_build_manifest.stdout | from_json | to_nice_json }}\n"
    dest: "{{ stack_dir }}/.state/compose-build-inputs.json"
    owner: root
    group: root
    mode: "0600"

- name: Retire deployed first-build rollback retry proofs
  ansible.builtin.command:
    argv:
      - python3
      - -I
      - "{{ stack_dir }}/scripts/preserve-compose-rollbacks.py"
      - --retire-first-builds
      - "{{ stack_dir }}"
      - "{{ compose_project_name }}"
  args:
    chdir: "{{ stack_dir }}"
    stdin: "{{ finalized_compose_build_manifest.stdout }}"
    stdin_add_newline: false
  register: retired_first_build_rollback_proofs
  changed_when: >-
    (retired_first_build_rollback_proofs.stdout |
     from_json).retired_services | length > 0

- name: Reconcile scoped ACLs for newly-created Docker json logs
  ansible.builtin.systemd_service:
    name: aigw-docker-log-acl.service
    state: started

- name: Inspect Vault immediately after Compose start
  community.docker.docker_container_info:
    docker_host: unix:///run/docker.sock
    tls: false
    validate_certs: false
    name: "{{ compose_project_name }}-vault-1"
  register: vault_container_startup

- name: Refuse a Vault restart loop before the bootstrap phase
  ansible.builtin.assert:
    that:
      - vault_container_startup.exists
      - vault_container_startup.container.State.Running | bool
      - not (vault_container_startup.container.State.Restarting | bool)
      - vault_container_startup.container.RestartCount | int == 0
    quiet: true
    fail_msg: >-
      Vault failed its hardened startup contract before initialization. Its
      reviewed config must be mounted read-only and the container must remain
      running without a restart loop.

- name: Read effective identity and capabilities of the Vault server process
  ansible.builtin.command:
    argv:
      - awk
      - /^(Uid|CapPrm|CapEff|CapBnd|NoNewPrivs):/
      - "/proc/{{ vault_container_startup.container.State.Pid }}/status"
  register: vault_process_security
  changed_when: false

- name: Vault runs non-root and drops IPC_LOCK after locking memory
  ansible.builtin.assert:
    that:
      - vault_process_security.stdout is search('Uid:\\s+1000\\s+1000\\s+1000\\s+1000')
      - vault_process_security.stdout is search('CapPrm:\\s+0000000000000000')
      - vault_process_security.stdout is search('CapEff:\\s+0000000000000000')
      - vault_process_security.stdout is search('CapBnd:\\s+0000000000004000')
      - vault_process_security.stdout is search('NoNewPrivs:\\s+1')
    quiet: true
    fail_msg: >-
      The DHI Vault server must run as uid 1000 under no-new-privileges, have
      only IPC_LOCK in its bounding set, and drop all permitted/effective
      capabilities after locking memory.

- name: Inspect the direct Vault UI proxy runtime after Compose start
  community.docker.docker_container_info:
    docker_host: unix:///run/docker.sock
    tls: false
    validate_certs: false
    name: "{{ compose_project_name }}-vault-ui-proxy-1"
  register: vault_ui_proxy_startup
  retries: 15
  delay: 2
  until: >-
    vault_ui_proxy_startup.exists and
    (vault_ui_proxy_startup.container.State.Running | bool)
  when: aigw_vault_ui_enabled | bool

- name: Vault UI proxy directly replaces the dormant DHI Vault entrypoint
  ansible.builtin.assert:
    that:
      - vault_ui_proxy_startup.container.Config.User == '1000:1000'
      - vault_ui_proxy_startup.container.Path == '/usr/local/bin/vault-ui-proxy'
      - vault_ui_proxy_startup.container.Args | length == 0
      - vault_ui_proxy_startup.container.State.Pid | int > 0
    quiet: true
    fail_msg: >-
      The Vault UI companion must run the reviewed proxy directly as uid 1000;
      the DHI base Vault binary and its tini entrypoint must remain dormant.
  when: aigw_vault_ui_enabled | bool

- name: Read the effective Vault UI proxy identity and executable
  ansible.builtin.shell:
    cmd: |
      set -eu
      awk '/^(Uid|CapPrm|CapEff|CapBnd|NoNewPrivs):/' "/proc/{{ vault_ui_proxy_startup.container.State.Pid }}/status"
      readlink "/proc/{{ vault_ui_proxy_startup.container.State.Pid }}/exe"
    executable: /bin/bash
  register: vault_ui_proxy_process_security
  changed_when: false
  when: aigw_vault_ui_enabled | bool

- name: Vault UI proxy is the non-root capability-free PID 1 executable
  ansible.builtin.assert:
    that:
      - vault_ui_proxy_process_security.stdout is search('Uid:\\s+1000\\s+1000\\s+1000\\s+1000')
      - vault_ui_proxy_process_security.stdout is search('CapPrm:\\s+0000000000000000')
      - vault_ui_proxy_process_security.stdout is search('CapEff:\\s+0000000000000000')
      - vault_ui_proxy_process_security.stdout is search('CapBnd:\\s+0000000000000000')
      - vault_ui_proxy_process_security.stdout is search('NoNewPrivs:\\s+1')
      - vault_ui_proxy_process_security.stdout_lines | last == '/usr/local/bin/vault-ui-proxy'
    quiet: true
    fail_msg: >-
      The Vault UI proxy must be the direct uid-1000 executable with no Linux
      capabilities and no-new-privileges enabled.
  when: aigw_vault_ui_enabled | bool

- name: Prove the Vault UI proxy serves the reviewed UI and reaches only Vault
  ansible.builtin.command:
    argv:
      - docker
      - --host
      - unix:///run/docker.sock
      - exec
      - "{{ compose_project_name }}-vault-ui-proxy-1"
      - /usr/local/bin/vault-ui-proxy
      - check
  register: vault_ui_proxy_contract
  changed_when: false
  # Compose permits a 15s start period plus twelve 10s health intervals and
  # bounded probe time. Keep this acceptance window strictly larger.
  retries: 42
  delay: 5
  until: vault_ui_proxy_contract.rc == 0
  when: aigw_vault_ui_enabled | bool

- name: Inspect DHI Alloy after Compose start
  community.docker.docker_container_info:
    docker_host: unix:///run/docker.sock
    tls: false
    validate_certs: false
    name: "{{ compose_project_name }}-alloy-1"
  register: alloy_container_startup
  retries: 15
  delay: 2
  until: >-
    alloy_container_startup.exists and
    (alloy_container_startup.container.State.Running | bool)

- name: Read effective Alloy identity and capabilities
  ansible.builtin.command:
    argv:
      - awk
      - /^(Uid|Gid|CapEff):/
      - "/proc/{{ alloy_container_startup.container.State.Pid }}/status"
  register: alloy_process_security
  changed_when: false
  retries: 15
  delay: 2
  until: alloy_process_security.rc == 0

- name: Alloy has only owner/group DAC access and no effective capabilities
  ansible.builtin.assert:
    that:
      - alloy_process_security.stdout is search('Uid:\\s+473\\s+473\\s+473\\s+473')
      - alloy_process_security.stdout is search('Gid:\\s+473\\s+473\\s+473\\s+473')
      - alloy_process_security.stdout is search('CapEff:\\s+0000000000000000')
    quiet: true
    fail_msg: >-
      DHI Alloy must run uid/gid 473 with CapEff=0. Host ACLs provide only
      read/traverse access to Docker json logs.

- name: Prove Alloy can read mounted logs and write only its state volume
  ansible.builtin.command:
    argv:
      - docker
      - --host
      - unix:///run/docker.sock
      - run
      - --rm
      - --network
      - none
      - --user
      - 473:473
      - --cap-drop
      - ALL
      - --security-opt
      - no-new-privileges:true
      # This bounded verifier exercises the same Docker-log path as Alloy.
      # Never relabel Docker's runtime-owned state to a container content type.
      - --security-opt
      - label=disable
      - --read-only
      - --entrypoint
      - /bin/sh
      - --volume
      - "{{ docker_data_root }}/containers:/logs:ro"
      - --volume
      - "{{ compose_project_name }}_alloy_data:/state"
      - --volume
      - "{{ compose_project_name }}_vault_audit:/audit:ro"
      - dhi.io/busybox:1.38.0-alpine@sha256:69a25015bda2c7dfac5d3a88990b56bc0f38539b313c448b171edef1497193ad
      - -ec
      - >-
        test -r /audit;
        test -w /state;
        set -- /logs/*/*-json.log*;
        test -e "$1";
        head -c 0 "$1";
        for sensitive in /logs/*/config.v2.json /logs/*/hostconfig.json; do
          test -e "$sensitive" || continue;
          if head -c 0 "$sensitive" >/dev/null 2>&1; then exit 1; fi;
        done
  changed_when: false

- name: Inspect the authenticated-restore marker
  ansible.builtin.stat:
    path: "{{ stack_dir }}/.state/restore-required-unseal"
    follow: false
  register: restore_required_unseal_marker

- name: Read the authenticated-restore marker
  ansible.builtin.slurp:
    src: "{{ stack_dir }}/.state/restore-required-unseal"
  register: restore_required_unseal_content
  when: restore_required_unseal_marker.stat.exists | default(false)

- name: Require a root-only authenticated-restore marker
  ansible.builtin.assert:
    that:
      - restore_required_unseal_marker.stat.isreg | default(false)
      - not (restore_required_unseal_marker.stat.islnk | default(false))
      - restore_required_unseal_marker.stat.uid == 0
      - restore_required_unseal_marker.stat.gid == 0
      - restore_required_unseal_marker.stat.mode == '0600'
      - (restore_required_unseal_marker.stat.nlink | default(1) | int) == 1
      - (restore_required_unseal_content.content | b64decode | trim) is match('^[0-9a-f]{64}$')
    quiet: true
    fail_msg: >-
      The authenticated-restore marker must be a root:root 0600 regular
      single-link file containing only the independently authenticated backup SHA-256.
  when: restore_required_unseal_marker.stat.exists | default(false)

- name: Read public Vault initialization and seal state before automatic unseal
  ansible.builtin.command:
    argv:
      - docker
      - --host
      - unix:///run/docker.sock
      - compose
      - exec
      - -T
      - vault
      - vault
      - status
      - -address=http://127.0.0.1:8200
      - -format=json
  args:
    chdir: "{{ stack_dir }}"
  environment:
    # Live-project exec: Compose v5+ validates the full model, so the real
    # profile set must be active or lab overlays render the project invalid.
    COMPOSE_PROFILES: "{{ aigw_compose_profiles | join(',') }}"
    VAULT_UI_ENABLED: "{{ aigw_vault_ui_enabled | bool | lower }}"
  register: vault_status_before_unseal
  changed_when: false
  failed_when: vault_status_before_unseal.rc not in [0, 2]

- name: Require the reviewed 1-of-1 Shamir seal contract after initialization
  ansible.builtin.assert:
    that:
      - (vault_status_before_unseal.stdout | from_json).type == 'shamir'
      - (vault_status_before_unseal.stdout | from_json).t | int == 1
      - (vault_status_before_unseal.stdout | from_json).n | int == 1
    quiet: true
    fail_msg: >-
      This deployment supports exactly one Shamir unseal share with threshold
      one (Vault status t=1, n=1). The initialized Vault reports another seal
      contract, so a singular vault_unseal_key cannot safely unseal it.
  when: (vault_status_before_unseal.stdout | from_json).initialized | bool

# The 1-of-1 Shamir key is deliberately controller-owned. It may be present
# only as an inventory secret (normally an Ansible-Vault/SOPS overlay), and is
# never rendered into .env, copied to the target, placed in argv/environment,
# or registered without no_log. A genuinely fresh Vault is the sole exception:
# it has no valid key until the separately reviewed initialization ceremony.
- name: Require the encrypted controller Vault unseal key after initialization
  ansible.builtin.assert:
    that:
      - vault_unseal_key is defined
      - vault_unseal_key is vault_encrypted
      - vault_unseal_key is string
      - vault_unseal_key | length == 44
      - vault_unseal_key is match('^[A-Za-z0-9+/]{43}=$')
    quiet: true
    fail_msg: >-
      An initialized Vault requires vault_unseal_key from the encrypted
      controller inventory. Supply its existing 1-of-1 Shamir unseal key;
      never generate a replacement key or place it in plaintext host vars.
  when: (vault_status_before_unseal.stdout | from_json).initialized | bool
  no_log: true

- name: Automatically unseal initialized Vault from controller inventory
  ansible.builtin.command:
    argv:
      - "{{ stack_dir }}/scripts/vault-unseal.sh"
    stdin: "{{ vault_unseal_key }}"
    stdin_add_newline: false
  register: vault_automatic_unseal
  changed_when: true
  when:
    - (vault_status_before_unseal.stdout | from_json).initialized | bool
    - (vault_status_before_unseal.stdout | from_json).sealed | bool
  no_log: true

- name: Re-read public Vault state after the automatic-unseal decision
  ansible.builtin.command:
    argv:
      - docker
      - --host
      - unix:///run/docker.sock
      - compose
      - exec
      - -T
      - vault
      - vault
      - status
      - -address=http://127.0.0.1:8200
      - -format=json
  args:
    chdir: "{{ stack_dir }}"
  environment:
    COMPOSE_PROFILES: "{{ aigw_compose_profiles | join(',') }}"
    VAULT_UI_ENABLED: "{{ aigw_vault_ui_enabled | bool | lower }}"
  register: vault_public_status
  changed_when: false
  failed_when: vault_public_status.rc not in [0, 2]
  no_log: true

- name: Require automatic unseal for every initialized Vault deployment
  ansible.builtin.assert:
    that:
      - (vault_public_status.stdout | from_json).initialized | bool
      - not ((vault_public_status.stdout | from_json).sealed | bool)
      - vault_public_status.rc == 0
    quiet: true
    fail_msg: >-
      Vault remained sealed after the controller supplied its encrypted
      1-of-1 unseal key. Refusing to complete a partially functional deploy.
  when: (vault_status_before_unseal.stdout | from_json).initialized | bool
  no_log: true

- name: Prove a fresh deployment was not initialized implicitly
  ansible.builtin.assert:
    that:
      - not ((vault_public_status.stdout | from_json).initialized | bool)
      - (vault_public_status.stdout | from_json).sealed | bool
    quiet: true
    fail_msg: >-
      Vault initialization state changed during the automatic-unseal phase.
      Initialization is a separate explicit ceremony and must never be
      inferred or made destructive by a normal converge.
  when: not ((vault_status_before_unseal.stdout | from_json).initialized | bool)

# A genuinely fresh Vault remains uninitialized/sealed on first converge so
# the operator can execute the reviewed bootstrap ceremony. Every initialized
# deployment must pass the strict health probe after the automatic unseal.
- name: Probe strict Vault readiness after the automatic-unseal decision
  ansible.builtin.command:
    argv:
      - docker
      - --host
      - unix:///run/docker.sock
      - compose
      - exec
      - -T
      - vault
      - /usr/local/bin/aigw-health-probe
      - http
      - --url
      - http://127.0.0.1:8200/v1/sys/health?standbyok=true
  args:
    chdir: "{{ stack_dir }}"
  environment:
    # Live-project exec: Compose v5+ validates the full model, so the real
    # profile set must be active or lab overlays render the project invalid.
    COMPOSE_PROFILES: "{{ aigw_compose_profiles | join(',') }}"
    VAULT_UI_ENABLED: "{{ aigw_vault_ui_enabled | bool | lower }}"
  register: vault_strict_readiness
  changed_when: false
  failed_when: false
  retries: 12
  delay: 5
  until: >-
    vault_strict_readiness.rc == 0 or
    not ((vault_public_status.stdout | from_json).initialized | bool)

- name: Probe strict key-rotator dependency readiness after stack start
  ansible.builtin.command:
    argv:
      - docker
      - --host
      - unix:///run/docker.sock
      - compose
      - exec
      - -T
      - key-rotator
      - python3
      - -c
      - >-
        import urllib.request;
        urllib.request.urlopen('http://127.0.0.1:8080/readyz', timeout=3).read()
  args:
    chdir: "{{ stack_dir }}"
  environment:
    COMPOSE_PROFILES: "{{ aigw_compose_profiles | join(',') }}"
    VAULT_UI_ENABLED: "{{ aigw_vault_ui_enabled | bool | lower }}"
  register: key_rotator_strict_readiness
  changed_when: false
  failed_when: false
  retries: 12
  delay: 5
  until: >-
    key_rotator_strict_readiness.rc == 0 or
    not ((vault_public_status.stdout | from_json).initialized | bool)
  no_log: true

- name: Bound the Vault bootstrap health exception to fresh uninitialized state
  ansible.builtin.assert:
    that:
      - >-
        (not ((vault_public_status.stdout | from_json).initialized | bool) and
         vault_strict_readiness.rc != 0 and
         key_rotator_strict_readiness.rc != 0) or
        ((vault_public_status.stdout | from_json).initialized | bool and
         not ((vault_public_status.stdout | from_json).sealed | bool) and
         vault_strict_readiness.rc == 0 and
         key_rotator_strict_readiness.rc == 0)
      - >-
        (vault_strict_readiness.rc == 0 and
         key_rotator_strict_readiness.rc == 0) or
        (vault_strict_readiness.rc != 0 and
         key_rotator_strict_readiness.rc != 0)
    quiet: true
    fail_msg: >-
      Vault and key-rotator strict readiness disagree with the public seal
      state, or an initialized deployment is not fully ready after automatic
      unseal. Only a genuinely uninitialized first bootstrap may remain
      unhealthy; every initialized deployment fails closed here.

- name: Require restored Vault state instead of replacement initialization
  ansible.builtin.assert:
    that:
      - (vault_public_status.stdout | from_json).initialized | bool
    quiet: true
    fail_msg: >-
      A restore marker exists but Vault reports uninitialized. Do not run
      vault-bootstrap.sh or create replacement identity; preserve the target
      and investigate the authenticated restore.
  when: restore_required_unseal_marker.stat.exists | default(false)

# A sealed/fresh Vault must not make its own UI administratively unreachable.
# This one-time bridge uses only the already-provisioned temporary Keycloak
# bootstrap client. Its inventory input is a closed mutation set, it never
# reads Vault, and a root-owned receipt prevents it from becoming a recurring
# group lifecycle controller after normal bootstrap consumes that client.
- name: Require an explicit pre-Vault managed-identity recovery contract
  ansible.builtin.assert:
    that:
      - aigw_pre_vault_identity_baseline_reconciliation | bool
      - >-
        aigw_pre_vault_identity_baseline_reconciliation_ack ==
        'RECONCILE_PRE_VAULT_MANAGED_IDENTITY_BASELINE'
      - aigw_pre_vault_identity_baseline_groups is sequence
      - aigw_pre_vault_identity_baseline_groups is not string
      - aigw_pre_vault_identity_baseline_groups | length > 0
      - aigw_pre_vault_identity_bootstrap_admin_identities is sequence
      - aigw_pre_vault_identity_bootstrap_admin_identities is not string
      - aigw_pre_vault_identity_bootstrap_admin_identities | length > 0
      - >-
        not (aigw_pre_vault_identity_ensure_lab_federation | bool) or
        (deployment_profile == 'rocky9-lab' and samba_lab_enabled | bool)
    quiet: true
    fail_msg: >-
      Pre-Vault identity recovery requires an exact acknowledgement and an
      explicitly configured, non-empty group/admin set. Lab federation is
      permitted only by the committed disposable Rocky 9 lab profile.
  when: aigw_pre_vault_identity_baseline_reconciliation | bool

- name: Build the exact pre-Vault managed-identity recovery specification
  ansible.builtin.set_fact:
    aigw_pre_vault_identity_baseline_spec: >-
      {{
        {
          'schema': 1,
          'ensure_lab_federation': aigw_pre_vault_identity_ensure_lab_federation | bool,
          'groups': aigw_pre_vault_identity_baseline_groups,
          'bootstrap_admin_identities': aigw_pre_vault_identity_bootstrap_admin_identities,
        }
      }}
  when: aigw_pre_vault_identity_baseline_reconciliation | bool
  no_log: true

- name: Derive the pre-Vault managed-identity recovery receipt
  ansible.builtin.set_fact:
    aigw_pre_vault_identity_baseline_digest: >-
      {{ aigw_pre_vault_identity_baseline_spec | to_json | hash('sha256') }}
    aigw_pre_vault_identity_baseline_receipt_path: >-
      {{ stack_dir }}/.state/pre-vault-identity-baseline.json
  when: aigw_pre_vault_identity_baseline_reconciliation | bool
  no_log: true

- name: Inspect the pre-Vault managed-identity recovery receipt
  ansible.builtin.stat:
    path: "{{ aigw_pre_vault_identity_baseline_receipt_path }}"
    follow: false
  register: aigw_pre_vault_identity_baseline_receipt
  when: aigw_pre_vault_identity_baseline_reconciliation | bool

- name: Read the existing pre-Vault managed-identity recovery receipt
  ansible.builtin.slurp:
    src: "{{ aigw_pre_vault_identity_baseline_receipt_path }}"
  register: aigw_pre_vault_identity_baseline_receipt_content
  when:
    - aigw_pre_vault_identity_baseline_reconciliation | bool
    - aigw_pre_vault_identity_baseline_receipt.stat.exists | default(false)
  no_log: true

- name: Require the exact private pre-Vault managed-identity recovery receipt
  ansible.builtin.assert:
    that:
      - aigw_pre_vault_identity_baseline_receipt.stat.isreg | default(false)
      - not (aigw_pre_vault_identity_baseline_receipt.stat.islnk | default(false))
      - aigw_pre_vault_identity_baseline_receipt.stat.uid == 0
      - aigw_pre_vault_identity_baseline_receipt.stat.gid == 0
      - aigw_pre_vault_identity_baseline_receipt.stat.mode == '0600'
      - >-
        (aigw_pre_vault_identity_baseline_receipt_content.content |
         b64decode | from_json).schema == 1
      - >-
        (aigw_pre_vault_identity_baseline_receipt_content.content |
         b64decode | from_json).spec_sha256 ==
        aigw_pre_vault_identity_baseline_digest
    quiet: true
    fail_msg: >-
      The pre-Vault identity recovery receipt is unsafe or its inventory
      mutation set drifted. Refuse to reuse bootstrap authority implicitly.
  when:
    - aigw_pre_vault_identity_baseline_reconciliation | bool
    - aigw_pre_vault_identity_baseline_receipt.stat.exists | default(false)
  no_log: true

- name: Wait for Keycloak before first pre-Vault identity recovery
  community.docker.docker_compose_v2:
    docker_host: unix:///run/docker.sock
    tls: false
    validate_certs: false
    project_src: "{{ stack_dir }}"
    project_name: "{{ compose_project_name }}"
    files: "{{ aigw_compose_files }}"
    profiles: "{{ aigw_compose_profiles }}"
    services: [keycloak]
    dependencies: false
    state: present
    build: never
    wait: true
    wait_timeout: 600
  environment:
    COMPOSE_PROFILES: ""
    VAULT_UI_ENABLED: "{{ aigw_vault_ui_enabled | bool | lower }}"
  when:
    - aigw_pre_vault_identity_baseline_reconciliation | bool
    - not (aigw_pre_vault_identity_baseline_receipt.stat.exists | default(false))
  no_log: true

- name: Apply the first pre-Vault managed-identity recovery baseline
  ansible.builtin.command:
    argv:
      - "{{ stack_dir }}/scripts/aigw-compose.sh"
      - run
      - --rm
      - --no-deps
      - -T
      - key-rotator
      - /opt/venv/bin/python
      - -m
      - app.reconcile_pre_vault_identity
      - --confirm
      - RECONCILE_PRE_VAULT_MANAGED_IDENTITY_BASELINE
  args:
    chdir: "{{ stack_dir }}"
    stdin: "{{ aigw_pre_vault_identity_baseline_spec | to_json }}"
    stdin_add_newline: false
  environment:
    STACK_DIR: "{{ stack_dir }}"
    COMPOSE_PROJECT_NAME: "{{ compose_project_name }}"
  register: aigw_pre_vault_identity_baseline_result
  changed_when: >-
    'PRE_VAULT_IDENTITY_BASELINE_RECONCILIATION_APPLIED' in
    aigw_pre_vault_identity_baseline_result.stdout
  failed_when: >-
    aigw_pre_vault_identity_baseline_result.rc != 0 or
    not (
      'PRE_VAULT_IDENTITY_BASELINE_RECONCILIATION_APPLIED' in
      aigw_pre_vault_identity_baseline_result.stdout or
      'PRE_VAULT_IDENTITY_BASELINE_RECONCILIATION_VERIFIED' in
      aigw_pre_vault_identity_baseline_result.stdout
    )
  when:
    - aigw_pre_vault_identity_baseline_reconciliation | bool
    - not (aigw_pre_vault_identity_baseline_receipt.stat.exists | default(false))
  no_log: true

- name: Prove the pre-Vault managed-identity recovery is idempotent
  ansible.builtin.command:
    argv:
      - "{{ stack_dir }}/scripts/aigw-compose.sh"
      - run
      - --rm
      - --no-deps
      - -T
      - key-rotator
      - /opt/venv/bin/python
      - -m
      - app.reconcile_pre_vault_identity
      - --confirm
      - RECONCILE_PRE_VAULT_MANAGED_IDENTITY_BASELINE
  args:
    chdir: "{{ stack_dir }}"
    stdin: "{{ aigw_pre_vault_identity_baseline_spec | to_json }}"
    stdin_add_newline: false
  environment:
    STACK_DIR: "{{ stack_dir }}"
    COMPOSE_PROJECT_NAME: "{{ compose_project_name }}"
  register: aigw_pre_vault_identity_baseline_idempotence
  changed_when: false
  failed_when: >-
    aigw_pre_vault_identity_baseline_idempotence.rc != 0 or
    'PRE_VAULT_IDENTITY_BASELINE_RECONCILIATION_VERIFIED' not in
    aigw_pre_vault_identity_baseline_idempotence.stdout
  when:
    - aigw_pre_vault_identity_baseline_reconciliation | bool
    - not (aigw_pre_vault_identity_baseline_receipt.stat.exists | default(false))
  no_log: true

- name: Seal the verified pre-Vault managed-identity recovery receipt
  ansible.builtin.copy:
    content: >-
      {{
        {
          'schema': 1,
          'spec_sha256': aigw_pre_vault_identity_baseline_digest,
        } | to_nice_json
      }}
    dest: "{{ aigw_pre_vault_identity_baseline_receipt_path }}"
    owner: root
    group: root
    mode: "0600"
  when:
    - aigw_pre_vault_identity_baseline_reconciliation | bool
    - not (aigw_pre_vault_identity_baseline_receipt.stat.exists | default(false))
  no_log: true

# Do not make the legacy OIDC repair part of the fresh-Vault bootstrap path:
# an uninitialized or sealed Vault intentionally prevents the rotator from
# reading its durable identity state. The stack is already started above, so
# wait only for Keycloak here when the public Vault state proves the one-shot
# runner can safely perform its narrow state-gated action. A short-lived 403
# from an edge before this point is availability-only; authorization remains
# fail-closed.
- name: Wait for Keycloak before applicable pre-bootstrap OIDC scope reconciliation
  community.docker.docker_compose_v2:
    docker_host: unix:///run/docker.sock
    tls: false
    validate_certs: false
    project_src: "{{ stack_dir }}"
    project_name: "{{ compose_project_name }}"
    files: "{{ aigw_compose_files }}"
    profiles: "{{ aigw_compose_profiles }}"
    services: [keycloak]
    dependencies: false
    state: present
    build: never
    wait: true
    # Keep this individual Keycloak wait aligned with the reviewed longest
    # Compose health window; a slow but healthy initial Keycloak migration
    # must not be misclassified as an OIDC-repair failure.
    wait_timeout: 600
  environment:
    COMPOSE_PROFILES: ""
    VAULT_UI_ENABLED: "{{ aigw_vault_ui_enabled | bool | lower }}"
  when:
    - aigw_prebootstrap_oidc_scope_reconciliation | bool
    - vault_strict_readiness.rc == 0
    - vault_public_status.rc == 0
    - (vault_public_status.stdout | from_json).initialized | bool
    - not ((vault_public_status.stdout | from_json).sealed | bool)
  no_log: true

- name: Reconcile only applicable pre-bootstrap Keycloak OIDC role scopes
  ansible.builtin.command:
    argv:
      - "{{ stack_dir }}/scripts/aigw-compose.sh"
      - run
      - --rm
      - --no-deps
      - -T
      - key-rotator
      - /opt/venv/bin/python
      - -m
      - app.reconcile_oidc_role_scopes
      - --confirm
      - RECONCILE_PREBOOTSTRAP_OIDC_ROLE_SCOPES
  args:
    chdir: "{{ stack_dir }}"
  environment:
    STACK_DIR: "{{ stack_dir }}"
    COMPOSE_PROJECT_NAME: "{{ compose_project_name }}"
  register: prebootstrap_oidc_scope_reconciliation
  changed_when: >-
    'OIDC_ROLE_SCOPE_PREBOOTSTRAP_RECONCILIATION_APPLIED' in
    prebootstrap_oidc_scope_reconciliation.stdout
  failed_when: prebootstrap_oidc_scope_reconciliation.rc != 0
  when:
    - aigw_prebootstrap_oidc_scope_reconciliation | bool
    - vault_strict_readiness.rc == 0
    - vault_public_status.rc == 0
    - (vault_public_status.stdout | from_json).initialized | bool
    - not ((vault_public_status.stdout | from_json).sealed | bool)
  no_log: true

# A domain migration on an already-seeded realm (e.g. aigw.internal ->
# aigw.aegisgroup.ch) cannot be repaired by re-importing the realm JSON:
# Keycloak imports realm JSON only into an empty database, so every managed
# first-party client keeps its stale callback allow-list and browser SSO fails
# with "Invalid parameter: redirect_uri". While the temporary master-realm
# bootstrap client still exists (the interactive identity bootstrap has not yet
# deleted it), realign only the four managed clients' redirectUris/webOrigins
# (and the two RP-initiated logout allow-lists) to the configured aigw_domain
# using that already-reviewed credential. This is deliberately safe to run on
# every initialized converge: it touches only the domain-derived callbacks —
# never client secrets, flows, mappers, realm-role scopes, the controller, or
# the broker — never contacts Vault, and self-disables the moment the
# interactive bootstrap consumes the client, reporting that a domain change
# then needs the re-bootstrap ceremony rather than granting the durable
# controller any manage-clients authority.
- name: Wait for Keycloak before managed OIDC redirect-URI reconciliation
  community.docker.docker_compose_v2:
    docker_host: unix:///run/docker.sock
    tls: false
    validate_certs: false
    project_src: "{{ stack_dir }}"
    project_name: "{{ compose_project_name }}"
    files: "{{ aigw_compose_files }}"
    profiles: "{{ aigw_compose_profiles }}"
    services: [keycloak]
    dependencies: false
    state: present
    build: never
    wait: true
    wait_timeout: 600
  environment:
    COMPOSE_PROFILES: ""
    VAULT_UI_ENABLED: "{{ aigw_vault_ui_enabled | bool | lower }}"
  when:
    - vault_strict_readiness.rc == 0
    - vault_public_status.rc == 0
    - (vault_public_status.stdout | from_json).initialized | bool
    - not ((vault_public_status.stdout | from_json).sealed | bool)
  no_log: true

- name: Reconcile managed OIDC client redirect URIs to the configured domain
  ansible.builtin.command:
    argv:
      - "{{ stack_dir }}/scripts/aigw-compose.sh"
      - run
      - --rm
      - --no-deps
      - -T
      - key-rotator
      - /opt/venv/bin/python
      - -m
      - app.reconcile_oidc_redirect_uris
      - --confirm
      - RECONCILE_PREBOOTSTRAP_OIDC_REDIRECT_URIS
  args:
    chdir: "{{ stack_dir }}"
  environment:
    STACK_DIR: "{{ stack_dir }}"
    COMPOSE_PROJECT_NAME: "{{ compose_project_name }}"
  register: managed_oidc_redirect_reconciliation
  changed_when: >-
    'OIDC_REDIRECT_URI_PREBOOTSTRAP_RECONCILIATION_APPLIED' in
    managed_oidc_redirect_reconciliation.stdout
  failed_when: managed_oidc_redirect_reconciliation.rc != 0
  when:
    - vault_strict_readiness.rc == 0
    - vault_public_status.rc == 0
    - (vault_public_status.stdout | from_json).initialized | bool
    - not ((vault_public_status.stdout | from_json).sealed | bool)
  no_log: true

# Post-bootstrap hosts (temporary client already consumed) return the
# rebootstrap-required marker with rc 0, so the converge does not fail; surface
# it loudly so a silent domain change cannot leave SSO broken unnoticed.
- name: Report when an OIDC domain migration needs the identity bootstrap ceremony
  ansible.builtin.debug:
    msg: >-
      Managed OIDC redirect-URI reconciliation is unavailable: the temporary
      master-realm bootstrap client has been consumed by the interactive
      identity bootstrap, and the durable controller holds no manage-clients
      role. If the deployment domain changed, browser SSO stays broken until an
      operator re-runs the identity bootstrap ceremony — see
      docs/identity-operations.md, "Domain migration on an existing realm".
  when:
    - managed_oidc_redirect_reconciliation is defined
    - >-
      'OIDC_REDIRECT_URI_PREBOOTSTRAP_RECONCILIATION_REBOOTSTRAP_REQUIRED' in
      (managed_oidc_redirect_reconciliation.stdout | default(''))

- name: Wait for the complete post-bootstrap stack
  community.docker.docker_compose_v2:
    docker_host: unix:///run/docker.sock
    tls: false
    validate_certs: false
    project_src: "{{ stack_dir }}"
    project_name: "{{ compose_project_name }}"
    files: "{{ aigw_compose_files }}"
    profiles: "{{ aigw_compose_profiles }}"
    services: "{{ compose_long_running_services }}"
    dependencies: false
    state: present
    build: never
    wait: true
    # Open WebUI intentionally allows 90s of migration startup plus up to
    # 24 15-second readiness attempts (450s worst case).  Leave a scheduling
    # margin so a healthy clean-Rocky deployment is not failed by Compose
    # before the service's own reviewed health window has elapsed.
    wait_timeout: 600
  environment:
    COMPOSE_PROFILES: ""
    VAULT_UI_ENABLED: "{{ aigw_vault_ui_enabled | bool | lower }}"
  when: vault_strict_readiness.rc == 0
  no_log: true

- name: Wait only for bootstrap-independent core on first converge
  community.docker.docker_compose_v2:
    docker_host: unix:///run/docker.sock
    tls: false
    validate_certs: false
    project_src: "{{ stack_dir }}"
    project_name: "{{ compose_project_name }}"
    files: "{{ aigw_compose_files }}"
    profiles: "{{ aigw_compose_profiles }}"
    services: >-
      {{ [
           'postgres', 'redis', 'envoy-egress', 'keycloak', 'litellm',
           'dev-portal', 'open-webui'
         ]
         + (['vault-ui-proxy'] if (aigw_vault_ui_enabled | bool) else [])
         + ['prometheus', 'grafana', 'traefik-int', 'traefik-adm'] }}
    dependencies: false
    state: present
    build: never
    wait: true
    # Keep the fresh-bootstrap core gate aligned with the full-stack wait:
    # Open WebUI's reviewed readiness window can reach 450 seconds.
    wait_timeout: 600
  environment:
    COMPOSE_PROFILES: ""
    VAULT_UI_ENABLED: "{{ aigw_vault_ui_enabled | bool | lower }}"
  when: vault_strict_readiness.rc != 0
  no_log: true

- name: Read the deployed dev-portal image used for secretless reconciliation
  ansible.builtin.command:
    argv:
      - "{{ stack_dir }}/scripts/aigw-compose.sh"
      - images
      - --quiet
      - dev-portal
  args:
    chdir: "{{ stack_dir }}"
  register: dev_portal_runtime_image
  changed_when: false
  # Docker Compose may emit the same content-addressed ID with or without its
  # `sha256:` algorithm prefix. Accept only those two exact representations.
  failed_when: dev_portal_runtime_image.stdout is not regex('^(sha256:)?[a-f0-9]{64}$')

- name: Reconcile the dedicated Open WebUI LiteLLM workload key
  block:
    # A transient private `Z` category must never be applied to the persistent
    # deployed script. Stage exact bytes in a disposable directory so Docker
    # can relabel them without stealing a long-lived host source's MCS range.
    - name: Create private reconciliation staging directory
      ansible.builtin.tempfile:
        state: directory
        prefix: aigw-openwebui-reconcile-
      register: openwebui_reconcile_staging

    - name: Stage the exact reconciliation program for private relabeling
      ansible.builtin.copy:
        src: "{{ stack_dir }}/scripts/reconcile-openwebui-key.py"
        dest: "{{ openwebui_reconcile_staging.path }}/reconcile.py"
        remote_src: true
        owner: root
        group: root
        mode: "0555"

    - name: Run secretless reconciliation from the private staged copy
      ansible.builtin.command:
        argv:
          - docker
          - --host
          - unix:///run/docker.sock
          - run
          - --rm
          - -i
          - --network
          - net-portal
          - --read-only
          - --cap-drop
          - ALL
          - --security-opt
          - no-new-privileges:true
          - --user
          - 65532:65532
          - --log-driver
          - none
          - --volume
          - "{{ openwebui_reconcile_staging.path }}/reconcile.py:/reconcile.py:ro,Z"
          - --entrypoint
          - python3
          - "{{ dev_portal_runtime_image.stdout }}"
          - /reconcile.py
      args:
        stdin: >-
          {{ {'master_key': litellm_master_key,
              'candidate_key': webui_litellm_key} | to_json }}
        stdin_add_newline: false
      register: openwebui_key_reconciliation
      changed_when: "'created=true' in openwebui_key_reconciliation.stdout"
      no_log: true
  always:
    - name: Remove private reconciliation staging directory
      ansible.builtin.file:
        path: >-
          {{ (openwebui_reconcile_staging | default({})).get(
               'path', stack_dir ~ '/.state/.missing-reconcile-stage') }}
        state: absent
      when:
        - openwebui_reconcile_staging is defined
        - openwebui_reconcile_staging.path is defined

- name: Prove Open WebUI can list exactly its allowed models
  ansible.builtin.command:
    argv:
      - "{{ stack_dir }}/scripts/aigw-compose.sh"
      - exec
      - -T
      - open-webui
      - python3
      - -c
      - |
        import json
        import os
        import urllib.request

        request = urllib.request.Request(
            os.environ["OPENAI_API_BASE_URL"].rstrip("/") + "/models",
            headers={"Authorization": "Bearer " + os.environ["OPENAI_API_KEY"]},
        )
        opener = urllib.request.build_opener(urllib.request.ProxyHandler({}))
        with opener.open(request, timeout=15) as response:
            data = json.load(response)
            if response.status != 200:
                raise SystemExit("Open WebUI model list returned non-success")
        actual = sorted(item.get("id") for item in data.get("data", []))
        expected = sorted(["claude-sonnet", "claude-haiku", "gpt"])
        if actual != expected:
            raise SystemExit("Open WebUI workload key model scope drifted")
        print("OPENWEBUI_MODELS_SCOPE_PASS")
  args:
    chdir: "{{ stack_dir }}"
  changed_when: false
  no_log: true

- name: Prove LiteLLM stores only the Open WebUI workload key hash and safe metadata
  ansible.builtin.command:
    argv:
      - "{{ stack_dir }}/scripts/aigw-compose.sh"
      - exec
      - -T
      - postgres
      - psql
      - --username
      - postgres
      - --dbname
      - litellm
      - --tuples-only
      - --no-align
      - --command
      - >-
        SELECT CASE WHEN count(*) = 1
          AND bool_and(token = '{{ webui_litellm_key | hash('sha256') }}')
          AND bool_and(position('sk-' in coalesce(metadata::text, '')) = 0)
        THEN 'pass' ELSE 'fail' END
        FROM "LiteLLM_VerificationToken"
        WHERE key_alias = 'aigw-open-webui-service';
  args:
    chdir: "{{ stack_dir }}"
  register: openwebui_key_database_contract
  changed_when: false
  failed_when: openwebui_key_database_contract.stdout.strip() != 'pass'
  no_log: true

- name: Prove the Open WebUI workload key plaintext is absent from project logs
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - |
        import subprocess
        import sys

        secret = sys.stdin.buffer.read(513).strip()
        if len(secret) < 16:
            raise SystemExit("bounded workload key input unavailable")
        ids = subprocess.check_output(
            ["docker", "--host", "unix:///run/docker.sock", "ps", "-aq", "--filter", f"label=com.docker.compose.project={sys.argv[1]}"],
            text=True,
        ).split()
        for container_id in ids:
            result = subprocess.run(
                ["docker", "--host", "unix:///run/docker.sock", "logs", container_id],
                stdout=subprocess.PIPE,
                stderr=subprocess.STDOUT,
                check=False,
            )
            if secret in result.stdout:
                raise SystemExit("Open WebUI workload key plaintext found in Docker logs")
        print("OPENWEBUI_KEY_LOG_HYGIENE_PASS")
      - "{{ compose_project_name }}"
  args:
    stdin: "{{ webui_litellm_key }}"
    stdin_add_newline: false
  changed_when: false
  no_log: true

- name: Prove exact published-port bindings and Docker DNAT rules
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - |
        import json
        import re
        import subprocess
        import sys

        project, egress_ip, adm_ip, internal_ip, lab_dns = sys.argv[1:]
        container_ids = subprocess.check_output(
            ["docker", "--host", "unix:///run/docker.sock", "ps", "-aq", "--filter", f"label=com.docker.compose.project={project}"],
            text=True,
        ).split()
        containers = json.loads(
            subprocess.check_output(["docker", "--host", "unix:///run/docker.sock", "inspect", *container_ids], text=True)
        )
        actual = set()
        for container in containers:
            service = container["Config"]["Labels"].get("com.docker.compose.service", "")
            for container_port, bindings in (container["NetworkSettings"].get("Ports") or {}).items():
                port, protocol = container_port.split("/", 1)
                for binding in bindings or []:
                    actual.add(
                        (service, protocol, int(port), binding["HostIp"], int(binding["HostPort"]))
                    )

        expected = {
            ("traefik-adm", "tcp", 443, adm_ip, 443),
            ("traefik-int", "tcp", 443, internal_ip, 443),
        }
        nat_expected = {
            (adm_ip, "tcp", 443),
            (internal_ip, "tcp", 443),
        }
        if lab_dns == "true":
            for host_ip in (adm_ip, internal_ip):
                for protocol in ("tcp", "udp"):
                    expected.add(("lab-dns", protocol, 53, host_ip, 53))
                    nat_expected.add((host_ip, protocol, 53))
        if actual != expected:
            raise SystemExit(f"published-port runtime mismatch: {sorted(actual)}")
        if any(binding[3] in {"0.0.0.0", "::", egress_ip} for binding in actual):
            raise SystemExit("wildcard or egress-NIC published binding detected")

        nat = subprocess.check_output(["iptables-save", "-t", "nat"], text=True)
        for host_ip, protocol, port in nat_expected:
            pattern = (
                rf"^-A DOCKER -d {re.escape(host_ip)}/32 .* -p {protocol} "
                rf".* --dport {port} -j DNAT --to-destination "
            )
            if not re.search(pattern, nat, re.MULTILINE):
                raise SystemExit(f"missing Docker DNAT for {host_ip}/{protocol}/{port}")
        for line in nat.splitlines():
            if line.startswith("-A DOCKER ") and re.search(r"--dport (53|443)(?: |$)", line):
                if f"-d {egress_ip}/32 " in line or " -d 0.0.0.0/0 " in line:
                    raise SystemExit("forbidden egress-NIC or wildcard DNAT detected")
        print("Exact TLS/DNS host bindings and Docker DNAT rules are present.")
      - "{{ compose_project_name }}"
      - "{{ eth0_ip }}"
      - "{{ eth1_ip }}"
      - "{{ eth2_ip }}"
      - "{{ platform_authoritative_dns_enabled | bool | lower }}"
  register: published_port_contract
  changed_when: false

- name: Report the fresh Vault bootstrap gate
  ansible.builtin.debug:
    msg: >-
      This fresh deployment's Vault is uninitialized and the deployment is
      intentionally not claiming full readiness. Only this no-restore-marker
      state may use the approved lab scripts/vault-bootstrap.sh ceremony,
      which performs its own final full-stack wait.
  when:
    - vault_strict_readiness.rc != 0
    - not (restore_required_unseal_marker.stat.exists | default(false))
    - not ((vault_public_status.stdout | from_json).initialized | bool)

- name: Install bounded Vault audit rotation service
  ansible.builtin.copy:
    dest: /etc/systemd/system/aigw-vault-audit-rotate.service
    mode: "0644"
    content: |
      [Unit]
      Description=Rotate AI Gateway Vault audit file safely
      After=docker.service
      Requires=docker.service

      [Service]
      Type=oneshot
      WorkingDirectory={{ stack_dir }}
      Environment=COMPOSE_PROJECT_NAME={{ compose_project_name }}
      ExecStart={{ stack_dir }}/scripts/rotate-vault-audit.sh
      User=root
      Group=root
      NoNewPrivileges=true
      PrivateTmp=true
      ProtectHome=true
      ProtectSystem=strict
      ReadWritePaths=/run/lock

- name: Install bounded Vault audit rotation timer
  ansible.builtin.copy:
    dest: /etc/systemd/system/aigw-vault-audit-rotate.timer
    mode: "0644"
    content: |
      [Unit]
      Description=Check AI Gateway Vault audit file size every 15 minutes

      [Timer]
      OnBootSec=15min
      OnUnitActiveSec=15min
      AccuracySec=1min
      Persistent=true

      [Install]
      WantedBy=timers.target

- name: Enable bounded Vault audit rotation timer
  ansible.builtin.systemd:
    name: aigw-vault-audit-rotate.timer
    enabled: true
    state: started
    daemon_reload: true

- name: Remove the retired flat backend network after services are segmented
  community.docker.docker_network:
    docker_host: unix:///run/docker.sock
    tls: false
    validate_certs: false
    name: net-backend
    state: absent

# firewalld reloads and Docker bridge activation can cause NetworkManager to
# replay a customer-owned policy-table route after the early routing role.
# Normalize only the dedicated AIGW tables once all network churn is complete;
# the applicator never edits or cycles the supplied connection profiles.
- name: Reassert dedicated policy routing after stack network activation
  ansible.builtin.command: /usr/local/sbin/aigw-policy-routing
  changed_when: false
  when: manage_networking | bool
