# This fact is deliberately set only after both markers' ownership, shape, and
# exact content have been proven by the asserts immediately above — before the
# artifact-adoption gate and every downstream ownership gate consume it. A
# genuinely foreign host has no valid marker, so aigw_host_ownership_proven
# stays false and each adoption gate still demands its explicit flag; a bare
# adoption flag with no marker never grants ownership. A validated pending
# marker is the sanctioned host-prep-done ownership signal, so a site.yml
# resume of an interrupted first converge is trusted exactly as
# deploy-stack-only.yml already trusts it. host_preflight is the first,
# read-only role: a malformed or foreign marker aborts at the asserts above
# before anything mutates.
- name: Preflight — record a validated dedicated-Docker-host ownership contract
  ansible.builtin.set_fact:
    aigw_host_pending_marker_valid: >-
      {{ aigw_host_pending_marker_stat.exists | default(false) | bool }}
    aigw_host_ownership_proven: >-
      {{ (aigw_host_marker_stat.exists | default(false) | bool) or
         (aigw_host_pending_marker_stat.exists | default(false) | bool) }}

- name: Preflight — reject unsafe or unowned existing AIGW-managed host artifacts
  ansible.builtin.command:
    argv:
      - python3
      - -I
      - -c
      - |
        import json
        import os
        import stat
        import sys

        artifacts = json.loads(sys.argv[1])
        has_marker = sys.argv[2] == "true"
        docker_adoption = sys.argv[3] == "true"
        firewall_adoption = sys.argv[4] == "true"
        ssh_adoption = sys.argv[5] == "true"
        adoptions = {
            "docker": docker_adoption,
            "firewall": firewall_adoption,
            "ssh": ssh_adoption,
        }
        errors = []
        for artifact in artifacts:
            path = artifact["path"]
            try:
                metadata = os.lstat(path)
            except FileNotFoundError:
                continue
            if (
                stat.S_ISLNK(metadata.st_mode) or
                not stat.S_ISREG(metadata.st_mode) or
                metadata.st_uid != 0 or metadata.st_gid != 0 or
                metadata.st_mode & 0o022
            ):
                errors.append(f"unsafe existing managed artifact {path}")
                continue
            adoption_granted = adoptions[artifact["adoption"]]
            if not has_marker and not adoption_granted:
                errors.append(
                    f"unmarked existing managed artifact {path} requires explicit {artifact['adoption']} adoption"
                )
        if errors:
            raise SystemExit("; ".join(dict.fromkeys(errors)))
      - "{{ aigw_managed_host_artifacts | to_json }}"
      - "{{ 'true' if (aigw_host_ownership_proven | default(false) | bool) else 'false' }}"
      - "{{ 'true' if (aigw_adopt_dedicated_docker_host | bool) else 'false' }}"
      - "{{ 'true' if (aigw_adopt_firewalld_state | bool) else 'false' }}"
      - "{{ 'true' if (aigw_adopt_ssh_state | bool) else 'false' }}"
  changed_when: false

- name: Preflight — reject unmanaged drop-ins for AI Gateway systemd units
  ansible.builtin.command:
    argv:
      - python3
      - -I
      - -c
      - |
        import json
        import os
        import stat
        import sys

        errors = []
        for unit in json.loads(sys.argv[1]):
            unit_name = os.path.basename(unit)
            for root in (
                "/etc/systemd/system", "/run/systemd/system",
                "/usr/local/lib/systemd/system", "/usr/lib/systemd/system",
            ):
                directory = os.path.join(root, unit_name + ".d")
                try:
                    metadata = os.lstat(directory)
                except FileNotFoundError:
                    continue
                if (stat.S_ISLNK(metadata.st_mode) or not stat.S_ISDIR(metadata.st_mode) or
                        metadata.st_uid != 0 or metadata.st_gid != 0 or metadata.st_mode & 0o022):
                    errors.append(f"unsafe managed-unit drop-in directory {directory}")
                    continue
                with os.scandir(directory) as entries:
                    for entry in entries:
                        try:
                            child = entry.stat(follow_symlinks=False)
                        except OSError:
                            errors.append(f"uninspectable managed-unit drop-in {entry.path}")
                            continue
                        if (stat.S_ISLNK(child.st_mode) or not stat.S_ISREG(child.st_mode) or
                                child.st_uid != 0 or child.st_gid != 0 or child.st_mode & 0o022):
                            errors.append(f"unsafe managed-unit drop-in {entry.path}")
                        else:
                            errors.append(f"unmanaged managed-unit drop-in {entry.path}")
        if errors:
            raise SystemExit("; ".join(dict.fromkeys(errors)))
      - >-
        {{ [
             '/etc/systemd/system/aigw-policy-routing.service',
             '/etc/systemd/system/aigw-host-input-rules.service',
             '/etc/systemd/system/docker-user-rules.service',
             '/etc/systemd/system/docker-user-rules-watch.service',
             '/etc/systemd/system/aigw-docker-log-acl.service',
             '/etc/systemd/system/aigw-docker-log-acl.timer',
             '/etc/systemd/system/aigw-vault-audit-rotate.service',
             '/etc/systemd/system/aigw-vault-audit-rotate.timer'
           ] | to_json }}
  changed_when: false

# The shape and content of the pending marker are proven by the relocated
# asserts that now run *before* the artifact-adoption gate (a validated pending
# marker is trusted there as full ownership, exactly as deploy-stack-only.yml
# already trusts it). host_preflight is the first, read-only role, so a foreign
# or malformed marker has already aborted before this point and nothing has
# mutated. No adoption flag is required to resume our own interrupted converge.
- name: Preflight — note resuming an interrupted converge from a validated pending marker
  ansible.builtin.debug:
    msg: >-
      resuming an interrupted converge from a validated pending marker; no
      adoption flag required. A previous host converge recorded this exact
      root-owned dedicated-Docker-host pending marker before verification
      promoted it, so host preparation is trusted as our own — the same trust
      deploy-stack-only.yml already grants.
  when: aigw_host_pending_marker_stat.exists | default(false)

- name: Preflight — read an existing Docker daemon configuration without following links
  ansible.builtin.slurp:
    src: /etc/docker/daemon.json
  register: aigw_daemon_config_raw
  no_log: true
  when: aigw_daemon_config_stat.exists | default(false)

- name: Preflight — classify the Docker daemon configuration contract
  ansible.builtin.command:
    argv:
      - python3
      - -I
      - -c
      - |
        import json
        import re
        import sys

        desired = {
            "data-root": sys.argv[1],
            "log-driver": "json-file",
            "log-opts": {"max-size": "50m", "max-file": "5"},
            "live-restore": True,
            "firewall-backend": "iptables",
            "selinux-enabled": True,
        }
        canonical_path = re.compile(
            r"^/(?:[A-Za-z0-9][A-Za-z0-9._-]{0,62})"
            r"(?:/[A-Za-z0-9][A-Za-z0-9._-]{0,62}){0,15}$"
        )
        try:
            actual = json.load(sys.stdin)
        except json.JSONDecodeError:
            print(json.dumps({"state": "invalid", "existing_data_root": "/var/lib/docker"}))
            raise SystemExit(0)
        if not isinstance(actual, dict):
            print(json.dumps({"state": "invalid", "existing_data_root": "/var/lib/docker"}))
            raise SystemExit(0)
        existing_data_root = actual.get("data-root", "/var/lib/docker")
        if not isinstance(existing_data_root, str) or not canonical_path.fullmatch(existing_data_root):
            print(json.dumps({"state": "invalid", "existing_data_root": "/var/lib/docker"}))
        elif actual == desired:
            print(json.dumps({"state": "exact", "existing_data_root": existing_data_root}))
        else:
            print(json.dumps({"state": "different", "existing_data_root": existing_data_root}))
      - "{{ docker_data_root }}"
    stdin: "{{ aigw_daemon_config_raw.content | b64decode }}"
    stdin_add_newline: false
  register: aigw_daemon_config_contract_raw
  changed_when: false
  no_log: true
  when: aigw_daemon_config_stat.exists | default(false)

- name: Preflight — record the Docker daemon configuration contract
  ansible.builtin.set_fact:
    aigw_daemon_config_contract: >-
      {{
        (aigw_daemon_config_contract_raw.stdout | from_json)
        if (aigw_daemon_config_stat.exists | default(false))
        else {'state': 'absent', 'existing_data_root': '/var/lib/docker'}
      }}
  no_log: true

- name: Preflight — inspect the data root named by an inactive existing daemon configuration
  ansible.builtin.stat:
    path: "{{ aigw_daemon_config_contract.existing_data_root }}"
    follow: false
    get_checksum: false
  register: aigw_existing_daemon_root_stat
  changed_when: false

- name: Preflight — reject unsafe ancestors for the existing daemon data root
  ansible.builtin.command:
    argv:
      - python3
      - -I
      - -c
      - |
        import os
        import stat
        import sys

        configured = sys.argv[1]
        current = "/"
        for index, part in enumerate(part for part in configured.split("/") if part):
            current = os.path.join(current, part)
            try:
                metadata = os.lstat(current)
            except FileNotFoundError:
                break
            if stat.S_ISLNK(metadata.st_mode):
                raise SystemExit(f"{configured}: symlinked ancestor {current}")
            if metadata.st_uid != 0 or metadata.st_gid != 0:
                raise SystemExit(f"{configured}: non-root ancestor {current}")
            if metadata.st_mode & 0o022:
                raise SystemExit(f"{configured}: group/other-writable ancestor {current}")
            if index < len([part for part in configured.split('/') if part]) - 1 and not stat.S_ISDIR(metadata.st_mode):
                raise SystemExit(f"{configured}: non-directory ancestor {current}")
      - "{{ aigw_daemon_config_contract.existing_data_root }}"
  changed_when: false

- name: Preflight — reject an unsafe existing daemon data root
  ansible.builtin.assert:
    that:
      - >-
        not (aigw_existing_daemon_root_stat.stat.exists | default(false)) or
        (aigw_existing_daemon_root_stat.stat.isdir | default(false) and
         not (aigw_existing_daemon_root_stat.stat.islnk | default(false)) and
         aigw_existing_daemon_root_stat.stat.uid == 0 and
         aigw_existing_daemon_root_stat.stat.gid == 0)
    quiet: true
    fail_msg: >-
      Refusing existing-host adoption: the Docker data root named in the
      current daemon configuration is symlinked, noncanonical, or not
      root-owned.

- name: Preflight — initialize the exact dedicated Docker network inventory
  ansible.builtin.set_fact:
    aigw_expected_docker_networks: []

- name: Preflight — derive each Docker network's fixed dynamic pool
  ansible.builtin.set_fact:
    aigw_expected_docker_networks: >-
      {{
        aigw_expected_docker_networks +
        [item | combine({'iprange': item.subnet | replace('.0/24', '.128/25')})]
      }}
  loop: "{{ docker_networks }}"
  loop_control:
    label: "{{ item.name }}"

- name: Preflight — define every Compose-owned named Docker volume
  ansible.builtin.set_fact:
    aigw_expected_docker_volumes: >-
      {{
        [
          'pg_data', 'openwebui_data', 'vault_data', 'vault_audit',
          'alloy_data', 'prom_data', 'loki_data', 'tempo_data', 'grafana_data'
        ] +
        (
          ['samba_ad_config', 'samba_ad_state', 'samba_ad_public']
          if (samba_lab_enabled | bool) else []
        )
      }}

- name: Preflight — inventory an existing stack directory before accepting live containers
  ansible.builtin.command:
    argv:
      - python3
      - -I
      - -c
      - |
        import json
        import os
        import sys

        try:
            entries = sorted(entry.name for entry in os.scandir(sys.argv[1]))
        except FileNotFoundError:
            entries = []
        print(json.dumps(entries))
      - "{{ stack_dir }}"
  register: aigw_stack_dir_inventory_raw
  changed_when: false

- name: Preflight — reject an unmarked nonempty stack directory without explicit adoption
  ansible.builtin.assert:
    that:
      - >-
        (aigw_host_ownership_proven | default(false) | bool) or
        ((aigw_stack_dir_inventory_raw.stdout | from_json) | length == 0) or
        (aigw_adopt_dedicated_docker_host | bool)
    quiet: true
    fail_msg: >-
      Refusing existing-host adoption: unmarked {{ stack_dir }} contains
      {{ (aigw_stack_dir_inventory_raw.stdout | from_json) | join(', ') }}.
      Inspect it and use aigw_adopt_dedicated_docker_host=true only when it is
      the intended AI Gateway stack.

- name: Preflight — inspect a live Docker host for foreign containers and networks
  ansible.builtin.command:
    argv:
      - /usr/bin/env
      - -u
      - DOCKER_CONFIG
      - -u
      - DOCKER_CONTEXT
      - -u
      - DOCKER_HOST
      - python3
      - -I
      - -c
      - |
        import json
        import ipaddress
        import os
        import re
        import subprocess
        import sys

        docker, project, data_root, stack_dir, expected_text, expected_volumes_text = sys.argv[1:]
        expected = {entry["name"]: entry for entry in json.loads(expected_text)}
        expected_volumes = set(json.loads(expected_volumes_text))

        def invoke(*args):
            result = subprocess.run(
                [docker, "--host", "unix:///run/docker.sock", *args], text=True, stdout=subprocess.PIPE,
                stderr=subprocess.PIPE, check=False,
            )
            if result.returncode:
                raise RuntimeError("docker " + " ".join(args) + ": " + result.stderr.strip())
            return result.stdout

        try:
            info = json.loads(invoke("info", "--format=json"))
            ids = invoke("ps", "-aq", "--no-trunc").split()
            containers = json.loads(invoke("inspect", *ids)) if ids else []
            project_ids = set()
            foreign_containers = []
            docker_socket_mounts = []
            unapproved_host_root_mounts = []
            docker_socket_path = "/run/docker.sock"

            def bind_exposes_docker_socket(mount, mounts, seen=frozenset()):
                if not isinstance(mount, dict) or mount.get("Type") != "bind":
                    return False
                if id(mount) in seen:
                    # A cyclic/malformed nested-mount model cannot be assumed
                    # to mask the Docker control socket safely.
                    return True
                source = mount.get("Source")
                destination = mount.get("Destination")
                if (
                    not isinstance(source, str) or not source.startswith("/")
                    or not isinstance(destination, str) or not destination.startswith("/")
                ):
                    return True
                # A bind of the exact socket, an alias such as /var/run, or
                # any parent directory (including /) gives the container
                # Docker-root-equivalent access. Resolve only the host source
                # string returned by Docker, never a container-controlled
                # destination path.
                try:
                    source_path = os.path.realpath(source)
                    if os.path.commonpath([source_path, docker_socket_path]) != source_path:
                        return False
                    relative_socket_path = os.path.relpath(
                        docker_socket_path, source_path
                    )
                except (OSError, ValueError):
                    return True
                if relative_socket_path == ".." or relative_socket_path.startswith("../"):
                    return False
                container_socket_path = os.path.normpath(
                    os.path.join(destination, relative_socket_path)
                )
                if not container_socket_path.startswith("/"):
                    return True
                masks = []
                for candidate in mounts:
                    if candidate is mount or not isinstance(candidate, dict):
                        continue
                    candidate_destination = candidate.get("Destination")
                    if not isinstance(candidate_destination, str) or not candidate_destination.startswith("/"):
                        continue
                    try:
                        if os.path.commonpath(
                            [candidate_destination, container_socket_path]
                        ) == candidate_destination:
                            masks.append(candidate)
                    except ValueError:
                        return True
                if not masks:
                    return True
                # Docker resolves the deepest nested mount. Only tmpfs is a
                # safe mask here: a named volume can itself be a local bind of
                # /run, while a nested bind is checked recursively so rebinding
                # /run cannot evade this gate.
                effective_mask = max(
                    masks, key=lambda item: len(item.get("Destination", ""))
                )
                if effective_mask.get("Type") == "tmpfs":
                    return False
                if effective_mask.get("Type") != "bind":
                    return True
                return bind_exposes_docker_socket(
                    effective_mask, mounts, seen | {id(mount)}
                )

            def normalized_container_mounts(container):
                """Add Docker 29 HostConfig.Tmpfs entries missing from Mounts.

                Docker Engine 29 reports configured tmpfs mounts under
                HostConfig.Tmpfs but omits them from the top-level Mounts list.
                The latter is otherwise the right source for bind provenance,
                so synthesize only structurally valid tmpfs entries. A
                conflicting non-tmpfs mount at the same destination is
                ambiguous and must fail closed rather than masking a socket.
                """
                mounts = container.get("Mounts")
                host_config = container.get("HostConfig")
                if (
                    not isinstance(mounts, list)
                    or any(not isinstance(mount, dict) for mount in mounts)
                    or not isinstance(host_config, dict)
                ):
                    return None
                tmpfs = host_config.get("Tmpfs")
                if tmpfs is None:
                    return list(mounts)
                if not isinstance(tmpfs, dict):
                    return None
                effective = list(mounts)
                by_destination = {}
                for mount in effective:
                    destination = mount.get("Destination")
                    if isinstance(destination, str):
                        by_destination.setdefault(destination, []).append(mount)
                for destination, options in tmpfs.items():
                    if (
                        not isinstance(destination, str)
                        or not destination.startswith("/")
                        or destination == "/"
                        or os.path.normpath(destination) != destination
                        or not isinstance(options, str)
                    ):
                        return None
                    existing = by_destination.get(destination, [])
                    if existing:
                        if any(mount.get("Type") != "tmpfs" for mount in existing):
                            return None
                        continue
                    tmpfs_mount = {
                        "Type": "tmpfs",
                        "Destination": destination,
                    }
                    effective.append(tmpfs_mount)
                    by_destination[destination] = [tmpfs_mount]
                return effective

            def is_host_root_bind(mount):
                if not isinstance(mount, dict) or mount.get("Type") != "bind":
                    return False
                source = mount.get("Source")
                if not isinstance(source, str) or not source.startswith("/"):
                    return True
                try:
                    return os.path.realpath(source) == "/"
                except OSError:
                    return True

            def has_approved_node_exporter_rootfs(container, mounts):
                labels = (container.get("Config") or {}).get("Labels") or {}
                if labels.get("com.docker.compose.service") != "node-exporter":
                    return False
                if (container.get("Config") or {}).get("User") != "65532:65532":
                    return False
                root_binds = [
                    mount for mount in mounts
                    if mount.get("Type") == "bind"
                    and mount.get("Source") == "/"
                    and mount.get("Destination") == "/host"
                    and mount.get("RW") is False
                    and mount.get("Propagation") == "rslave"
                ]
                all_host_root_binds = [
                    mount for mount in mounts if is_host_root_bind(mount)
                ]
                run_masks = [
                    mount for mount in mounts
                    if mount.get("Type") == "tmpfs"
                    and mount.get("Destination") == "/host/run"
                ]
                tmpfs = (container.get("HostConfig") or {}).get("Tmpfs")
                return (
                    len(root_binds) == 1
                    and len(all_host_root_binds) == 1
                    and len(run_masks) == 1
                    and isinstance(tmpfs, dict)
                    and "/host/run" in tmpfs
                )

            for container in containers:
                labels = (container.get("Config") or {}).get("Labels") or {}
                container_id = container.get("Id", "")
                valid_project_labels = (
                    labels.get("com.docker.compose.project") == project
                    and labels.get("com.docker.compose.project.working_dir") == stack_dir
                    and re.fullmatch(r"[a-z0-9][a-z0-9_-]{0,62}", labels.get("com.docker.compose.service", ""))
                    and re.fullmatch(r"[0-9a-f]{64}", labels.get("com.docker.compose.config-hash", ""))
                )
                if valid_project_labels:
                    project_ids.add(container_id)
                else:
                    foreign_containers.append(container_id)
                mounts = normalized_container_mounts(container)
                if mounts is None:
                    # Docker supplied an ambiguous mount model. Treat it as a
                    # control-socket/root-bind boundary failure rather than
                    # assuming a malformed entry is harmless.
                    docker_socket_mounts.append(container_id or "?")
                    unapproved_host_root_mounts.append(container_id or "?")
                    continue
                if any(bind_exposes_docker_socket(mount, mounts) for mount in mounts):
                    docker_socket_mounts.append(container_id or "?")
                if any(is_host_root_bind(mount) for mount in mounts) and not has_approved_node_exporter_rootfs(container, mounts):
                    unapproved_host_root_mounts.append(container_id or "?")

            network_ids = invoke("network", "ls", "-q").split()
            networks = json.loads(invoke("network", "inspect", *network_ids)) if network_ids else []
            actual_by_name = {network.get("Name", ""): network for network in networks}
            links_result = subprocess.run(
                ["ip", "-j", "link", "show"], text=True, stdout=subprocess.PIPE,
                stderr=subprocess.PIPE, check=False,
            )
            if links_result.returncode:
                raise RuntimeError("ip -j link show: " + links_result.stderr.strip())
            linux_links = {
                link.get("ifname") for link in json.loads(links_result.stdout)
                if link.get("ifname")
            }
            managed_subnets = [
                ipaddress.ip_network(entry["subnet"], strict=True)
                for entry in expected.values()
            ]
            default_bridge_overlap = []
            bridge = actual_by_name.get("bridge")
            if bridge is not None:
                for entry in ((bridge.get("IPAM") or {}).get("Config") or []):
                    subnet_text = entry.get("Subnet")
                    if not subnet_text:
                        continue
                    try:
                        subnet = ipaddress.ip_network(subnet_text, strict=True)
                    except ValueError:
                        default_bridge_overlap.append(f"invalid default bridge subnet {subnet_text!r}")
                        continue
                    if any(subnet.overlaps(managed) for managed in managed_subnets):
                        default_bridge_overlap.append(str(subnet))
            for pool in info.get("DefaultAddressPools") or []:
                base = pool.get("Base") or pool.get("base")
                if not base:
                    default_bridge_overlap.append("malformed Docker default address pool")
                    continue
                try:
                    pool_network = ipaddress.ip_network(base, strict=True)
                except ValueError:
                    default_bridge_overlap.append(f"invalid Docker default address pool {base!r}")
                    continue
                if any(pool_network.overlaps(managed) for managed in managed_subnets):
                    default_bridge_overlap.append(f"default-pool:{pool_network}")
            foreign_networks = sorted(
                name for name in actual_by_name
                if name not in {"bridge", "host", "none"} and name not in expected
            )
            volume_ids = invoke("volume", "ls", "-q").split()
            volumes = json.loads(invoke("volume", "inspect", *volume_ids)) if volume_ids else []
            expected_volume_names = {project + "_" + name for name in expected_volumes}
            foreign_volumes = []
            volume_mismatch = []
            retained_expected_volumes = []
            for volume in volumes:
                name = volume.get("Name", "")
                if name not in expected_volume_names:
                    foreign_volumes.append(name or "?")
                    continue
                logical_name = name[len(project) + 1:]
                labels = volume.get("Labels") or {}
                if (
                    labels.get("com.docker.compose.project") != project or
                    labels.get("com.docker.compose.volume") != logical_name
                ):
                    volume_mismatch.append(name)
                retained_expected_volumes.append(name)
            mismatch = []
            attached_foreign = []
            bridge_collisions = []
            for name, wanted in expected.items():
                network = actual_by_name.get(name)
                desired = {
                    "driver": "bridge",
                    "internal": bool(wanted["internal"]),
                    "ipv6": False,
                    "bridge": wanted["bridge"],
                    "subnet": wanted["subnet"],
                    "iprange": wanted["iprange"],
                }
                actual = None
                if network is not None:
                    config = (network.get("IPAM") or {}).get("Config") or []
                    subnet = next((entry.get("Subnet") for entry in config if entry.get("Subnet")), None)
                    iprange = next((entry.get("IPRange") for entry in config if entry.get("IPRange")), None)
                    options = network.get("Options") or {}
                    actual = {
                        "driver": network.get("Driver"),
                        "internal": bool(network.get("Internal")),
                        "ipv6": bool(network.get("EnableIPv6")),
                        "bridge": options.get("com.docker.network.bridge.name"),
                        "subnet": subnet,
                        "iprange": iprange,
                    }
                    if actual != desired:
                        mismatch.append(name)
                    for container_id in (network.get("Containers") or {}):
                        if container_id not in project_ids:
                            attached_foreign.append(name + ":" + container_id)
                bridge_name = wanted["bridge"]
                if bridge_name in linux_links:
                    if actual != desired:
                        bridge_collisions.append(
                            f"Linux interface {bridge_name} is not the exact reviewed Docker bridge for {name}"
                        )
                elif actual == desired:
                    bridge_collisions.append(
                        f"reviewed Docker network {name} is missing Linux bridge {bridge_name}"
                    )

            print(json.dumps({
                "error": "",
                "docker_root": info.get("DockerRootDir", ""),
                "selinux_enabled": "name=selinux" in (info.get("SecurityOptions") or []),
                "swarm_state": (info.get("Swarm") or {}).get("LocalNodeState", "inactive"),
                "container_count": len(containers),
                "foreign_containers": sorted(foreign_containers),
                "docker_socket_mounts": sorted(docker_socket_mounts),
                "unapproved_host_root_mounts": sorted(unapproved_host_root_mounts),
                "foreign_networks": foreign_networks,
                "foreign_volumes": sorted(foreign_volumes),
                "volume_mismatch": sorted(volume_mismatch),
                "retained_expected_volumes": sorted(retained_expected_volumes),
                "network_mismatch": sorted(mismatch),
                "attached_foreign": sorted(attached_foreign),
                "bridge_collisions": sorted(bridge_collisions),
                "default_bridge_overlap": sorted(default_bridge_overlap),
            }, sort_keys=True))
        except Exception as exc:
            print(json.dumps({
                "error": str(exc), "docker_root": "", "container_count": 0,
                "selinux_enabled": False, "swarm_state": "unknown",
                "foreign_containers": [], "docker_socket_mounts": [],
                "unapproved_host_root_mounts": [], "foreign_networks": [],
                "foreign_volumes": [], "volume_mismatch": [], "retained_expected_volumes": [],
                "network_mismatch": [], "attached_foreign": [],
                "bridge_collisions": [],
                "default_bridge_overlap": [],
            }, sort_keys=True))
      - "{{ aigw_docker_cli_resolved.stdout | trim }}"
      - "{{ compose_project_name }}"
      - "{{ docker_data_root }}"
      - "{{ stack_dir }}"
      - "{{ aigw_expected_docker_networks | to_json }}"
      - "{{ aigw_expected_docker_volumes | to_json }}"
  register: aigw_live_docker_boundary_raw
  changed_when: false
  when:
    - aigw_docker_cli.rc == 0
    - aigw_docker_info.rc | default(1) == 0

- name: Preflight — record the live dedicated-Docker-host boundary
  ansible.builtin.set_fact:
    aigw_live_docker_boundary: >-
      {{
        (aigw_live_docker_boundary_raw.stdout | from_json)
        if (aigw_docker_cli.rc == 0 and aigw_docker_info.rc | default(1) == 0)
        else {'error': '', 'docker_root': '', 'container_count': 0,
              'selinux_enabled': false, 'swarm_state': 'inactive',
              'foreign_containers': [], 'docker_socket_mounts': [],
              'unapproved_host_root_mounts': [], 'foreign_networks': [],
              'foreign_volumes': [], 'volume_mismatch': [], 'retained_expected_volumes': [],
              'network_mismatch': [], 'attached_foreign': [],
              'bridge_collisions': [],
              'default_bridge_overlap': []}
      }}

- name: Preflight — inspect inactive Docker and stack roots for unknown retained state
  ansible.builtin.command:
    argv:
      - python3
      - -I
      - -c
      - |
        import json
        import os
        import sys

        for path in dict.fromkeys(json.loads(sys.argv[1])):
            try:
                names = sorted(entry.name for entry in os.scandir(path))
            except FileNotFoundError:
                names = []
            if names:
                print(f"{path}: {', '.join(names)}")
      - >-
        {{ [docker_data_root, aigw_daemon_config_contract.existing_data_root, stack_dir]
           | unique | list | to_json }}
  register: aigw_inactive_roots
  changed_when: false
  when:
    - not (aigw_docker_cli.rc == 0 and aigw_docker_info.rc | default(1) == 0)

- name: Preflight — require a non-running Docker root to be empty unless this is a marked AIGW host
  ansible.builtin.assert:
    that:
      - >-
        (aigw_host_ownership_proven | default(false) | bool) or
        (aigw_inactive_roots.stdout | trim | length == 0)
    quiet: true
    fail_msg: >-
      Docker is not running and a configured/current data root or stack
      directory contains uninspectable retained state. Refuse to start or
      adopt it blindly; bring the dedicated host up for read-only inspection
      or restore its verified AI Gateway ownership marker first.
  when:
    - not (aigw_docker_cli.rc == 0 and aigw_docker_info.rc | default(1) == 0)

- name: Preflight — require an active Docker host to contain only AIGW or default objects
  ansible.builtin.assert:
    that:
      - aigw_live_docker_boundary.error | length == 0
      - aigw_live_docker_boundary.docker_root == docker_data_root
      - aigw_live_docker_boundary.foreign_containers | length == 0
      - aigw_live_docker_boundary.docker_socket_mounts | length == 0
      - aigw_live_docker_boundary.unapproved_host_root_mounts | length == 0
      - aigw_live_docker_boundary.foreign_networks | length == 0
      - aigw_live_docker_boundary.foreign_volumes | length == 0
      - aigw_live_docker_boundary.volume_mismatch | length == 0
      - aigw_live_docker_boundary.network_mismatch | length == 0
      - aigw_live_docker_boundary.attached_foreign | length == 0
      - aigw_live_docker_boundary.bridge_collisions | length == 0
      - aigw_live_docker_boundary.default_bridge_overlap | length == 0
      - aigw_live_docker_boundary.swarm_state == 'inactive'
    quiet: true
    fail_msg: >-
      Refusing existing Docker host: AI Gateway requires a dedicated Docker
      root. Foreign containers/networks, an incompatible named AIGW network,
      an unexpected attachment, or a different DockerRootDir would be changed
      by daemon-wide firewall/logging policy.
  when:
    - aigw_docker_cli.rc == 0
    - aigw_docker_info.rc | default(1) == 0

- name: Preflight — require explicit adoption for retained named volumes on an unmarked Docker host
  ansible.builtin.assert:
    that:
      - >-
        (aigw_host_ownership_proven | default(false) | bool) or
        (aigw_live_docker_boundary.retained_expected_volumes | length == 0) or
        (aigw_adopt_dedicated_docker_host | bool)
    quiet: true
    fail_msg: >-
      Existing Compose-named Docker volumes are unmarked. Inspect the retained
      state and re-run with aigw_adopt_dedicated_docker_host=true only when it
      belongs to this AI Gateway deployment.
  when:
    - aigw_docker_cli.rc == 0
    - aigw_docker_info.rc | default(1) == 0

- name: Preflight — allow only a clean, marked, legacy-AIGW-only, or explicitly adopted daemon configuration
  ansible.builtin.assert:
    that:
      - aigw_daemon_config_contract.state != 'invalid'
      - >-
        aigw_daemon_config_contract.state in ['absent', 'exact'] or
        (aigw_adopt_dedicated_docker_host | bool)
      - >-
        not (aigw_docker_daemon_active | bool) or
        (aigw_host_marker_stat.exists | default(false)) or
        aigw_daemon_config_contract.state != 'absent' or
        (aigw_adopt_dedicated_docker_host | bool)
      - >-
        not (aigw_host_marker_stat.exists | default(false)) or
        aigw_daemon_config_contract.state == 'exact'
    quiet: true
    fail_msg: >-
      Refusing existing-host adoption: /etc/docker/daemon.json is not the
      reviewed dedicated-AIGW contract. Use the explicit adoption flag only
      after confirming this is a clean dedicated Docker host; an invalid file
      or a marked host with drift is never overwritten automatically.

- name: Preflight — record whether an explicit daemon adoption backup is required
  ansible.builtin.set_fact:
    aigw_docker_daemon_adoption_required: >-
      {{
        (aigw_daemon_config_contract.state == 'different') and
        (aigw_adopt_dedicated_docker_host | bool)
      }}
