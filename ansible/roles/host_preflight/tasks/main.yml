---
# This role is deliberately read-only.  The full stack owns daemon-wide Docker
# policy and all Docker bridge egress, so it must never be applied to a host
# carrying an unrelated workload.  A clean existing Rocky VM and a previous
# AI Gateway-only converge are valid inputs; ambiguous Docker state is not.

- name: Preflight — prove a fresh key-only controller SSH path before firewall mutation
  ansible.builtin.command:
    argv: "{{ aigw_controller_ssh_argv + ['/usr/bin/bash', '-c', 'sudo -n true && exec /usr/bin/printenv SSH_CONNECTION'] }}"
  vars:
    aigw_controller_ssh_argv: >-
      {{
        ['ssh', '-p', ansible_port | default(22) | string]
        + (
            ['-i', ansible_ssh_private_key_file]
            if ansible_ssh_private_key_file is defined
              and ansible_ssh_private_key_file | length > 0
            else []
          )
        + [
            '-o', 'BatchMode=yes',
            '-o', 'PasswordAuthentication=no',
            '-o', 'KbdInteractiveAuthentication=no',
            '-o', 'PreferredAuthentications=publickey',
            '-o', 'StrictHostKeyChecking=yes',
            '-o', 'ConnectTimeout=10',
            ansible_user ~ '@' ~ ansible_host
          ]
      }}
  delegate_to: localhost
  become: false
  changed_when: false
  register: aigw_controller_ssh_transport

- name: Preflight — require the controller to enter through the future ADM SSH rule
  ansible.builtin.command:
    argv:
      - python3
      - -I
      - -c
      - |
        import ipaddress
        import sys

        fields = sys.argv[1].split()
        if len(fields) != 4:
            raise SystemExit("fresh SSH transport did not yield four SSH_CONNECTION fields")
        client, client_port, server, server_port = fields
        try:
            client_address = ipaddress.ip_address(client)
            allowed = ipaddress.ip_network(sys.argv[2], strict=True)
            expected_port = int(sys.argv[5])
            int(client_port)
            actual_port = int(server_port)
        except ValueError as exc:
            raise SystemExit(f"invalid SSH transport tuple: {exc}") from exc
        if client_address not in allowed:
            raise SystemExit(
                f"controller source {client_address} is outside ADM management CIDR {allowed}"
            )
        if server != sys.argv[3]:
            raise SystemExit(
                f"controller reaches {server}, not configured ADM address {sys.argv[3]}"
            )
        if actual_port != expected_port:
            raise SystemExit(
                f"controller reaches SSH port {actual_port}, not managed firewall port {expected_port}"
            )
        if int(sys.argv[4]) != expected_port:
            raise SystemExit("inventory ansible_port and managed SSH firewall port disagree")
      - "{{ aigw_controller_ssh_transport.stdout | trim }}"
      - "{{ vpn_client_cidr }}"
      - "{{ eth1_ip }}"
      - "{{ ansible_port | default(22) | string }}"
      - "{{ aigw_management_ssh_port | string }}"
  changed_when: false

- name: Preflight — inspect Docker CLI availability without starting Docker
  ansible.builtin.command:
    argv: [/usr/bin/bash, -c, 'command -v docker']
  register: aigw_docker_cli
  changed_when: false
  failed_when: false

- name: Preflight — inspect Docker daemon state without starting it
  ansible.builtin.command:
    argv:
      - /usr/bin/env
      - -u
      - DOCKER_CONFIG
      - -u
      - DOCKER_CONTEXT
      - -u
      - DOCKER_HOST
      - "{{ aigw_docker_cli.stdout | trim }}"
      - --host
      - unix:///run/docker.sock
      - info
      - --format=json
  register: aigw_docker_info
  changed_when: false
  failed_when: false
  when: aigw_docker_cli.rc == 0

- name: Preflight — record whether the local Docker daemon is active
  ansible.builtin.set_fact:
    aigw_docker_daemon_active: >-
      {{ (aigw_docker_cli.rc == 0) and (aigw_docker_info.rc | default(1) == 0) }}

# Docker plugins are daemon-wide code/configuration. A dedicated gateway host
# models no plugins, so even a disabled retained plugin is an adoption hazard
# rather than harmless empty Docker state.
- name: Preflight — inventory installed Docker plugins on the local daemon
  ansible.builtin.command:
    argv:
      - /usr/bin/env
      - -u
      - DOCKER_CONFIG
      - -u
      - DOCKER_CONTEXT
      - -u
      - DOCKER_HOST
      - "{{ aigw_docker_cli.stdout | trim }}"
      - --host
      - unix:///run/docker.sock
      - plugin
      - ls
      - --format
      - "{{ '{{json .}}' }}"
  register: aigw_docker_plugins
  changed_when: false
  when: aigw_docker_daemon_active | bool

- name: Preflight — require the dedicated Docker host to have no plugins
  ansible.builtin.assert:
    that:
      - aigw_docker_plugins.stdout_lines | reject('equalto', '') | list | length == 0
    quiet: true
    fail_msg: >-
      Refusing existing-host adoption: the dedicated AI Gateway Docker host
      must not retain Docker plugins. Remove/review every plugin before this
      platform takes ownership of daemon-wide Docker policy.
  when: aigw_docker_daemon_active | bool

- name: Preflight — determine whether a Docker systemd unit exists without starting it
  ansible.builtin.command:
    argv:
      - systemctl
      - show
      - docker.service
      - --property=LoadState
      - --value
  register: aigw_docker_systemd_load_state
  changed_when: false
  failed_when: false

- name: Preflight — record whether a Docker systemd unit is installed
  ansible.builtin.set_fact:
    aigw_docker_systemd_unit_installed: >-
      {{ (aigw_docker_systemd_load_state.rc | default(1) == 0) and
         (aigw_docker_systemd_load_state.stdout | trim == 'loaded') }}

- name: Preflight — reject local or transient Docker systemd overrides before adoption
  ansible.builtin.command:
    argv:
      - python3
      - -I
      - -c
      - |
        import os
        import stat

        errors = []
        for unit_path in (
            "/etc/systemd/system/docker.service",
            "/run/systemd/system/docker.service",
        ):
            try:
                metadata = os.lstat(unit_path)
            except FileNotFoundError:
                continue
            if stat.S_ISLNK(metadata.st_mode):
                errors.append(f"unsafe Docker systemd unit override {unit_path}")
            else:
                errors.append(f"unreviewed Docker systemd unit override {unit_path}")

        for directory in (
            "/etc/systemd/system/docker.service.d",
            "/run/systemd/system/docker.service.d",
        ):
            try:
                metadata = os.lstat(directory)
            except FileNotFoundError:
                continue
            if (stat.S_ISLNK(metadata.st_mode) or not stat.S_ISDIR(metadata.st_mode) or
                    metadata.st_uid != 0 or metadata.st_gid != 0 or metadata.st_mode & 0o022):
                errors.append(f"unsafe Docker systemd drop-in directory {directory}")
                continue
            with os.scandir(directory) as entries:
                for entry in entries:
                    try:
                        child = entry.stat(follow_symlinks=False)
                    except OSError:
                        errors.append(f"uninspectable Docker systemd drop-in {entry.path}")
                        continue
                    if (stat.S_ISLNK(child.st_mode) or not stat.S_ISREG(child.st_mode) or
                            child.st_uid != 0 or child.st_gid != 0 or child.st_mode & 0o022):
                        errors.append(f"unsafe Docker systemd drop-in {entry.path}")
                    else:
                        errors.append(f"unreviewed Docker systemd drop-in {entry.path}")
        if errors:
            raise SystemExit("; ".join(dict.fromkeys(errors)))
  changed_when: false

- name: Preflight — inspect Docker systemd unit and drop-ins without mutation
  ansible.builtin.command:
    argv: [systemctl, cat, docker.service]
  register: aigw_docker_systemd_unit
  changed_when: false
  failed_when: false
  no_log: true
  when: aigw_docker_systemd_unit_installed | bool

# `systemctl cat` includes the unit and drop-ins, but does not expand an
# EnvironmentFile.  A local administrator could otherwise hide a conflicting
# `DOCKER_OPTS=--data-root …` (or other daemon-wide option) there.  Capture
# systemd's resolved command/environment metadata as well; the subsequent
# read-only parser opens only canonical, root-owned environment files and
# reports option names, never their values.
- name: Preflight — inspect resolved Docker systemd environment metadata without mutation
  ansible.builtin.command:
    argv:
      - systemctl
      - show
      - docker.service
      - --no-pager
      - --property=ExecStart
      - --property=Environment
      - --property=EnvironmentFiles
  register: aigw_docker_systemd_show
  changed_when: false
  failed_when: false
  no_log: true
  when: aigw_docker_systemd_unit_installed | bool

- name: Preflight — reject daemon flags hidden in Docker systemd environment files
  ansible.builtin.command:
    argv:
      - python3
      - -I
      - -c
      - |
        import json
        import os
        import re
        import stat
        import sys

        payload = json.load(sys.stdin)
        unit = payload.get("unit", "")
        resolved = payload.get("resolved", "")
        pattern = re.compile(
            r"(?<![A-Za-z0-9_-])(?:"
            r"--(?:data-root|iptables|ip6tables|log-driver|log-opt|"
            r"selinux-enabled|firewall-backend|bip|fixed-cidr|"
            r"default-address-pool|bridge|config-file)(?:=|\s|$)|"
            r"-g(?:=|\s|$)"
            r")"
        )
        environment_file_paths = set()
        for source in (unit, resolved):
            for candidate in re.findall(r"(?m)^\s*EnvironmentFile\s*=\s*-?([^\s#]+)", source):
                environment_file_paths.add(candidate)
            for candidate in re.findall(r"(?m)^EnvironmentFiles=(.*)$", source):
                environment_file_paths.update(re.findall(r"/(?:[^\s()]*)", candidate))

        sources = [unit, resolved]
        errors = []
        for path in sorted(environment_file_paths):
            if not re.fullmatch(r"/(?:[A-Za-z0-9][A-Za-z0-9._-]{0,62})(?:/[A-Za-z0-9][A-Za-z0-9._-]{0,62}){0,15}", path):
                errors.append(f"unsafe Docker EnvironmentFile path {path!r}")
                continue
            try:
                descriptor = os.open(path, os.O_RDONLY | os.O_CLOEXEC | os.O_NOFOLLOW)
            except FileNotFoundError:
                # A systemd EnvironmentFile prefixed with '-' is optional;
                # an absent file contributes no daemon option.
                continue
            except OSError as exc:
                errors.append(f"cannot inspect Docker EnvironmentFile {path}: {exc}")
                continue
            try:
                metadata = os.fstat(descriptor)
                if not stat.S_ISREG(metadata.st_mode) or metadata.st_uid != 0 or metadata.st_gid != 0 or metadata.st_mode & 0o022:
                    errors.append(f"unsafe Docker EnvironmentFile boundary {path}")
                    continue
                with os.fdopen(descriptor, "r", encoding="utf-8", errors="replace", closefd=False) as stream:
                    sources.append(stream.read())
            finally:
                os.close(descriptor)

        matches = sorted({
            match.group(0).strip()
            for source in sources
            for match in pattern.finditer(source)
        })
        # Refuse indirection even when the current value does not match our
        # small flag list: an ExecStart that consumes these variables makes
        # the unit contract dependent on an unreviewed environment file.
        indirect = sorted({
            name
            for source in sources
            for name in re.findall(r"\b(DOCKER_(?:OPTS|DAEMON_OPTIONS|EXTRA_ARGS))\b", source)
        })
        print(json.dumps({"errors": errors, "flags": matches, "indirect": indirect}, sort_keys=True))
    stdin: >-
      {{ {
           'unit': aigw_docker_systemd_unit.stdout | default(''),
           'resolved': aigw_docker_systemd_show.stdout | default('')
         } | to_json }}
    stdin_add_newline: false
  register: aigw_docker_systemd_conflicts_raw
  changed_when: false
  when:
    - aigw_docker_systemd_unit_installed | bool
    - aigw_docker_systemd_unit.rc | default(1) == 0
    - aigw_docker_systemd_show.rc | default(1) == 0
  no_log: true

- name: Preflight — record conflicting Docker systemd flags
  ansible.builtin.set_fact:
    aigw_docker_systemd_conflicts: >-
      {{
        (aigw_docker_systemd_conflicts_raw.stdout | from_json)
        if (
          (aigw_docker_systemd_unit_installed | bool) and
          (aigw_docker_systemd_unit.rc | default(1) == 0) and
          (aigw_docker_systemd_show.rc | default(1) == 0)
        )
        else {'errors': [], 'flags': [], 'indirect': []}
      }}
  no_log: true

- name: Preflight — require an inspectable local Docker service contract
  ansible.builtin.assert:
    that:
      - not (aigw_docker_systemd_unit_installed | bool) or aigw_docker_systemd_unit.rc == 0
      - not (aigw_docker_systemd_unit_installed | bool) or aigw_docker_systemd_show.rc == 0
      - aigw_docker_systemd_conflicts.errors | length == 0
      - aigw_docker_systemd_conflicts.flags | length == 0
      - aigw_docker_systemd_conflicts.indirect | length == 0
    quiet: true
    fail_msg: >-
      Refusing existing-host adoption: Docker's systemd unit/drop-ins contain
      daemon settings that conflict with the reviewed data-root, firewall,
      logging, address-pool, or SELinux contract, or an unreviewed DOCKER_OPTS
      indirection.

- name: Preflight — reject unsafe existing ancestors for mutable host paths
  ansible.builtin.command:
    argv:
      - python3
      - -I
      - -c
      - |
        import json
        import os
        import stat
        import sys

        errors = []
        for configured in json.loads(sys.argv[1]):
            current = "/"
            parts = [part for part in configured.split("/") if part]
            for index, part in enumerate(parts):
                current = os.path.join(current, part)
                try:
                    metadata = os.lstat(current)
                except FileNotFoundError:
                    break
                if stat.S_ISLNK(metadata.st_mode):
                    errors.append(f"{configured}: symlinked ancestor {current}")
                    break
                if metadata.st_uid != 0 or metadata.st_gid != 0:
                    errors.append(f"{configured}: non-root ancestor {current}")
                    break
                if metadata.st_mode & 0o022:
                    errors.append(f"{configured}: group/other-writable ancestor {current}")
                    break
                if index < len(parts) - 1 and not stat.S_ISDIR(metadata.st_mode):
                    errors.append(f"{configured}: non-directory ancestor {current}")
                    break
        if errors:
            raise SystemExit("; ".join(dict.fromkeys(errors)))
      - >-
        {{ [stack_dir, docker_data_root, aigw_docker_host_marker | dirname, '/etc/docker',
            '/usr/local/sbin', '/etc/systemd/system',
            '/etc/NetworkManager/dispatcher.d', '/etc/iproute2',
            '/etc/ssh/sshd_config.d']
           | unique | list | to_json }}
  changed_when: false

- name: Preflight — inspect existing AI Gateway ownership and state paths
  ansible.builtin.stat:
    path: "{{ item }}"
    follow: false
    get_checksum: false
  loop:
    - "{{ aigw_docker_host_marker }}"
    - "{{ aigw_docker_host_pending_marker }}"
    - /etc/docker/daemon.json
    - "{{ stack_dir }}"
    - "{{ docker_data_root }}"
  register: aigw_host_boundary_paths
  changed_when: false

- name: Preflight — name existing host-boundary objects
  ansible.builtin.set_fact:
    aigw_host_marker_stat: "{{ aigw_host_boundary_paths.results[0].stat }}"
    aigw_host_pending_marker_stat: "{{ aigw_host_boundary_paths.results[1].stat }}"
    aigw_daemon_config_stat: "{{ aigw_host_boundary_paths.results[2].stat }}"
    aigw_stack_dir_stat: "{{ aigw_host_boundary_paths.results[3].stat }}"
    aigw_docker_root_stat: "{{ aigw_host_boundary_paths.results[4].stat }}"

- name: Preflight — define root-managed host artifacts that may be replaced later
  ansible.builtin.set_fact:
    aigw_managed_host_artifacts:
      - { path: "{{ aigw_docker_host_marker }}.pre-adoption-daemon.json", adoption: docker }
      - { path: /usr/local/sbin/aigw-policy-routing, adoption: docker }
      - { path: /etc/NetworkManager/dispatcher.d/90-aigw-policy-routing, adoption: docker }
      - { path: /etc/systemd/system/aigw-policy-routing.service, adoption: docker }
      - { path: /usr/local/sbin/docker-user-rules.sh, adoption: firewall }
      - { path: /usr/local/sbin/aigw-host-input-rules.sh, adoption: firewall }
      - { path: /usr/local/sbin/docker-user-rules-watch.sh, adoption: firewall }
      - { path: /etc/systemd/system/aigw-host-input-rules.service, adoption: firewall }
      - { path: /etc/systemd/system/docker-user-rules.service, adoption: firewall }
      - { path: /etc/systemd/system/docker-user-rules-watch.service, adoption: firewall }
      - { path: /etc/NetworkManager/dispatcher.d/91-aigw-firewalld-zones, adoption: firewall }
      - { path: /etc/ssh/sshd_config.d/00-ai-gateway-hardening.conf, adoption: ssh }
      - { path: /usr/local/sbin/aigw-docker-log-acl, adoption: docker }
      - { path: /usr/local/sbin/aigw-load-offline-image-seed, adoption: docker }
      - { path: /etc/systemd/system/aigw-docker-log-acl.service, adoption: docker }
      - { path: /etc/systemd/system/aigw-docker-log-acl.timer, adoption: docker }
      - { path: /etc/systemd/system/aigw-vault-audit-rotate.service, adoption: docker }
      - { path: /etc/systemd/system/aigw-vault-audit-rotate.timer, adoption: docker }

- name: Preflight — reject unsafe or unowned existing AIGW-managed host artifacts
  ansible.builtin.command:
    argv:
      - python3
      - -I
      - -c
      - |
        import json
        import os
        import stat
        import sys

        artifacts = json.loads(sys.argv[1])
        has_marker = sys.argv[2] == "true"
        docker_adoption = sys.argv[3] == "true"
        firewall_adoption = sys.argv[4] == "true"
        ssh_adoption = sys.argv[5] == "true"
        adoptions = {
            "docker": docker_adoption,
            "firewall": firewall_adoption,
            "ssh": ssh_adoption,
        }
        errors = []
        for artifact in artifacts:
            path = artifact["path"]
            try:
                metadata = os.lstat(path)
            except FileNotFoundError:
                continue
            if (
                stat.S_ISLNK(metadata.st_mode) or
                not stat.S_ISREG(metadata.st_mode) or
                metadata.st_uid != 0 or metadata.st_gid != 0 or
                metadata.st_mode & 0o022
            ):
                errors.append(f"unsafe existing managed artifact {path}")
                continue
            adoption_granted = adoptions[artifact["adoption"]]
            if not has_marker and not adoption_granted:
                errors.append(
                    f"unmarked existing managed artifact {path} requires explicit {artifact['adoption']} adoption"
                )
        if errors:
            raise SystemExit("; ".join(dict.fromkeys(errors)))
      - "{{ aigw_managed_host_artifacts | to_json }}"
      - "{{ 'true' if (aigw_host_marker_stat.exists | default(false)) else 'false' }}"
      - "{{ 'true' if (aigw_adopt_dedicated_docker_host | bool) else 'false' }}"
      - "{{ 'true' if (aigw_adopt_firewalld_state | bool) else 'false' }}"
      - "{{ 'true' if (aigw_adopt_ssh_state | bool) else 'false' }}"
  changed_when: false

- name: Preflight — reject unmanaged drop-ins for AI Gateway systemd units
  ansible.builtin.command:
    argv:
      - python3
      - -I
      - -c
      - |
        import json
        import os
        import stat
        import sys

        errors = []
        for unit in json.loads(sys.argv[1]):
            unit_name = os.path.basename(unit)
            for root in (
                "/etc/systemd/system", "/run/systemd/system",
                "/usr/local/lib/systemd/system", "/usr/lib/systemd/system",
            ):
                directory = os.path.join(root, unit_name + ".d")
                try:
                    metadata = os.lstat(directory)
                except FileNotFoundError:
                    continue
                if (stat.S_ISLNK(metadata.st_mode) or not stat.S_ISDIR(metadata.st_mode) or
                        metadata.st_uid != 0 or metadata.st_gid != 0 or metadata.st_mode & 0o022):
                    errors.append(f"unsafe managed-unit drop-in directory {directory}")
                    continue
                with os.scandir(directory) as entries:
                    for entry in entries:
                        try:
                            child = entry.stat(follow_symlinks=False)
                        except OSError:
                            errors.append(f"uninspectable managed-unit drop-in {entry.path}")
                            continue
                        if (stat.S_ISLNK(child.st_mode) or not stat.S_ISREG(child.st_mode) or
                                child.st_uid != 0 or child.st_gid != 0 or child.st_mode & 0o022):
                            errors.append(f"unsafe managed-unit drop-in {entry.path}")
                        else:
                            errors.append(f"unmanaged managed-unit drop-in {entry.path}")
        if errors:
            raise SystemExit("; ".join(dict.fromkeys(errors)))
      - >-
        {{ [
             '/etc/systemd/system/aigw-policy-routing.service',
             '/etc/systemd/system/aigw-host-input-rules.service',
             '/etc/systemd/system/docker-user-rules.service',
             '/etc/systemd/system/docker-user-rules-watch.service',
             '/etc/systemd/system/aigw-docker-log-acl.service',
             '/etc/systemd/system/aigw-docker-log-acl.timer',
             '/etc/systemd/system/aigw-vault-audit-rotate.service',
             '/etc/systemd/system/aigw-vault-audit-rotate.timer'
           ] | to_json }}
  changed_when: false

- name: Preflight — reject symlinked or non-root host-boundary objects
  ansible.builtin.assert:
    that:
      - >-
        not (aigw_host_marker_stat.exists | default(false)) or
        (aigw_host_marker_stat.isreg | default(false) and
         not (aigw_host_marker_stat.islnk | default(false)) and
         aigw_host_marker_stat.uid == 0 and aigw_host_marker_stat.gid == 0 and
         aigw_host_marker_stat.mode == '0600')
      - >-
        not (aigw_host_pending_marker_stat.exists | default(false)) or
        (aigw_host_pending_marker_stat.isreg | default(false) and
         not (aigw_host_pending_marker_stat.islnk | default(false)) and
         aigw_host_pending_marker_stat.uid == 0 and
         aigw_host_pending_marker_stat.gid == 0 and
         aigw_host_pending_marker_stat.mode == '0600')
      - >-
        not (aigw_daemon_config_stat.exists | default(false)) or
        (aigw_daemon_config_stat.isreg | default(false) and
         not (aigw_daemon_config_stat.islnk | default(false)) and
         aigw_daemon_config_stat.uid == 0 and aigw_daemon_config_stat.gid == 0)
      - >-
        not (aigw_stack_dir_stat.exists | default(false)) or
        (aigw_stack_dir_stat.isdir | default(false) and
         not (aigw_stack_dir_stat.islnk | default(false)) and
         aigw_stack_dir_stat.uid == 0 and aigw_stack_dir_stat.gid == 0)
      - >-
        not (aigw_docker_root_stat.exists | default(false)) or
        (aigw_docker_root_stat.isdir | default(false) and
         not (aigw_docker_root_stat.islnk | default(false)) and
         aigw_docker_root_stat.uid == 0 and aigw_docker_root_stat.gid == 0)
    quiet: true
    fail_msg: >-
      Refusing existing-host adoption: an AI Gateway marker, pending marker,
      daemon config, stack directory, or Docker root is symlinked,
      noncanonical, or not root-owned.

- name: Preflight — read a valid-shaped existing ownership marker
  ansible.builtin.slurp:
    src: "{{ aigw_docker_host_marker }}"
  register: aigw_host_marker_raw
  no_log: true
  when: aigw_host_marker_stat.exists | default(false)

- name: Preflight — read a valid-shaped in-progress ownership marker
  ansible.builtin.slurp:
    src: "{{ aigw_docker_host_pending_marker }}"
  register: aigw_host_pending_marker_raw
  no_log: true
  when: aigw_host_pending_marker_stat.exists | default(false)

- name: Preflight — define the exact dedicated-Docker-host marker contract
  ansible.builtin.set_fact:
    aigw_docker_host_marker_content: |
      format=aigw-dedicated-docker-host-v1
      project={{ compose_project_name }}
      docker_data_root={{ docker_data_root }}

- name: Preflight — require an existing marker to describe this exact host contract
  ansible.builtin.assert:
    that:
      - (aigw_host_marker_raw.content | b64decode) == aigw_docker_host_marker_content
    quiet: true
    fail_msg: >-
      Refusing existing-host adoption: the dedicated-Docker-host marker does
      not describe this project and Docker root.
  when: aigw_host_marker_stat.exists | default(false)
  no_log: true

- name: Preflight — require an in-progress marker to describe this exact host contract
  ansible.builtin.assert:
    that:
