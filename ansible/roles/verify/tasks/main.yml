- name: Prove exact non-root bind-source ownership and modes
  ansible.builtin.command:
    argv:
      - python3
      - -I
      - -c
      - |
        import os
        from pathlib import Path
        import stat
        import sys

        root = Path(sys.argv[1])
        samba_enabled = sys.argv[2] == "true"
        expected = {
            "certs": ("dir", 0, 65532, 0o750),
            "certs/int.key": ("file", 0, 65532, 0o640),
            "certs/int.crt": ("file", 0, 0, 0o644),
            "certs/ca.pem": ("file", 0, 0, 0o644),
            "traefik/dynamic-int.yml": ("file", 0, 0, 0o644),
            "traefik/dynamic-adm.yml": ("file", 0, 0, 0o644),
            "grafana": ("dir", 0, 0, 0o755),
            "grafana/provisioning": ("dir", 0, 0, 0o755),
            "grafana/provisioning/datasources": ("dir", 0, 0, 0o755),
            "grafana/provisioning/datasources/datasources.yml": ("file", 0, 0, 0o644),
            "keycloak/realms": ("dir", 0, 65532, 0o750),
            "keycloak/realms/aigw-realm.json": ("file", 0, 65532, 0o640),
            "keycloak/realms/anthropic-wif-realm.json": ("file", 0, 65532, 0o640),
            "secrets": ("dir", 0, 0, 0o700),
            "secrets/redis_password": ("file", 0, 65532, 0o440),
            "secrets/redis_users.acl": ("file", 0, 65532, 0o440),
        }
        if samba_enabled:
            expected.update({
                "secrets/samba_ad_admin_password": ("file", 0, 0, 0o400),
                "secrets/samba_ad_bind_password": ("file", 0, 65532, 0o440),
                "secrets/samba_user_lab-admin_password": ("file", 0, 0, 0o400),
                "secrets/samba_user_lab-developer_password": ("file", 0, 0, 0o400),
                "secrets/samba_user_lab-user_password": ("file", 0, 0, 0o400),
            })
        errors = []
        for relative, (kind, uid, gid, mode) in expected.items():
            path = root / relative
            try:
                info = path.lstat()
            except FileNotFoundError:
                errors.append(f"{relative}: missing")
                continue
            actual_kind = "file" if stat.S_ISREG(info.st_mode) else "dir" if stat.S_ISDIR(info.st_mode) else "unsafe"
            actual = (actual_kind, info.st_uid, info.st_gid, stat.S_IMODE(info.st_mode))
            wanted = (kind, uid, gid, mode)
            if path.is_symlink() or actual != wanted or (kind == "file" and info.st_nlink != 1):
                errors.append(f"{relative}: got={actual!r} wanted={wanted!r} links={info.st_nlink}")
        if errors:
            raise SystemExit("; ".join(errors))
      - "{{ stack_dir }}"
      - "{{ samba_lab_enabled | bool | lower }}"
  changed_when: false

- name: Prove selected DHI services actually run as uid and gid 65532
  ansible.builtin.command:
    argv:
      - python3
      - -I
      - -c
      - |
        import json
        from pathlib import Path
        import subprocess
        import sys

        name = sys.argv[1]
        details = json.loads(subprocess.check_output(["docker", "--host", "unix:///run/docker.sock", "inspect", name], text=True))[0]
        pid = int(details["State"]["Pid"])
        if pid <= 0 or not details["State"]["Running"]:
            raise SystemExit(f"{name} is not running")
        fields = {}
        for line in Path(f"/proc/{pid}/status").read_text().splitlines():
            if line.startswith(("Uid:", "Gid:")):
                key, values = line.split(":", 1)
                fields[key] = tuple(int(value) for value in values.split())
        if fields.get("Uid") != (65532, 65532, 65532, 65532):
            raise SystemExit(f"{name} unexpected Uid tuple")
        if fields.get("Gid") != (65532, 65532, 65532, 65532):
            raise SystemExit(f"{name} unexpected Gid tuple")
      - "{{ compose_project_name }}-{{ item }}-1"
  loop:
    - traefik-int
    - traefik-adm
    - keycloak
    - redis
    - grafana
    - key-rotator
  loop_control:
    label: "{{ item }}"
  changed_when: false

- name: Prove trusted TLS and SNI routing through the exact service-plane edge addresses
  ansible.builtin.command:
    argv:
      - python3
      - -I
      - -c
      - |
        import socket
        import ssl
        import sys

        ca_file, address, hostname, path, expected_csv = sys.argv[1:]
        expected = {int(value) for value in expected_csv.split(",")}
        context = ssl.create_default_context(cafile=ca_file)
        with socket.create_connection((address, 443), timeout=5) as plain:
            with context.wrap_socket(plain, server_hostname=hostname) as tls:
                request = (
                    f"GET {path} HTTP/1.1\r\n"
                    f"Host: {hostname}\r\n"
                    "Connection: close\r\n\r\n"
                ).encode("ascii")
                tls.sendall(request)
                response = bytearray()
                while b"\r\n\r\n" not in response and len(response) <= 65536:
                    chunk = tls.recv(4096)
                    if not chunk:
                        break
                    response.extend(chunk)
        first_line = bytes(response).split(b"\r\n", 1)[0].decode("ascii", "strict")
        fields = first_line.split()
        if len(fields) < 2 or not fields[1].isdigit():
            raise SystemExit(f"invalid HTTP response for {hostname}{path}: {first_line!r}")
        status = int(fields[1])
        if status not in expected:
            raise SystemExit(
                f"unexpected status for {hostname}{path}: {status}, wanted {sorted(expected)}"
            )
      - "{{ stack_dir }}/certs/ca.pem"
      - "{{ item.address }}"
      - "{{ item.hostname }}"
      - "{{ item.path }}"
      - "{{ item.status }}"
  loop:
    # Probe each reviewed Traefik attachment directly. Host-origin traffic to
    # a physical published address is deliberately denied while the separate
    # disaster-recovery maintenance guard admits only the recovery operator;
    # listener/DNAT/firewall verification above proves physical publication.
    - { address: "{{ traefik_int_portal_ip }}", hostname: "portal.{{ aigw_domain }}", path: /healthz, status: "200" }
    - { address: "{{ traefik_int_portal_ip }}", hostname: "auth.{{ aigw_domain }}", path: /realms/aigw/.well-known/openid-configuration, status: "200" }
    - { address: "{{ traefik_int_chat_ip }}", hostname: "api.{{ aigw_domain }}", path: /ui, status: "403" }
    - { address: "{{ traefik_adm_admin_ip }}", hostname: "admin.{{ aigw_domain }}", path: /, status: "302" }
    - { address: "{{ traefik_adm_admin_ip }}", hostname: "admin-portal.{{ aigw_domain }}", path: /healthz, status: "200" }
    - { address: "{{ traefik_adm_admin_ip }}", hostname: "grafana.{{ aigw_domain }}", path: /, status: "302" }
    - { address: "{{ traefik_adm_admin_ip }}", hostname: "prometheus.{{ aigw_domain }}", path: /, status: "302" }
    - { address: "{{ traefik_adm_admin_ip }}", hostname: "vault.{{ aigw_domain }}", path: /, status: "302" }
    - { address: "{{ traefik_adm_admin_ip }}", hostname: "auth.{{ aigw_domain }}", path: /admin/, status: "302" }
  loop_control:
    label: "{{ item.hostname }}{{ item.path }} -> {{ item.status }}"
  changed_when: false

- name: Prove Grafana loaded the exact provisioned datasource graph without a local-login bypass
  ansible.builtin.command:
    argv:
      - docker
      - --host
      - unix:///run/docker.sock
      - run
      - --rm
      - -i
      - --pull=never
      - --network
      - net-observability
      - --volumes-from
      - "{{ compose_project_name }}-grafana-1:ro"
      - --read-only
      - --tmpfs
      - /tmp:rw,noexec,nosuid,nodev
      - --cap-drop
      - ALL
      - --security-opt
      - no-new-privileges:true
      - --log-driver
      - none
      - --entrypoint
      - /opt/venv/bin/python
      - ai-gateway/portal:1
      - -I
      - -c
      - |
        import sqlite3
        import urllib.request

        database = sqlite3.connect(
            "file:/var/lib/grafana/grafana.db?mode=ro", uri=True, timeout=5
        )
        actual = set(
            database.execute("SELECT name, uid, type, url FROM data_source")
        )
        expected = {
            ("Prometheus", "prometheus", "prometheus", "http://prometheus:9090"),
            ("Loki", "loki", "loki", "http://loki:3100"),
            ("Tempo", "tempo", "tempo", "http://tempo:3200"),
        }
        if actual != expected:
            raise SystemExit("Grafana datasource graph does not match the reviewed provisioning")
        # Each exact provisioned backend must answer its application-native
        # readiness endpoint from Grafana's private observability plane.
        for url in (
            "http://prometheus:9090/-/ready",
            "http://loki:3100/ready",
            "http://tempo:3200/ready",
        ):
            with urllib.request.urlopen(url, timeout=10) as response:
                if response.status != 200:
                    raise SystemExit(f"datasource backend is unhealthy: {url}")
  register: grafana_datasource_graph
  retries: 12
  delay: 5
  until: grafana_datasource_graph.rc == 0
  changed_when: false

- name: Prove Prometheus scraped the host filesystem through node-exporter
  ansible.builtin.command:
    argv:
      - python3
      - -I
      - -c
      - |
        import json
        import sys
        import urllib.parse
        import urllib.request

        base = f"http://{sys.argv[1]}:9090/api/v1/query?"

        def query(expression):
            url = base + urllib.parse.urlencode({"query": expression})
            with urllib.request.urlopen(url, timeout=5) as response:
                payload = json.load(response)
            if payload.get("status") != "success":
                raise SystemExit("Prometheus query failed")
            return payload["data"]["result"]

        up = query('up{job="node-exporter"}')
        if len(up) != 1 or float(up[0]["value"][1]) != 1.0:
            raise SystemExit("node-exporter scrape target is not exactly up")
        filesystems = query(
            'node_filesystem_size_bytes{job="node-exporter",mountpoint="/"}'
        )
        if not filesystems or not all(float(item["value"][1]) > 0 for item in filesystems):
            raise SystemExit("node-exporter did not expose the host root filesystem")
      - "{{ prometheus_observability_ip }}"
  changed_when: false

