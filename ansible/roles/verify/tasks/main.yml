---
# Post-converge assertions. Fail loudly rather than assume.

- name: Read Docker daemon state-root configuration
  ansible.builtin.command:
    argv: [docker, --host, unix:///run/docker.sock, info, --format=json]
  register: docker_info_json
  changed_when: false

- name: Docker uses the reviewed encrypted state root
  ansible.builtin.assert:
    that:
      - (docker_info_json.stdout | from_json).DockerRootDir == docker_data_root
      - "'name=selinux' in (docker_info_json.stdout | from_json).SecurityOptions"
    fail_msg: >-
      Docker must use {{ docker_data_root }} and report active SELinux support;
      host getenforce alone does not confine container processes.

- name: Prove exact SELinux, health, restart, seccomp, and capability contracts
  ansible.builtin.command:
    argv:
      - python3
      - -I
      - -c
      - |
        import json
        import os
        import re
        import subprocess
        import sys
        from pathlib import Path

        project = sys.argv[1]
        expected = set(json.loads(sys.argv[2]))
        disabled = set(json.loads(sys.argv[3]))
        expected_bind_digests = json.loads(sys.argv[4])
        allowed_unhealthy = set(json.loads(sys.argv[5]))
        docker_data_root = Path(sys.argv[6]).resolve(strict=False)
        ids = subprocess.check_output(
            ["docker", "--host", "unix:///run/docker.sock", "ps", "-q", "--filter", f"label=com.docker.compose.project={project}"],
            text=True,
        ).split()
        if not ids:
            raise SystemExit("no running project containers")
        containers = json.loads(
            subprocess.check_output(["docker", "--host", "unix:///run/docker.sock", "inspect", *ids], text=True)
        )
        actual = {}
        for container in containers:
            service = container["Config"]["Labels"].get(
                "com.docker.compose.service", ""
            )
            if not service or service in actual:
                raise SystemExit(f"missing/duplicate Compose service label: {service!r}")
            actual[service] = container
        if set(actual) != expected:
            raise SystemExit(
                f"running service drift: missing={sorted(expected-set(actual))} "
                f"unexpected={sorted(set(actual)-expected)}"
            )
        if not disabled < expected or disabled != {"alloy", "node-exporter"}:
            raise SystemExit("SELinux label-disable exception set drifted")
        if not isinstance(expected_bind_digests, dict) or not set(
            expected_bind_digests
        ) < expected:
            raise SystemExit("bind-source digest inventory drifted")
        if any(
            not re.fullmatch(r"[0-9a-f]{64}", value)
            for value in expected_bind_digests.values()
        ):
            raise SystemExit("bind-source digest marker is malformed")
        if not allowed_unhealthy <= {"vault", "key-rotator"}:
            raise SystemExit("bootstrap health exception set drifted")

        process_pattern = re.compile(
            r"^system_u:system_r:container_t:s0:c[0-9]+,c[0-9]+$"
        )
        mount_pattern = re.compile(
            r"^system_u:object_r:container_file_t:s0:c[0-9]+,c[0-9]+$"
        )
        bounded_caps = {
            "traefik-int": 0x400,
            "traefik-adm": 0x400,
            "lab-dns": 0x400,
            "vault": 0x4000,
            "samba-ad": 0x2004C3,
        }
        effective_caps = {"samba-ad": 0x2004C3}
        checked_bind_objects = 0

        def require_bind_context(source, expected):
            nonlocal_checked = 0
            root = Path(source)
            if not root.exists() or root.is_symlink():
                raise SystemExit(f"unsafe/missing bind source: {source}")
            candidates = [root]
            if root.is_dir():
                for current, directories, files in os.walk(root, followlinks=False):
                    directories.sort()
                    files.sort()
                    for name in directories + files:
                        candidate = Path(current, name)
                        if candidate.is_symlink():
                            raise SystemExit(f"symlink below bind source: {candidate}")
                        candidates.append(candidate)
                        if len(candidates) > 4096:
                            raise SystemExit(f"bind-source walk exceeds safety cap: {source}")
            for candidate in candidates:
                try:
                    context = os.getxattr(
                        candidate, "security.selinux", follow_symlinks=False
                    ).rstrip(b"\x00").decode("ascii")
                except (OSError, UnicodeError) as exc:
                    raise SystemExit(
                        f"cannot read SELinux context for {candidate}: {exc}"
                    ) from exc
                if expected == "shared":
                    if not re.fullmatch(
                        r"[^:]+:object_r:container_file_t:s0", context
                    ):
                        raise SystemExit(
                            f"{candidate}: shared bind context drift: {context}"
                        )
                elif context != expected:
                    raise SystemExit(
                        f"{candidate}: private bind MCS drift: {context} != {expected}"
                    )
                nonlocal_checked += 1
            return nonlocal_checked

        def is_host_root_bind(mount):
            if not isinstance(mount, dict) or mount.get("Type") != "bind":
                return False
            source = mount.get("Source")
            if not isinstance(source, str) or not source.startswith("/"):
                return True
            try:
                return os.path.realpath(source) == "/"
            except OSError:
                return True

        def normalized_container_mounts(container):
            """Add Docker 29 HostConfig.Tmpfs entries missing from Mounts.

            Docker Engine 29 reports configured tmpfs mounts under
            HostConfig.Tmpfs but omits them from the top-level Mounts list.
            A conflicting non-tmpfs mount at the same destination is
            ambiguous and must fail closed rather than masking a boundary.
            """
            mounts = container.get("Mounts")
            host_config = container.get("HostConfig")
            if (
                not isinstance(mounts, list)
                or any(not isinstance(mount, dict) for mount in mounts)
                or not isinstance(host_config, dict)
            ):
                return None
            tmpfs = host_config.get("Tmpfs")
            if tmpfs is None:
                return list(mounts)
            if not isinstance(tmpfs, dict):
                return None
            effective = list(mounts)
            by_destination = {}
            for mount in effective:
                destination = mount.get("Destination")
                if isinstance(destination, str):
                    by_destination.setdefault(destination, []).append(mount)
            for destination, options in tmpfs.items():
                if (
                    not isinstance(destination, str)
                    or not destination.startswith("/")
                    or destination == "/"
                    or os.path.normpath(destination) != destination
                    or not isinstance(options, str)
                ):
                    return None
                existing = by_destination.get(destination, [])
                if existing:
                    if any(mount.get("Type") != "tmpfs" for mount in existing):
                        return None
                    continue
                tmpfs_mount = {
                    "Type": "tmpfs",
                    "Destination": destination,
                }
                effective.append(tmpfs_mount)
                by_destination[destination] = [tmpfs_mount]
            return effective

        for service, container in sorted(actual.items()):
            labels = container["Config"]["Labels"]
            if labels.get("com.aigw.contract.selinux-generation") != "1":
                raise SystemExit(f"{service}: missing SELinux recreation generation")
            bind_digest = labels.get("com.aigw.contract.bind-source-digest")
            if service in expected_bind_digests:
                if bind_digest != expected_bind_digests[service]:
                    raise SystemExit(f"{service}: stale bind-source recreation marker")
            elif bind_digest is not None:
                raise SystemExit(f"{service}: unexpected bind-source recreation marker")
            host = container["HostConfig"]
            state = container["State"]
            options = set(host.get("SecurityOpt") or [])
            if host.get("Privileged"):
                raise SystemExit(f"{service}: privileged container")
            if "no-new-privileges:true" not in options:
                raise SystemExit(f"{service}: no-new-privileges absent")
            if set(host.get("CapDrop") or []) != {"ALL"}:
                raise SystemExit(f"{service}: cap-drop ALL absent")
            if not state.get("Running") or state.get("OOMKilled"):
                raise SystemExit(f"{service}: not running cleanly")
            if int(container.get("RestartCount", -1)) != 0:
                raise SystemExit(f"{service}: Docker restart count is nonzero")
            health = state.get("Health") or {}
            if service in allowed_unhealthy:
                if health.get("Status") not in {"starting", "unhealthy", "healthy"}:
                    raise SystemExit(f"{service}: health contract is absent")
            elif health.get("Status") != "healthy" or int(
                health.get("FailingStreak", -1)
            ) != 0:
                raise SystemExit(f"{service}: health contract is not clean")

            pid = int(state["Pid"])
            proc_label = (
                Path(f"/proc/{pid}/attr/current")
                .read_bytes()
                .replace(b"\x00", b"")
                .decode("ascii")
                .strip()
            )
            process_label = container.get("ProcessLabel") or ""
            mount_label = container.get("MountLabel") or ""
            if service in disabled:
                if "label=disable" not in options or any(
                    option.startswith("label=") and option != "label=disable"
                    for option in options
                ):
                    raise SystemExit(f"{service}: label-disable option drift")
                # Docker Engine 29 retains a generated MCS MountLabel in
                # inspect metadata even when label=disable makes the live
                # process run as spc_t.  This is metadata only here: these
                # bounded exceptions use no :z/:Z bind and therefore never
                # apply it to a host source.  Require it to remain a normal
                # container-file MCS label when present, while continuing to
                # reject any process-label override or non-spc_t process.
                if process_label or proc_label != "system_u:system_r:spc_t:s0":
                    raise SystemExit(f"{service}: bounded spc_t exception drift")
                if mount_label and not mount_pattern.fullmatch(mount_label):
                    raise SystemExit(
                        f"{service}: bounded spc_t MountLabel metadata drift"
                    )
                # A generated MountLabel must never turn into a relabel of a
                # host-owned source for either bounded spc_t exception. Use
                # Docker's effective Mounts metadata rather than
                # HostConfig.Binds: Engine 29 also puts named volumes in the
                # latter, and a volume is not a host bind source.
                mounts = container.get("Mounts")
                if not isinstance(mounts, list) or any(
                    not isinstance(mount, dict) for mount in mounts
                ):
                    raise SystemExit(
                        f"{service}: malformed Docker mount metadata"
                    )
                for mount in mounts:
                    if mount.get("Type") != "bind":
                        continue
                    source = mount.get("Source")
                    destination = mount.get("Destination")
                    mode = mount.get("Mode")
                    if (
                        not isinstance(source, str)
                        or not source.startswith("/")
                        or not isinstance(destination, str)
                        or not destination.startswith("/")
                        or mount.get("RW") is not False
                        or not isinstance(mode, str)
                    ):
                        raise SystemExit(
                            f"{service}: label-disable bind must be absolute and read-only"
                        )
                    if {"z", "Z"} & set(mode.split(",")):
                        raise SystemExit(
                            f"{service}: label-disable bind requested relabel"
                        )
            else:
                if "label=disable" in options or any(
                    option.startswith("label=") for option in options
                ):
                    raise SystemExit(f"{service}: unexpected SELinux label override")
                if not process_pattern.fullmatch(process_label):
                    raise SystemExit(f"{service}: missing container_t MCS ProcessLabel")
                if not mount_pattern.fullmatch(mount_label):
                    raise SystemExit(f"{service}: missing container_file_t MCS MountLabel")
                if proc_label != process_label:
                    raise SystemExit(f"{service}: live process label differs from Docker metadata")

                # Prove the host side of each *effective bind mount* remains
                # readable at this container's exact MCS level. Docker Engine
                # 29 includes named volumes in HostConfig.Binds, so iterating
                # it here mistakes approved RW state volumes for unsafe host
                # bind sources. Mounts identifies the actual mount type and
                # exposes the effective mode. This catches an unconditional
                # restorecon on a repeated converge: Compose retains an
                # unchanged container and therefore does not reapply `Z`.
                mounts = container.get("Mounts")
                if not isinstance(mounts, list) or any(
                    not isinstance(mount, dict) for mount in mounts
                ):
                    raise SystemExit(f"{service}: malformed Docker mount metadata")
                for mount in mounts:
                    if mount.get("Type") != "bind":
                        continue
                    source = mount.get("Source")
                    destination = mount.get("Destination")
                    option_text = mount.get("Mode")
                    if (
                        not isinstance(source, str)
                        or not source.startswith("/")
                        or not isinstance(destination, str)
                        or not destination.startswith("/")
                        or not isinstance(option_text, str)
                    ):
                        raise SystemExit(
                            f"{service}: malformed effective bind metadata"
                        )
                    options_set = set(option_text.split(","))
                    relabel = options_set & {"z", "Z"}
                    if mount.get("RW") is not False or "ro" not in options_set or len(relabel) != 1:
                        raise SystemExit(
                            f"{service}: unsafe effective bind options: {source}"
                        )
                    source_path = Path(source)
                    if not source_path.is_absolute():
                        raise SystemExit(f"{service}: non-absolute bind source: {source}")
                    try:
                        source_path.resolve(strict=False).relative_to(docker_data_root)
                    except ValueError:
                        source_is_docker_runtime = False
                    else:
                        source_is_docker_runtime = True
                    if source_path == Path("/") or source_is_docker_runtime:
                        raise SystemExit(f"{service}: system path requested relabel: {source}")
                    expected_context = mount_label if relabel == {"Z"} else "shared"
                    checked_bind_objects += require_bind_context(
                        source, expected_context
                    )

            expected_user = {
                "alloy": "473:473",
                "grafana": "65532",
                "node-exporter": "65532:65532",
                "open-webui": "65532:65532",
            }.get(service)
            if expected_user is not None and (container.get("Config") or {}).get("User") != expected_user:
                raise SystemExit(f"{service}: configured non-root user drift")
            if service == "node-exporter":
                mounts = normalized_container_mounts(container)
                if mounts is None:
                    raise SystemExit("node-exporter: malformed Docker mount metadata")
                root_binds = [
                    mount for mount in mounts
                    if mount.get("Type") == "bind"
                    and mount.get("Source") == "/"
                    and mount.get("Destination") == "/host"
                    and mount.get("RW") is False
                    and mount.get("Propagation") == "rslave"
                ]
                all_host_root_binds = [
                    mount for mount in mounts if is_host_root_bind(mount)
                ]
                run_masks = [
                    mount for mount in mounts
                    if mount.get("Type") == "tmpfs"
                    and mount.get("Destination") == "/host/run"
                ]
                if (
                    len(root_binds) != 1
                    or len(all_host_root_binds) != 1
                    or len(run_masks) != 1
                ):
                    raise SystemExit("node-exporter: exact rootfs and /run mask mounts are required")
                tmpfs = host.get("Tmpfs") or {}
                if "/host/run" not in tmpfs:
                    raise SystemExit("node-exporter: /host/run tmpfs contract is missing")
                if Path(f"/proc/{pid}/root/host/run/docker.sock").exists():
                    raise SystemExit("node-exporter: Docker socket is visible below the host root bind")
            if service == "open-webui":
                if host.get("ReadonlyRootfs") is not True:
                    raise SystemExit("open-webui: read-only root filesystem is required")
                tmpfs = host.get("Tmpfs") or {}
                tmpfs_options = set((tmpfs.get("/tmp") or "").split(","))
                if not {"rw", "noexec", "nosuid", "nodev", "mode=1777", "size=256m"} <= tmpfs_options:
                    raise SystemExit("open-webui: bounded hardened /tmp tmpfs contract is missing")
                mounts = normalized_container_mounts(container)
                if mounts is None:
                    raise SystemExit("open-webui: malformed Docker mount metadata")
                tmpfs_mounts = [
                    mount for mount in mounts
                    if mount.get("Type") == "tmpfs" and mount.get("Destination") == "/tmp"
                ]
                data_volumes = [
                    mount for mount in mounts
                    if mount.get("Type") == "volume"
                    and mount.get("Name") == f"{project}_openwebui_data"
                    and mount.get("Destination") == "/app/backend/data"
                    and mount.get("RW") is True
                ]
                if len(tmpfs_mounts) != 1 or len(data_volumes) != 1:
                    raise SystemExit("open-webui: exact temporary and persistent mount contract is required")
                environment = {
                    entry.split("=", 1)[0]: entry.split("=", 1)[1]
                    for entry in (container.get("Config") or {}).get("Env") or []
                    if "=" in entry
                }
                required_environment = {
                    "HOME": "/app/backend/data",
                    "PYTHONNOUSERSITE": "1",
                    "PYTHONDONTWRITEBYTECODE": "1",
                    "STATIC_DIR": "/tmp/static",
                }
                if any(environment.get(key) != value for key, value in required_environment.items()):
                    raise SystemExit("open-webui: hardened runtime environment contract drift")
            if service == "grafana":
                if host.get("ReadonlyRootfs") is not True:
                    raise SystemExit("grafana: read-only root filesystem is required")
                tmpfs = host.get("Tmpfs") or {}
                plugin_options = set(
                    (tmpfs.get("/var/lib/grafana/plugins") or "").split(",")
                )
                required_plugin_options = {
                    "rw",
                    "noexec",
                    "nosuid",
                    "nodev",
                    "uid=65532",
                    "gid=65532",
                    "mode=0700",
                }
                if not required_plugin_options <= plugin_options:
                    raise SystemExit(
                        "grafana: hardened ephemeral plugin tmpfs contract is missing"
                    )
                mounts = normalized_container_mounts(container)
                if mounts is None:
                    raise SystemExit("grafana: malformed Docker mount metadata")
                plugin_mounts = [
                    mount
                    for mount in mounts
                    if mount.get("Type") == "tmpfs"
                    and mount.get("Destination") == "/var/lib/grafana/plugins"
                ]
                data_volumes = [
                    mount
                    for mount in mounts
                    if mount.get("Type") == "volume"
                    and mount.get("Name") == f"{project}_grafana_data"
                    and mount.get("Destination") == "/var/lib/grafana"
                    and mount.get("RW") is True
                ]
                if len(plugin_mounts) != 1 or len(data_volumes) != 1:
                    raise SystemExit(
                        "grafana: exact ephemeral plugin and persistent data mounts are required"
                    )

            status = {}
            for line in Path(f"/proc/{pid}/status").read_text().splitlines():
                if ":" in line:
                    key, value = line.split(":", 1)
                    status[key] = value.strip().split()[0]
            if status.get("NoNewPrivs") != "1" or status.get("Seccomp") != "2":
                raise SystemExit(f"{service}: live NNP/seccomp contract drift")
            expected_uid = {
                "alloy": "473",
                "grafana": "65532",
                "node-exporter": "65532",
                "open-webui": "65532",
            }.get(service)
            if expected_uid is not None and (
                status.get("Uid") != expected_uid or status.get("Gid") != expected_uid
            ):
                raise SystemExit(f"{service}: live non-root identity drift")
            cap_eff = int(status.get("CapEff", "-1"), 16)
            cap_bnd = int(status.get("CapBnd", "-1"), 16)
            if cap_eff != effective_caps.get(service, 0):
                raise SystemExit(f"{service}: unexpected effective capabilities")
            if cap_bnd != bounded_caps.get(service, 0):
                raise SystemExit(f"{service}: unexpected capability bounding set")

        print(
            f"selinux-runtime-contract=ok confined={len(expected-disabled)} "
            f"bounded-disabled={len(disabled)} bind-objects={checked_bind_objects}"
        )
      - "{{ compose_project_name }}"
      - >-
        {{
          ([
            'traefik-int', 'traefik-adm', 'oauth2-proxy',
            'oauth2-proxy-grafana', 'oauth2-proxy-prometheus',
            'litellm', 'open-webui', 'keycloak',
            'dev-portal', 'admin-portal',
            'envoy-egress', 'key-rotator', 'vault', 'postgres', 'redis',
            'alloy', 'prometheus', 'node-exporter', 'loki', 'tempo', 'grafana',
            'cribl-mock'
          ]
          + (['oauth2-proxy-vault', 'vault-ui-proxy']
             if (aigw_vault_ui_enabled | bool) else [])
          + (['lab-dns'] if (platform_authoritative_dns_enabled | bool) else [])
          + (['samba-ad'] if (samba_lab_enabled | bool) else []))
          | to_json
        }}
      - "{{ ['alloy', 'node-exporter'] | to_json }}"
      - "{{ aigw_bind_source_digests | to_json }}"
      - >-
        {{
          (['vault', 'key-rotator']
           if (vault_strict_readiness is defined and vault_strict_readiness.rc != 0)
           else [])
          | to_json
        }}
      - "{{ docker_data_root }}"
  register: selinux_runtime_contract
  changed_when: false
  retries: 24
  delay: 5
  until: selinux_runtime_contract.rc == 0

- name: Prove disabled Vault browser-surface containers are absent, not stopped
  ansible.builtin.command:
    argv:
      - docker
      - --host
      - unix:///run/docker.sock
      - ps
      - -aq
      - --filter
      - "label=com.docker.compose.project={{ compose_project_name }}"
      - --filter
      - "label=com.docker.compose.service={{ item }}"
  loop:
    - oauth2-proxy-vault
    - vault-ui-proxy
  register: disabled_vault_ui_containers
  changed_when: false
  failed_when: disabled_vault_ui_containers.stdout | trim | length > 0
  when: not (aigw_vault_ui_enabled | bool)

- name: Read Docker runtime-root SELinux types without relabeling them
  ansible.builtin.command:
    argv: [stat, -c, '%C', --, "{{ item }}"]
  loop:
    - "{{ docker_data_root }}"
    - "{{ docker_data_root }}/containers"
  register: docker_runtime_contexts
  changed_when: false

- name: Docker runtime roots retain the policy-owned container runtime type
  ansible.builtin.assert:
    that:
      - item.stdout is match('^system_u:object_r:container_var_lib_t:s0$')
    quiet: true
    fail_msg: >-
      {{ item.item }} was relabeled as application content. z/Z must never be
      applied to the Docker data root or containers tree.
  loop: "{{ docker_runtime_contexts.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: Read SELinux denials created during this converge window
  ansible.builtin.command:
    argv:
      - ausearch
      - -m
      - AVC,USER_AVC
      - --start
      - "{{ aigw_selinux_audit_window_start.stdout.split()[0] }}"
      - "{{ aigw_selinux_audit_window_start.stdout.split()[1] }}"
  environment:
    LC_ALL: C
  register: aigw_recent_selinux_denials
  changed_when: false
  failed_when: false

- name: Require zero SELinux denials during the controlled converge
  ansible.builtin.assert:
    that:
      - aigw_recent_selinux_denials.rc == 1
      # Rocky 9 ausearch with LC_ALL=C reports a clean no-match query on
      # stderr. Require its exact documented stream layout so a parser or
      # audit-query error cannot be mistaken for a clean window.
      - aigw_recent_selinux_denials.stdout | trim == ''
      - aigw_recent_selinux_denials.stderr | trim == '<no matches>'
    quiet: true
    fail_msg: >-
      SELinux AVC audit verification did not prove a clean converge window.
      Review the audit record or query error and narrow the mount/policy
      contract; never disable labeling on another service as a workaround.

- name: Read each dedicated PBR rule
  ansible.builtin.command: "ip -4 rule show priority {{ item.priority }}"
  loop: "{{ pbr_tables }}"
  loop_control:
    label: "{{ item.name }}"
  register: ip_rules
  changed_when: false
  failed_when: >-
    ('from ' ~ item.src) not in ip_rules.stdout or
    ('lookup ' ~ item.name) not in ip_rules.stdout

- name: Read each PBR default route
  ansible.builtin.command: "ip -4 route show table {{ item.id }} default"
  loop: "{{ pbr_tables }}"
  loop_control:
    label: "{{ item.name }}"
  register: pbr_defaults
  changed_when: false
  failed_when: >-
    pbr_defaults.stdout_lines | length != 1 or
    ('via ' ~ item.gw) not in pbr_defaults.stdout or
    ('dev ' ~ item.dev) not in pbr_defaults.stdout or
    (('src ' ~ item.src) not in pbr_defaults.stdout and
     'proto static' not in pbr_defaults.stdout)

- name: Read IPv4 default routes
  ansible.builtin.command: ip -4 route show default
  register: defroute
  changed_when: false

- name: Exactly one default route exists and it exits the egress NIC
  ansible.builtin.assert:
    that:
      - defroute.stdout_lines | length == 1
      - "('dev ' ~ nic_egress) in defroute.stdout_lines[0]"
      - "('via ' ~ eth0_gateway) in defroute.stdout_lines[0]"
    fail_msg: "Expected exactly one IPv4 default route, via {{ nic_egress }}."

- name: firewalld — interfaces in expected zones
  ansible.builtin.command: firewall-cmd --get-active-zones
  register: active_zones
  changed_when: false
  # Assert every configured zone is active by its real name. Substring checks
  # broke when zones were renamed to aigw-* (e.g. "ext" is not in "aigw-egress").
  failed_when: >
    firewalld_zones | map(attribute='zone') | reject('in', active_zones.stdout) | list | length > 0

- name: firewalld — exact runtime and saved-profile zone ownership
  ansible.builtin.command:
    argv:
      - python3
      - -I
      - -c
      - |
        import subprocess
        import sys

        interface, expected = sys.argv[1:]

        def read(*argv):
            result = subprocess.run(
                argv,
                check=False,
                text=True,
                stdout=subprocess.PIPE,
                stderr=subprocess.PIPE,
            )
            if result.returncode != 0:
                raise SystemExit(
                    f"{argv[0]} failed for {interface}: {result.stderr.strip()}"
                )
            return result.stdout.strip()

        runtime = read("firewall-cmd", "--get-zone-of-interface", interface)
        uuid = read("nmcli", "--get-values", "GENERAL.CON-UUID", "device", "show", interface)
        saved = read(
            "nmcli", "--get-values", "connection.zone",
            "connection", "show", "uuid", uuid,
        )
        permanent = read(
            "firewall-cmd", "--permanent", f"--zone={expected}", "--list-interfaces"
        ).split()

        errors = []
        if runtime != expected:
            errors.append(f"runtime={runtime!r}")
        if saved != expected:
            errors.append(f"saved={saved!r}")
        if permanent != [interface]:
            errors.append(f"permanent={permanent!r}")
        if errors:
            raise SystemExit(f"{interface} expected {expected}: " + ", ".join(errors))
      - "{{ item.1 }}"
      - "{{ item.0.zone }}"
  loop: "{{ firewalld_zones | subelements('interfaces') }}"
  loop_control:
    label: "{{ item.1 }} -> {{ item.0.zone }}"
  changed_when: false

- name: firewalld — no legacy zone-wide port openings remain
  ansible.builtin.command: "firewall-cmd --zone={{ item.zone }} --list-ports"
  loop: "{{ firewalld_zones }}"
  loop_control:
    label: "{{ item.zone }}"
  register: zone_ports
  changed_when: false
  failed_when: zone_ports.stdout | trim | length > 0

- name: firewalld — read source-scoped rich rules
  ansible.builtin.command: "firewall-cmd --zone={{ item.zone }} --list-rich-rules"
  loop: "{{ firewalld_zones }}"
  loop_control:
    label: "{{ item.zone }}"
  register: zone_rich_rules
  changed_when: false

- name: firewalld — every approved source/port rule is present
  ansible.builtin.assert:
    that:
      - item.1 in item.0.stdout
    fail_msg: "Missing source-scoped rule in zone {{ item.0.item.zone }}: {{ item.1 }}"
  loop: "{{ zone_rich_rules.results | subelements('item.rich_rules') }}"
  loop_control:
    label: "{{ item.0.item.zone }}"

# firewalld_zones applies these in-role (and at boot Before=docker.service),
# so by verify time the chain must hold the real lockdown, not just "some rules":
# the exact Envoy 443 allow AND the all-bridge original-direction deny.
- name: DOCKER-USER chain populated with egress lockdown
  ansible.builtin.command: iptables -S DOCKER-USER
  register: du
  changed_when: false
  failed_when: >
    du.stdout_lines | length < 5 or
    '-i br-egress' not in du.stdout or
    ('-s ' ~ envoy_egress_ip ~ '/32') not in du.stdout or
    '--ctdir REPLY -j RETURN' not in du.stdout or
    '-i br+ ! -o br+ -j DROP' not in du.stdout

- name: Platform DNS DNAT is source-scoped in DOCKER-USER
  ansible.builtin.assert:
    that:
      # iptables canonicalizes source before the interfaces and emits the
      # conntrack options after the transport match.
      - "du.stdout is search('(?m).* -s ' ~ (vpn_client_cidr | regex_escape) ~ ' -i ' ~ (nic_adm | regex_escape) ~ ' -o br\\+ -p udp .*--dport 53.*--ctstate DNAT.*--ctorigdst ' ~ (eth1_ip | regex_escape) ~ '(?:/32)?.*--ctorigdstport 53.*--ctdir ORIGINAL.*RETURN')"
      - "du.stdout is search('(?m).* -s ' ~ (vpn_client_cidr | regex_escape) ~ ' -i ' ~ (nic_adm | regex_escape) ~ ' -o br\\+ -p tcp .*--dport 53.*--ctstate DNAT.*--ctorigdst ' ~ (eth1_ip | regex_escape) ~ '(?:/32)?.*--ctorigdstport 53.*--ctdir ORIGINAL.*RETURN')"
      - "du.stdout is search('(?m).* -s ' ~ (internal_cidr | regex_escape) ~ ' -i ' ~ (nic_internal | regex_escape) ~ ' -o br\\+ -p udp .*--dport 53.*--ctstate DNAT.*--ctorigdst ' ~ (eth2_ip | regex_escape) ~ '(?:/32)?.*--ctorigdstport 53.*--ctdir ORIGINAL.*RETURN')"
      - "du.stdout is search('(?m).* -s ' ~ (internal_cidr | regex_escape) ~ ' -i ' ~ (nic_internal | regex_escape) ~ ' -o br\\+ -p tcp .*--dport 53.*--ctstate DNAT.*--ctorigdst ' ~ (eth2_ip | regex_escape) ~ '(?:/32)?.*--ctorigdstport 53.*--ctdir ORIGINAL.*RETURN')"
      # Envoy legitimately reaches its Internet resolvers with `-o
      # {{ nic_egress }}`. Reject only DNS that entered from the physical
      # egress leg and was DNATed toward a container bridge.
      - "du.stdout is not search('(?m).* -i ' ~ (nic_egress | regex_escape) ~ ' -o br\\+ -p (?:udp|tcp) .*--dport 53.*--ctstate DNAT.*RETURN')"
    fail_msg: Platform DNS TCP/UDP 53 is not source-scoped before the ADM drop.
  when: platform_authoritative_dns_enabled | bool

- name: Physical ingress is restricted to exact Docker DNAT tuples
  ansible.builtin.assert:
    that:
      - "du.stdout is search('(?m).*' ~ (nic_adm | regex_escape) ~ '.*-o br\\+.*--dport 443.*--ctstate DNAT.*--ctorigdst ' ~ (eth1_ip | regex_escape) ~ '(?:/32)?.*--ctorigdstport 443.*--ctdir ORIGINAL.*RETURN')"
      - "du.stdout is search('(?m).*' ~ (nic_internal | regex_escape) ~ '.*-o br\\+.*--dport 443.*--ctstate DNAT.*--ctorigdst ' ~ (eth2_ip | regex_escape) ~ '(?:/32)?.*--ctorigdstport 443.*--ctdir ORIGINAL.*RETURN')"
      - "du.stdout is not search('(?m)^-A DOCKER-USER -i (' ~ ([nic_adm, nic_internal] | map('regex_escape') | join('|')) ~ ').*--dport (53|443) -j RETURN$')"
    fail_msg: >-
      Physical ingress allows source/port-only forwarding instead of exact
      DNAT to the approved host addresses; the gateway could become a transit router.

- name: Read persistent container-to-host boundary
  ansible.builtin.command: nft list table inet aigw_guard
  register: host_input_guard
  changed_when: false

- name: Independent nft guard denies internal-to-egress routing before reply allowance
  ansible.builtin.command:
    argv:
      - python3
      - -I
      - -c
      - |
        import sys

        policy = sys.stdin.read()
        marker = "chain container_forward {"
        if policy.count(marker) != 1:
            raise SystemExit("aigw_guard must contain exactly one container_forward chain")
        forward = policy.split(marker, 1)[1]
        reply = forward.find("ct state established,related ct direction reply accept")
        if reply < 0:
            raise SystemExit("container_forward has no explicit reply-only allowance")
        errors = []
        for ingress, egress in ((sys.argv[1], sys.argv[2]), (sys.argv[2], sys.argv[1])):
            drop = f'iifname "{ingress}" oifname "{egress}" drop'
            position = forward.find(drop)
            if position < 0:
                errors.append(f"missing physical cross-plane drop: {drop}")
            elif position > reply:
                errors.append(f"physical cross-plane drop occurs after reply allowance: {drop}")
            if f'iifname "{ingress}" oifname "{egress}" accept' in forward:
                errors.append(f"physical cross-plane accept exists: {ingress}->{egress}")
        if errors:
            raise SystemExit("; ".join(errors))
      - "{{ nic_internal }}"
      - "{{ nic_egress }}"
    stdin: "{{ host_input_guard.stdout }}"
    stdin_add_newline: false
  changed_when: false

- name: Every managed bridge denies new container-to-host connections
  ansible.builtin.assert:
    that:
      - "'chain container_forward' in host_input_guard.stdout"
      - "('ip saddr ' ~ envoy_egress_ip) in host_input_guard.stdout"
      - "('iifname \"' ~ item.bridge ~ '\" drop') in host_input_guard.stdout"
      - "('iifname \"' ~ item.bridge ~ '\" ct state established,related ct direction reply accept') in host_input_guard.stdout"
    fail_msg: "Missing host INPUT boundary for {{ item.bridge }}."
  loop: "{{ docker_networks }}"
  loop_control:
    label: "{{ item.bridge }}"

- name: Every Internet resolver is pinned to the Envoy egress identity
  ansible.builtin.assert:
    that:
      - "('ip saddr ' ~ envoy_egress_ip ~ ' ip daddr ' ~ item) in host_input_guard.stdout"
      - "('oifname \"' ~ nic_egress ~ '\"') in host_input_guard.stdout"
    fail_msg: "Internet resolver {{ item }} is not identity- and egress-pinned."
  loop: "{{ egress_dns_servers }}"

- name: Docker default and future bridge names deny new container-to-host connections
  ansible.builtin.assert:
    that:
      - "host_input_guard.stdout.count('iifname \"docker0\" drop') == 2"
      - "host_input_guard.stdout.count('iifname \"br-*\" drop') == 2"
      - "'iifname \"docker0\" ct state established,related ct direction reply accept' in host_input_guard.stdout"
      - "'iifname \"br-*\" ct state established,related ct direction reply accept' in host_input_guard.stdout"
    quiet: true
    fail_msg: >-
      The nft INPUT guard does not cover Docker's docker0/default generated
      br-* bridge names; a future container could reach a host listener.

- name: Platform DNS DNAT is source-scoped in the independent nft guard
  ansible.builtin.assert:
    that:
      - "host_input_guard.stdout is search('iifname \\\"' ~ (nic_adm | regex_escape) ~ '\\\".*ip saddr ' ~ (vpn_client_cidr | regex_escape) ~ '.*udp dport 53 accept')"
      - "host_input_guard.stdout is search('iifname \\\"' ~ (nic_adm | regex_escape) ~ '\\\".*ip saddr ' ~ (vpn_client_cidr | regex_escape) ~ '.*tcp dport 53 accept')"
      - "host_input_guard.stdout is search('iifname \\\"' ~ (nic_internal | regex_escape) ~ '\\\".*ip saddr ' ~ (internal_cidr | regex_escape) ~ '.*udp dport 53 accept')"
      - "host_input_guard.stdout is search('iifname \\\"' ~ (nic_internal | regex_escape) ~ '\\\".*ip saddr ' ~ (internal_cidr | regex_escape) ~ '.*tcp dport 53 accept')"
      - "host_input_guard.stdout is not search('iifname \\\"' ~ (nic_egress | regex_escape) ~ '\\\".*dport 53 accept')"
    fail_msg: Platform DNS TCP/UDP 53 is absent from the persistent native guard.
  when: platform_authoritative_dns_enabled | bool

- name: Independent nft guard restricts physical ingress to exact DNAT tuples
  ansible.builtin.assert:
    that:
      - "'ct status dnat' in host_input_guard.stdout"
      - "('ct original ip daddr ' ~ eth1_ip) in host_input_guard.stdout"
      - "('ct original ip daddr ' ~ eth2_ip) in host_input_guard.stdout"
      - "'ct original proto-dst 443' in host_input_guard.stdout"
      - "host_input_guard.stdout is not search('(?m)iifname \\\"(' ~ ([nic_adm, nic_internal] | map('regex_escape') | join('|')) ~ ')\\\" ip saddr .* (tcp|udp) dport (53|443) accept$')"
    fail_msg: >-
      The independent nft guard lacks exact original-destination/DNAT proof
      for physical ingress and does not independently prevent routed transit.

- name: Firewall persistence services are active
  ansible.builtin.command: >-
    systemctl is-active aigw-host-input-rules.service
    docker-user-rules.service docker-user-rules-watch.service
  changed_when: false

- name: Vault audit rotation timer is active
  ansible.builtin.command: systemctl is-active aigw-vault-audit-rotate.timer
  changed_when: false

- name: Inspect every managed Docker network
  ansible.builtin.command:
    argv: [docker, --host, unix:///run/docker.sock, network, inspect, "{{ item.name }}"]
  loop: "{{ docker_networks }}"
  loop_control:
    label: "{{ item.name }}"
  register: verified_networks
  changed_when: false

- name: Docker networks match the firewall ABI and have IPv6 disabled
  ansible.builtin.assert:
    that:
      - (item.stdout | from_json | first).Driver == 'bridge'
      - (item.stdout | from_json | first).Internal == item.item.internal
      - not ((item.stdout | from_json | first).EnableIPv6 | bool)
      - (item.stdout | from_json | first).Options['com.docker.network.bridge.name'] == item.item.bridge
      - item.item.subnet in ((item.stdout | from_json | first).IPAM.Config | map(attribute='Subnet') | list)
      - >-
        (item.stdout | from_json | first).IPAM.Config[0].IPRange ==
        (item.item.subnet | regex_replace('\\.0/24$', '.128/25'))
    fail_msg: "Docker network {{ item.item.name }} does not match the firewall ABI."
  loop: "{{ verified_networks.results }}"
  loop_control:
    label: "{{ item.item.name }}"

- name: Wait for the lab Samba AD health contract
  ansible.builtin.command:
    argv:
      - docker
      - --host
      - unix:///run/docker.sock
      - inspect
      - "{{ compose_project_name }}-samba-ad-1"
  register: samba_lab_inspect
  changed_when: false
  retries: 45
  delay: 4
  until: >-
    samba_lab_inspect.rc == 0 and
    ((((samba_lab_inspect.stdout | from_json | first).State.Health | default({})).Status) | default('')) == 'healthy'
  when: samba_lab_enabled | bool

- name: Samba lab runtime matches the reviewed isolation boundary
  ansible.builtin.assert:
    that:
      - not ((samba_lab_inspect.stdout | from_json | first).HostConfig.Privileged | bool)
      - (samba_lab_inspect.stdout | from_json | first).HostConfig.ReadonlyRootfs | bool
      - ((samba_lab_inspect.stdout | from_json | first).HostConfig.CapDrop | sort) == ['ALL']
      - ((samba_lab_inspect.stdout | from_json | first).HostConfig.CapAdd | sort) == ['CAP_CHOWN', 'CAP_DAC_OVERRIDE', 'CAP_NET_BIND_SERVICE', 'CAP_SETGID', 'CAP_SETUID', 'CAP_SYS_ADMIN']
      - (((samba_lab_inspect.stdout | from_json | first).HostConfig.PortBindings | default({}, true)) | length) == 0
      - ((samba_lab_inspect.stdout | from_json | first).NetworkSettings.Networks | dict2items | map(attribute='key') | list) == ['net-identity']
    fail_msg: >-
      Samba AD is unhealthy, privileged, externally published, over-capable,
      writable, or attached outside net-identity.
  when: samba_lab_enabled | bool

- name: Wait for the authoritative platform DNS health contract
  ansible.builtin.command:
    argv:
      - docker
      - --host
      - unix:///run/docker.sock
      - inspect
      - "{{ compose_project_name }}-lab-dns-1"
  register: lab_dns_inspect
  changed_when: false
  retries: 30
  delay: 2
  until: >-
    lab_dns_inspect.rc == 0 and
    ((((lab_dns_inspect.stdout | from_json | first).State.Health | default({})).Status) | default('')) == 'healthy'
  when: platform_authoritative_dns_enabled | bool

- name: Platform DNS runtime matches the reviewed isolation boundary
  ansible.builtin.assert:
    that:
      - not ((lab_dns_inspect.stdout | from_json | first).HostConfig.Privileged | bool)
      - (lab_dns_inspect.stdout | from_json | first).HostConfig.ReadonlyRootfs | bool
      - ((lab_dns_inspect.stdout | from_json | first).HostConfig.CapDrop | sort) == ['ALL']
      - ((lab_dns_inspect.stdout | from_json | first).HostConfig.CapAdd | sort) == ['CAP_NET_BIND_SERVICE']
      - ((lab_dns_inspect.stdout | from_json | first).NetworkSettings.Networks | dict2items | map(attribute='key') | list) == ['net-lab-dns']
      - (lab_dns_inspect.stdout | from_json | first).NetworkSettings.Networks['net-lab-dns'].IPAddress == lab_dns_ip
      - ((lab_dns_inspect.stdout | from_json | first).HostConfig.PortBindings | dict2items | map(attribute='key') | sort | list) == ['53/tcp', '53/udp']
      - ((lab_dns_inspect.stdout | from_json | first).HostConfig.PortBindings['53/tcp'] | map(attribute='HostIp') | sort | list) == ([eth1_ip, eth2_ip] | sort)
      - ((lab_dns_inspect.stdout | from_json | first).HostConfig.PortBindings['53/udp'] | map(attribute='HostIp') | sort | list) == ([eth1_ip, eth2_ip] | sort)
      - eth0_ip not in ((lab_dns_inspect.stdout | from_json | first).HostConfig.PortBindings['53/tcp'] | map(attribute='HostIp') | list)
      - eth0_ip not in ((lab_dns_inspect.stdout | from_json | first).HostConfig.PortBindings['53/udp'] | map(attribute='HostIp') | list)
    fail_msg: >-
      Platform DNS is unhealthy, privileged, writable, over-capable, attached to an
      application plane, or published outside TCP/UDP 53.
  when: platform_authoritative_dns_enabled | bool

- name: Verify live containers retain their exact resolver modes
  ansible.builtin.command:
    argv:
      - python3
      - -I
      - -c
      - |
        import json
        import subprocess
        import sys

        project = sys.argv[1]
        internal = json.loads(sys.argv[2])
        egress = json.loads(sys.argv[3])
        internal_services = json.loads(sys.argv[4])
        isolated_services = json.loads(sys.argv[5])
        errors = []
        for name in internal_services + isolated_services + ["envoy-egress"]:
            raw = subprocess.check_output(
                ["docker", "--host", "unix:///run/docker.sock", "inspect",
                 f"{project}-{name}-1"], text=True
            )
            configured = json.loads(raw)[0]["HostConfig"].get("Dns") or []
            expected = (
                egress if name == "envoy-egress"
                else internal if name in internal_services
                else ["127.0.0.1"]
            )
            if configured != expected:
                errors.append(f"{name}:resolver-mode-drift")
        if errors:
            raise SystemExit(";".join(errors))
      - "{{ compose_project_name }}"
      - "{{ internal_dns_servers | to_json }}"
      - "{{ egress_dns_servers | to_json }}"
      - >-
        {{ ['traefik-int', 'traefik-adm', 'alloy', 'cribl-mock'] | to_json }}
      - >-
        {{ (
          [
            'oauth2-proxy', 'oauth2-proxy-grafana',
            'oauth2-proxy-prometheus', 'litellm', 'open-webui', 'keycloak',
            'dev-portal', 'admin-portal', 'key-rotator', 'vault', 'postgres',
            'redis', 'prometheus', 'node-exporter', 'loki', 'tempo', 'grafana'
          ]
          + (['oauth2-proxy-vault', 'vault-ui-proxy']
             if (aigw_vault_ui_enabled | bool) else [])
        ) | to_json }}
  changed_when: false

- name: Preserve embedded service discovery for an upstream-DNS-isolated backend
  ansible.builtin.command:
    argv:
      - docker
      - --host
      - unix:///run/docker.sock
      - exec
      - "{{ compose_project_name }}-litellm-1"
      - python3
      - -I
      - -c
      - |
        import socket

        if not socket.getaddrinfo(
            "postgres", 5432, socket.AF_INET, socket.SOCK_STREAM
        ):
            raise SystemExit("embedded Docker service discovery returned no address")
  changed_when: false

- name: Resolve the authoritative zone from each routable edge resolver path
  ansible.builtin.command:
    argv:
      - python3
      - -I
      - -c
      - |
        import json
        import subprocess
        import sys

        project, service, resolver, hostname, expected = sys.argv[1:]
        raw = subprocess.check_output(
            ["docker", "--host", "unix:///run/docker.sock", "inspect",
             f"{project}-{service}-1"], text=True
        )
        pid = json.loads(raw)[0]["State"]["Pid"]
        result = subprocess.run(
            ["nsenter", "--target", str(pid), "--net", "dig",
             f"@{resolver}", hostname, "A", "+short", "+time=2", "+tries=1"],
            text=True, stdout=subprocess.PIPE, stderr=subprocess.DEVNULL,
            check=False,
        )
        if result.returncode or result.stdout.strip() != expected:
            raise SystemExit("edge resolver path did not return the restricted view")
      - "{{ compose_project_name }}"
      - "{{ item.0 }}"
      - "{{ item.1 }}"
      - "dns.{{ aigw_domain }}"
      - "{{ eth2_ip }}"
  loop: "{{ ['traefik-int', 'traefik-adm'] | product(internal_dns_servers) | list }}"
  loop_control:
    label: "{{ item.0 }}"
  changed_when: false
  when: platform_authoritative_dns_enabled | bool

- name: Query the restricted platform DNS view over UDP and TCP from the host bridge
  ansible.builtin.command:
    argv:
      - dig
      - "@{{ (lab_dns_inspect.stdout | from_json | first).NetworkSettings.Networks['net-lab-dns'].IPAddress }}"
      - "{{ item.name }}"
      - A
      - +short
      - "{{ item.transport }}"
  loop:
    - { name: "portal.{{ aigw_domain }}", transport: +notcp }
    - { name: "auth.{{ aigw_domain }}", transport: +tcp }
    - { name: "api.{{ aigw_domain }}", transport: +notcp }
  register: lab_dns_restricted_queries
  changed_when: false
  failed_when: >-
    lab_dns_restricted_queries.rc != 0 or
    lab_dns_restricted_queries.stdout | trim != eth2_ip
  when: platform_authoritative_dns_enabled | bool

# The host reaches the isolated DNS bridge from its Docker address, which is
# deliberately outside LAB_DNS_ADM_CIDR.  It can therefore exercise the
# fail-closed/default view, but must never be used to assert ADM-only names.
- name: Verify the restricted platform DNS view does not disclose ADM-only names
  ansible.builtin.command:
    argv:
      - dig
      - "@{{ (lab_dns_inspect.stdout | from_json | first).NetworkSettings.Networks['net-lab-dns'].IPAddress }}"
      - "{{ item.name }}"
      - A
      - +noall
      - +comments
      - "{{ item.transport }}"
  loop:
    - { name: "admin.{{ aigw_domain }}", transport: +notcp }
    - { name: "admin-portal.{{ aigw_domain }}", transport: +tcp }
    - { name: "litellm-admin.{{ aigw_domain }}", transport: +notcp }
    - { name: "grafana.{{ aigw_domain }}", transport: +notcp }
    - { name: "prometheus.{{ aigw_domain }}", transport: +tcp }
    - { name: "vault.{{ aigw_domain }}", transport: +notcp }
    - { name: "vault.{{ aigw_domain }}", transport: +tcp }
  register: lab_dns_restricted_negative_queries
  changed_when: false
  failed_when: >-
    lab_dns_restricted_negative_queries.rc != 0 or
    'status: NXDOMAIN' not in lab_dns_restricted_negative_queries.stdout
  when: platform_authoritative_dns_enabled | bool

- name: Prove the restricted DNS view cannot recurse public names
  ansible.builtin.command:
    argv:
      - dig
      - "@{{ (lab_dns_inspect.stdout | from_json | first).NetworkSettings.Networks['net-lab-dns'].IPAddress }}"
      - www.example.com
      - A
      - +noall
      - +comments
      - +time=2
      - +tries=1
  register: internal_public_dns_denial
  changed_when: false
  failed_when: >-
    internal_public_dns_denial.rc != 0 or
    'status: NXDOMAIN' not in internal_public_dns_denial.stdout
  when: platform_authoritative_dns_enabled | bool

# The controller's exact source/ADM path is proven before any host mutation.
# Query through the published ADM listener from that controller so CoreDNS sees
# a real ADM client address.  Do not bind the host's ADM address while querying
# the bridge: source-policy routing correctly sends that traffic to the ADM
# gateway rather than the Docker subnet.
- name: Query the published ADM platform DNS view over UDP and TCP from the controller
  ansible.builtin.command:
    argv:
      - /usr/bin/dig
      - "@{{ eth1_ip }}"
      - "{{ item.name }}"
      - A
      - +short
      - "{{ item.transport }}"
      - +time=5
      - +tries=1
  loop:
    - { name: "auth.{{ aigw_domain }}", expected: "{{ eth1_ip }}", transport: +tcp }
    - { name: "admin.{{ aigw_domain }}", expected: "{{ eth1_ip }}", transport: +notcp }
    - { name: "admin-portal.{{ aigw_domain }}", expected: "{{ eth1_ip }}", transport: +tcp }
    - { name: "litellm-admin.{{ aigw_domain }}", expected: "{{ eth1_ip }}", transport: +notcp }
    - { name: "grafana.{{ aigw_domain }}", expected: "{{ eth1_ip }}", transport: +notcp }
    - { name: "prometheus.{{ aigw_domain }}", expected: "{{ eth1_ip }}", transport: +tcp }
    - { name: "chat.{{ aigw_domain }}", expected: "{{ eth1_ip }}", transport: +tcp }
