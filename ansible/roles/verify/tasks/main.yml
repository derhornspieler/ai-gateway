        | list | length == 0
    fail_msg: "A non-SSH wildcard listener or explicit {{ nic_egress }} listener is exposed."

- name: Prove exact non-root bind-source ownership and modes
  ansible.builtin.command:
    argv:
      - python3
      - -I
      - -c
      - |
        import os
        from pathlib import Path
        import stat
        import sys

        root = Path(sys.argv[1])
        samba_enabled = sys.argv[2] == "true"
        expected = {
            "certs": ("dir", 0, 65532, 0o750),
            "certs/int.key": ("file", 0, 65532, 0o640),
            "certs/int.crt": ("file", 0, 0, 0o644),
            "certs/ca.pem": ("file", 0, 0, 0o644),
            "traefik/dynamic-int.yml": ("file", 0, 0, 0o644),
            "traefik/dynamic-adm.yml": ("file", 0, 0, 0o644),
            "grafana": ("dir", 0, 0, 0o755),
            "grafana/provisioning": ("dir", 0, 0, 0o755),
            "grafana/provisioning/alerting": ("dir", 0, 0, 0o755),
            "grafana/provisioning/alerting/empty.yml": ("file", 0, 0, 0o644),
            "grafana/provisioning/dashboards": ("dir", 0, 0, 0o755),
            "grafana/provisioning/dashboards/json": ("dir", 0, 0, 0o755),
            "grafana/provisioning/dashboards/dashboards.yml": ("file", 0, 0, 0o644),
            "grafana/provisioning/dashboards/json/ai-gateway-live-logs.json": ("file", 0, 0, 0o644),
            "grafana/provisioning/dashboards/json/ai-gateway-overview.json": ("file", 0, 0, 0o644),
            "grafana/provisioning/dashboards/json/ai-gateway-request-audit.json": ("file", 0, 0, 0o644),
            "grafana/provisioning/datasources": ("dir", 0, 0, 0o755),
            "grafana/provisioning/datasources/datasources.yml": ("file", 0, 0, 0o644),
            "grafana/provisioning/plugins": ("dir", 0, 0, 0o755),
            "grafana/provisioning/plugins/empty.yml": ("file", 0, 0, 0o644),
            "keycloak/realms": ("dir", 0, 65532, 0o750),
            "keycloak/realms/aigw-realm.json": ("file", 0, 65532, 0o640),
            "keycloak/realms/anthropic-wif-realm.json": ("file", 0, 65532, 0o640),
            "secrets": ("dir", 0, 0, 0o700),
            "secrets/redis_password": ("file", 0, 65532, 0o440),
            "secrets/redis_users.acl": ("file", 0, 65532, 0o440),
        }
        if samba_enabled:
            expected.update({
                "secrets/samba_ad_admin_password": ("file", 0, 0, 0o400),
                "secrets/samba_ad_bind_password": ("file", 0, 65532, 0o440),
                "secrets/samba_user_lab-admin_password": ("file", 0, 0, 0o400),
                "secrets/samba_user_lab-developer_password": ("file", 0, 0, 0o400),
                "secrets/samba_user_lab-user_password": ("file", 0, 0, 0o400),
            })
        errors = []
        for relative, (kind, uid, gid, mode) in expected.items():
            path = root / relative
            try:
                info = path.lstat()
            except FileNotFoundError:
                errors.append(f"{relative}: missing")
                continue
            actual_kind = "file" if stat.S_ISREG(info.st_mode) else "dir" if stat.S_ISDIR(info.st_mode) else "unsafe"
            actual = (actual_kind, info.st_uid, info.st_gid, stat.S_IMODE(info.st_mode))
            wanted = (kind, uid, gid, mode)
            if path.is_symlink() or actual != wanted or (kind == "file" and info.st_nlink != 1):
                errors.append(f"{relative}: got={actual!r} wanted={wanted!r} links={info.st_nlink}")
        if errors:
            raise SystemExit("; ".join(errors))
      - "{{ stack_dir }}"
      - "{{ samba_lab_enabled | bool | lower }}"
  changed_when: false

- name: Prove selected DHI services actually run as uid and gid 65532
  ansible.builtin.command:
    argv:
      - python3
      - -I
      - -c
      - |
        import json
        from pathlib import Path
        import subprocess
        import sys

        name = sys.argv[1]
        details = json.loads(subprocess.check_output(["docker", "--host", "unix:///run/docker.sock", "inspect", name], text=True))[0]
        pid = int(details["State"]["Pid"])
        if pid <= 0 or not details["State"]["Running"]:
            raise SystemExit(f"{name} is not running")
        fields = {}
        for line in Path(f"/proc/{pid}/status").read_text().splitlines():
            if line.startswith(("Uid:", "Gid:")):
                key, values = line.split(":", 1)
                fields[key] = tuple(int(value) for value in values.split())
        if fields.get("Uid") != (65532, 65532, 65532, 65532):
            raise SystemExit(f"{name} unexpected Uid tuple")
        if fields.get("Gid") != (65532, 65532, 65532, 65532):
            raise SystemExit(f"{name} unexpected Gid tuple")
      - "{{ compose_project_name }}-{{ item }}-1"
  loop:
    - traefik-int
    - traefik-adm
    - keycloak
    - redis
    - grafana
    - key-rotator
  loop_control:
    label: "{{ item }}"
  changed_when: false

- name: Prove trusted TLS and SNI routing through the exact service-plane edge addresses
  ansible.builtin.command:
    argv:
      - python3
      - -I
      - -c
      - |
        import socket
        import ssl
        import sys

        ca_file, address, hostname, path, expected_csv = sys.argv[1:]
        expected = {int(value) for value in expected_csv.split(",")}
        context = ssl.create_default_context(cafile=ca_file)
        with socket.create_connection((address, 443), timeout=5) as plain:
            with context.wrap_socket(plain, server_hostname=hostname) as tls:
                request = (
                    f"GET {path} HTTP/1.1\r\n"
                    f"Host: {hostname}\r\n"
                    "Connection: close\r\n\r\n"
                ).encode("ascii")
                tls.sendall(request)
                response = bytearray()
                while b"\r\n\r\n" not in response and len(response) <= 65536:
                    chunk = tls.recv(4096)
                    if not chunk:
                        break
                    response.extend(chunk)
        first_line = bytes(response).split(b"\r\n", 1)[0].decode("ascii", "strict")
        fields = first_line.split()
        if len(fields) < 2 or not fields[1].isdigit():
            raise SystemExit(f"invalid HTTP response for {hostname}{path}: {first_line!r}")
        status = int(fields[1])
        if status not in expected:
            raise SystemExit(
                f"unexpected status for {hostname}{path}: {status}, wanted {sorted(expected)}"
            )
      - "{{ stack_dir }}/certs/ca.pem"
      - "{{ item.address }}"
      - "{{ item.hostname }}"
      - "{{ item.path }}"
      - "{{ item.status }}"
  loop:
    # Probe each reviewed Traefik attachment directly. Host-origin traffic to
    # a physical published address is deliberately denied while the separate
    # disaster-recovery maintenance guard admits only the recovery operator;
    # listener/DNAT/firewall verification above proves physical publication.
    - { address: "{{ traefik_int_portal_ip }}", hostname: "portal.{{ aigw_domain }}", path: /healthz, status: "200" }
    - { address: "{{ traefik_int_portal_ip }}", hostname: "auth.{{ aigw_domain }}", path: /realms/aigw/.well-known/openid-configuration, status: "200" }
    - { address: "{{ traefik_int_chat_ip }}", hostname: "api.{{ aigw_domain }}", path: /ui, status: "403" }
    - { address: "{{ traefik_adm_admin_ip }}", hostname: "admin.{{ aigw_domain }}", path: /, status: "303" }
    # Traefik v3 RedirectRegex emits 301 for permanent redirects and 302 for
    # temporary redirects. Verify the implementation's actual contract.
    - { address: "{{ traefik_adm_admin_ip }}", hostname: "admin-portal.{{ aigw_domain }}", path: /healthz, status: "301" }
    - { address: "{{ traefik_adm_admin_ip }}", hostname: "litellm-admin.{{ aigw_domain }}", path: /, status: "302" }
    - { address: "{{ traefik_adm_admin_ip }}", hostname: "litellm-admin.{{ aigw_domain }}", path: /ui, status: "302" }
    - { address: "{{ traefik_adm_admin_ip }}", hostname: "litellm-admin.{{ aigw_domain }}", path: /openapi.json, status: "403" }
    - { address: "{{ traefik_adm_admin_ip }}", hostname: "litellm-admin.{{ aigw_domain }}", path: /docs/, status: "403" }
    - { address: "{{ traefik_adm_admin_ip }}", hostname: "litellm-admin.{{ aigw_domain }}", path: /redoc, status: "403" }
    - { address: "{{ traefik_adm_admin_ip }}", hostname: "grafana.{{ aigw_domain }}", path: /, status: "302" }
    - { address: "{{ traefik_adm_admin_ip }}", hostname: "prometheus.{{ aigw_domain }}", path: /, status: "302" }
    # A disabled UI must have no matching router (Traefik 404), not a dangling
    # backend that leaks its former hostname through a 502 response.
    - { address: "{{ traefik_adm_admin_ip }}", hostname: "vault.{{ aigw_domain }}", path: /, status: "{{ '302' if (aigw_vault_ui_enabled | bool) else '404' }}" }
    - { address: "{{ traefik_adm_admin_ip }}", hostname: "auth.{{ aigw_domain }}", path: /admin/, status: "302" }
  loop_control:
    label: "{{ item.hostname }}{{ item.path }} -> {{ item.status }}"
  changed_when: false

- name: Prove Grafana loaded the exact provisioned observability graph without a local-login bypass
  ansible.builtin.command:
    argv:
      - docker
      - --host
      - unix:///run/docker.sock
      - run
      - --rm
      - -i
      - --pull=never
      - --network
      - net-observability
      - --volumes-from
      - "{{ compose_project_name }}-grafana-1:ro"
      - --read-only
      - --tmpfs
      - /tmp:rw,noexec,nosuid,nodev
      - --cap-drop
      - ALL
      - --security-opt
      - no-new-privileges:true
      - --log-driver
      - none
      - --entrypoint
      - /opt/venv/bin/python
      - ai-gateway/portal:1
      - -I
      - -c
      - |
        import json
        import re
        import sqlite3
        import urllib.request

        database = sqlite3.connect(
            "file:/var/lib/grafana/grafana.db?mode=ro", uri=True, timeout=5
        )
        actual = set(
            database.execute("SELECT name, uid, type, url FROM data_source")
        )
        expected = {
            ("Prometheus", "prometheus", "prometheus", "http://prometheus:9090"),
            ("Loki", "loki", "loki", "http://loki:3100"),
            ("Tempo", "tempo", "tempo", "http://tempo:3200"),
        }
        if actual != expected:
            raise SystemExit("Grafana datasource graph does not match the reviewed provisioning")
        # Grafana 12 file provisioning writes dashboards to unified storage;
        # the legacy dashboard/dashboard_provisioning tables remain empty.
        # Parse the stored resource JSON in Python so verification does not
        # depend on optional SQLite JSON extensions.
        resources = list(
            database.execute(
                """
                SELECT "group", resource, namespace, name, folder, action, value
                FROM resource
                WHERE namespace = 'default' AND (
                    ("group" = 'dashboard.grafana.app' AND resource = 'dashboards') OR
                    ("group" = 'folder.grafana.app' AND resource = 'folders' AND name = 'aigw')
                )
                ORDER BY "group", resource, name
                """
            )
        )
        if len(resources) != 4:
            raise SystemExit("Grafana unified-storage resource inventory is not exact")

        expected_dashboards = {
            "aigw-live-logs": (
                "AI Gateway Live Logs",
                "/etc/grafana/provisioning/dashboards/json/ai-gateway-live-logs.json",
            ),
            "aigw-overview": (
                "AI Gateway Overview",
                "/etc/grafana/provisioning/dashboards/json/ai-gateway-overview.json",
            ),
            "aigw-request-audit": (
                "AI Gateway Request Audit",
                "/etc/grafana/provisioning/dashboards/json/ai-gateway-request-audit.json",
            ),
        }
        observed_dashboards = set()
        observed_folder = False
        for group, resource, namespace, name, folder, action, raw_value in resources:
            try:
                value = json.loads(raw_value)
            except (TypeError, ValueError) as error:
                raise SystemExit("Grafana unified-storage resource is not valid JSON") from error
            metadata = value.get("metadata", {})
            annotations = metadata.get("annotations", {})
            if namespace != "default" or metadata.get("namespace") != "default" or action != 1:
                raise SystemExit("Grafana unified-storage namespace/action contract drifted")
            if annotations.get("grafana.app/managedBy") != "classic-file-provisioning":
                raise SystemExit("Grafana resource is not owned by file provisioning")
            if annotations.get("grafana.app/managerId") != "AI Gateway":
                raise SystemExit("Grafana resource manager identity drifted")

            if group == "folder.grafana.app":
                if (
                    resource != "folders"
                    or name != "aigw"
                    or folder != ""
                    or value.get("kind") != "Folder"
                    or value.get("apiVersion") != "folder.grafana.app/v1beta1"
                    or metadata.get("name") != "aigw"
                    or value.get("spec", {}).get("title") != "AI Gateway"
                ):
                    raise SystemExit("Grafana provisioned folder contract drifted")
                observed_folder = True
                continue

            expected = expected_dashboards.get(name)
            if expected is None:
                raise SystemExit("Grafana contains an unreviewed provisioned dashboard")
            title, source_path = expected
            if (
                group != "dashboard.grafana.app"
                or resource != "dashboards"
                or folder != "aigw"
                or value.get("kind") != "Dashboard"
                or value.get("apiVersion") != "dashboard.grafana.app/v0alpha1"
                or metadata.get("name") != name
                or annotations.get("grafana.app/folder") != "aigw"
                or annotations.get("grafana.app/sourcePath") != source_path
                or not re.fullmatch(
                    r"[0-9a-f]{32}", annotations.get("grafana.app/sourceChecksum", "")
                )
                or value.get("spec", {}).get("title") != title
            ):
                raise SystemExit("Grafana provisioned dashboard contract drifted")
            observed_dashboards.add(name)
        if not observed_folder or observed_dashboards != set(expected_dashboards):
            raise SystemExit("Grafana provisioned folder/dashboard graph is incomplete")
        with urllib.request.urlopen("http://grafana:3000/api/health", timeout=10) as response:
            if response.status != 200:
                raise SystemExit("Grafana API is unhealthy")
        # Each exact provisioned backend must answer its application-native
        # readiness endpoint from Grafana's private observability plane.
        for url in (
            "http://prometheus:9090/-/ready",
            "http://loki:3100/ready",
            "http://tempo:3200/ready",
        ):
            with urllib.request.urlopen(url, timeout=10) as response:
                if response.status != 200:
                    raise SystemExit(f"datasource backend is unhealthy: {url}")
  register: grafana_datasource_graph
  retries: 12
  delay: 5
  until: grafana_datasource_graph.rc == 0
  changed_when: false

- name: Prove Prometheus loaded the exact reviewed scrape and alert graph
  ansible.builtin.command:
    argv:
      - python3
      - -I
      - -c
      - |
        import json
        import sys
        import urllib.request

        base = f"http://{sys.argv[1]}:9090/api/v1"

        def fetch(path):
            with urllib.request.urlopen(base + path, timeout=10) as response:
                payload = json.load(response)
            if payload.get("status") != "success":
                raise SystemExit(f"Prometheus API failed for {path}")
            return payload["data"]

        targets = fetch("/targets?state=active")["activeTargets"]
        actual_targets = {
            (target["labels"].get("job"), target["discoveredLabels"].get("__address__"))
            for target in targets
        }
        expected_targets = {
            ("traefik", "traefik-int:9100"),
            ("traefik", "traefik-adm:9100"),
            ("envoy-egress", "envoy-egress:9902"),
            ("keycloak", "keycloak:9000"),
            ("alloy", "alloy:12345"),
            ("grafana", "grafana:3000"),
            ("tempo", "tempo:3200"),
            ("prometheus", "prometheus-observability:9090"),
            ("loki", "loki:3100"),
            ("node-exporter", "node-exporter:9100"),
        }
        if actual_targets != expected_targets or len(targets) != len(expected_targets):
            raise SystemExit("Prometheus scrape target graph does not match reviewed source")
        failed_targets = [
            target for target in targets
            if target.get("health") != "up" or target.get("lastError")
        ]
        if failed_targets:
            raise SystemExit("one or more reviewed Prometheus targets is not cleanly up")

        groups = fetch("/rules?type=alert")["groups"]
        actual_rules = {
            (group["name"], rule["name"])
            for group in groups
            for rule in group["rules"]
        }
        expected_rules = {
            ("aigw-observability-pipeline", "AIGatewayScrapeTargetDown"),
            ("aigw-observability-pipeline", "AIGatewayAlloyExporterSendFailures"),
            ("aigw-observability-pipeline", "AIGatewayAlloyExporterEnqueueFailures"),
            ("aigw-observability-pipeline", "AIGatewayAlloyExporterQueueSaturation"),
            ("aigw-observability-pipeline", "AIGatewayLokiWriteDrops"),
            ("aigw-observability-pipeline", "AIGatewayLokiWriteRetriesHigh"),
            ("aigw-observability-pipeline", "AIGatewayTempoRefusedSpans"),
            ("aigw-observability-pipeline", "AIGatewayPrometheusRemoteWriteFailures"),
            ("aigw-observability-pipeline", "AIGatewayPrometheusRemoteWriteBacklog"),
            ("aigw-state-capacity", "AIGatewayFilesystemSpaceLow"),
            ("aigw-state-capacity", "AIGatewayFilesystemSpaceCritical"),
            ("aigw-state-capacity", "AIGatewayFilesystemPredictedFull"),
        }
        if actual_rules != expected_rules:
            raise SystemExit("Prometheus alert rule graph does not match reviewed source")
        unhealthy_rules = [
            rule
            for group in groups
            for rule in group["rules"]
            if rule.get("health") != "ok"
        ]
        if unhealthy_rules:
            raise SystemExit("one or more reviewed Prometheus rules failed evaluation")
      - "{{ prometheus_observability_ip }}"
  register: prometheus_observability_graph
  retries: 12
  delay: 5
  until: prometheus_observability_graph.rc == 0
  changed_when: false

- name: Prove Prometheus scraped the host filesystem through node-exporter
  ansible.builtin.command:
    argv:
      - python3
      - -I
      - -c
      - |
        import json
        import sys
        import urllib.parse
        import urllib.request

        base = f"http://{sys.argv[1]}:9090/api/v1/query?"

        def query(expression):
            url = base + urllib.parse.urlencode({"query": expression})
            with urllib.request.urlopen(url, timeout=5) as response:
                payload = json.load(response)
            if payload.get("status") != "success":
                raise SystemExit("Prometheus query failed")
            return payload["data"]["result"]

        up = query('up{job="node-exporter"}')
        if len(up) != 1 or float(up[0]["value"][1]) != 1.0:
            raise SystemExit("node-exporter scrape target is not exactly up")
        filesystems = query(
            'node_filesystem_size_bytes{job="node-exporter",mountpoint="/"}'
        )
        if not filesystems or not all(float(item["value"][1]) > 0 for item in filesystems):
            raise SystemExit("node-exporter did not expose the host root filesystem")
      - "{{ prometheus_observability_ip }}"
  changed_when: false

- name: Egress canary — vendor reachable only via the pinned reverse proxy
  ansible.builtin.command:
    argv:
      - docker
      - --host
      - unix:///run/docker.sock
      - exec
      - "{{ compose_project_name }}-key-rotator-1"
      - python3
      - -c
      - >-
        import urllib.request,sys;
        r=urllib.request.urlopen(urllib.request.Request('http://envoy-egress:8080/anthropic/v1/models'),timeout=15);
        print(r.status)
  register: canary
  changed_when: false
  failed_when: false   # 401 (no key) still proves path+TLS; informational
  # expected: HTTPError 401 from api.anthropic.com through envoy — proves the
  # pinned egress path works; a connection error means routing/DNS/eth0 issue.

- name: Show canary result
  ansible.builtin.debug:
    var: canary.stdout_lines + canary.stderr_lines | default([])
