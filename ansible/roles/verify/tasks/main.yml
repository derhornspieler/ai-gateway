      - >-
        import urllib.request,sys;
        r=urllib.request.urlopen(urllib.request.Request('http://envoy-egress:8080/anthropic/v1/models'),timeout=15);
        print(r.status)
  register: canary
  changed_when: false
  failed_when: false   # 401 (no key) still proves path+TLS; informational
  # expected: HTTPError 401 from api.anthropic.com through envoy — proves the
  # pinned egress path works; a connection error means routing/DNS/eth0 issue.

- name: Show canary result
  ansible.builtin.debug:
    var: canary.stdout_lines + canary.stderr_lines | default([])
