- name: Lab DNS runtime matches the reviewed isolation boundary
  ansible.builtin.assert:
    that:
      - not ((lab_dns_inspect.stdout | from_json | first).HostConfig.Privileged | bool)
      - (lab_dns_inspect.stdout | from_json | first).HostConfig.ReadonlyRootfs | bool
      - ((lab_dns_inspect.stdout | from_json | first).HostConfig.CapDrop | sort) == ['ALL']
      - ((lab_dns_inspect.stdout | from_json | first).HostConfig.CapAdd | sort) == ['CAP_NET_BIND_SERVICE']
      - ((lab_dns_inspect.stdout | from_json | first).NetworkSettings.Networks | dict2items | map(attribute='key') | list) == ['net-lab-dns']
      - (lab_dns_inspect.stdout | from_json | first).NetworkSettings.Networks['net-lab-dns'].IPAddress == lab_dns_ip
      - ((lab_dns_inspect.stdout | from_json | first).HostConfig.PortBindings | dict2items | map(attribute='key') | sort | list) == ['53/tcp', '53/udp']
      - ((lab_dns_inspect.stdout | from_json | first).HostConfig.PortBindings['53/tcp'] | map(attribute='HostIp') | sort | list) == ([eth1_ip, eth2_ip] | sort)
      - ((lab_dns_inspect.stdout | from_json | first).HostConfig.PortBindings['53/udp'] | map(attribute='HostIp') | sort | list) == ([eth1_ip, eth2_ip] | sort)
      - eth0_ip not in ((lab_dns_inspect.stdout | from_json | first).HostConfig.PortBindings['53/tcp'] | map(attribute='HostIp') | list)
      - eth0_ip not in ((lab_dns_inspect.stdout | from_json | first).HostConfig.PortBindings['53/udp'] | map(attribute='HostIp') | list)
    fail_msg: >-
      Lab DNS is unhealthy, privileged, writable, over-capable, attached to an
      application plane, or published outside TCP/UDP 53.
  when: lab_dns_enabled | bool

- name: Query authoritative lab DNS over UDP and TCP from the host bridge
  ansible.builtin.command:
    argv:
      - dig
      - "@{{ (lab_dns_inspect.stdout | from_json | first).NetworkSettings.Networks['net-lab-dns'].IPAddress }}"
      - "{{ item.name }}"
      - A
      - +short
      - "{{ item.transport }}"
  loop:
    - { name: portal.aigw.internal, transport: +notcp }
    - { name: auth.aigw.internal, transport: +tcp }
    - { name: admin.aigw.internal, transport: +tcp }
    - { name: admin-portal.aigw.internal, transport: +notcp }
    - { name: grafana.aigw.internal, transport: +notcp }
    - { name: prometheus.aigw.internal, transport: +tcp }
    - { name: vault.aigw.internal, transport: +notcp }
  register: lab_dns_queries
  changed_when: false
  failed_when: >-
    lab_dns_queries.rc != 0 or
    (item.name in ['portal.aigw.internal'] and
     lab_dns_queries.stdout | trim != eth2_ip) or
    (item.name not in ['portal.aigw.internal'] and
     lab_dns_queries.stdout | trim != eth1_ip)
  when: lab_dns_enabled | bool

