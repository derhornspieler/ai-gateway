---
# Source-based policy routing keeps replies on the NIC/address where a flow
# arrived. The host's existing NetworkManager connection profiles and static
# addressing are customer-owned: this role never creates a connection, changes
# an address/gateway, or replaces a connection's route list.

- name: Assert expected NICs exist and are distinct
  ansible.builtin.assert:
    that:
      - nic_egress in ansible_facts.interfaces
      - nic_adm in ansible_facts.interfaces
      - nic_internal in ansible_facts.interfaces
      - "[nic_egress, nic_adm, nic_internal] | unique | length == 3"
    fail_msg: "Configured egress/ADM/internal interfaces do not match the host."

- name: Inspect the administrator policy-routing table registry
  ansible.builtin.stat:
    path: /etc/iproute2/rt_tables
    follow: false
  register: administrator_rt_tables

- name: Refuse an unsafe administrator policy-routing registry
  ansible.builtin.assert:
    that:
      - >-
        not (administrator_rt_tables.stat.exists | default(false)) or
        (administrator_rt_tables.stat.isreg | default(false))
      - not (administrator_rt_tables.stat.islnk | default(false))
    quiet: true
    fail_msg: /etc/iproute2/rt_tables must be a regular non-symlink file.

# Rocky 9 keeps the pristine registry in /usr/share and creates no /etc file
# on a vanilla installation. Preserve its standard table names when creating
# the administrator override; a blank project-only override would otherwise
# shadow the vendor registry for name resolution.
- name: Seed the administrator registry from the Rocky vendor registry
  ansible.builtin.copy:
    src: /usr/share/iproute2/rt_tables
    dest: /etc/iproute2/rt_tables
    remote_src: true
    force: false
    owner: root
    group: root
    mode: "0644"
  when: not (administrator_rt_tables.stat.exists | default(false))

- name: Named routing tables
  ansible.builtin.blockinfile:
    path: /etc/iproute2/rt_tables
    create: true
    mode: "0644"
    marker: "# {mark} AI GATEWAY POLICY TABLES"
    block: |
      {% for t in pbr_tables %}
      {{ t.id }} {{ t.name }}
      {% endfor %}

- name: Install additive AI Gateway policy-routing applicator
  ansible.builtin.template:
    src: aigw-policy-routing.sh.j2
    dest: /usr/local/sbin/aigw-policy-routing
    owner: root
    group: root
    mode: "0750"

- name: Reapply policy routing after a relevant NetworkManager event
  ansible.builtin.copy:
    src: 90-aigw-policy-routing
    dest: /etc/NetworkManager/dispatcher.d/90-aigw-policy-routing
    owner: root
    group: root
    mode: "0755"

- name: Install boot-time policy-routing unit
  ansible.builtin.copy:
    src: aigw-policy-routing.service
    dest: /etc/systemd/system/aigw-policy-routing.service
    owner: root
    group: root
    mode: "0644"
  register: pbr_unit

- name: Reload systemd for policy-routing unit
  ansible.builtin.systemd:
    daemon_reload: true
  when: pbr_unit.changed

- name: Apply policy routes without modifying NetworkManager connections
  ansible.builtin.command: /usr/local/sbin/aigw-policy-routing
  changed_when: false

- name: Prove a fresh key-only controller SSH path after policy-routing change
  ansible.builtin.command:
    # OpenSSH joins every argument after the destination into the remote shell
    # command without retaining argv boundaries.  Keep the compound probe in
    # one argument so `-n` is passed to sudo and SSH_CONNECTION remains from
    # the unprivileged SSH session.
    argv: "{{ aigw_post_pbr_ssh_argv + ['/usr/bin/sudo -n /usr/bin/true && exec /usr/bin/printenv SSH_CONNECTION'] }}"
  vars:
    aigw_post_pbr_ssh_argv: >-
      {{
        ['ssh', '-p', ansible_port | default(22) | string]
        + (
            ['-i', ansible_ssh_private_key_file]
            if ansible_ssh_private_key_file is defined
              and ansible_ssh_private_key_file | length > 0
            else []
          )
        + [
            '-o', 'BatchMode=yes',
            '-o', 'PasswordAuthentication=no',
            '-o', 'KbdInteractiveAuthentication=no',
            '-o', 'PreferredAuthentications=publickey',
            '-o', 'StrictHostKeyChecking=yes',
            '-o', 'ConnectTimeout=10',
            ansible_user ~ '@' ~ ansible_host
          ]
      }}
  delegate_to: localhost
  become: false
  changed_when: false
  register: aigw_post_pbr_ssh_transport

- name: Require policy routing to preserve the proven ADM controller path
  ansible.builtin.command:
    argv:
      - python3
      - -I
      - -c
      - |
        import ipaddress
        import sys

        fields = sys.argv[1].split()
        if len(fields) != 4:
            raise SystemExit("post-PBR SSH transport did not yield four SSH_CONNECTION fields")
        client, client_port, server, server_port = fields
        try:
            client_address = ipaddress.ip_address(client)
            allowed = ipaddress.ip_network(sys.argv[2], strict=True)
            int(client_port)
            actual_port = int(server_port)
            expected_port = int(sys.argv[4])
        except ValueError as exc:
            raise SystemExit(f"invalid post-PBR SSH transport tuple: {exc}") from exc
        if client_address not in allowed:
            raise SystemExit("post-PBR controller source is outside the ADM management CIDR")
        if server != sys.argv[3] or actual_port != expected_port:
            raise SystemExit("policy routing did not preserve the configured ADM SSH endpoint")
      - "{{ aigw_post_pbr_ssh_transport.stdout | trim }}"
      - "{{ vpn_client_cidr }}"
      - "{{ eth1_ip }}"
      - "{{ aigw_management_ssh_port | string }}"
  changed_when: false

- name: Enable policy routing after network-online at boot
  ansible.builtin.systemd:
    name: aigw-policy-routing.service
    enabled: true
    state: started
