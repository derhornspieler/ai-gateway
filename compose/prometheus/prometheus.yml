# Prometheus scrape config — solution-map §1.8.
# node_exporter/cAdvisor/postgres_exporter/redis_exporter land in the
# hardening pass (test-runbook "next steps").
global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  - job_name: traefik
    static_configs:
      - targets: ["traefik-int:9100", "traefik-adm:9100"]

  - job_name: envoy-egress          # read-only stats facade; admin stays loopback-only
    metrics_path: /stats/prometheus
    static_configs:
      - targets: ["envoy-egress:9902"]

  - job_name: keycloak
    metrics_path: /metrics
    static_configs:
      - targets: ["keycloak:9000"]   # KC management port (metrics-enabled)

  - job_name: alloy
    static_configs:
      - targets: ["alloy:12345"]

  - job_name: grafana
    static_configs:
      - targets: ["grafana:3000"]

  - job_name: tempo
    static_configs:
      - targets: ["tempo:3200"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  # Vault telemetry requires either a token or unauthenticated_metrics_access;
  # wire in the hardening pass with a scrape token from the bootstrap script.
