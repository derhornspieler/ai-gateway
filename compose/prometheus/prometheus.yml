# Prometheus scrape config — solution-map §1.8.
# Only endpoints reachable on the dedicated metrics/observability planes are
# scraped. Data services stay isolated until a least-privilege exporter can be
# added without exposing their native administration protocols.
global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  - job_name: traefik
    static_configs:
      - targets: ["traefik-int:9100", "traefik-adm:9100"]

  - job_name: envoy-egress          # read-only stats facade; admin stays loopback-only
    metrics_path: /stats/prometheus
    static_configs:
      - targets: ["envoy-egress:9902"]

  - job_name: keycloak
    metrics_path: /metrics
    static_configs:
      - targets: ["keycloak:9000"]   # KC management port (metrics-enabled)

  - job_name: alloy
    static_configs:
      - targets: ["alloy:12345"]

  - job_name: grafana
    static_configs:
      - targets: ["grafana:3000"]

  - job_name: tempo
    static_configs:
      - targets: ["tempo:3200"]

  - job_name: prometheus
    static_configs:
      # Prometheus binds only its fixed net-observability address, so use its
      # observability-only alias instead of its ambiguous dual-plane service
      # name or loopback for the self-scrape.
      - targets: ["prometheus-observability:9090"]

  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  # Vault telemetry requires either a scoped scrape token or
  # unauthenticated_metrics_access. Vault is intentionally absent from both
  # Prometheus networks, so do not weaken that boundary merely to add a target.
  # PostgreSQL and Redis likewise need dedicated exporters; LiteLLM exposes no
  # reviewed unauthenticated private metrics endpoint in this deployment.
