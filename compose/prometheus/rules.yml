groups:
  - name: aigw-observability-pipeline
    rules:
      - alert: AIGatewayScrapeTargetDown
        expr: up == 0
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "Prometheus target {{ $labels.job }} is down"
          description: "Prometheus cannot scrape {{ $labels.instance }} for job {{ $labels.job }}."

      - alert: AIGatewayAlloyExporterSendFailures
        expr: >-
          increase(otelcol_exporter_send_failed_log_records_total{
            job="alloy",component_id="otelcol.exporter.otlp.cribl"}[2m]) > 0
        # One transient retry must not page. Requiring a non-zero two-minute
        # window continuously for five minutes detects a sustained outage.
        for: 5m
        labels: { severity: warning, owner: platform-operations }
        annotations:
          summary: "Alloy cannot deliver security logs to Cribl"
          description: "The Cribl log exporter has failed for five minutes; its persistent queue is retaining approved security logs for retry."
          runbook_url: "https://docs.aigw.internal/observability-operations#cribl-delivery-alerts"

      - alert: AIGatewayAlloyExporterEnqueueFailures
        expr: >-
          otelcol_exporter_enqueue_failed_log_records_total{
            job="alloy",component_id="otelcol.exporter.otlp.cribl"} > 0
        # block_on_overflow=false protects collector availability, but a full
        # queue then rejects new telemetry. Latch the cumulative loss signal
        # until Alloy restarts: a range increase can miss the first failure
        # when its labeled counter series is first created at a non-zero value.
        for: 0m
        labels: { severity: critical, owner: platform-operations }
        annotations:
          summary: "Cribl security-log queue rejected a record"
          description: "The Cribl exporter could not enqueue an approved security log; delivery data was lost before export."
          runbook_url: "https://docs.aigw.internal/observability-operations#cribl-delivery-alerts"

      - alert: AIGatewayAlloyExporterQueueSaturation
        expr: >-
          (otelcol_exporter_queue_size{job="alloy",component_id="otelcol.exporter.otlp.cribl"}
          / otelcol_exporter_queue_capacity{job="alloy",component_id="otelcol.exporter.otlp.cribl"}) > 0.80
        for: 5m
        labels: { severity: warning, owner: platform-operations }
        annotations:
          summary: "Cribl security-log queue is over 80% full"
          description: "The approved security-log delivery queue is close to exhaustion."
          runbook_url: "https://docs.aigw.internal/observability-operations#cribl-delivery-alerts"

      - alert: AIGatewayLokiWriteDrops
        expr: increase(loki_write_dropped_entries_total{job="alloy"}[5m]) > 0
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "Alloy permanently dropped Loki log entries"
          description: "Loki writer dropped entries after retries (reason={{ $labels.reason }})."

      - alert: AIGatewayLokiWriteRetriesHigh
        expr: increase(loki_write_batch_retries_total{job="alloy"}[5m]) >= 3
        for: 2m
        labels: { severity: warning }
        annotations:
          summary: "Alloy is repeatedly retrying Loki writes"
          description: "The Loki writer retried at least three batches in five minutes."

      - alert: AIGatewayPrometheusRemoteWriteFailures
        expr: >-
          increase(prometheus_remote_storage_samples_failed_total{job="alloy"}[5m]) > 0
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "Alloy remote-write samples failed permanently"
          description: "Remote write {{ $labels.remote_name }} could not deliver samples to Prometheus."

      - alert: AIGatewayPrometheusRemoteWriteBacklog
        expr: >-
          prometheus_remote_storage_samples_pending{job="alloy"}
          > 2 * prometheus_remote_storage_max_samples_per_send{job="alloy"}
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "Alloy remote-write queue has a sustained backlog"
          description: "Remote write {{ $labels.remote_name }} has more than two full batches pending."

  - name: aigw-state-capacity
    rules:
      - alert: AIGatewayFilesystemSpaceLow
        expr: >-
          (node_filesystem_avail_bytes{fstype!~"tmpfs|devtmpfs|overlay|squashfs"}
          / node_filesystem_size_bytes{fstype!~"tmpfs|devtmpfs|overlay|squashfs"}) < 0.15
          and node_filesystem_readonly == 0
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "AI Gateway host filesystem has less than 15% free"
          description: "Filesystem {{ $labels.mountpoint }} on {{ $labels.device }} is approaching capacity."

      - alert: AIGatewayFilesystemSpaceCritical
        expr: >-
          (node_filesystem_avail_bytes{fstype!~"tmpfs|devtmpfs|overlay|squashfs"}
          / node_filesystem_size_bytes{fstype!~"tmpfs|devtmpfs|overlay|squashfs"}) < 0.05
          and node_filesystem_readonly == 0
        for: 5m
        labels: { severity: critical }
        annotations:
          summary: "AI Gateway host filesystem has less than 5% free"
          description: "Filesystem {{ $labels.mountpoint }} on {{ $labels.device }} is near exhaustion."

      - alert: AIGatewayFilesystemPredictedFull
        expr: >-
          predict_linear(node_filesystem_avail_bytes{fstype!~"tmpfs|devtmpfs|overlay|squashfs"}[6h], 24 * 3600) < 0
          and node_filesystem_readonly == 0
        for: 30m
        labels: { severity: warning }
        annotations:
          summary: "AI Gateway host filesystem predicted full within 24 hours"
          description: "Filesystem {{ $labels.mountpoint }} on {{ $labels.device }} is growing too quickly."
