# LiteLLM proxy config — design: docs/solution-map.md §1, §1.7.
# ALL vendor traffic exits via envoy-egress (TLS-originating, CA-pinned).
# Credentials are runtime objects managed by key-rotator via /credentials —
# NOT env vars — so rotation hot-swaps without restart (§1.7).

model_list:
  # NOTE: api_base for anthropic/ models must NOT end in a trailing slash —
  # LiteLLM appends "/v1/messages" without normalizing, and envoy's
  # prefix_rewrite would otherwise emit a double slash. (openai/ is immune.)
  # ── Anthropic (native /v1/messages passthrough for Claude Code) ──────
  # Auto-Inject Prompt Caching: LiteLLM stamps Anthropic cache_control at the
  # proxy, so every client (Open WebUI, dev-portal, Claude Code) benefits with
  # no client change.  Conservative first cut: cache only the system message.
  # After measuring the cache-hit ratio in spend logs, a conversation-turn
  # point ({location: message, index: -2}) can be added below to also cache the
  # growing chat history — deferred so the rollout is measured, not assumed.
  # Requires optional_pre_call_checks in router_settings.
  # Rationale + rollout plan: docs/research/openwebui-prompt-caching.md.
  # Model names are the current-generation Anthropic lineup, exposed to
  # end users in Open WebUI and to API clients. Each entry is verified to
  # actually serve on the customer's WIF-federated Anthropic workspace via
  # scripts/test-wif-inference.py before it ships (the workspace's model
  # entitlements — not this file — are the source of truth for what an org
  # can reach; an unentitled model here would 404 at Anthropic).
  - model_name: claude-opus-4-8
    litellm_params:
      model: anthropic/claude-opus-4-8
      api_base: http://envoy-egress:8080/anthropic
      litellm_credential_name: anthropic-primary
      cache_control_injection_points: [{location: message, role: system}]
  - model_name: claude-sonnet-4-5
    litellm_params:
      model: anthropic/claude-sonnet-4-5
      api_base: http://envoy-egress:8080/anthropic
      litellm_credential_name: anthropic-primary
      cache_control_injection_points: [{location: message, role: system}]
  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5
      api_base: http://envoy-egress:8080/anthropic
      litellm_credential_name: anthropic-primary
      cache_control_injection_points: [{location: message, role: system}]
  # Verified live on the lab's WIF workspace 2026-07-16 (all six return real
  # completions via scripts/test-wif-inference.py / probe). Access is NOT
  # limited here — every key may reach every model; the admin portal's
  # per-project runtime policy is the only model-access control.
  - model_name: claude-opus-4-7
    litellm_params:
      model: anthropic/claude-opus-4-7
      api_base: http://envoy-egress:8080/anthropic
      litellm_credential_name: anthropic-primary
      cache_control_injection_points: [{location: message, role: system}]
  - model_name: claude-sonnet-5
    litellm_params:
      model: anthropic/claude-sonnet-5
      api_base: http://envoy-egress:8080/anthropic
      litellm_credential_name: anthropic-primary
      cache_control_injection_points: [{location: message, role: system}]
  - model_name: claude-fable-5
    litellm_params:
      model: anthropic/claude-fable-5
      api_base: http://envoy-egress:8080/anthropic
      litellm_credential_name: anthropic-primary
      cache_control_injection_points: [{location: message, role: system}]

litellm_settings:
  # otel: prompt-bearing spans -> Alloy -> Cribl, plus the derived per-request
  # Loki stream (service_name="aigw-requests") for local audit (§9.7).
  # aigw_default_model_hook: server-side per-project default-model
  # enforcement. The pre-call hook resolves a request that omits `model`
  # (or sends the `aigw-default` sentinel) to the project's admin-set
  # default from the key's `aigw_default_model` metadata, and DENIES on a
  # malformed default or one outside the key's model allowlist. Caveat: the
  # `aigw-default` sentinel only reaches this hook for keys with no model
  # allowlist (or the all-proxy-models wildcard) -- LiteLLM's own auth
  # layer rejects an explicit "aigw-default" string on a restricted key
  # before this hook runs. Callers should OMIT `model` to get the project
  # default; that path is enforced here for every key. The module is
  # bind-mounted next to this file and resolved relative to it.
  callbacks: ["otel", "aigw_default_model_hook.aigw_default_model_enforcer"]
  drop_params: true
  num_retries: 2
  request_timeout: 600

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: false     # models are reviewed config; creds rotate via /credentials
  # Prompt/completion content belongs only in the access-controlled OTel trace
  # path.  Pin this false instead of relying on LiteLLM's current default so a
  # future image upgrade cannot silently create a second plaintext copy in
  # LiteLLM_SpendLogs.messages/response/proxy_server_request.
  store_prompts_in_spend_logs: false

router_settings:
  redis_host: os.environ/REDIS_HOST
  redis_password: os.environ/REDIS_PASSWORD
  # Activates the PromptCachingDeploymentCheck that makes the per-model
  # cache_control_injection_points above take effect (auto-injection is a no-op
  # without it).  Only the Anthropic models declare injection points; the
  # openai model is untouched, so this check is inert for it.
  optional_pre_call_checks: ["prompt_caching"]
