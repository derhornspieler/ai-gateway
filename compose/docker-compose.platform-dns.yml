# Optional authoritative-only DNS overlay for production Rocky 9 deployments.
# Ansible renders the zone/view files for the supplied domain and
# loads this file only when platform_authoritative_dns_enabled=true.

networks:
  net-platform-dns:
    external: true

services:
  platform-dns:
    build:
      context: ./services/platform-dns
      network: none
    image: ai-gateway/platform-dns:1.14.6
    command: [-conf, /etc/coredns/Corefile]
    restart: unless-stopped
    privileged: false
    user: "65532:65532"
    read_only: true
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    pids_limit: 64
    labels:
      com.aigw.contract.selinux-generation: "1"
      com.aigw.contract.bind-source-digest: ${AIGW_BIND_DIGEST_PLATFORM_DNS:?AIGW_BIND_DIGEST_PLATFORM_DNS must be set}
    deploy:
      resources:
        limits: { memory: 64M, cpus: "0.25", pids: 64 }
    environment:
      PLATFORM_DNS_ADM_CIDR: ${PLATFORM_DNS_ADM_CIDR:?PLATFORM_DNS_ADM_CIDR must be set}
    ports:
      - "${ETH1_IP:?ETH1_IP must be set}:53:53/tcp"
      - "${ETH1_IP:?ETH1_IP must be set}:53:53/udp"
      - "${ETH2_IP:?ETH2_IP must be set}:53:53/tcp"
      - "${ETH2_IP:?ETH2_IP must be set}:53:53/udp"
    volumes:
      - ./services/platform-dns/Corefile:/etc/coredns/Corefile:ro,Z
      - ./services/platform-dns/db.aigw.internal:/etc/coredns/zones/db.aigw.internal:ro,Z
      - ./services/platform-dns/db.aigw.internal.adm:/etc/coredns/zones/db.aigw.internal.adm:ro,Z
    networks:
      net-platform-dns:
        ipv4_address: ${PLATFORM_DNS_IP:?PLATFORM_DNS_IP must be set}
    healthcheck:
      test: [CMD, /dns-healthcheck]
      interval: 10s
      timeout: 2s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
        labels: "com.docker.compose.project,com.docker.compose.service"
