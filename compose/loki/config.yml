# Loki single-binary, filesystem storage (LUKS-encrypted volume at rest §1.6).
# Full AI content lives in Cribl spans and, by explicit owner decision, in the
# dedicated per-request stream (service_name="aigw-requests") Alloy derives
# from litellm_request spans. Loki therefore contains sensitive prompt and
# operational/audit data and is queried only via the ADM Grafana path.
auth_enabled: false

server:
  http_listen_port: 3100

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

ingester:
  wal:
    enabled: true
    dir: /loki/wal
    # Loki 3.7 defaults this to 4 GiB, four times this container's 1 GiB
    # cgroup limit. A restart with a backlog could therefore OOM-loop while
    # replaying otherwise recoverable data. Keep replay plus process overhead
    # inside the limit and flush cleanly during planned maintenance.
    replay_memory_ceiling: 512MB
    flush_on_shutdown: true

# limits_config alone only marks data eligible for deletion.  The compactor is
# what actually enforces retention for TSDB/filesystem storage in single-binary
# mode; without this block full-prompt logs accumulated indefinitely.
compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 50
  delete_request_store: filesystem

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 168h   # 7d local; long-term retention is Cribl's job
