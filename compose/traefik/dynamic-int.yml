# traefik-int dynamic config â€” internal vhosts (eth2).
http:
  routers:
    # api.$DOMAIN â€” explicit allow-list of LiteLLM's INFERENCE surface only.
    # The management API (/key, /user, /team, /model, /config, /global, ...)
    # and the Admin UI (/ui, /sso, /login) must never be reachable on the
    # internal edge: the native LiteLLM UI is litellm-admin.$DOMAIN on
    # traefik-adm behind oauth2-proxy + the aigw-admins role, while the
    # separate custom platform console is admin.$DOMAIN. Anything not matched
    # here falls through to api-deny below.
    api:
      # Never use a blanket /v1 prefix here. LiteLLM also places management
      # and control-plane handlers below /v1 (for example /v1/model/info,
      # /v1/memory, and /v1/workflows). Keep this list exact and deliberately
      # small; query strings do not affect Traefik Path matching.
      rule: 'Host(`api.{{ env "DOMAIN" }}`) && (Path(`/v1/chat/completions`) || Path(`/chat/completions`) || Path(`/v1/completions`) || Path(`/completions`) || Path(`/v1/embeddings`) || Path(`/embeddings`) || Path(`/v1/messages`) || Path(`/v1/messages/count_tokens`) || Path(`/health/liveliness`) || Path(`/health/readiness`))'
      priority: 100
      entryPoints: [websecure]
      service: litellm
      tls: {}
    api-model-discovery:
      # Model discovery is a separate fail-closed filter. It preserves
      # LiteLLM key scoping, then removes hidden and unmanaged DB models.
      rule: 'Host(`api.{{ env "DOMAIN" }}`) && (Path(`/v1/models`) || PathPrefix(`/v1/models/`) || Path(`/models`) || PathPrefix(`/models/`))'
      priority: 110
      entryPoints: [websecure]
      service: dev-portal
      tls: {}
    # Catch-all deny for the api host. deny-all never matches a real client,
    # so every non-allow-listed path gets 403 before reaching litellm.
    api-deny:
      rule: 'Host(`api.{{ env "DOMAIN" }}`)'
      priority: 1
      entryPoints: [websecure]
      middlewares: [deny-all]
      service: litellm   # unreachable â€” deny-all rejects first
      tls: {}
    auth:
      # Permit only the browser-facing endpoints needed to start/finish portal
      # login and logout. Token redemption, JWKS, and userinfo travel directly
      # over the private Keycloak network; the account console, master realm,
      # and administration API remain exclusive to the ADM edge.
      rule: 'Host(`auth.{{ env "DOMAIN" }}`) && (Path(`/realms/aigw/.well-known/openid-configuration`) || Path(`/realms/aigw/protocol/openid-connect/auth`) || Path(`/realms/aigw/protocol/openid-connect/logout`) || PathPrefix(`/realms/aigw/login-actions/`) || PathPrefix(`/resources/`))'
      priority: 100
      entryPoints: [websecure]
      service: keycloak
      tls: {}
    auth-deny:
      rule: 'Host(`auth.{{ env "DOMAIN" }}`)'
      priority: 1
      entryPoints: [websecure]
      middlewares: [deny-all]
      service: keycloak
      tls: {}
    portal:
      rule: 'Host(`portal.{{ env "DOMAIN" }}`)'
      entryPoints: [websecure]
      service: dev-portal
      tls: {}
    chat:
      # Owner decision: Open WebUI is ALSO published to LAN users on the
      # internal edge. This is a second reachability path only â€” the
      # application keeps its single Keycloak OIDC client and the dedicated
      # aigw-chat role gate, and the source-restricted ADM/VPN listener in
      # dynamic-adm.yml stays as-is. traefik-int reaches the backend over its
      # existing net-chat attachment; no new bridge or alias is involved.
      rule: 'Host(`chat.{{ env "DOMAIN" }}`)'
      entryPoints: [websecure]
      service: open-webui
      tls: {}

  middlewares:
    # 403-everything middleware: an allow-list containing only IPv4's
    # unspecified source address, which cannot originate an established TCP
    # connection. Do not use loopback here; it is a real local source.
    deny-all:
      ipAllowList:
        sourceRange: ["0.0.0.0/32"]

  services:
    litellm:
      loadBalancer:
        servers: [{ url: "http://litellm:4000" }]
    keycloak:
      loadBalancer:
        servers: [{ url: "http://keycloak:8080" }]
    dev-portal:
      loadBalancer:
        servers: [{ url: "http://dev-portal:8080" }]
    open-webui:
      loadBalancer:
        servers: [{ url: "http://open-webui:8080" }]

tls:
  certificates:
    - certFile: /certs/int.crt
      keyFile: /certs/int.key
  stores:
    default:
      defaultCertificate:
        certFile: /certs/int.crt
        keyFile: /certs/int.key
