# traefik-adm dynamic config — admin vhosts (eth1).
http:
  routers:
    chat:
      # Open WebUI retains its own Keycloak OIDC client, but the application
      # is an ADM/VPN-only convenience surface—not part of the internal-user
      # edge. Host firewall policy source-restricts this listener.
      rule: 'Host(`chat.{{ env "DOMAIN" }}`)'
      entryPoints: [websecure]
      service: open-webui
      tls: {}
    admin:
      rule: 'Host(`admin.{{ env "DOMAIN" }}`)'
      entryPoints: [websecure]
      # The first-party console owns its OIDC session, performs a live
      # aigw-admins decision, and requires step-up authentication for writes.
      service: admin-portal
      tls: {}
    litellm-admin-docs-deny:
      rule: 'Host(`litellm-admin.{{ env "DOMAIN" }}`) && (Path(`/openapi.json`) || Path(`/openapi.json/`) || Path(`/docs`) || Path(`/docs/`) || Path(`/redoc`) || Path(`/redoc/`))'
      priority: 120
      entryPoints: [websecure]
      middlewares: [deny-all]
      service: oauth2-proxy # unreachable — deny-all rejects before the OIDC gate
      tls: {}
    litellm-admin-model-mutation-deny:
      # Runtime models belong to the first-party governed workflow. Keep the
      # native UI readable, but block its model/config mutation APIs at the
      # ADM edge. Key-rotator reaches LiteLLM only on the private bridge.
      rule: 'Host(`litellm-admin.{{ env "DOMAIN" }}`) && (PathPrefix(`/model/`) || PathPrefix(`/model_group/`) || Path(`/config/field/update`))'
      priority: 125
      entryPoints: [websecure]
      middlewares: [deny-all]
      service: oauth2-proxy # unreachable — deny-all rejects before OIDC
      tls: {}
    litellm-admin-root:
      rule: 'Host(`litellm-admin.{{ env "DOMAIN" }}`) && Path(`/`)'
      priority: 110
      entryPoints: [websecure]
      middlewares: [litellm-admin-root]
      service: oauth2-proxy
      tls: {}
    litellm-admin:
      rule: 'Host(`litellm-admin.{{ env "DOMAIN" }}`)'
      priority: 100
      entryPoints: [websecure]
      # LiteLLM's native UI and its supporting control APIs remain behind an
      # independent Keycloak OIDC gate with the exact aigw-admins role.
      service: oauth2-proxy
      tls: {}
    grafana:
      rule: 'Host(`grafana.{{ env "DOMAIN" }}`)'
      entryPoints: [websecure]
      # Dedicated oauth2-proxy gate checks the Keycloak aigw-admins role before
      # any Grafana route is reachable.
      service: oauth2-proxy-grafana
      tls: {}
    prometheus:
      rule: 'Host(`prometheus.{{ env "DOMAIN" }}`)'
      entryPoints: [websecure]
      service: oauth2-proxy-prometheus
      tls: {}
# {{ if eq (env "VAULT_UI_ENABLED") "true" }}
    vault:
      rule: 'Host(`vault.{{ env "DOMAIN" }}`)'
      entryPoints: [websecure]
      service: oauth2-proxy-vault
      tls: {}
# {{ end }}
    keycloak-admin:
      # The ADM listener is source-restricted to the VPN CIDR by host firewall
      # and DOCKER-USER rules. It carries the admin console/master realm that
      # are deliberately denied on the internal-user listener.
      rule: 'Host(`auth.{{ env "DOMAIN" }}`)'
      entryPoints: [websecure]
      service: keycloak
      tls: {}

  middlewares:
    deny-all:
      ipAllowList:
        sourceRange: ["0.0.0.0/32"]
    litellm-admin-root:
      redirectRegex:
        regex: '^https://litellm-admin\.[^/]+/$'
        replacement: 'https://litellm-admin.{{ env "DOMAIN" }}/ui'
        permanent: false

  services:
    open-webui:
      loadBalancer:
        servers: [{ url: "http://open-webui:8080" }]
    oauth2-proxy:
      loadBalancer:
        servers: [{ url: "http://oauth2-proxy:4180" }]
    admin-portal:
      loadBalancer:
        servers: [{ url: "http://admin-portal:8080" }]
    oauth2-proxy-grafana:
      loadBalancer:
        servers: [{ url: "http://oauth2-proxy-grafana:4180" }]
    oauth2-proxy-prometheus:
      loadBalancer:
        servers: [{ url: "http://oauth2-proxy-prometheus:4180" }]
# {{ if eq (env "VAULT_UI_ENABLED") "true" }}
    oauth2-proxy-vault:
      loadBalancer:
        servers: [{ url: "http://oauth2-proxy-vault:4180" }]
# {{ end }}
    keycloak:
      loadBalancer:
        # This network-scoped alias resolves only on net-admin-app. It prevents
        # Docker DNS from selecting Keycloak's net-chat address, which would
        # make the ADM proxy's source dynamic and therefore untrusted by
        # Keycloak's exact --proxy-trusted-addresses allow-list.
        servers: [{ url: "http://keycloak-adm:8080" }]

tls:
  certificates:
    - certFile: /certs/int.crt
      keyFile: /certs/int.key
  stores:
    default:
      defaultCertificate:
        certFile: /certs/int.crt
        keyFile: /certs/int.key
