# Local PostgreSQL major-migration rehearsal overlay. The ordinary PreProd
# playbook never loads this file. The fixed rehearsal driver adds it last so
# the full application graph runs once against the exact PostgreSQL 16 source.

services:
  postgres:
    image: "dhi.io/postgres:16.14@sha256:47a12e559e8c418ed54e27da521efcbf4c00fc1c26e86eb58d82845afd7c57c7"
    pull_policy: never
    volumes: !override
      - pg_data:/var/lib/postgresql/16/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro,Z
