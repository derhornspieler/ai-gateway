apiVersion: 1
datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      derivedFields:
        - datasourceUid: tempo
          matcherRegex: 'trace[_-]?id[=: ]+([0-9a-fA-F]{16,32})'
          name: TraceID
          url: '${__value.raw}'
  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    editable: false
    jsonData:
      httpMethod: GET
      serviceMap:
        datasourceUid: prometheus
      tracesToLogsV2:
        datasourceUid: loki
        filterByTraceID: true
        spanStartTimeShift: -5m
        spanEndTimeShift: 5m
  # Owner-approved admin cost/usage path: a READ-ONLY PostgreSQL datasource
  # over LiteLLM's own computed spend rows (metadata only — prompt storage in
  # spend logs is pinned off). The grafana_ro role may CONNECT only to the
  # litellm database and SELECT only the reviewed spend/token/user tables;
  # dashboards use bounded top-N SQL instead of high-cardinality per-user or
  # per-key Prometheus labels. The credential arrives via container
  # environment ($__env) from the encrypted inventory — never from this file.
  - name: LiteLLM Spend
    type: grafana-postgresql-datasource
    uid: litellm-spend
    access: proxy
    url: postgres:5432
    user: grafana_ro
    editable: false
    jsonData:
      database: litellm
      # Plaintext on the dedicated internal-only net-db-grafana bridge matches
      # the platform's container-to-container transport posture.
      sslmode: disable
      maxOpenConns: 4
      maxIdleConns: 2
      connMaxLifetime: 14400
      postgresVersion: 1600
      timescaledb: false
    secureJsonData:
      password: $__env{AIGW_PG_GRAFANA_RO_PASSWORD}
