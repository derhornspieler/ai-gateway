# Rocky 9 identity lab overlay.
#
# This file is never loaded by the generic deployment. Use it only with the
# explicit lab profile:
#   docker compose -f docker-compose.yml -f docker-compose.lab.yml \
#     --profile lab-ad up -d

networks:
  net-identity:
    external: true

volumes:
  samba_ad_config:
  samba_ad_state:
  samba_ad_public:

services:
  samba-ad:
    profiles: [lab-ad]
    build:
      context: ./services/samba-ad-lab
      # Build-time package retrieval uses host egress; the running AD service
      # remains isolated on net-identity with no physical-network allowance.
      network: host
    hostname: samba-ad
    restart: unless-stopped
    privileged: false
    read_only: true
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    cap_add:
      [CHOWN, DAC_OVERRIDE, NET_BIND_SERVICE, SETGID, SETUID, SYS_ADMIN]
    dns: [127.0.0.1]
    pids_limit: 2048
    labels:
      com.aigw.contract.selinux-generation: "1"
      com.aigw.contract.bind-source-digest: ${AIGW_BIND_DIGEST_SAMBA_AD:?AIGW_BIND_DIGEST_SAMBA_AD must be set}
    tmpfs:
      - /run
      - /tmp
      - /var/cache/samba
      - /var/log/samba
    deploy:
      resources:
        limits: { memory: 2G, cpus: "2.0", pids: 2048 }
    environment:
      SAMBA_REALM: LAB.AIGW.INTERNAL
      SAMBA_DOMAIN: AIGWLAB
      SAMBA_HOSTNAME: samba-ad
      SAMBA_BIND_USER: svc-keycloak-ldap
      SAMBA_ADMIN_PASSWORD_FILE: /run/secrets/samba_ad_admin_password
      SAMBA_BIND_PASSWORD_FILE: /run/secrets/samba_ad_bind_password
      SAMBA_SEED_USERS: lab-admin,lab-developer,lab-user
      # The LDAPS endpoint this DC serves. It MUST be an FQDN under the lab
      # domain: the customer (Aegis) root CA carries critical name constraints
      # (permitted DNS aegisgroup.ch/cluster.local), so a certificate whose SAN
      # is the bare container hostname `samba-ad` cannot be signed by that CA
      # (`openssl verify` -> error 47, permitted subtree violation). This FQDN
      # both drives the self-signed bootstrap SAN and is the name Keycloak
      # verifies. It resolves inside net-identity via the Docker network alias
      # declared below.
      SAMBA_LDAPS_FQDN: samba-ad.${DOMAIN:?DOMAIN must be set}
      # Where the CA-issued LDAPS material is delivered. On a fresh converge
      # these are empty placeholders and the entrypoint self-signs; once the
      # Vault PKI ceremony (scripts/vault-pki-intermediate.sh samba-tls) writes
      # the real customer-CA-signed leaf+key here, the entrypoint serves it.
      SAMBA_TLS_CERT_FILE: /run/secrets/samba_ad_tls_cert
      SAMBA_TLS_KEY_FILE: /run/secrets/samba_ad_tls_key
    volumes:
      # File-backed Compose secrets are ordinary bind mounts and cannot carry
      # an explicit SELinux relabel contract. Keep the same in-container
      # secret-file API with explicitly checked binds instead. The LDAP bind
      # value alone is shared with key-rotator; every other source is private
      # to this lab-only DC. Direct Compose invocation is forbidden; Ansible's
      # preflight prevents short syntax from ever creating a missing directory.
      # Ansible has already failed closed unless each source is a regular,
      # single-link file with the exact root-only/group-readable mode. Short
      # syntax is required for reliable Engine-side z/Z relabeling.
      - ./secrets/samba_ad_admin_password:/run/secrets/samba_ad_admin_password:ro,Z
      - ./secrets/samba_ad_bind_password:/run/secrets/samba_ad_bind_password:ro,z
      - ./secrets/samba_user_lab-admin_password:/run/secrets/samba_user_lab-admin_password:ro,Z
      - ./secrets/samba_user_lab-developer_password:/run/secrets/samba_user_lab-developer_password:ro,Z
      - ./secrets/samba_user_lab-user_password:/run/secrets/samba_user_lab-user_password:ro,Z
      # CA-issued LDAPS leaf + key. Root-owned on the host (cert 0644, key 0640
      # root:root — never world-readable, never a Compose env/argv/log value).
      # Private to this DC, so a private-category Z relabel is correct here.
      - ./secrets/samba_ad_tls_cert:/run/secrets/samba_ad_tls_cert:ro,Z
      - ./secrets/samba_ad_tls_key:/run/secrets/samba_ad_tls_key:ro,Z
      - samba_ad_config:/etc/samba
      - samba_ad_state:/var/lib/samba
      - samba_ad_public:/var/lib/samba-public
    networks:
      net-identity:
        # Docker's embedded DNS answers this alias for peers on net-identity
        # (Keycloak), so ldaps://samba-ad.${DOMAIN}:636 resolves to this DC.
        # The short `samba-ad` name keeps working (Docker registers the service
        # name automatically); this only ADDS the FQDN the CA-signed cert bears.
        aliases:
          - samba-ad.${DOMAIN:?DOMAIN must be set}
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
        labels: "com.docker.compose.project,com.docker.compose.service"
    # Repeat the image contract explicitly so a rendered Compose audit can
    # prove it. The script validates database/config presence, Samba control
    # responsiveness, domain policy, and hostname-verified LDAPS—not only PID.
    healthcheck:
      test: [CMD, /usr/local/sbin/samba-ad-healthcheck]
      interval: 15s
      timeout: 8s
      retries: 4
      start_period: 90s

  keycloak:
    environment:
      # Exercise the SAME trust path production will use: trust the REAL
      # customer CA chain (the Aegis root + AIGW intermediate held in
      # certs/ca.pem) so Keycloak validates the Vault-issued LDAPS leaf exactly
      # as it would a customer directory. The lab DC's self-signed
      # bootstrap certificate (published to /var/lib/samba-public/ca.pem) is
      # kept as a SECOND, comma-separated anchor ONLY so federation still works
      # during the first-converge bootstrap window, before the PKI ceremony has
      # issued the CA-signed leaf. After issuance the CA chain is the load-
      # bearing anchor; the self-signed entry is harmless (samba then serves the
      # CA-signed cert, which chains to certs/ca.pem, not to the self-signed CA).
      KC_TRUSTSTORE_PATHS: /etc/aigw/aegis-ca.pem,/var/lib/samba-public/ca.pem
      # LDAPS hostname verification stays strict and is now meaningful: the leaf
      # is verified against the FQDN samba-ad.${DOMAIN}, not a bare hostname.
      KC_TLS_HOSTNAME_VERIFIER: DEFAULT
    volumes:
      # The Aegis chain is the deployed edge CA bundle, SHARED read-only with
      # traefik-int/traefik-adm/open-webui/alloy. Its relabel MUST be the
      # lowercase shared category `z`; a private `Z` would steal the SELinux
      # label from those peers. The file is world-readable (0644) so Keycloak's
      # non-root uid 65532 can read it.
      - ./certs/ca.pem:/etc/aigw/aegis-ca.pem:ro,z
      - samba_ad_public:/var/lib/samba-public:ro
    networks:
      net-identity: {}
    depends_on:
      postgres:
        condition: service_started
      samba-ad:
        condition: service_healthy
        required: true

  key-rotator:
    environment:
      LAB_SAMBA_LDAP_ENABLED: "true"
      # FQDN, not the bare `samba-ad` name: the CA-signed leaf's only SAN is the
      # FQDN (a bare-hostname SAN is unusable under the Aegis name constraints),
      # so hostname verification is only meaningful against this name. Resolves
      # via the samba-ad network alias declared above.
      LAB_SAMBA_LDAP_URL: ldaps://samba-ad.${DOMAIN:?DOMAIN must be set}:636
      LAB_SAMBA_USERS_DN: OU=AIGWUsers,DC=lab,DC=aigw,DC=internal
      LAB_SAMBA_BIND_DN: CN=svc-keycloak-ldap,CN=Users,DC=lab,DC=aigw,DC=internal
      LAB_SAMBA_BIND_PASSWORD_FILE: /run/secrets/samba_keycloak_bind_password
    volumes:
      - ./secrets/samba_ad_bind_password:/run/secrets/samba_keycloak_bind_password:ro,z
    labels:
      com.aigw.contract.selinux-generation: "1"
      com.aigw.contract.bind-source-digest: ${AIGW_BIND_DIGEST_KEY_ROTATOR_LAB:?AIGW_BIND_DIGEST_KEY_ROTATOR_LAB must be set}
