[extend]
useDefault = true

[[rules]]
id = "generic-api-key"

  [[rules.allowlists]]
description = "Deterministic non-production tokens used by validation and unit tests"
regexTarget = "secret"
regexes = [
  '''^0123456789abcdef0123456789abcdef$''',
  '''^abcdef0123456789abcdef0123456789$''',
  '''^sk-ValidationMasterKey_0123456789ABCDEF$''',
  '''^sk-ValidationVirtualKey_0123456789$''',
  '''^ValidationWebuiOIDCSecret0123456789ABC$''',
  '''^ValidationRotatorInternal0123456789ABCDE$''',
  '''^WebuiOIDCSecret_0123456789_ABCDEFGHI$''',
  '''^PortalOIDCSecret_0123456789_ABCDEFGH$''',
  '''^AdminPortalOIDCSecret_0123456789_ABCDE$''',
  '''^OAuth2ProxySecret_0123456789_ABCDEFGHI$''',
  '''^VaultOIDCSecret_0123456789_ABCDEFGHIJK$''',
  '''^ValidationVaultOIDCSecret0123456789ABC$''',
  '''^WebuiOIDCSecret!0123456789-ABCDEFGHI$''',
  '''^PortalOIDCSecret!0123456789-ABCDEFGH$''',
  '''^AdminPortalOIDCSecret!0123456789-ABCDE$''',
  '''^OAuth2ProxySecret!0123456789-ABCDEFGHI$''',
  # Public HashiCorp release-signing subkey fingerprint, not a credential.
  '''^374EC75B485913604A831CC7C820C6D5CD27AB87$''',
]
